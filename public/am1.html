<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>منظم الطلبات الذكي | AM Rewards PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #7000ff;
            --neon-green: #10b981;
            --neon-red: #ff4444;
            --bg-deep: #020617;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-deep);
            color: #fff;
            margin: 0; padding: 20px;
            transition: background 0.5s ease;
        }

        .container {
            max-width: 550px; margin: 0 auto;
            background: var(--glass);
            padding: 25px; border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { text-align: center; color: var(--neon-blue); font-weight: 900; margin-bottom: 5px; text-shadow: 0 0 10px var(--neon-blue); }
        .sub-title { text-align: center; font-size: 12px; color: #94a3b8; margin-bottom: 25px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 12px; font-weight: 700; }
        
        .input-row { display: flex; gap: 10px; }
        
        input, select {
            width: 100%; padding: 12px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.4); color: #fff;
            font-size: 15px; outline: none; box-sizing: border-box;
            transition: 0.3s; font-family: 'Tajawal';
        }
        input:focus, select:focus { border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }

        .add-btn {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            color: #fff; font-weight: 900; cursor: pointer; font-size: 16px;
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.2); margin-top: 10px;
            transition: 0.3s; font-family: 'Tajawal';
        }
        .add-btn:hover { opacity: 0.9; transform: translateY(-1px); }

        .section-title {
            font-size: 16px; color: var(--neon-blue); font-weight: 700;
            margin: 25px 0 15px 0; padding-bottom: 8px;
            border-bottom: 1px solid rgba(0, 242, 255, 0.2);
            display: flex; justify-content: space-between; align-items: center;
        }

        /* جدول تجميعة المطعم الكلية */
        .summary-table {
            width: 100%; border-collapse: collapse; margin-bottom: 20px;
            background: rgba(0,0,0,0.2); border-radius: 14px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .summary-table th {
            background: rgba(112, 0, 255, 0.15); color: #cbd5e1;
            padding: 12px; font-size: 13px; text-align: right;
            border-bottom: 1px solid rgba(112, 0, 255, 0.3);
        }
        .summary-table td {
            padding: 12px; font-size: 14px; color: #fff;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .summary-table tr:last-child td { border-bottom: none; }
        .qty-badge {
            background: rgba(0, 242, 255, 0.1); color: var(--neon-blue);
            padding: 2px 10px; border-radius: 20px; font-weight: bold;
            border: 1px solid rgba(0, 242, 255, 0.3); display: inline-block;
        }

        /* قائمة طلبات الأشخاص */
        .person-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px; padding: 15px; margin-bottom: 12px;
            animation: fadeIn 0.4s ease; position: relative;
        }
        .person-name { font-weight: 900; color: #fff; font-size: 15px; margin-bottom: 8px; }
        .person-items { font-size: 13px; color: #94a3b8; line-height: 1.6; }
        
        .delete-btn {
            position: absolute; left: 15px; top: 15px;
            background: none; border: none; color: #64748b; cursor: pointer;
            font-size: 12px; transition: 0.2s;
        }
        .delete-btn:hover { color: var(--neon-red); }

        .clear-all {
            font-size: 11px; color: var(--neon-red); text-decoration: underline;
            cursor: pointer; background: none; border: none; font-family: 'Tajawal';
        }

        .empty-state {
            text-align: center; color: #475569; font-size: 13px; padding: 20px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <h1>📝 منظم الطلبات</h1>
        <p class="sub-title">تجميع وتلخيص طلبات الأكل والمطاعم ذكياً</p>

        <!-- استمارة إضافة طلب -->
        <div class="form-group">
            <label>اسم الشخص</label>
            <input type="text" id="personName" placeholder="مثال: محمد، أمير، ياسر..." autocomplete="off">
        </div>

        <div class="form-group">
            <label>تفاصيل الطلب</label>
            <div class="input-row">
                <input type="text" id="itemName" placeholder="مثال: فول، طعمية، عيش..." style="flex: 2;">
                <input type="number" id="itemQty" value="1" min="1" style="flex: 1; text-align: center;" inputmode="numeric">
            </div>
        </div>

        <button class="add-btn" onclick="addOrder()">إضافة الصنف للطلبات ➕</button>

        <!-- النصف التحتاني من الورقة: جدول تجميعة المطعم الكلية -->
        <div class="section-title">
            <span>📋 بون المطعم الكلي (الطلب المجمع)</span>
        </div>
        
        <table class="summary-table">
            <thead>
                <tr>
                    <th>الصنف / الطلب</th>
                    <th style="text-align: center; width: 100px;">إجمالي الكمية</th>
                </tr>
            </thead>
            <tbody id="summaryBody">
                <!-- البيانات تظهر هنا برمجياً -->
            </tbody>
        </table>

        <!-- لستة طلبات كل فرد بشكل منفصل -->
        <div class="section-title">
            <span>👤 طلبات الفردية للحساب والتوزيع</span>
            <button class="clear-all" onclick="clearAllOrders()">🔄 مسح الكل</button>
        </div>

        <div id="ordersList">
            <!-- كروت الأشخاص تظهر هنا -->
        </div>

    </div>

    <script>
        // مصفوفة لتخزين البيانات
        let orders = JSON.parse(localStorage.getItem('am_orders')) || [];

        // تشغيل التحديث فور فتح الصفحة
        document.addEventListener("DOMContentLoaded", updateUI);

        function addOrder() {
            const nameInput = document.getElementById('personName');
            const itemInput = document.getElementById('itemName');
            const qtyInput = document.getElementById('itemQty');

            const name = nameInput.value.trim();
            const item = itemInput.value.trim();
            const qty = parseInt(qtyInput.value);

            if (!name || !item || isNaN(qty) || qty < 1) {
                alert("يرجى إدخال البيانات كاملة وبشكل صحيح!");
                return;
            }

            // إضافة الطلب للمصفوفة
            orders.push({
                id: Date.now(),
                name: name,
                item: item,
                qty: qty
            });

            // حفظ البيانات وتحديث الواجهة
            saveAndRefresh();

            // تنظيف حقول الأصناف مع الاحتفاظ بالاسم لتسهيل إضافة كذا صنف لنفس الشخص
            itemInput.value = "";
            qtyInput.value = "1";
            itemInput.focus();
        }

        function deleteOrder(id) {
            orders = orders.filter(order => order.id !== id);
            saveAndRefresh();
        }

        function clearAllOrders() {
            if (confirm("هل أنت متأكد من مسح جميع الطلبات الحالية؟")) {
                orders = [];
                saveAndRefresh();
                document.getElementById('personName').value = "";
            }
        }

        function saveAndRefresh() {
            localStorage.setItem('am_orders', JSON.stringify(orders));
            updateUI();
        }

        function updateUI() {
            const summaryBody = document.getElementById('summaryBody');
            const ordersList = document.getElementById('ordersList');

            // تفريغ المحتوى القديم
            summaryBody.innerHTML = "";
            ordersList.innerHTML = "";

            if (orders.length === 0) {
                summaryBody.innerHTML = `<tr><td colspan="2" class="empty-state">لا توجد طلبات مضافة حالياً.</td></tr>`;
                ordersList.innerHTML = `<div class="empty-state">القائمة فارغة.</div>`;
                return;
            }

            // 1. حساب وتحضير تجميعة المطعم الكلية
            const totals = {};
            orders.forEach(o => {
                const cleanedItem = o.item.toLowerCase();
                totals[cleanedItem] = (totals[cleanedItem] || 0) + o.qty;
            });

            for (const [item, qty] of Object.entries(totals)) {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item}</td>
                    <td style="text-align: center;"><span class="qty-badge">${qty}</span></td>
                `;
                summaryBody.appendChild(row);
            }

            // 2. تجميع وتوزيع الطلبات حسب أسماء الأشخاص
            const groupedPersons = {};
            orders.forEach(o => {
                if (!groupedPersons[o.name]) {
                    groupedPersons[o.name] = [];
                }
                groupedPersons[o.name].push(o);
            });

            for (const [personName, personOrders] of Object.entries(groupedPersons)) {
                const card = document.createElement('div');
                card.className = 'person-card';

                let itemsText = personOrders.map(o => {
                    return `• ${o.item} <span style="color: var(--neon-blue); font-weight: bold;">(${o.qty})</span> <span class="delete-btn" onclick="deleteOrder(${o.id})">❌</span>`;
                }).join('<br>');

                card.innerHTML = `
                    <div class="person-name">👤 ${personName}</div>
                    <div class="person-items">${itemsText}</div>
                `;
                ordersList.appendChild(card);
            }
        }
    </script>
</body>
</html>
