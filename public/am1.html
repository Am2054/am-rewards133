<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار الفطار الذكي - Am Rewards</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #131a26;
            --text-color: #f3f4f6;
            --primary-neon: #00f2fe;
            --secondary-neon: #4facfe;
            --accent-purple: #7f00ff;
            --danger-color: #ff4757;
            --success-color: #2ed573;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 242, 254, 0.1);
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 5px;
            background: linear-gradient(45deg, var(--primary-neon), var(--secondary-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            font-size: 13px;
            color: #8a99ad;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        input, select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--primary-neon);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }

        .btn-add {
            background: linear-gradient(45deg, var(--accent-purple), var(--secondary-neon));
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-add:hover {
            opacity: 0.9;
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.4);
        }

        .list-section {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            border-right: 3px solid var(--primary-neon);
        }

        .order-item .details {
            font-size: 14px;
        }

        .order-item .name {
            font-weight: bold;
            color: var(--secondary-neon);
        }

        .btn-delete {
            background: none;
            border: none;
            color: var(--danger-color);
            cursor: pointer;
            font-size: 14px;
        }

        .result-section {
            margin-top: 25px;
            display: none;
        }

        .result-box {
            background: rgba(0, 242, 254, 0.03);
            border: 1px dashed var(--primary-neon);
            border-radius: 12px;
            padding: 15px;
            margin-top: 10px;
            white-space: pre-line;
            font-size: 14px;
            line-height: 1.6;
        }

        .btn-action {
            width: 100%;
            background: #1e293b;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn-action.process {
            background: var(--success-color);
            color: #000;
            border: none;
        }

        .btn-action.copy {
            background: var(--primary-neon);
            color: #000;
            border: none;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success-color);
            color: #000;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ رادار الفطار الذكي</h1>
    <div class="subtitle">تجميع وفرز طلبات العمال بضغطة واحدة</div>

    <div class="input-group">
        <input type="text" id="workerName" placeholder="اسم العامل أو الموظف" autocomplete="off">
        <input type="text" id="foodItem" placeholder="نوع الساندوتش أو الصنف (فول، فلافل..)" autocomplete="off">
        <input type="text" id="details" placeholder="أي تعديل؟ (بدون طماطم، زيت حار.. اختياري)" autocomplete="off">
        <button class="btn-add" id="addBtn">إضافة القائمة ➕</button>
    </div>

    <div class="list-section" id="ordersList"></div>

    <button class="btn-action process" id="processBtn" style="display: none;">تجميع وفرز الطلبات 🔍</button>

    <div class="result-section" id="resultSection">
        <h3>📋 ملخص طلبات المطعم:</h3>
        <div class="result-box" id="restaurantSummary"></div>
        <button class="btn-action copy" id="copySummaryBtn">نسخ ملخص المطعم 📋</button>

        <h3 style="margin-top: 20px;">👥 جدول التوزيع (مين هياكل إيه):</h3>
        <div class="result-box" id="distributionSummary"></div>
    </div>
</div>

<div class="toast" id="toast">تم النسخ بنجاح! ✔️</div>

<script>
    // مصفوفة لتخزين الطلبات مؤقتاً
    let orders = [];

    const workerNameInput = document.getElementById('workerName');
    const foodItemInput = document.getElementById('foodItem');
    const detailsInput = document.getElementById('details');
    const addBtn = document.getElementById('addBtn');
    const ordersList = document.getElementById('ordersList');
    const processBtn = document.getElementById('processBtn');
    const resultSection = document.getElementById('resultSection');
    const restaurantSummary = document.getElementById('restaurantSummary');
    const distributionSummary = document.getElementById('distributionSummary');
    const copySummaryBtn = document.getElementById('copySummaryBtn');
    const toast = document.getElementById('toast');

    // دالة إضافة الطلب للقائمة
    function addOrder() {
        const name = workerNameInput.value.trim();
        const food = foodItemInput.value.trim();
        const detail = detailsInput.value.trim();

        if (!name || !food) {
            alert('من فضلك اكتب اسم العامل ونوع الأكل!');
            return;
        }

        // إضافة الطلب للكائن
        orders.push({ name, food, detail });

        // إعادة ضبط الخانات وتوجيه المؤشر لاسم العامل الجديد مباشرة
        workerNameInput.value = '';
        foodItemInput.value = '';
        detailsInput.value = '';
        workerNameInput.focus();

        updateList();
    }

    // زرار الإضافة
    addBtn.addEventListener('click', addOrder);

    // السماح بالضغط على Enter للإضافة السريعة
    detailsInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') addOrder();
    });

    // تحديث الواجهة بقائمة الأسماء المضافة
    function updateList() {
        ordersList.innerHTML = '';
        orders.forEach((order, index) => {
            const item = document.createElement('div');
            item.className = 'order-item';
            item.innerHTML = `
                <div class="details">
                    <span class="name">${order.name}:</span> ${order.food} ${order.detail ? `(${order.detail})` : ''}
                </div>
                <button class="btn-delete" onclick="deleteOrder(${index})">حذف ❌</button>
            `;
            ordersList.appendChild(item);
        });

        // إظهار زر التجميع لو فيه طلبات
        processBtn.style.display = orders.length > 0 ? 'block' : 'none';
        if (orders.length === 0) resultSection.style.display = 'none';
    }

    // دالة حذف طلب معين
    function deleteOrder(index) {
        orders.splice(index, 1);
        updateList();
    }

    // دالة الفرز والتجميع السحري
    processBtn.addEventListener('click', function() {
        if (orders.length === 0) return;

        // 1. تجميع طلبات المطعم (حسب الأكل والتعديل)
        let summaryMap = {};
        orders.forEach(order => {
            // المفتاح الفريد عبارة عن الصنف + التعديل إن وجد
            let key = order.food;
            if (order.detail) {
                key += ` (${order.detail})`;
            }
            summaryMap[key] = (summaryMap[key] || 0) + 1;
        });

        // صياغة نص المطعم
        let restaurantText = `إجمالي المطلـوب من المحل:\n`;
        let count = 1;
        for (let item in summaryMap) {
            restaurantText += `🔹 [ ${summaryMap[item]} ]  ${item}\n`;
            count++;
        }

        // 2. صياغة نص التوزيع (مين هياكل إيه)
        let distributionText = '';
        orders.forEach(order => {
            distributionText += `👤 ${order.name} 👈 ${order.food} ${order.detail ? `(${order.detail})` : ''}\n`;
        });

        // عرض النتائج في الواجهة
        restaurantSummary.innerText = restaurantText;
        distributionSummary.innerText = distributionText;
        resultSection.style.display = 'block';

        // النزول لأسفل الشاشة تلقائياً لرؤية النتيجة على الموبايل
        resultSection.scrollIntoView({ behavior: 'smooth' });
    });

    // ميزة النسخ بضغطة زرار واحدة للواتساب
    copySummaryBtn.addEventListener('click', function() {
        const textToCopy = restaurantSummary.innerText;
        navigator.clipboard.writeText(textToCopy).then(() => {
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2000);
        });
    });
</script>

</body>
</html>
