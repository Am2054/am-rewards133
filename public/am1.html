<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام طلبات الفطار | Breakfast Orders</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #FF6B35;
      --secondary: #F7931E;
      --bg-dark: #1a1a2e;
      --card-bg: rgba(255, 107, 53, 0.1);
      --border: rgba(255, 107, 53, 0.2);
      --text: #f5f5f5;
      --text-secondary: #b0b0b0;
      --success: #4CAF50;
      --warning: #FFC107;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: var(--text);
      min-height: 100vh;
      background-attachment: fixed;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ✅ Header */
    header {
      text-align: center;
      margin-bottom: 30px;
      padding: 20px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(255, 107, 53, 0.3);
      animation: slideDown 0.5s ease;
    }

    @keyframes slideDown {
      from { transform: translateY(-30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    header h1 {
      font-size: 2rem;
      font-weight: 900;
      color: #fff;
      margin-bottom: 5px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }

    header p {
      color: rgba(255,255,255,0.9);
      font-size: 0.9rem;
      font-weight: 600;
    }

    /* ✅ Form Card */
    .form-card {
      background: rgba(30, 30, 46, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 30px;
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* ✅ Form Section */
    .form-section {
      margin-bottom: 25px;
    }

    .section-title {
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 12px;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ✅ Input Fields */
    input[type="text"],
    input[type="email"],
    select {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.3);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      margin-bottom: 15px;
      outline: none;
      transition: 0.3s;
    }

    input:focus,
    select:focus {
      border-color: var(--primary);
      background: rgba(255, 107, 53, 0.05);
      box-shadow: 0 0 15px rgba(255, 107, 53, 0.2);
    }

    /* ✅ Radio Buttons (Food Items) */
    .food-options {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .food-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.2);
      border: 2px solid transparent;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
    }

    .food-item:hover {
      border-color: var(--primary);
      background: rgba(255, 107, 53, 0.05);
    }

    .food-item input {
      width: auto;
      margin: 0;
      margin-right: 12px;
      cursor: pointer;
      accent-color: var(--primary);
    }

    .food-info {
      flex: 1;
    }

    .food-name {
      font-weight: 700;
      color: var(--text);
    }

    .food-desc {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .food-price {
      color: var(--primary);
      font-weight: 900;
      font-size: 0.95rem;
    }

    /* ✅ Quantity */
    .quantity-control {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0, 0, 0, 0.2);
      width: fit-content;
      padding: 8px 12px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .quantity-control button {
      background: var(--primary);
      color: #fff;
      border: none;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 900;
      transition: 0.2s;
    }

    .quantity-control button:hover {
      transform: scale(1.1);
    }

    .quantity-display {
      min-width: 30px;
      text-align: center;
      font-weight: 700;
      color: var(--primary);
    }

    /* ✅ Checkbox (Extra Options) */
    .extra-options {
      display: grid;
      gap: 10px;
      margin-bottom: 20px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      padding: 12px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
    }

    .checkbox-item:hover {
      background: rgba(255, 107, 53, 0.1);
    }

    .checkbox-item input {
      width: auto;
      margin: 0;
      margin-right: 12px;
      cursor: pointer;
      accent-color: var(--primary);
    }

    /* ✅ Textarea */
    textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.3);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: 0.3s;
      margin-bottom: 20px;
    }

    textarea:focus {
      border-color: var(--primary);
      background: rgba(255, 107, 53, 0.05);
      box-shadow: 0 0 15px rgba(255, 107, 53, 0.2);
    }

    /* ✅ Buttons */
    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 25px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-weight: 900;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-submit {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
      box-shadow: 0 5px 15px rgba(255, 107, 53, 0.3);
    }

    .btn-submit:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(255, 107, 53, 0.4);
    }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-reset {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-reset:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    /* ✅ Summary */
    .order-summary {
      background: rgba(76, 175, 80, 0.1);
      border: 1px solid rgba(76, 175, 80, 0.3);
      border-radius: 12px;
      padding: 15px;
      margin-top: 20px;
      display: none;
    }

    .order-summary.show {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .summary-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      font-size: 0.9rem;
    }

    .summary-item strong {
      color: var(--success);
    }

    /* ✅ Status Message */
    .status-message {
      padding: 15px;
      border-radius: 12px;
      margin-top: 20px;
      display: none;
      text-align: center;
      font-weight: 700;
    }

    .status-message.show {
      display: block;
      animation: slideUp 0.3s ease;
    }

    .status-success {
      background: rgba(76, 175, 80, 0.15);
      border: 1px solid rgba(76, 175, 80, 0.4);
      color: var(--success);
    }

    .status-error {
      background: rgba(244, 67, 54, 0.15);
      border: 1px solid rgba(244, 67, 54, 0.4);
      color: #f44336;
    }

    /* ✅ Mobile Responsive */
    @media (max-width: 600px) {
      .container { padding: 10px; }
      header h1 { font-size: 1.5rem; }
      .form-card { padding: 20px; }
      .button-group { flex-direction: column-reverse; }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- ✅ Header -->
    <header>
      <h1>🍔 طلب الفطار</h1>
      <p>أدخل تفاصيل طلبك الآن - سيتم إحضاره بسرعة</p>
    </header>

    <!-- ✅ Form -->
    <div class="form-card">
      <form id="orderForm">
        <!-- 1️⃣ Personal Info -->
        <div class="form-section">
          <div class="section-title">👤 بيانتك</div>
          <input type="text" id="fullName" placeholder="اسمك الكامل" required>
          <input type="email" id="email" placeholder="بريدك الإلكتروني" required>
          <select id="department" required>
            <option value="">اختر القسم</option>
            <option value="sales">المبيعات</option>
            <option value="hr">الموارد البشرية</option>
            <option value="it">تكنولوجيا المعلومات</option>
            <option value="accounting">المحاسبة</option>
            <option value="operations">العمليات</option>
            <option value="admin">الإدارة</option>
          </select>
        </div>

        <!-- 2️⃣ Food Selection -->
        <div class="form-section">
          <div class="section-title">🥘 اختر الطعام</div>
          <div class="food-options">
            <label class="food-item">
              <input type="radio" name="food" value="sandwich" data-price="15" required>
              <div class="food-info">
                <div class="food-name">شطيرة الفطار 🥪</div>
                <div class="food-desc">جبن + بيض + نقانق</div>
              </div>
              <div class="food-price">15 ج</div>
            </label>

            <label class="food-item">
              <input type="radio" name="food" value="cheese" data-price="12">
              <div class="food-info">
                <div class="food-name">فطيرة الجبن 🧀</div>
                <div class="food-desc">جبن رومي طازج</div>
              </div>
              <div class="food-price">12 ج</div>
            </label>

            <label class="food-item">
              <input type="radio" name="food" value="eggs" data-price="10">
              <div class="food-info">
                <div class="food-name">بيض مقلي ✨</div>
                <div class="food-desc">3 بيضات مع خبز</div>
              </div>
              <div class="food-price">10 ج</div>
            </label>

            <label class="food-item">
              <input type="radio" name="food" value="beans" data-price="8">
              <div class="food-info">
                <div class="food-name">فول محمص 🫘</div>
                <div class="food-desc">فول مصري أصيل</div>
              </div>
              <div class="food-price">8 ج</div>
            </label>

            <label class="food-item">
              <input type="radio" name="food" value="mixture" data-price="20">
              <div class="food-info">
                <div class="food-name">مشكل الفطار 🎁</div>
                <div class="food-desc">مشكل من كل الأنواع</div>
              </div>
              <div class="food-price">20 ج</div>
            </label>
          </div>
        </div>

        <!-- 3️⃣ Extras -->
        <div class="form-section">
          <div class="section-title">➕ إضافات اختيارية</div>
          <div class="extra-options">
            <label class="checkbox-item">
              <input type="checkbox" name="extras" value="juice" data-price="5">
              <span>عصير طازج 🧃 (+5 ج)</span>
            </label>
            <label class="checkbox-item">
              <input type="checkbox" name="extras" value="tea" data-price="2">
              <span>شاي ساخن ☕ (+2 ج)</span>
            </label>
            <label class="checkbox-item">
              <input type="checkbox" name="extras" value="fruit" data-price="8">
              <span>سلة فواكه 🍎 (+8 ج)</span>
            </label>
            <label class="checkbox-item">
              <input type="checkbox" name="extras" value="pastry" data-price="6">
              <span>معجنات شهية 🥐 (+6 ج)</span>
            </label>
          </div>
        </div>

        <!-- 4️⃣ Quantity -->
        <div class="form-section">
          <div class="section-title">📦 الكمية</div>
          <div class="quantity-control">
            <button type="button" onclick="decreaseQty()">−</button>
            <div class="quantity-display" id="qtyDisplay">1</div>
            <button type="button" onclick="increaseQty()">+</button>
          </div>
        </div>

        <!-- 5️⃣ Notes -->
        <div class="form-section">
          <div class="section-title">📝 ملاحظات إضافية</div>
          <textarea id="notes" placeholder="أي ملاحظات خاصة؟ (بدون بهارات، بدون ملح، إلخ...)"></textarea>
        </div>

        <!-- 6️⃣ Order Summary -->
        <div class="order-summary" id="summary">
          <div class="summary-item">
            <span>الطعام:</span>
            <strong id="summaryFood">---</strong>
          </div>
          <div class="summary-item">
            <span>الإضافات:</span>
            <strong id="summaryExtras">---</strong>
          </div>
          <div class="summary-item">
            <span>الكمية:</span>
            <strong id="summaryQty">1</strong>
          </div>
          <div class="summary-item" style="border-top: 1px solid rgba(76, 175, 80, 0.3); padding-top: 8px; margin-top: 8px;">
            <span>السعر الإجمالي:</span>
            <strong id="summaryTotal">0 ج</strong>
          </div>
        </div>

        <!-- 7️⃣ Buttons -->
        <div class="button-group">
          <button type="reset" class="btn btn-reset" onclick="resetForm()">إعادة تعيين</button>
          <button type="submit" class="btn btn-submit" id="submitBtn">📤 تأكيد الطلب</button>
        </div>

        <!-- Status -->
        <div class="status-message" id="statusMessage"></div>
      </form>
    </div>
  </div>

  <script>
    let quantity = 1;
    const DELIVERY_TIME = 30; // دقيقة

    function increaseQty() {
      if (quantity < 10) {
        quantity++;
        updateDisplay();
      }
    }

    function decreaseQty() {
      if (quantity > 1) {
        quantity--;
        updateDisplay();
      }
    }

    function updateDisplay() {
      document.getElementById('qtyDisplay').textContent = quantity;
      document.getElementById('summaryQty').textContent = quantity;
      updateSummary();
    }

    function updateSummary() {
      const foodRadios = document.querySelectorAll('input[name="food"]');
      const extrasCheckboxes = document.querySelectorAll('input[name="extras"]:checked');

      let selectedFood = null;
      let foodPrice = 0;

      foodRadios.forEach(radio => {
        if (radio.checked) {
          selectedFood = radio.parentElement.querySelector('.food-name').textContent;
          foodPrice = parseFloat(radio.dataset.price);
        }
      });

      let extras = [];
      let extrasPrice = 0;
      extrasCheckboxes.forEach(checkbox => {
        extras.push(checkbox.nextElementSibling.textContent.split(' ')[0]);
        extrasPrice += parseFloat(checkbox.dataset.price);
      });

      document.getElementById('summaryFood').textContent = selectedFood || '---';
      document.getElementById('summaryExtras').textContent = extras.length > 0 ? extras.join(' + ') : 'بدون';

      const totalPrice = (foodPrice + extrasPrice) * quantity;
      document.getElementById('summaryTotal').textContent = totalPrice + ' ج';

      if (selectedFood) {
        document.getElementById('summary').classList.add('show');
      }
    }

    function resetForm() {
      document.getElementById('orderForm').reset();
      quantity = 1;
      updateDisplay();
      document.getElementById('summary').classList.remove('show');
      document.getElementById('statusMessage').classList.remove('show');
    }

    function showStatus(message, isSuccess) {
      const statusEl = document.getElementById('statusMessage');
      statusEl.textContent = message;
      statusEl.className = `status-message show ${isSuccess ? 'status-success' : 'status-error'}`;
      
      if (isSuccess) {
        setTimeout(() => {
          resetForm();
        }, 2000);
      }
    }

    document.getElementById('orderForm').addEventListener('change', updateSummary);
    document.getElementById('orderForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = {
        fullName: document.getElementById('fullName').value,
        email: document.getElementById('email').value,
        department: document.getElementById('department').value,
        food: document.querySelector('input[name="food"]:checked').value,
        extras: Array.from(document.querySelectorAll('input[name="extras"]:checked')).map(el => el.value),
        quantity: quantity,
        notes: document.getElementById('notes').value,
        timestamp: new Date().toISOString(),
        deliveryTime: new Date(Date.now() + DELIVERY_TIME * 60000).toLocaleTimeString('ar-EG')
      };

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '⏳ جاري الحفظ...';

      try {
        const response = await fetch('/api/breakfast-orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });

        if (response.ok) {
          showStatus(`✅ تم استقبال طلبك! ستصل بك الوجبة في الساعة ${formData.deliveryTime}`, true);
        } else {
          showStatus('❌ حدث خطأ في تسجيل الطلب', false);
        }
      } catch (error) {
        showStatus('❌ فشل الاتصال بالسيرفر', false);
      } finally {
        btn.disabled = false;
        btn.textContent = '📤 تأكيد الطلب';
      }
    });

    // تحديث الملخص عند التحميل
    updateDisplay();
  </script>
</body>
</html>
