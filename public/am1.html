<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار الفطار الذكي - Am Rewards</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --bg-secondary: #131a26;
            --card-bg: #1a2332;
            --text-color: #f3f4f6;
            --text-secondary: #b0b8c6;
            --primary-neon: #00f2fe;
            --secondary-neon: #4facfe;
            --accent-purple: #7f00ff;
            --danger-color: #ff4757;
            --success-color: #2ed573;
            --warning-color: #ffa502;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', 'Inter', sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--bg-color) 0%, var(--bg-secondary) 100%);
            color: var(--text-color);
        }

        body {
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-attachment: fixed;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: linear-gradient(135deg, var(--card-bg) 0%, rgba(26, 35, 50, 0.8) 100%);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 242, 254, 0.15);
            backdrop-filter: blur(10px);
        }

        /* ✅ Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary-neon), var(--secondary-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 900;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.1);
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .info-text {
            background: rgba(79, 172, 254, 0.1);
            border: 1px solid rgba(79, 172, 254, 0.3);
            border-radius: 10px;
            padding: 12px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 15px;
            line-height: 1.6;
        }

        /* ✅ Input Group */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 25px 0;
        }

        .input-label {
            font-size: 0.9rem;
            color: var(--primary-neon);
            font-weight: 900;
            margin-bottom: 8px;
        }

        input, textarea {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 16px;
            border-radius: 12px;
            color: var(--text-color);
            font-size: 15px;
            font-family: 'Cairo', sans-serif;
            outline: none;
            transition: 0.3s;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            font-size: 14px;
        }

        input::placeholder, textarea::placeholder {
            color: var(--text-secondary);
        }

        input:focus, textarea:focus {
            border-color: var(--primary-neon);
            background: rgba(0, 242, 254, 0.05);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        /* ✅ Buttons */
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .btn {
            border: none;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 900;
            font-size: 15px;
            font-family: 'Cairo', sans-serif;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-add {
            background: linear-gradient(135deg, var(--accent-purple), var(--secondary-neon));
            color: #fff;
            grid-column: span 2;
        }

        .btn-add:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 172, 254, 0.4);
        }

        .btn-add:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-clear {
            background: rgba(255, 71, 87, 0.15);
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }

        .btn-clear:hover {
            background: var(--danger-color);
            color: #fff;
        }

        /* ✅ List Section */
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .list-header h3 {
            font-size: 0.95rem;
            color: var(--primary-neon);
            font-weight: 900;
        }

        .list-header .count {
            background: var(--primary-neon);
            color: #000;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 900;
        }

        .list-section {
            max-height: 250px;
            overflow-y: auto;
            padding: 0;
            margin-bottom: 20px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(0, 242, 254, 0.1);
        }

        .list-section::-webkit-scrollbar {
            width: 6px;
        }

        .list-section::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .list-section::-webkit-scrollbar-thumb {
            background: rgba(0, 242, 254, 0.3);
            border-radius: 10px;
        }

        .list-section::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 242, 254, 0.5);
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 242, 254, 0.05);
            padding: 14px 16px;
            border-right: 4px solid var(--primary-neon);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        .order-item:hover {
            background: rgba(0, 242, 254, 0.1);
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-item .details {
            flex: 1;
            font-size: 14px;
            line-height: 1.6;
        }

        .order-item .name {
            font-weight: 900;
            color: var(--secondary-neon);
            font-size: 15px;
        }

        .order-item .items {
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 4px;
        }

        .btn-delete {
            background: none;
            border: none;
            color: var(--danger-color);
            cursor: pointer;
            font-size: 13px;
            font-weight: 900;
            margin-right: 10px;
            transition: 0.3s;
            padding: 6px 10px;
        }

        .btn-delete:hover {
            background: rgba(255, 71, 87, 0.2);
            border-radius: 8px;
        }

        /* ✅ Result Section */
        .result-section {
            display: none;
            margin-top: 25px;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-section.show {
            display: block;
        }

        .store-section {
            margin-bottom: 20px;
            animation: slideUp 0.4s ease;
        }

        .store-title {
            font-size: 1rem;
            color: #fff;
            font-weight: 900;
            margin-bottom: 12px;
            padding: 12px 16px;
            background: linear-gradient(135deg, var(--accent-purple), var(--secondary-neon));
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .store-items {
            background: rgba(0, 242, 254, 0.03);
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 12px;
            padding: 16px;
            font-size: 14px;
            line-height: 1.8;
            font-family: 'Courier New', monospace;
            color: var(--text-color);
        }

        .store-item-line {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .store-item-line:last-child {
            border-bottom: none;
        }

        .store-item-qty {
            color: var(--warning-color);
            font-weight: 900;
            margin-right: 10px;
        }

        .store-item-name {
            color: var(--primary-neon);
        }

        /* ✅ Action Buttons */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-action {
            background: #1e293b;
            color: var(--text-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 900;
            transition: 0.3s;
            font-size: 14px;
            font-family: 'Cairo', sans-serif;
        }

        .btn-action:hover {
            border-color: var(--primary-neon);
            background: rgba(0, 242, 254, 0.1);
        }

        .btn-action.copy {
            background: var(--primary-neon);
            color: #000;
            border: none;
            grid-column: span 2;
        }

        .btn-action.copy:hover {
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
        }

        .btn-action.whatsapp {
            background: #25d366;
            color: #fff;
            border: none;
        }

        .btn-action.whatsapp:hover {
            background: #20ba5a;
        }

        .btn-action.print {
            background: #667eea;
            color: #fff;
            border: none;
        }

        .btn-action.print:hover {
            background: #5568d3;
        }

        /* ✅ Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success-color);
            color: #000;
            padding: 14px 24px;
            border-radius: 20px;
            font-weight: 900;
            display: none;
            box-shadow: 0 5px 20px rgba(46, 213, 115, 0.4);
            z-index: 1000;
            animation: slideUpToast 0.3s ease;
        }

        @keyframes slideUpToast {
            from { transform: translateX(-50%) translateY(30px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        .toast.show {
            display: block;
        }

        /* ✅ Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        /* ✅ Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
                border-radius: 20px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .action-buttons {
                grid-template-columns: 1fr;
            }

            .btn-action.copy {
                grid-column: span 1;
            }

            @media print {
                body {
                    background: white;
                }
                .container {
                    box-shadow: none;
                    border: none;
                }
                .button-group, .input-group, .btn-clear, .action-buttons {
                    display: none;
                }
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- ✅ Header -->
    <div class="header">
        <h1>⚡ رادار الفطار الذكي</h1>
        <p class="subtitle">فرز ذكي لطلبات العمال من محلات مختلفة</p>
        <div class="info-text">
            💡 <strong>الطريقة:</strong> اكتب اسم الشخص وكل طلباته من المحلات المختلفة في سطر واحد<br>
            مثال: "يوسف: عيش (مخبز) + فول وبطاطس (مطعم) + شيبسي (سوبر)"
        </div>
    </div>

    <!-- ✅ Input -->
    <div class="input-group">
        <label class="input-label">👥 أضف طلبات العمال:</label>
        <textarea id="ordersInput" placeholder="أمثلة:&#10;يوسف: عيش (مخبز) + فول وبطاطس وطعمية (مطعم) + شيبسي وجبنة (سوبر)&#10;أحمد وأمير: فطير (مخبز) + جبنة وشيبسي (سوبر)&#10;وائل وزياد: 2 فطير (مخبز) + 3 فول (مطعم)"></textarea>
    </div>

    <!-- ✅ Buttons -->
    <div class="button-group">
        <button class="btn btn-add" id="processBtn">🚀 فرز وتجميع</button>
        <button class="btn btn-clear" id="clearBtn">🗑️ مسح الكل</button>
    </div>

    <!-- ✅ List -->
    <div class="list-header" id="listHeaderContainer" style="display: none;">
        <h3>📋 الطلبات المضافة</h3>
        <div class="count" id="listCount">0</div>
    </div>
    <div class="list-section" id="ordersList"></div>

    <!-- ✅ Result -->
    <div class="result-section" id="resultSection">
        <div id="storesContainer"></div>

        <div class="action-buttons">
            <button class="btn-action copy" id="copySummaryBtn">📋 نسخ</button>
            <button class="btn-action whatsapp" id="whatsappBtn">💬 واتس</button>
            <button class="btn-action print" id="printBtn">🖨️ طباعة</button>
        </div>
    </div>
</div>

<!-- ✅ Toast -->
<div class="toast" id="toast"></div>

<script>
    // ✅ Store emoji mapping
    const storeEmojis = {
        'مطعم': '🍽️',
        'مخبز': '🥖',
        'خباز': '🥖',
        'سوبر ماركت': '🛒',
        'سوبر': '🛒',
        'كشري': '🍲',
        'بطاطس': '🍟',
        'مشروبات': '🥤',
        'فواكه': '🍎',
        'صيدلية': '💊'
    };

    // ✅ DOM Elements
    const ordersInput = document.getElementById('ordersInput');
    const processBtn = document.getElementById('processBtn');
    const clearBtn = document.getElementById('clearBtn');
    const ordersList = document.getElementById('ordersList');
    const listCount = document.getElementById('listCount');
    const resultSection = document.getElementById('resultSection');
    const storesContainer = document.getElementById('storesContainer');
    const copySummaryBtn = document.getElementById('copySummaryBtn');
    const whatsappBtn = document.getElementById('whatsappBtn');
    const printBtn = document.getElementById('printBtn');
    const toast = document.getElementById('toast');
    const listHeaderContainer = document.getElementById('listHeaderContainer');

    let parsedOrders = [];

    // ✅ Parse Orders from Text
    function parseOrders() {
        const text = ordersInput.value.trim();
        if (!text) {
            showToast('⚠️ من فضلك اكتب الطلبات!', 'warning');
            return false;
        }

        parsedOrders = [];
        const lines = text.split('\n');

        lines.forEach((line, index) => {
            line = line.trim();
            if (!line) return;

            // Parse: "name: item1 (store1) + item2 (store2)"
            const colonIndex = line.indexOf(':');
            if (colonIndex === -1) {
                showToast(`⚠️ السطر ${index + 1}: من فضلك استخدم صيغة "الاسم: الطلبات"`, 'warning');
                return;
            }

            const names = line.substring(0, colonIndex).trim();
            const itemsText = line.substring(colonIndex + 1).trim();

            // Split names by "و" or "و " or comma
            const nameList = names.split(/\s+و\s+|،|,/).map(n => n.trim()).filter(n => n);

            if (nameList.length === 0) return;

            // Parse items
            const items = parseItems(itemsText);

            // Add order for each person
            nameList.forEach(name => {
                parsedOrders.push({
                    id: Date.now() + Math.random(),
                    name: name,
                    items: items
                });
            });
        });

        if (parsedOrders.length === 0) {
            showToast('⚠️ لم يتم إضافة أي طلبات صحيحة!', 'warning');
            return false;
        }

        return true;
    }

    // ✅ Parse Items with Stores
    function parseItems(itemsText) {
        const items = [];
        
        // Split by + to get individual items
        const itemGroups = itemsText.split('+').map(x => x.trim());

        itemGroups.forEach(group => {
            // Find store in parentheses
            const storeMatch = group.match(/\((.*?)\)/);
            let store = storeMatch ? storeMatch[1].trim() : 'أخرى';
            let itemText = group.replace(/\(.*?\)/, '').trim();

            if (!itemText) return;

            // Parse quantities (e.g., "2 فطير" or "10 فول")
            const qtyMatch = itemText.match(/^(\d+)\s+(.+)$/);
            let quantity = 1;
            let itemName = itemText;

            if (qtyMatch) {
                quantity = parseInt(qtyMatch[1]);
                itemName = qtyMatch[2];
            }

            // Split multiple items in same group (e.g., "فول وبطاطس وطعمية")
            const subItems = itemName.split(/\s+و\s+|،|,/).map(x => x.trim()).filter(x => x);

            subItems.forEach(subItem => {
                items.push({
                    name: subItem,
                    quantity: quantity,
                    store: normalizeStore(store)
                });
            });
        });

        return items;
    }

    // ✅ Normalize Store Names
    function normalizeStore(store) {
        const normalized = store.toLowerCase();
        for (let key in storeEmojis) {
            if (normalized.includes(key.toLowerCase())) {
                return key;
            }
        }
        return 'أخرى';
    }

    // ✅ Display Parsed Orders
    function displayParsedOrders() {
        if (parsedOrders.length === 0) {
            ordersList.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <p>لم يتم إضافة طلبات</p>
                </div>
            `;
            listHeaderContainer.style.display = 'none';
            return;
        }

        listHeaderContainer.style.display = 'flex';
        listCount.textContent = parsedOrders.length;

        ordersList.innerHTML = parsedOrders.map(order => `
            <div class="order-item">
                <div class="details">
                    <div class="name">👤 ${order.name}</div>
                    <div class="items">
                        ${order.items.map(item => 
                            `${storeEmojis[item.store] || '📦'} ${item.name} × ${item.quantity}`
                        ).join('<br>')}
                    </div>
                </div>
                <button class="btn-delete" onclick="deleteOrder(${order.id})">❌</button>
            </div>
        `).join('');
    }

    // ✅ Delete Order
    function deleteOrder(id) {
        parsedOrders = parsedOrders.filter(o => o.id !== id);
        displayParsedOrders();
        if (parsedOrders.length > 0) {
            generateResults();
        } else {
            resultSection.classList.remove('show');
        }
        showToast('🗑️ تم حذف الطلب');
    }

    window.deleteOrder = deleteOrder;

    // ✅ Generate Results - Group by Store and Item
    function generateResults() {
        if (parsedOrders.length === 0) return;

        // Create store groups with items
        let storeGroups = {};

        parsedOrders.forEach(order => {
            order.items.forEach(item => {
                const store = item.store;
                const itemName = item.name;

                if (!storeGroups[store]) {
                    storeGroups[store] = {};
                }

                if (!storeGroups[store][itemName]) {
                    storeGroups[store][itemName] = 0;
                }

                storeGroups[store][itemName] += item.quantity;
            });
        });

        // Generate HTML for each store
        const storeOrder = ['مطعم', 'مخبز', 'خباز', 'سوبر ماركت', 'سوبر', 'كشري', 'بطاطس', 'مشروبات', 'فواكه', 'صيدلية', 'أخرى'];
        let storesHTML = '';

        storeOrder.forEach(store => {
            if (!storeGroups[store]) return;

            const items = storeGroups[store];
            const emoji = storeEmojis[store] || '📦';

            let storeHTML = `<div class="store-section">
                <div class="store-title">${emoji} ${store}</div>
                <div class="store-items">`;

            Object.keys(items).forEach(itemName => {
                const qty = items[itemName];
                storeHTML += `
                    <div class="store-item-line">
                        <span class="store-item-qty">[ ${qty} ]</span>
                        <span class="store-item-name">🔹 ${itemName}</span>
                    </div>
                `;
            });

            storeHTML += `</div></div>`;
            storesHTML += storeHTML;
        });

        storesContainer.innerHTML = storesHTML;
        resultSection.classList.add('show');
    }

    // ✅ Process Orders
    processBtn.addEventListener('click', function() {
        if (parseOrders()) {
            displayParsedOrders();
            generateResults();
            showToast('✅ تم الفرز والتجميع بنجاح!');
        }
    });

    // ✅ Clear All
    clearBtn.addEventListener('click', function() {
        if (confirm('هل تريد حذف جميع الطلبات؟')) {
            ordersInput.value = '';
            parsedOrders = [];
            ordersList.innerHTML = '';
            resultSection.classList.remove('show');
            listHeaderContainer.style.display = 'none';
            showToast('🗑️ تم حذف الكل');
        }
    });

    // ✅ Copy Summary
    copySummaryBtn.addEventListener('click', function() {
        const text = storesContainer.innerText;
        navigator.clipboard.writeText(text).then(() => {
            showToast('📋 تم النسخ بنجاح!');
        });
    });

    // ✅ Share WhatsApp
    whatsappBtn.addEventListener('click', function() {
        const text = encodeURIComponent(storesContainer.innerText);
        window.open(`https://wa.me/?text=${text}`, '_blank');
    });

    // ✅ Print
    printBtn.addEventListener('click', function() {
        window.print();
    });

    // ✅ Toast
    function showToast(message, type = 'success') {
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 2000);
    }

    // ✅ Allow Enter to process
    ordersInput.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.key === 'Enter') {
            processBtn.click();
        }
    });
</script>

</body>
</html>
