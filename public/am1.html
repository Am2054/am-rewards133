<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>منظم الطلبات الذكي | AM Rewards PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #7000ff;
            --neon-green: #10b981;
            --neon-red: #ff4444;
            --bg-deep: #020617;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-deep);
            color: #fff;
            margin: 0; padding: 20px;
            transition: background 0.5s ease;
        }

        .container {
            max-width: 700px; margin: 0 auto;
            background: var(--glass);
            padding: 25px; border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { text-align: center; color: var(--neon-blue); font-weight: 900; margin-bottom: 5px; text-shadow: 0 0 10px var(--neon-blue); }
        .sub-title { text-align: center; font-size: 12px; color: #94a3b8; margin-bottom: 25px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 12px; font-weight: 700; }
        
        .input-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .input-row input { flex: 1; min-width: 120px; }
        
        input {
            width: 100%; padding: 12px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.4); color: #fff;
            font-size: 15px; outline: none; box-sizing: border-box;
            transition: 0.3s; font-family: 'Tajawal';
        }
        input:focus { border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }

        .add-btn {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            color: #fff; font-weight: 900; cursor: pointer; font-size: 16px;
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.2); margin-top: 10px;
            transition: 0.3s; font-family: 'Tajawal';
        }
        .add-btn:hover { opacity: 0.9; transform: translateY(-1px); }

        .section-title {
            font-size: 16px; color: var(--neon-blue); font-weight: 700;
            margin: 30px 0 15px 0; padding-bottom: 8px;
            border-bottom: 1px solid rgba(0, 242, 255, 0.2);
            display: flex; justify-content: space-between; align-items: center;
        }

        /* حاوي الجداول الديناميكية لتظهر بجانب بعضها بشكل مرن */
        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px; margin-bottom: 25px;
        }

        .shop-table-box {
            background: rgba(0,0,0,0.3); border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08); overflow: hidden;
        }

        .shop-title {
            background: rgba(112, 0, 255, 0.2); color: #fff;
            padding: 10px; font-size: 14px; font-weight: bold; text-align: center;
            border-bottom: 1px solid rgba(112, 0, 255, 0.4);
        }

        .summary-table { width: 100%; border-collapse: collapse; }
        .summary-table td {
            padding: 10px; font-size: 13px; color: #e2e8f0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .summary-table tr:last-child td { border-bottom: none; }
        
        .qty-badge {
            background: rgba(0, 242, 255, 0.1); color: var(--neon-blue);
            padding: 1px 8px; border-radius: 20px; font-weight: bold;
            font-size: 12px; border: 1px solid rgba(0, 242, 255, 0.3);
        }

        /* قائمة طلبات الأشخاص */
        .persons-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px;
        }
        .person-card {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 14px; padding: 15px; animation: fadeIn 0.4s ease; position: relative;
        }
        .person-name { font-weight: 900; color: #fff; font-size: 14px; margin-bottom: 8px; border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 5px; }
        .person-items { font-size: 12px; color: #94a3b8; line-height: 1.8; }
        
        .delete-btn {
            float: left; background: none; border: none; color: #64748b; cursor: pointer;
            font-size: 11px; transition: 0.2s; margin-right: 5px;
        }
        .delete-btn:hover { color: var(--neon-red); }

        .clear-all {
            font-size: 11px; color: var(--neon-red); text-decoration: underline;
            cursor: pointer; background: none; border: none; font-family: 'Tajawal';
        }

        .empty-state {
            grid-column: 1 / -1; text-align: center; color: #475569; font-size: 13px; padding: 30px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <h1>📝 منظم الطلبات الذكي</h1>
        <p class="sub-title">فرز وتجميع الطلبات تلقائياً حسب جهة الشراء</p>

        <!-- استمارة الإدخال -->
        <div class="form-group">
            <label>اسم الشخص</label>
            <input type="text" id="personName" placeholder="مثال: يوسف، أحمد، زياد..." autocomplete="off">
        </div>

        <div class="form-group">
            <label>تفاصيل الصنف والجهة</label>
            <div class="input-row">
                <input type="text" id="itemName" placeholder="الصنف (مثال: فول، شيبسي، كارت شحن)">
                <input type="text" id="shopName" placeholder="مكان الشراء (مثال: مطعم، سوبرماركت، سنترال)">
                <input type="number" id="itemQty" value="1" min="1" style="max-width: 80px; text-align: center;" inputmode="numeric">
            </div>
        </div>

        <button class="add-btn" onclick="addOrder()">إضافة الطلب للفارس الذكي ➕</button>

        <!-- الجداول الديناميكية المجمعة حسب جهة الشراء -->
        <div class="section-title">
            <span>📋 بونات الشراء المجمعة (حسب المكان)</span>
        </div>
        
        <div class="tables-grid" id="tablesGrid">
            <!-- الجداول هتتبني هنا لوحدها بالكامل بناء على اسم المكان اللي هتكتبه -->
        </div>

        <!-- تفاصيل حساب كل شخص -->
        <div class="section-title">
            <span>👤 توزيع الطلبات الفردية</span>
            <button class="clear-all" onclick="clearAllOrders()">🔄 مسح الكل</button>
        </div>

        <div class="persons-grid" id="ordersList">
            <!-- كروت الأشخاص تفصيلياً -->
        </div>

    </div>

    <script>
        let orders = JSON.parse(localStorage.getItem('dynamic_orders')) || [];

        document.addEventListener("DOMContentLoaded", updateUI);

        function addOrder() {
            const nameInput = document.getElementById('personName');
            const itemInput = document.getElementById('itemName');
            const shopInput = document.getElementById('shopName');
            const qtyInput = document.getElementById('itemQty');

            const name = nameInput.value.trim();
            const item = itemInput.value.trim();
            let shop = shopInput.value.trim();
            const qty = parseInt(qtyInput.value);

            if (!name || !item || !shop || isNaN(qty) || qty < 1) {
                alert("يرجى ملء جميع الخانات (الاسم، الصنف، والمكان) بشكل صحيح!");
                return;
            }

            // إضافة الطلب
            orders.push({
                id: Date.now(),
                name: name,
                item: item,
                shop: shop,
                qty: qty
            });

            saveAndRefresh();

            // تنظيف الخانات لتسهيل الإدخال التالي
            itemInput.value = "";
            qtyInput.value = "1";
            itemInput.focus();
        }

        function deleteOrder(id) {
            orders = orders.filter(order => order.id !== id);
            saveAndRefresh();
        }

        function clearAllOrders() {
            if (confirm("هل تريد مسح القائمة بالكامل وتصفير العدادات؟")) {
                orders = [];
                saveAndRefresh();
                document.getElementById('personName').value = "";
                document.getElementById('shopName').value = "";
            }
        }

        function saveAndRefresh() {
            localStorage.setItem('dynamic_orders', JSON.stringify(orders));
            updateUI();
        }

        function updateUI() {
            const tablesGrid = document.getElementById('tablesGrid');
            const ordersList = document.getElementById('ordersList');

            tablesGrid.innerHTML = "";
            ordersList.innerHTML = "";

            if (orders.length === 0) {
                tablesGrid.innerHTML = `<div class="empty-state">اكتب الطلبات فوق والبرنامج هيقسم الجداول لوحده..</div>`;
                ordersList.innerHTML = `<div class="empty-state">لا يوجد أشخاص حالياً.</div>`;
                return;
            }

            // 1. فرز وتجميع الأصناف ديناميكياً حسب المحل (المكان)
            const shopData = {};
            orders.forEach(o => {
                if (!shopData[o.shop]) {
                    shopData[o.shop] = {};
                }
                shopData[o.shop][o.item] = (shopData[o.shop][o.item] || 0) + o.qty;
            });

            // بناء جداول المحلات تلقائياً
            for (const [shopName, items] of Object.entries(shopData)) {
                const tableBox = document.createElement('div');
                tableBox.className = 'shop-table-box';
                
                let rowsHtml = '';
                for (const [itemName, qty] of Object.entries(items)) {
                    rowsHtml += `
                        <tr>
                            <td>${itemName}</td>
                            <td style="text-align: left;"><span class="qty-badge">${qty}</span></td>
                        </tr>
                    `;
                }

                tableBox.innerHTML = `
                    <div class="shop-title">🏬 ${shopName}</div>
                    <table class="summary-table">
                        <tbody>${rowsHtml}</tbody>
                    </table>
                `;
                tablesGrid.appendChild(tableBox);
            }

            // 2. تجميع وعرض الطلبات الفردية لكل شخص
            const groupedPersons = {};
            orders.forEach(o => {
                if (!groupedPersons[o.name]) { groupedPersons[o.name] = []; }
                groupedPersons[o.name].push(o);
            });

            for (const [personName, personOrders] of Object.entries(groupedPersons)) {
                const card = document.createElement('div');
                card.className = 'person-card';

                let itemsText = personOrders.map(o => {
                    return `• ${o.item} <span style="color: var(--neon-blue)">(${o.qty})</span> <span style="font-size:10px; color:#475569;">[${o.shop}]</span> <span class="delete-btn" onclick="deleteOrder(${o.id})">❌</span>`;
                }).join('<br>');

                card.innerHTML = `
                    <div class="person-name">👤 ${personName}</div>
                    <div class="person-items">${itemsText}</div>
                `;
                ordersList.appendChild(card);
            }
        }
    </script>
</body>
</html>
