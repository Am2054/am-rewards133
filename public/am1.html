<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار الفطار الذكي - Am Rewards</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --bg-secondary: #131a26;
            --card-bg: #1a2332;
            --text-color: #f3f4f6;
            --text-secondary: #b0b8c6;
            --primary-neon: #00f2fe;
            --secondary-neon: #4facfe;
            --accent-purple: #7f00ff;
            --danger-color: #ff4757;
            --success-color: #2ed573;
            --warning-color: #ffa502;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', 'Inter', sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--bg-color) 0%, var(--bg-secondary) 100%);
            color: var(--text-color);
        }

        body {
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-attachment: fixed;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: linear-gradient(135deg, var(--card-bg) 0%, rgba(26, 35, 50, 0.8) 100%);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 242, 254, 0.15);
            backdrop-filter: blur(10px);
        }

        /* ✅ Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary-neon), var(--secondary-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 900;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* ✅ Input Group */
        .input-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            margin-bottom: 15px;
        }

        .input-label {
            font-size: 0.9rem;
            color: var(--primary-neon);
            font-weight: 900;
            margin-bottom: 8px;
            grid-column: 1 / -1;
        }

        input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 16px;
            border-radius: 12px;
            color: var(--text-color);
            font-size: 15px;
            font-family: 'Cairo', sans-serif;
            outline: none;
            transition: 0.3s;
        }

        input::placeholder {
            color: var(--text-secondary);
        }

        input:focus {
            border-color: var(--primary-neon);
            background: rgba(0, 242, 254, 0.05);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        /* ✅ Buttons */
        .btn {
            border: none;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 900;
            font-size: 15px;
            font-family: 'Cairo', sans-serif;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-add {
            background: linear-gradient(135deg, var(--accent-purple), var(--secondary-neon));
            color: #fff;
            padding: 14px 20px;
        }

        .btn-add:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 172, 254, 0.4);
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-clear {
            background: rgba(255, 71, 87, 0.15);
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }

        .btn-clear:hover {
            background: var(--danger-color);
            color: #fff;
        }

        /* ✅ List Section */
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 25px 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .list-header h3 {
            font-size: 0.95rem;
            color: var(--primary-neon);
            font-weight: 900;
        }

        .list-header .count {
            background: var(--primary-neon);
            color: #000;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 900;
        }

        .list-section {
            max-height: 250px;
            overflow-y: auto;
            padding: 0;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(0, 242, 254, 0.1);
        }

        .list-section::-webkit-scrollbar {
            width: 6px;
        }

        .list-section::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .list-section::-webkit-scrollbar-thumb {
            background: rgba(0, 242, 254, 0.3);
            border-radius: 10px;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 242, 254, 0.05);
            padding: 14px 16px;
            border-right: 4px solid var(--primary-neon);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        .order-item:hover {
            background: rgba(0, 242, 254, 0.1);
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-item .details {
            flex: 1;
            font-size: 14px;
            line-height: 1.6;
        }

        .order-item .name {
            font-weight: 900;
            color: var(--secondary-neon);
            font-size: 15px;
        }

        .order-item .items {
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 4px;
        }

        .btn-delete {
            background: none;
            border: none;
            color: var(--danger-color);
            cursor: pointer;
            font-size: 13px;
            font-weight: 900;
            margin-right: 10px;
            transition: 0.3s;
            padding: 6px 10px;
        }

        .btn-delete:hover {
            background: rgba(255, 71, 87, 0.2);
            border-radius: 8px;
        }

        /* ✅ Result Section */
        .result-section {
            display: none;
            margin-top: 25px;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-section.show {
            display: block;
        }

        .result-title {
            font-size: 1rem;
            color: var(--primary-neon);
            font-weight: 900;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 242, 254, 0.3);
        }

        .items-result {
            background: rgba(0, 242, 254, 0.03);
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 12px;
            padding: 16px;
            font-size: 14px;
            line-height: 1.8;
            color: var(--text-color);
        }

        .item-line {
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-line:last-child {
            border-bottom: none;
        }

        .item-qty {
            background: var(--warning-color);
            color: #000;
            padding: 4px 12px;
            border-radius: 6px;
            font-weight: 900;
            min-width: 50px;
            text-align: center;
        }

        .item-name {
            color: var(--primary-neon);
            flex: 1;
            margin-right: 15px;
        }

        /* ✅ Action Buttons */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-action {
            background: #1e293b;
            color: var(--text-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 900;
            transition: 0.3s;
            font-size: 14px;
            font-family: 'Cairo', sans-serif;
        }

        .btn-action:hover {
            border-color: var(--primary-neon);
            background: rgba(0, 242, 254, 0.1);
        }

        .btn-action.copy {
            background: var(--primary-neon);
            color: #000;
            border: none;
            grid-column: span 2;
        }

        .btn-action.copy:hover {
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
        }

        .btn-action.whatsapp {
            background: #25d366;
            color: #fff;
            border: none;
        }

        .btn-action.print {
            background: #667eea;
            color: #fff;
            border: none;
        }

        /* ✅ Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success-color);
            color: #000;
            padding: 14px 24px;
            border-radius: 20px;
            font-weight: 900;
            display: none;
            box-shadow: 0 5px 20px rgba(46, 213, 115, 0.4);
            z-index: 1000;
            animation: slideUpToast 0.3s ease;
        }

        @keyframes slideUpToast {
            from { transform: translateX(-50%) translateY(30px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        .toast.show {
            display: block;
        }

        .toast.warning {
            background: var(--warning-color);
        }

        /* ✅ Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        /* ✅ Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .action-buttons {
                grid-template-columns: 1fr;
            }

            .btn-action.copy {
                grid-column: span 1;
            }

            .item-line {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .item-qty {
                align-self: flex-end;
                margin-right: 0;
            }

            @media print {
                body {
                    background: white;
                }
                .container {
                    box-shadow: none;
                    border: none;
                }
                .input-row, .btn-group, .action-buttons, .list-header, .list-section {
                    display: none;
                }
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- ✅ Header -->
    <div class="header">
        <h1>⚡ رادار الفطار الذكي</h1>
        <p class="subtitle">تجميع ذكي لطلبات الأصناف المتشابهة</p>
    </div>

    <!-- ✅ Input -->
    <div class="input-row">
        <label class="input-label">👤 اسم الشخص:</label>
        <input type="text" id="nameInput" placeholder="مثال: يوسف">
    </div>

    <div class="input-row">
        <label class="input-label">🛒 الطلبات (مفصولة بـ و أو فاصلة):</label>
        <input type="text" id="itemsInput" placeholder="مثال: عيش و فول و بطاطس و شيبسي">
        <button class="btn btn-add" id="addBtn">➕ أضف</button>
    </div>

    <!-- ✅ Buttons -->
    <div class="btn-group">
        <button class="btn btn-clear" id="clearBtn">🗑️ مسح الكل</button>
    </div>

    <!-- ✅ List -->
    <div class="list-header" id="listHeaderContainer" style="display: none;">
        <h3>📋 الطلبات المضافة</h3>
        <div class="count" id="listCount">0</div>
    </div>
    <div class="list-section" id="ordersList"></div>

    <!-- ✅ Result -->
    <div class="result-section" id="resultSection">
        <div class="result-title">📊 الملخص النهائي</div>
        <div class="items-result" id="resultContent"></div>

        <div class="action-buttons">
            <button class="btn-action copy" id="copySummaryBtn">📋 نسخ</button>
            <button class="btn-action whatsapp" id="whatsappBtn">💬 واتس</button>
            <button class="btn-action print" id="printBtn">🖨️ طباعة</button>
        </div>
    </div>
</div>

<!-- ✅ Toast -->
<div class="toast" id="toast"></div>

<script>
    // ✅ DOM Elements
    const nameInput = document.getElementById('nameInput');
    const itemsInput = document.getElementById('itemsInput');
    const addBtn = document.getElementById('addBtn');
    const clearBtn = document.getElementById('clearBtn');
    const ordersList = document.getElementById('ordersList');
    const listCount = document.getElementById('listCount');
    const resultSection = document.getElementById('resultSection');
    const resultContent = document.getElementById('resultContent');
    const copySummaryBtn = document.getElementById('copySummaryBtn');
    const whatsappBtn = document.getElementById('whatsappBtn');
    const printBtn = document.getElementById('printBtn');
    const toast = document.getElementById('toast');
    const listHeaderContainer = document.getElementById('listHeaderContainer');

    let allOrders = [];
    let itemTotals = {};

    // ✅ Add Order
    addBtn.addEventListener('click', function() {
        const name = nameInput.value.trim();
        const itemsText = itemsInput.value.trim();

        if (!name || !itemsText) {
            showToast('⚠️ من فضلك ملء الاسم والطلبات!', 'warning');
            return;
        }

        // Parse items
        const items = itemsText.split(/\s+و\s+|،|,/).map(x => x.trim()).filter(x => x);

        if (items.length === 0) {
            showToast('⚠️ من فضلك أدخل طلبات صحيحة!', 'warning');
            return;
        }

        // Add order
        const order = {
            id: Date.now(),
            name: name,
            items: items
        };

        allOrders.push(order);

        // Update totals
        items.forEach(item => {
            itemTotals[item] = (itemTotals[item] || 0) + 1;
        });

        // Clear inputs
        nameInput.value = '';
        itemsInput.value = '';
        nameInput.focus();

        // Update display
        displayOrders();
        generateResults();
        showToast('✅ تم إضافة الطلب!');
    });

    // ✅ Display Orders
    function displayOrders() {
        if (allOrders.length === 0) {
            ordersList.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <p>لم يتم إضافة طلبات</p>
                </div>
            `;
            listHeaderContainer.style.display = 'none';
            return;
        }

        listHeaderContainer.style.display = 'flex';
        listCount.textContent = allOrders.length;

        ordersList.innerHTML = allOrders.map(order => `
            <div class="order-item">
                <div class="details">
                    <div class="name">👤 ${order.name}</div>
                    <div class="items">📦 ${order.items.join(' • ')}</div>
                </div>
                <button class="btn-delete" onclick="deleteOrder(${order.id})">❌</button>
            </div>
        `).join('');
    }

    // ✅ Delete Order
    function deleteOrder(id) {
        const order = allOrders.find(o => o.id === id);
        if (order) {
            order.items.forEach(item => {
                itemTotals[item]--;
                if (itemTotals[item] <= 0) {
                    delete itemTotals[item];
                }
            });
        }

        allOrders = allOrders.filter(o => o.id !== id);
        displayOrders();

        if (allOrders.length > 0) {
            generateResults();
        } else {
            resultSection.classList.remove('show');
        }

        showToast('🗑️ تم حذف الطلب');
    }

    window.deleteOrder = deleteOrder;

    // ✅ Generate Results
    function generateResults() {
        if (Object.keys(itemTotals).length === 0) return;

        // Sort items by quantity (descending)
        const sortedItems = Object.entries(itemTotals).sort((a, b) => b[1] - a[1]);

        let html = '';
        sortedItems.forEach(([item, qty]) => {
            html += `
                <div class="item-line">
                    <span class="item-name">🔹 ${item}</span>
                    <span class="item-qty">${qty}</span>
                </div>
            `;
        });

        resultContent.innerHTML = html;
        resultSection.classList.add('show');
    }

    // ✅ Clear All
    clearBtn.addEventListener('click', function() {
        if (allOrders.length > 0 && confirm('هل تريد حذف جميع الطلبات؟')) {
            allOrders = [];
            itemTotals = {};
            nameInput.value = '';
            itemsInput.value = '';
            ordersList.innerHTML = '';
            resultSection.classList.remove('show');
            listHeaderContainer.style.display = 'none';
            showToast('🗑️ تم حذف الكل');
        }
    });

    // ✅ Copy Summary
    copySummaryBtn.addEventListener('click', function() {
        const text = resultContent.innerText;
        navigator.clipboard.writeText(text).then(() => {
            showToast('📋 تم النسخ بنجاح!');
        });
    });

    // ✅ Share WhatsApp
    whatsappBtn.addEventListener('click', function() {
        const text = encodeURIComponent(resultContent.innerText);
        window.open(`https://wa.me/?text=${text}`, '_blank');
    });

    // ✅ Print
    printBtn.addEventListener('click', function() {
        window.print();
    });

    // ✅ Toast
    function showToast(message, type = 'success') {
        toast.textContent = message;
        toast.className = 'toast show ' + type;
        setTimeout(() => {
            toast.classList.remove('show');
        }, 2000);
    }

    // ✅ Allow Enter to add
    itemsInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            addBtn.click();
        }
    });

    // Focus on name input
    nameInput.focus();
</script>

</body>
</html>
