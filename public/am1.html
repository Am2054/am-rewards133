<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار الفطار الذكي - Am Rewards</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --bg-secondary: #131a26;
            --card-bg: #1a2332;
            --text-color: #f3f4f6;
            --text-secondary: #b0b8c6;
            --primary-neon: #00f2fe;
            --secondary-neon: #4facfe;
            --accent-purple: #7f00ff;
            --danger-color: #ff4757;
            --success-color: #2ed573;
            --warning-color: #ffa502;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', 'Inter', sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--bg-color) 0%, var(--bg-secondary) 100%);
            color: var(--text-color);
        }

        body {
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-attachment: fixed;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: linear-gradient(135deg, var(--card-bg) 0%, rgba(26, 35, 50, 0.8) 100%);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 242, 254, 0.15);
            backdrop-filter: blur(10px);
        }

        /* ✅ Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary-neon), var(--secondary-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 900;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.1);
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* ✅ Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: rgba(79, 172, 254, 0.1);
            border: 1px solid rgba(79, 172, 254, 0.3);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--primary-neon);
            margin-top: 4px;
            font-family: 'Inter', monospace;
        }

        /* ✅ Input Group */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        input, select {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 16px;
            border-radius: 12px;
            color: var(--text-color);
            font-size: 15px;
            font-family: 'Cairo', sans-serif;
            outline: none;
            transition: 0.3s;
        }

        input::placeholder, select > option {
            color: var(--text-secondary);
        }

        input:focus, select:focus {
            border-color: var(--primary-neon);
            background: rgba(0, 242, 254, 0.05);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        /* ✅ Buttons */
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .btn {
            border: none;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 900;
            font-size: 15px;
            font-family: 'Cairo', sans-serif;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-add {
            background: linear-gradient(135deg, var(--accent-purple), var(--secondary-neon));
            color: #fff;
            grid-column: span 2;
        }

        .btn-add:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 172, 254, 0.4);
        }

        .btn-add:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-clear {
            background: rgba(255, 71, 87, 0.15);
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }

        .btn-clear:hover {
            background: var(--danger-color);
            color: #fff;
        }

        /* ✅ List Section */
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .list-header h3 {
            font-size: 0.95rem;
            color: var(--primary-neon);
            font-weight: 900;
        }

        .list-header .count {
            background: var(--primary-neon);
            color: #000;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 900;
        }

        .list-section {
            max-height: 280px;
            overflow-y: auto;
            padding: 0;
            margin-bottom: 20px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(0, 242, 254, 0.1);
        }

        .list-section::-webkit-scrollbar {
            width: 6px;
        }

        .list-section::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .list-section::-webkit-scrollbar-thumb {
            background: rgba(0, 242, 254, 0.3);
            border-radius: 10px;
        }

        .list-section::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 242, 254, 0.5);
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 242, 254, 0.05);
            padding: 14px 16px;
            border-right: 4px solid var(--primary-neon);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        .order-item:hover {
            background: rgba(0, 242, 254, 0.1);
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-item .details {
            flex: 1;
            font-size: 14px;
            line-height: 1.6;
        }

        .order-item .name {
            font-weight: 900;
            color: var(--secondary-neon);
            font-size: 15px;
        }

        .order-item .food {
            color: var(--primary-neon);
            font-weight: 700;
        }

        .order-item .note {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .btn-delete {
            background: none;
            border: none;
            color: var(--danger-color);
            cursor: pointer;
            font-size: 13px;
            font-weight: 900;
            margin-right: 10px;
            transition: 0.3s;
            padding: 6px 10px;
        }

        .btn-delete:hover {
            background: rgba(255, 71, 87, 0.2);
            border-radius: 8px;
        }

        /* ✅ Result Section */
        .result-section {
            display: none;
            margin-top: 25px;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-section.show {
            display: block;
        }

        .result-title {
            font-size: 0.95rem;
            color: var(--primary-neon);
            font-weight: 900;
            margin-bottom: 12px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-title:first-of-type {
            margin-top: 0;
        }

        .result-box {
            background: rgba(0, 242, 254, 0.03);
            border: 1px dashed rgba(0, 242, 254, 0.4);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 15px;
            white-space: pre-line;
            font-size: 14px;
            line-height: 1.8;
            font-family: 'Courier New', monospace;
            color: var(--text-color);
            max-height: 300px;
            overflow-y: auto;
        }

        .result-box::-webkit-scrollbar {
            width: 4px;
        }

        .result-box::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .result-box::-webkit-scrollbar-thumb {
            background: rgba(0, 242, 254, 0.3);
            border-radius: 4px;
        }

        /* ✅ Action Buttons */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-action {
            background: #1e293b;
            color: var(--text-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 900;
            transition: 0.3s;
            font-size: 14px;
            font-family: 'Cairo', sans-serif;
        }

        .btn-action:hover {
            border-color: var(--primary-neon);
            background: rgba(0, 242, 254, 0.1);
        }

        .btn-action.copy {
            background: var(--primary-neon);
            color: #000;
            border: none;
            grid-column: span 2;
        }

        .btn-action.copy:hover {
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
        }

        .btn-action.whatsapp {
            background: #25d366;
            color: #fff;
            border: none;
        }

        .btn-action.whatsapp:hover {
            background: #20ba5a;
        }

        .btn-action.print {
            background: #667eea;
            color: #fff;
            border: none;
        }

        .btn-action.print:hover {
            background: #5568d3;
        }

        /* ✅ Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success-color);
            color: #000;
            padding: 14px 24px;
            border-radius: 20px;
            font-weight: 900;
            display: none;
            box-shadow: 0 5px 20px rgba(46, 213, 115, 0.4);
            z-index: 1000;
            animation: slideUpToast 0.3s ease;
        }

        @keyframes slideUpToast {
            from { transform: translateX(-50%) translateY(30px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        .toast.show {
            display: block;
        }

        /* ✅ Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        /* ✅ Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
                border-radius: 20px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .stats-bar {
                grid-template-columns: 1fr 1fr;
            }

            .button-group {
                grid-template-columns: 1fr;
            }

            .btn-add {
                grid-column: span 1;
            }

            .action-buttons {
                grid-template-columns: 1fr;
            }

            .btn-action.copy {
                grid-column: span 1;
            }

            @media print {
                body {
                    background: white;
                }
                .container {
                    box-shadow: none;
                    border: none;
                }
                .button-group, .input-group, .btn-clear {
                    display: none;
                }
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- ✅ Header -->
    <div class="header">
        <h1>⚡ رادار الفطار الذكي</h1>
        <p class="subtitle">تجميع وفرز طلبات العمال بذكاء اصطناعي</p>
    </div>

    <!-- ✅ Stats -->
    <div class="stats-bar">
        <div class="stat-box">
            <div class="stat-label">📊 إجمالي الطلبات</div>
            <div class="stat-value" id="totalOrdersCount">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">🔥 أصناف فريدة</div>
            <div class="stat-value" id="uniqueItemsCount">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">💰 التكلفة الكلية</div>
            <div class="stat-value" id="totalPriceCount">0 ج</div>
        </div>
    </div>

    <!-- ✅ Input -->
    <div class="input-group">
        <input type="text" id="workerName" placeholder="👤 اسم العامل أو الموظف" autocomplete="off">
        <input type="text" id="foodItem" placeholder="🥪 نوع الساندوتش أو الصنف (فول، فلافل، جبن..)" autocomplete="off">
        <input type="text" id="details" placeholder="📝 أي تعديل؟ (بدون طماطم، زيت حار.. اختياري)" autocomplete="off">
    </div>

    <!-- ✅ Buttons -->
    <div class="button-group">
        <button class="btn btn-add" id="addBtn">➕ إضافة الطلب</button>
        <button class="btn btn-clear" id="clearBtn">🗑️ حذف الكل</button>
    </div>

    <!-- ✅ List -->
    <div class="list-header">
        <h3>📋 قائمة الطلبات</h3>
        <div class="count" id="listCount">0</div>
    </div>
    <div class="list-section" id="ordersList">
        <div class="empty-state">
            <div class="empty-state-icon">📭</div>
            <p>لم تضيف طلبات بعد</p>
        </div>
    </div>

    <!-- ✅ Result -->
    <div class="result-section" id="resultSection">
        <div class="result-title">🏪 ملخص طلبات المطعم:</div>
        <div class="result-box" id="restaurantSummary"></div>

        <div class="result-title">👥 جدول التوزيع (مين هياكل إيه):</div>
        <div class="result-box" id="distributionSummary"></div>

        <div class="action-buttons">
            <button class="btn-action copy" id="copySummaryBtn">📋 نسخ الملخص</button>
            <button class="btn-action whatsapp" id="whatsappBtn">💬 إرسال واتس</button>
            <button class="btn-action print" id="printBtn">🖨️ طباعة</button>
        </div>
    </div>
</div>

<!-- ✅ Toast -->
<div class="toast" id="toast"></div>

<script>
    // ✅ Data Storage
    let orders = [];
    const STORAGE_KEY = 'breakfastRadar_orders';

    // ✅ DOM Elements
    const workerNameInput = document.getElementById('workerName');
    const foodItemInput = document.getElementById('foodItem');
    const detailsInput = document.getElementById('details');
    const addBtn = document.getElementById('addBtn');
    const clearBtn = document.getElementById('clearBtn');
    const ordersList = document.getElementById('ordersList');
    const listCount = document.getElementById('listCount');
    const resultSection = document.getElementById('resultSection');
    const restaurantSummary = document.getElementById('restaurantSummary');
    const distributionSummary = document.getElementById('distributionSummary');
    const copySummaryBtn = document.getElementById('copySummaryBtn');
    const whatsappBtn = document.getElementById('whatsappBtn');
    const printBtn = document.getElementById('printBtn');
    const toast = document.getElementById('toast');
    const totalOrdersCount = document.getElementById('totalOrdersCount');
    const uniqueItemsCount = document.getElementById('uniqueItemsCount');
    const totalPriceCount = document.getElementById('totalPriceCount');

    // ✅ Load from Local Storage
    function loadOrders() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                orders = JSON.parse(saved);
                updateUI();
            } catch (e) {
                console.error('Error loading orders:', e);
                orders = [];
            }
        }
    }

    // ✅ Save to Local Storage
    function saveOrders() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
    }

    // ✅ Add Order
    function addOrder() {
        const name = workerNameInput.value.trim();
        const food = foodItemInput.value.trim();
        const detail = detailsInput.value.trim();

        if (!name || !food) {
            showToast('⚠️ من فضلك اكتب الاسم ونوع الأكل!', 'warning');
            return;
        }

        orders.push({ 
            id: Date.now(),
            name, 
            food, 
            detail,
            timestamp: new Date().toLocaleTimeString('ar-EG')
        });

        workerNameInput.value = '';
        foodItemInput.value = '';
        detailsInput.value = '';
        workerNameInput.focus();

        saveOrders();
        updateUI();
        showToast('✅ تم إضافة الطلب بنجاح!');
    }

    // ✅ Delete Order
    function deleteOrder(id) {
        orders = orders.filter(o => o.id !== id);
        saveOrders();
        updateUI();
        showToast('🗑️ تم حذف الطلب');
    }

    // ✅ Clear All
    function clearAll() {
        if (confirm('هل أنت متأكد من حذف جميع الطلبات؟')) {
            orders = [];
            saveOrders();
            updateUI();
            resultSection.classList.remove('show');
            showToast('🗑️ تم حذف جميع الطلبات');
        }
    }

    // ✅ Update UI
    function updateUI() {
        // Update List
        if (orders.length === 0) {
            ordersList.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <p>لم تضيف طلبات بعد</p>
                </div>
            `;
            resultSection.classList.remove('show');
            listCount.textContent = '0';
            return;
        }

        ordersList.innerHTML = orders.map(order => `
            <div class="order-item">
                <div class="details">
                    <div class="name">👤 ${order.name}</div>
                    <div class="food">🥪 ${order.food}</div>
                    ${order.detail ? `<div class="note">📝 ${order.detail}</div>` : ''}
                </div>
                <button class="btn-delete" onclick="deleteOrder(${order.id})">❌</button>
            </div>
        `).join('');

        listCount.textContent = orders.length;

        // Update Stats
        updateStats();

        // Generate Results
        generateResults();
    }

    // ✅ Update Stats
    function updateStats() {
        // Total orders
        totalOrdersCount.textContent = orders.length;

        // Unique items
        const uniqueItems = new Set(orders.map(o => o.food)).size;
        uniqueItemsCount.textContent = uniqueItems;

        // Total price (فرضاً كل طلب = 15 جنيه)
        const pricePerItem = 15;
        const totalPrice = orders.length * pricePerItem;
        totalPriceCount.textContent = totalPrice + ' ج';
    }

    // ✅ Generate Results
    function generateResults() {
        if (orders.length === 0) return;

        // 1. Restaurant Summary (grouped by food + details)
        let summaryMap = {};
        orders.forEach(order => {
            let key = order.food;
            if (order.detail) {
                key += ` (${order.detail})`;
            }
            summaryMap[key] = (summaryMap[key] || 0) + 1;
        });

        let restaurantText = `🏪 إجمالي المطلـوب من المحل:\n`;
        restaurantText += `━━━━━━━━━━━━━━━━━━━━━\n`;
        for (let item in summaryMap) {
            restaurantText += `✓ [ ${summaryMap[item]} ] 🔹 ${item}\n`;
        }
        restaurantText += `━━━━━━━━━━━━━━━━━━━━━\n`;
        restaurantText += `📊 الإجمالي: ${orders.length} طلب`;

        // 2. Distribution Table
        let distributionText = `👥 جدول التوزيع:\n`;
        distributionText += `━━━━━━━━━━━━━━━━━━━━━\n`;
        orders.forEach((order, index) => {
            distributionText += `${index + 1}️⃣  ${order.name.padEnd(15, '.')} ${order.food}`;
            if (order.detail) {
                distributionText += ` (${order.detail})`;
            }
            distributionText += `\n`;
        });

        restaurantSummary.innerText = restaurantText;
        distributionSummary.innerText = distributionText;
        resultSection.classList.add('show');
    }

    // ✅ Toast
    function showToast(message, type = 'success') {
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 2000);
    }

    // ✅ Copy Summary
    function copySummary() {
        const text = restaurantSummary.innerText + '\n\n' + distributionSummary.innerText;
        navigator.clipboard.writeText(text).then(() => {
            showToast('📋 تم النسخ بنجاح!');
        });
    }

    // ✅ Share WhatsApp
    function shareWhatsApp() {
        const text = encodeURIComponent(restaurantSummary.innerText + '\n\n' + distributionSummary.innerText);
        window.open(`https://wa.me/?text=${text}`, '_blank');
    }

    // ✅ Print
    function print() {
        window.print();
    }

    // ✅ Event Listeners
    addBtn.addEventListener('click', addOrder);
    clearBtn.addEventListener('click', clearAll);
    copySummaryBtn.addEventListener('click', copySummary);
    whatsappBtn.addEventListener('click', shareWhatsApp);
    printBtn.addEventListener('click', print);

    detailsInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') addOrder();
    });

    workerNameInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') foodItemInput.focus();
    });

    foodItemInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') detailsInput.focus();
    });

    // ✅ Make functions global
    window.deleteOrder = deleteOrder;

    // ✅ Load data on page load
    loadOrders();
</script>

</body>
</html>
