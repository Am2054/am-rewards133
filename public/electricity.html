<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار الكهرباء الذكي | AM Rewards PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon-yellow: #facc15; --neon-purple: #7000ff; --neon-red: #ff4444; --bg-deep: #020617; --glass: rgba(255, 255, 255, 0.05); --cyan: #00f2ff; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg-deep); color: #fff; margin: 0; padding: 0; transition: background 0.5s ease; }
        
        .points-bar {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(11, 15, 25, 0.8); backdrop-filter: blur(10px);
            padding: 10px 20px; border-bottom: 1px solid rgba(250, 204, 21, 0.2);
            display: flex; justify-content: space-between; align-items: center;
        }
        .points-display { background: rgba(250, 204, 21, 0.1); padding: 5px 15px; border-radius: 50px; border: 1px solid var(--neon-yellow); font-size: 14px; font-weight: 900; color: var(--neon-yellow); }

        .container { max-width: 500px; margin: 20px auto; background: var(--glass); padding: 25px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 92%; box-sizing: border-box; }
        h1 { text-align: center; color: var(--neon-yellow); font-weight: 900; margin-bottom: 5px; text-shadow: 0 0 15px rgba(250, 204, 21, 0.3); }
        .sub-title { text-align: center; font-size: 12px; color: #94a3b8; margin-bottom: 25px; }
        
        #compareBadge { display: none; text-align: center; margin-bottom: 15px; padding: 8px; border-radius: 12px; font-size: 11px; font-weight: 700; animation: slideUp 0.5s ease; }
        .badge-up { background: rgba(255, 68, 68, 0.1); color: var(--neon-red); border: 1px solid var(--neon-red); }
        .badge-down { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid #10b981; }

        .input-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .input-group { flex: 1; }
        label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 12px; font-weight: 700; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); color: #fff; font-size: 18px; text-align: center; outline: none; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--neon-yellow); box-shadow: 0 0 10px rgba(250, 204, 21, 0.2); }
        
        #errorMsg { display: none; background: rgba(239, 68, 68, 0.1); color: #ef4444; padding: 10px; border-radius: 10px; border: 1px solid #ef4444; font-size: 12px; text-align: center; margin-bottom: 15px; }
        .calc-btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: linear-gradient(90deg, var(--neon-purple), #4f46e5); color: #fff; font-weight: 900; cursor: pointer; font-size: 18px; box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3); transition: 0.3s; }
        .reset-btn { width: 100%; padding: 10px; background: transparent; color: #64748b; border: none; cursor: pointer; font-size: 11px; text-decoration: underline; margin-top: 5px; opacity: 0.7; }
        
        .result-box { display: none; margin-top: 25px; padding: 20px; border-radius: 18px; background: rgba(255,255,255,0.03); border: 1px solid rgba(0, 242, 255, 0.2); animation: slideUp 0.5s ease; }
        .radar-status { text-align: center; font-size: 11px; margin-bottom: 15px; color: var(--cyan); background: rgba(0, 242, 255, 0.05); padding: 8px; border-radius: 50px; border: 1px solid rgba(0, 242, 255, 0.1); }
        .total-price { font-size: 36px; color: var(--neon-yellow); text-align: center; margin: 5px 0; display: block; font-weight: 900; }
        
        .unit-money-box { background: rgba(250, 204, 21, 0.1); border: 1px solid var(--neon-yellow); padding: 12px; border-radius: 15px; margin: 15px 0; text-align: center; display: none; }
        .smart-warning { margin-top: 15px; padding: 12px; border-radius: 10px; font-size: 13px; line-height: 1.6; border-right: 4px solid; }
        .warn-danger { background: rgba(255, 68, 68, 0.1); color: var(--neon-red); border-color: var(--neon-red); animation: pulse 2s infinite; }
        .warn-safe { background: rgba(16, 185, 129, 0.1); color: #10b981; border-color: #10b981; }

        #tipsBox { display: none; margin-top: 15px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; font-size: 13px; border: 1px dashed var(--cyan); color: #cbd5e1; line-height: 1.6; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="points-bar">
    <div style="font-size: 12px; font-weight: bold;">المجانية المتبقية: <span id="freeTries">3</span></div>
    <div class="points-display">🪙 النقاط: <span id="userPoints">0</span></div>
</div>

<div class="container">
    <h1>⚡ رادار الكهرباء</h1>
    <p class="sub-title">تحليل ذكي ودقيق (تحديث 2026)</p>
    
    <div id="compareBadge"></div>
    <div id="errorMsg">⚠️ خطأ: القراءة الحالية يجب أن تكون أكبر من السابقة.</div>
    
    <div class="input-row">
        <div class="input-group">
            <label>القراءة الحالية</label>
            <input type="number" id="currentRead" placeholder="0000" inputmode="numeric">
        </div>
        <div class="input-group">
            <label>القراءة السابقة</label>
            <input type="number" id="prevRead" placeholder="0000" inputmode="numeric">
        </div>
    </div>

    <div class="input-group" style="margin-bottom: 20px;">
        <label>عدد الوحدات (لتقسيم الفاتورة والرسوم)</label>
        <input type="number" id="unitsCount" value="1" min="1" inputmode="numeric">
    </div>

    <button class="calc-btn" onclick="processElectricityAnalysis()">تحليل الاستهلاك 🔍</button>
    <button class="reset-btn" onclick="resetApp()">🔄 حساب جديد / مسح الذاكرة</button>

    <div id="resultBox" class="result-box">
        <div class="radar-status" id="radarStatus">📡 جاري تحليل الشرائح...</div>
        <div style="text-align: center; font-size: 13px; color: #94a3b8;">إجمالي فاتورة العداد</div>
        <span class="total-price" id="totalVal">0.00 ج.م</span>
        
        <div class="unit-money-box" id="unitBox">
            <span id="unitMoneyVal" style="font-size: 24px; color: var(--neon-yellow); font-weight: 900;">0.00 ج.م</span>
        </div>

        <div id="smartWarning" class="smart-warning"></div>
        <div id="tipsBox"></div>
        
        <div style="margin-top: 20px; font-size: 13px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px;">
            <div style="display:flex; justify-content:space-between; margin-bottom: 8px;"><span>إجمالي كمية الاستهلاك:</span> <span id="totalKwh" style="color:var(--cyan); font-weight:bold;">0</span></div>
            <div style="display:flex; justify-content:space-between; margin-bottom: 8px;"><span>متوسط الاستهلاك اليومي:</span> <span id="dailyAvg" style="color:var(--cyan)">0</span></div>
            <div style="display:flex; justify-content:space-between; margin-bottom: 8px;"><span>الشريحة الحالية:</span> <span id="shText" style="color:var(--neon-yellow)"> - </span></div>
            <div style="display:flex; justify-content:space-between; color: var(--neon-yellow); padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.1);">
                <span>الرسوم (نظافة + خدمة):</span> <span id="feesText">0</span>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", authDomain: "am--rewards.firebaseapp.com", projectId: "am--rewards" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let userRef = null;
    let points = 0;
    let elecStats = { count: 0, date: "" };
    let lastElecHash = "";

    onAuthStateChanged(auth, (user) => {
        if (user) {
            userRef = doc(db, "users", user.uid);
            onSnapshot(userRef, (snap) => {
                const data = snap.data();
                points = data.points || 0;
                elecStats = data.elecStats || { count: 0, date: "" };
                const today = new Date().toISOString().split('T')[0];
                let dailyCount = (elecStats.date === today) ? elecStats.count : 0;
                document.getElementById('userPoints').innerText = points;
                document.getElementById('freeTries').innerText = Math.max(0, 3 - dailyCount);
            });
        }
    });

    window.processElectricityAnalysis = async function() {
        if (!auth.currentUser) return Swal.fire("خطأ", "سجل دخول أولاً", "error");
        const cur = parseFloat(document.getElementById('currentRead').value);
        const prev = parseFloat(document.getElementById('prevRead').value);
        const units = document.getElementById('unitsCount').value;

        if (isNaN(cur) || isNaN(prev) || cur < prev) {
            document.getElementById('errorMsg').style.display = 'block';
            return;
        }

        const currentHash = `${cur}-${prev}-${units}`;
        if (currentHash === lastElecHash) {
            calculateSmartBill();
            return;
        }

        const today = new Date().toISOString().split('T')[0];
        let dailyCount = (elecStats.date === today) ? elecStats.count : 0;

        if (dailyCount >= 3) {
            if (points < 1) return Swal.fire("نقاط غير كافية", "المحاولات المجانية انتهت.", "error");
            const confirm = await Swal.fire({
                title: 'تأكيد الخصم',
                text: "خصم 1 نقطة لإجراء التحليل؟",
                icon: 'info',
                showCancelButton: true, confirmButtonText: 'اخصم 1 نقطة'
            });
            if (!confirm.isConfirmed) return;
        }

        try {
            let updateData = { "elecStats.count": dailyCount + 1, "elecStats.date": today };
            if (dailyCount >= 3) updateData["points"] = increment(-1);
            await updateDoc(userRef, updateData);
            lastElecHash = currentHash;
            calculateSmartBill();
        } catch (e) { Swal.fire("خطأ", "فشل التحديث", "error"); }
    };
</script>

<script>
    window.onload = function() {
        const savedRead = localStorage.getItem('lastCurrentRead');
        if (savedRead) { document.getElementById('prevRead').value = savedRead; }
    };

    function animateValue(id, start, end, duration) {
        const obj = document.getElementById(id);
        const range = end - start;
        if (range === 0) { obj.innerHTML = end.toFixed(2) + " ج.م"; return; }
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            obj.innerHTML = (progress * range + start).toFixed(2) + " ج.م";
            if (progress < 1) window.requestAnimationFrame(step);
        };
        window.requestAnimationFrame(step);
    }

    function calculateSmartBill() {
        const current = parseFloat(document.getElementById('currentRead').value);
        const previous = parseFloat(document.getElementById('prevRead').value);
        let units = parseInt(document.getElementById('unitsCount').value) || 1;
        document.getElementById('errorMsg').style.display = 'none';
        const totalKwh = current - previous;
        
        let totalCost = 0, sh = "", serviceFee = 0;
        const cleanFee = 15;

        // خوارزمية الشرائح 2026
        if (totalKwh <= 100) {
            if (totalKwh <= 50) { totalCost = totalKwh * 0.68; serviceFee = 1; sh = "الأولى"; }
            else { totalCost = (50 * 0.68) + ((totalKwh - 50) * 0.78); serviceFee = 2; sh = "الثانية"; }
        } else if (totalKwh <= 650) {
            if (totalKwh <= 200) { totalCost = totalKwh * 0.95; serviceFee = 6; sh = "الثالثة"; }
            else if (totalKwh <= 350) { totalCost = (200 * 0.95) + ((totalKwh - 200) * 1.55); serviceFee = 11; sh = "الرابعة"; }
            else { totalCost = (200 * 0.95) + (150 * 1.55) + ((totalKwh - 350) * 1.65); serviceFee = 15; sh = "الخامسة"; }
        } else if (totalKwh <= 1000) { totalCost = totalKwh * 2.10; serviceFee = 25; sh = "السادسة"; }
        else { totalCost = totalKwh * 3.00; serviceFee = 40; sh = "السابعة (خطر)"; }

        const finalTotal = totalCost + serviceFee + cleanFee;
        const dailyAvg = (totalKwh / 30).toFixed(1);

        // --- تأثيرات التحليل الذكي (العودة للأصل) ---
        const warnBox = document.getElementById('smartWarning');
        const tipsBox = document.getElementById('tipsBox');
        
        if (totalKwh > 650) {
            document.body.style.background = "#1a0505"; // أحمر خطر
            warnBox.className = "smart-warning warn-danger";
            warnBox.innerHTML = "🚨 <b>خطر!</b> استهلاكك غير طبيعي وتخطيت الدعم. الكيلو بـ 2.10 ج.م!";
            tipsBox.innerHTML = "💡 <b>نصيحة:</b> افصل الأجهزة غير الضرورية. السخانات والتكييفات هي السبب الرئيسي غالباً.";
        } else {
            document.body.style.background = "#020617"; // طبيعي
            warnBox.className = "smart-warning warn-safe";
            warnBox.innerHTML = "✅ <b>ممتاز:</b> أنت الآن داخل النطاق المدعوم.";
            tipsBox.innerHTML = "💡 <b>نصيحة:</b> حافظ على استهلاك أقل من 200 ك.و لتوفير أكبر في فاتورتك القادمة.";
        }
        tipsBox.style.display = "block";

        // مقارنة الشهور
        const lastMonthKwh = parseFloat(localStorage.getItem('lastMonthKwh'));
        const badge = document.getElementById('compareBadge');
        if (!isNaN(lastMonthKwh) && lastMonthKwh > 0) {
            const diff = totalKwh - lastMonthKwh;
            badge.style.display = 'block';
            badge.className = diff > 0 ? 'badge-up' : 'badge-down';
            badge.innerHTML = diff > 0 ? `📈 استهلاكك زاد عن الشهر الماضي` : `📉 وفرت في استهلاكك عن الشهر الماضي`;
        }

        localStorage.setItem('lastCurrentRead', current);
        localStorage.setItem('lastMonthKwh', totalKwh);
        
        document.getElementById('resultBox').style.display = 'block';
        document.getElementById('totalVal').innerText = "0.00 ج.م";
        animateValue("totalVal", 0, finalTotal, 800);
        
        document.getElementById('totalKwh').innerText = totalKwh + " ك.و.س";
        document.getElementById('dailyAvg').innerText = dailyAvg + " ك.و / يوم";
        document.getElementById('shText').innerText = sh;
        document.getElementById('feesText').innerText = (serviceFee + cleanFee).toFixed(2) + " ج.م";
        
        if (units > 1) {
            document.getElementById('unitBox').style.display = 'block';
            document.getElementById('unitMoneyVal').innerText = (finalTotal / units).toFixed(2) + " ج.م";
        } else {
            document.getElementById('unitBox').style.display = 'none';
        }

        document.getElementById('radarStatus').innerText = "✅ تم تحديث التحليل بنجاح";
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function resetApp() { if(confirm("هل تريد مسح البيانات؟")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
