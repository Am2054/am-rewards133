<!-- referrals.html - النسخة النهائية المحسّنة -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <title>نظام الإحالات | AM Rewards</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon-cyan: #00f2ff; --neon-purple: #7000ff; --bg-deep: #020617;
      --glass-bg: rgba(15, 23, 42, 0.7); --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #f1f5f9; --muted: #94a3b8; --gold: #FFD369; --success: #22c55e;
    }
    * { box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    body {
      margin: 0; padding: 0; font-family: 'Cairo', sans-serif;
      background: var(--bg-deep); color: var(--text-main);
      min-height: 100vh; overflow-x: hidden;
      background-image: radial-gradient(circle at 10% 20%, rgba(112, 0, 255, 0.15) 0%, transparent 40%);
    }
    .container { max-width: 550px; margin: 20px auto; padding: 15px; }
    .header { text-align: center; margin-bottom: 30px; }
    .header h1 { font-weight: 900; font-size: 28px; color: var(--neon-cyan); text-shadow: 0 0 20px rgba(0, 242, 255, 0.5); }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
    .stat-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; text-align: center; border-bottom: 3px solid var(--neon-cyan); }
    .stat-card .value { font-family: 'Montserrat'; font-size: 24px; font-weight: 900; }
    .main-card { background: linear-gradient(135deg, rgba(112, 0, 255, 0.1), rgba(0, 242, 255, 0.1)); border: 1px solid var(--glass-border); border-radius: 24px; padding: 25px; text-align: center; }
    .code-display { font-family: 'Montserrat'; font-size: 36px; font-weight: 900; color: var(--neon-cyan); letter-spacing: 5px; margin: 15px 0; text-transform: uppercase; }
    .link-box { background: rgba(0, 0, 0, 0.4); border-radius: 16px; border: 1px solid var(--glass-border); display: flex; align-items: center; padding: 5px; margin-top: 15px; }
    .link-text { flex: 1; padding: 10px; font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; direction: ltr; }
    .copy-btn { background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan)); border: none; border-radius: 12px; color: #fff; padding: 10px 20px; font-weight: 900; cursor: pointer; }
    .progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 8px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan)); }
    .table-wrapper { background: var(--glass-bg); border-radius: 20px; border: 1px solid var(--glass-border); overflow: hidden; margin-top: 25px; }
    table { width: 100%; border-collapse: collapse; }
    th { background: rgba(255,255,255,0.03); padding: 15px; text-align: right; font-size: 12px; color: var(--muted); }
    td { padding: 15px; border-bottom: 1px solid var(--glass-border); }
    .commission-tag { background: rgba(34, 197, 94, 0.15); color: #4ade80; padding: 6px 10px; border-radius: 10px; font-family: 'Montserrat'; font-weight: 700; }
    .view-log-link { color: var(--neon-cyan); font-size: 10px; cursor: pointer; text-decoration: underline; margin-top: 8px; display: block; }
    .history-box { display: none; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 12px; margin-top: 10px; border: 1px solid var(--glass-border); }
    .history-item { display: flex; justify-content: space-between; font-size: 11px; padding: 6px 0; border-bottom: 1px dashed rgba(255,255,255,0.1); }
    #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--neon-cyan); color: #000; padding: 12px 30px; border-radius: 50px; font-weight: 900; visibility: hidden; opacity: 0; z-index: 1000; }
    #toast.show { visibility: visible; opacity: 1; bottom: 50px; }
    .wa-btn { background: #25D366; border: none; border-radius: 12px; color: #fff; padding: 10px 15px; font-weight: 900; cursor: pointer; margin-right: 5px; }
    .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
    .pagination button { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: #fff; cursor: pointer; }
    .pagination button.active { background: var(--neon-cyan); color: #000; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🚀 صاروخ الإحالات</h1>
    <p style="color:var(--muted); font-size: 14px;">عمولة 10% عن أول 10 سحبات لكل صديق</p>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div style="font-size: 12px; color: var(--muted);">إجمالي الأصدقاء</div>
      <div class="value" id="refCount">0</div>
    </div>
    <div class="stat-card">
      <div style="font-size: 12px; color: var(--muted);">أرباحك المحققة</div>
      <div class="value" id="refEarnings" style="color:var(--gold)">0.00 <small>EGP</small></div>
    </div>
  </div>

  <div class="main-card">
    <div style="font-size: 13px; color: var(--muted);">كود الدعوة الخاص بك</div>
    <div class="code-display" id="userCode">------</div>
    <div class="link-box">
      <div class="link-text" id="refLink">جارِ التحميل...</div>
      <button class="copy-btn" onclick="copyRef()">نسخ</button>
      <button class="wa-btn" onclick="shareWhatsapp()">واتساب</button>
    </div>
  </div>

  <div class="table-wrapper">
    <table>
      <thead><tr><th>الصديق / التقدم</th><th>العمولة</th></tr></thead>
      <tbody id="refTable">
        <tr><td colspan="2" style="text-align:center; padding:30px; color:var(--muted);">جارِ جلب البيانات...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="pagination" id="paginationControls" style="display: none;"></div>
</div>

<div id="toast">تم النسخ! 📋</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, onSnapshot, collection, query, where, getDocs, orderBy, limit, startAfter } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = { apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", authDomain: "am--rewards.firebaseapp.com", projectId: "am--rewards" };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  let currentPage = 0;
  const pageSize = 5;
  let allFriends = [];

  onAuthStateChanged(auth, user => {
    if (!user) return;

    onSnapshot(doc(db, "users", user.uid), s => {
      if(!s.exists()) return;
      const d = s.data();
      document.getElementById('userCode').innerText = d.referralCode || "---";
      document.getElementById('refCount').innerText = d.referralCount || 0;
      document.getElementById('refLink').innerText = `https://am-rewards.vercel.app/signup.html?ref=${d.referralCode}`;
    });

    loadFriendsWithPagination(user.uid);
  });

  // ✅ تحميل الأصدقاء مع Pagination
  async function loadFriendsWithPagination(userId) {
    const q = query(
      collection(db, "users"),
      where("referredBy", "==", userId)
    );
    
    const snap = await getDocs(q);
    allFriends = snap.docs;

    if (allFriends.length === 0) {
      document.getElementById('refTable').innerHTML = "<tr><td colspan='2' style='text-align:center;padding:40px;'>لا يوجد أصدقاء بعد.</td></tr>";
      document.getElementById('refEarnings').innerHTML = `0.00 <small>EGP</small>`;
      return;
    }

    displayPage(0, userId);
    setupPagination(userId);
  }

  async function displayPage(pageNum, userId) {
    const start = pageNum * pageSize;
    const end = start + pageSize;
    const pageFriends = allFriends.slice(start, end);

    const tbody = document.getElementById('refTable');
    tbody.innerHTML = "";

    let totalEarnings = 0;

    for (const friendDoc of pageFriends) {
      const u = friendDoc.data();
      const uId = friendDoc.id;

      const wQ = query(
        collection(db, "withdrawals"),
        where("userId", "==", uId),
        where("status", "==", "completed")
      );
      const wSnap = await getDocs(wQ);
      
      let friendComm = 0;
      let historyHtml = "";
      
      wSnap.docs.forEach((wDoc, i) => {
        if(i < 10) {
          const amt = (Number(wDoc.data().amount || 0) * 0.10);
          friendComm += amt;
          historyHtml += `<div class="history-item"><span>سحب #${i+1}</span><span style="color:var(--neon-cyan)">+${amt.toFixed(2)} ج</span></div>`;
        }
      });

      totalEarnings += friendComm;
      const count = wSnap.size > 10 ? 10 : wSnap.size;
      const progress = (count / 10) * 100;

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>
          <div style="font-weight:700">${u.name || 'مستخدم'}</div>
          <div style="font-size:10px; color:var(--muted); margin-top:4px;">سحبات الربح: ${count}/10</div>
          <div class="progress-container"><div class="progress-bar" style="width:${progress}%"></div></div>
          <span class="view-log-link" onclick="toggleHistory('${uId}')">تفاصيل السحبات 👇</span>
          <div id="hist-${uId}" class="history-box">${historyHtml || 'لا يوجد سحبات مكتملة بعد.'}</div>
        </td>
        <td style="text-align:center"><span class="commission-tag">+${friendComm.toFixed(2)}</span></td>
      `;
      tbody.appendChild(tr);
    }
    
    document.getElementById('refEarnings').innerHTML = `${totalEarnings.toFixed(2)} <small>EGP</small>`;
    currentPage = pageNum;
  }

  function setupPagination(userId) {
    const paginationControls = document.getElementById('paginationControls');
    paginationControls.innerHTML = "";
    
    const totalPages = Math.ceil(allFriends.length / pageSize);
    
    if (totalPages <= 1) {
      paginationControls.style.display = 'none';
      return;
    }

    paginationControls.style.display = 'flex';

    for (let i = 0; i < totalPages; i++) {
      const btn = document.createElement('button');
      btn.textContent = i + 1;
      btn.className = i === 0 ? 'active' : '';
      btn.onclick = () => {
        document.querySelectorAll('.pagination button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        displayPage(i, userId);
      };
      paginationControls.appendChild(btn);
    }
  }

  window.toggleHistory = id => {
    const el = document.getElementById('hist-' + id);
    if(el) el.style.display = (el.style.display === 'block') ? 'none' : 'block';
  };

  window.copyRef = () => {
    const txt = document.getElementById('refLink').innerText;
    navigator.clipboard.writeText(txt).then(() => {
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    });
  };

  window.shareWhatsapp = () => {
      const link = document.getElementById('refLink').innerText;
      const text = `سجل في AM Rewards وابدأ جمع نقاط وحولها لفلوس! ده رابط التسجيل بتاعي: ${link}`;
      window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
  };
</script>
</body>
</html>
