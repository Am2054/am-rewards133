<!-- my-properties.html - النسخة الهندسية النهائية لإدارة الملاك (خالية تماماً من الحجوزات والمعاينة) -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إدارة عقاراتي الاستثمارية | AM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --neon-cyan: #00f2ff; 
      --neon-purple: #7000ff; 
      --bg-deep: #020617;
      --glass-bg: rgba(15, 23, 42, 0.75); 
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f1f5f9; 
      --muted: #94a3b8;
      --success: #22c55e; 
      --danger: #f87171; 
      --warning: #facc15;
      --radius: 24px;
      --shadow: 0 8px 32px 0 rgba(2, 6, 23, 0.5);
    }

    * { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }

    body {
      margin: 0; padding: 0; font-family: 'Cairo', sans-serif;
      background: var(--bg-deep); color: var(--text-main);
      min-height: 100vh;
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(112, 0, 255, 0.15) 0%, transparent 35%),
        radial-gradient(circle at 100% 100%, rgba(0, 242, 255, 0.15) 0%, transparent 35%);
      padding: 2.5rem 1.5rem;
    }

    body::after {
      content: ""; position: fixed; inset: 0; z-index: -1;
      background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
      opacity: 0.15; pointer-events: none;
    }

    .properties-container {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
    }
    
    .btn-back { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--muted); text-decoration: none; font-weight: 700; margin-bottom: 1.5rem; font-size: 0.95rem; }
    .btn-back:hover { color: var(--neon-cyan); }

    h1 { font-weight: 900; margin-bottom: 2.5rem; color: #fff; text-shadow: 0 0 15px rgba(0, 242, 255, 0.3); font-size: 2rem; }
    
    /* كارد عقاري زجاجي فسيح ومرن للغاية */
    .prop-card { 
      background: var(--glass-bg); 
      border: 1px solid var(--glass-border); 
      border-radius: var(--radius); 
      padding: 2rem; 
      margin-bottom: 2rem; 
      display: flex; 
      gap: 2rem; 
      align-items: flex-start; 
      position: relative;
    }
    .prop-card:hover { border-color: var(--neon-cyan); box-shadow: 0 15px 30px rgba(0, 242, 255, 0.05); }
    
    /* تقليل الشفافية وتطبيق شريط مميز في حال تأجير العقار أو بيعه أو إخفائه */
    .prop-card.inactive-asset {
      opacity: 0.7;
    }

    .prop-img-wrapper {
      position: relative;
      width: 220px;
      height: 160px;
      border-radius: 16px;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid var(--glass-border);
      background: rgba(0,0,0,0.3);
    }
    .prop-img { width: 100%; height: 100%; object-fit: cover; }
    
    /* شريط البادج في حال تأجير العقار أو إخفائه */
    .asset-overlay-ribbon {
      position: absolute;
      inset: 0;
      background: rgba(16, 185, 129, 0.85);
      color: #fff;
      font-weight: 900;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      backdrop-filter: blur(4px);
    }

    .prop-details { flex: 1; display: flex; flex-direction: column; gap: 0.5rem; width: 100%; }
    .prop-title { font-size: 1.4rem; font-weight: 900; color: #fff; line-height: 1.4; }
    
    /* بادجات تصنيف مراجعة الإدارة */
    .status-badge { width: max-content; padding: 0.4rem 1rem; border-radius: 8px; font-size: 0.8rem; font-weight: 900; display: inline-flex; align-items: center; gap: 0.45rem; margin-bottom: 0.25rem; }
    .status-pending { background: rgba(245, 158, 11, 0.12); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.2); }
    .status-approved { background: rgba(16, 185, 129, 0.12); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
    .status-rejected { background: rgba(239, 68, 68, 0.12); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
    
    /* بادجات حالة العقار الشخصية للمالك */
    .availability-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.82rem;
      font-weight: 900;
      padding: 0.35rem 0.85rem;
      border-radius: 6px;
      margin-right: 8px;
    }
    .avail-available { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
    .avail-reserved { background: rgba(245, 158, 11, 0.1); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.2); }
    .avail-rented { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
    .avail-sold { background: rgba(112, 0, 255, 0.1); color: var(--neon-cyan); border: 1px solid rgba(112, 0, 255, 0.2); }
    .avail-rejected { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }

    .reason-box {
      background: rgba(239, 68, 68, 0.05);
      border: 1px solid var(--danger);
      padding: 1rem;
      border-radius: 10px;
      color: var(--danger);
      font-size: 0.88rem;
      font-weight: 600;
      margin-top: 10px;
      line-height: 1.6;
    }

    .seo-alert-box { background: rgba(0, 242, 255, 0.03); border: 1px solid rgba(0,242,255,0.15); padding: 0.85rem 1.1rem; border-radius: 10px; font-size: 0.85rem; margin-top: 0.5rem; display: flex; align-items: center; gap: 0.5rem; color: #fff; font-weight: 600; line-height: 1.6; }

    /* مظهر مخصص ومحسّن لأزرار التحكم والعمليات المزدوجة */
    .actions-panel-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      width: 100%;
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--glass-border);
    }

    .btn-action-asset {
      background: var(--bg-tertiary);
      color: #fff;
      padding: 0.65rem 1.25rem;
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Cairo', sans-serif;
    }
    .btn-action-asset:hover {
      border-color: var(--neon-cyan);
      background: rgba(0,242,255,0.05);
    }
    .btn-action-edit-resubmit {
      background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan));
      color: #fff;
      border: none;
      box-shadow: 0 4px 15px rgba(112,0,255,0.2);
    }
    .btn-action-edit-resubmit:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(112,0,255,0.35);
    }

    /* منسدل ومظهر اختيار وتغيير الحالة الشخصية */
    .status-select-wrapper {
      position: relative;
      display: inline-block;
    }
    .status-select-el {
      background: var(--bg-deep);
      border: 1px solid var(--glass-border);
      color: #fff;
      padding: 0.4rem 1rem;
      border-radius: 8px;
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      outline: none;
      cursor: pointer;
    }
    .status-select-el:focus {
      border-color: var(--neon-cyan);
    }

    @media (max-width: 768px) {
      .prop-card { flex-direction: column; align-items: stretch; padding: 1.5rem; }
      .prop-img-wrapper { width: 100%; height: 200px; }
      .actions-panel-row { justify-content: center; }
      .btn-action-asset { width: 100%; justify-content: center; }
      .status-select-wrapper { width: 100%; }
      .status-select-el { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>

  <div class="properties-container">
    <a href="dashboard.html" class="btn-back"><i class="fas fa-arrow-right"></i> العودة للوحة التحكم الإدارية</a>
    
    <h1>أصول عقاراتي الاستثمارية</h1>
    <div id="myPropertiesList">جاري تحميل وسحب قائمة الأصول العقارية الخاصة بك...</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, updateDoc, deleteDoc, collection, query, where, getDocs, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0",
        authDomain: "am--rewards.firebaseapp.com",
        projectId: "am--rewards",
        storageBucket: "am--rewards.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            document.getElementById('myPropertiesList').innerHTML = "يرجى تسجيل الدخول لعرض عقاراتك الاستثمارية.";
            return;
        }
        
        try {
            // مراقبة حية ومباشرة لقائمة العقارات التابعة للمالك
            const q = query(collection(db, "properties"), where("ownerId", "==", user.uid), orderBy("createdAt", "desc"));
            
            onSnapshot(q, (snapshot) => {
                const listContainer = document.getElementById('myPropertiesList');
                listContainer.innerHTML = '';

                if (snapshot.empty) {
                    listContainer.innerHTML = `<p style="color: var(--muted); text-align:center; padding: 3rem; font-weight:700;">لم تقم بإضافة أي أصول عقارية أو أراضي حتى الآن بملفك.</p>`;
                    return;
                }

                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const id = docSnap.id;

                    const card = document.createElement('div');
                    // تقليل الشفافية في حال كان العقار غير متاح أو مؤجر
                    const isInactive = data.isHidden || data.availability === 'rented' || data.availability === 'sold' || data.availability === 'unavailable';
                    card.className = `prop-card ${isInactive ? 'inactive-asset' : ''}`;

                    const imgUrl = data.coverImage || (data.images && data.images[0]) || 'https://images.unsplash.com/photo-1545324418-cc1a9917ecff?w=500&fit=crop';
                    
                    // 1. معالجة البادج الخاص بالإدارة
                    let statusMarkup = '';
                    if (data.status === 'pending') {
                        statusMarkup = `<span class="status-badge status-pending"><i class="fas fa-hourglass-half"></i> قيد المراجعة الإدارية</span>`;
                    } else if (data.status === 'approved') {
                        statusMarkup = `<span class="status-badge status-approved"><i class="fas fa-check-circle"></i> معتمد ونشط</span>`;
                    } else if (data.status === 'rejected') {
                        statusMarkup = `
                            <span class="status-badge status-rejected"><i class="fas fa-times-circle"></i> تم رفض الإعلان</span>
                            <div class="reason-box"><strong>سبب الرفض:</strong> ${data.rejectReason || 'مخالف لسياسة المحتوى والوسائط'}</div>
                        `;
                    }

                    // 2. معالجة حالة الوفرة الشخصية للمالك (متاح، مؤجر، تم البيع...)
                    const avail = data.availability || 'available';
                    let availBadge = '';
                    if (avail === 'available') {
                        availBadge = `<span class="availability-badge avail-available"><i class="fas fa-circle" style="font-size:0.6rem;"></i> متاح</span>`;
                    } else if (avail === 'reserved') {
                        availBadge = `<span class="availability-badge avail-reserved"><i class="fas fa-circle" style="font-size:0.6rem;"></i> محجوز مؤقتاً</span>`;
                    } else if (avail === 'rented') {
                        availBadge = `<span class="availability-badge avail-rented"><i class="fas fa-circle" style="font-size:0.6rem;"></i> مؤجر للنزلاء</span>`;
                    } else if (avail === 'sold') {
                        availBadge = `<span class="availability-badge avail-sold"><i class="fas fa-circle" style="font-size:0.6rem;"></i> تم البيع</span>`;
                    } else if (avail === 'unavailable') {
                        availBadge = `<span class="availability-badge avail-rejected"><i class="fas fa-circle" style="font-size:0.6rem;"></i> غير متاح حالياً</span>`;
                    }

                    // 3. معالجة التنبيهات الذكية (تحسين الـ SEO للبحث المتقدم)
                    let seoMarkup = '';
                    const hasOptionalDetails = data.finishing || data.electricityCard || (data.features && Object.values(data.features).includes(true));
                    if (!hasOptionalDetails && data.status === 'approved') {
                        seoMarkup = `
                            <div class="seo-alert-box">
                              <i class="fas fa-lightbulb" style="color:var(--neon-cyan)"></i>
                              <span>أضف المزيد من التفاصيل والتشطيبات والمميزات بداخل إعدادات العقار لتصدر نتائج البحث العقاري والترشيحات بالمنصة.</span>
                            </div>
                        `;
                    }

                    // 4. معالجة تاريخ النشر المنسق
                    const timeText = data.createdAt ? new Date(data.createdAt.toDate()).toLocaleDateString('ar-EG', { day: 'numeric', month: 'long' }) : "قريباً";

                    // 5. نوع العملية والأسعار
                    const isRent = data.purpose === 'rent';
                    const operationTypeMarkup = isRent ? `<span style="color: var(--neon-cyan); font-weight:700; font-size:0.85rem;">للإيجار الـ${data.rentCycle || 'شهري'}</span>` : `<span style="color: var(--warning); font-weight:700; font-size:0.85rem;">للبيع والتمليك</span>`;
                    const priceFormatted = Number(data.price || 0).toLocaleString('ar-EG');
                    const priceText = isRent ? `${priceFormatted} ج.م / ${data.rentCycle || 'شهر'}` : `${priceFormatted} ج.م كاش`;

                    // 6. شريط تغطية الكارد في حال عدم الإتاحة
                    let ribbonMarkup = '';
                    if (data.isHidden) {
                        ribbonMarkup = `<div class="asset-overlay-ribbon" style="background: rgba(239, 68, 68, 0.85);"><i class="fas fa-eye-slash"></i> إعلان مخفي مؤقتاً</div>`;
                    } else if (avail === 'rented') {
                        ribbonMarkup = `<div class="asset-overlay-ribbon" style="background: rgba(16, 185, 129, 0.85);"><i class="fas fa-key"></i> تم تأجير العقار للنزلاء</div>`;
                    } else if (avail === 'sold') {
                        ribbonMarkup = `<div class="asset-overlay-ribbon" style="background: rgba(112, 0, 255, 0.85);"><i class="fas fa-handshake"></i> تم بيع الأصل بالكامل</div>`;
                    }

                    card.innerHTML = `
                        <div class="prop-img-wrapper">
                          <img src="${imgUrl}" class="prop-img" alt="Property Cover" onerror="this.src='https://images.unsplash.com/photo-1545324418-cc1a9917ecff?w=500&fit=crop'">
                          ${ribbonMarkup}
                        </div>
                        <div class="prop-details">
                            <div style="display:flex; align-items:center; flex-wrap:wrap; gap:8px;">
                              ${statusMarkup} 
                              ${availBadge}
                              <span style="font-size:0.75rem; color:var(--muted); font-weight:700; margin-right:auto;">تم النشر: ${timeText}</span>
                            </div>
                            <div style="display:flex; justify-content:space-between; align-items:center; width:100%; margin-top:5px;">
                              <div class="prop-title">${data.title}</div>
                              ${operationTypeMarkup}
                            </div>
                            <p style="color:var(--neon-cyan); font-weight:900; font-size:1.15rem; margin-top:2px;">${priceText}</p>
                            <p style="color:var(--muted); font-size:0.85rem; font-weight:600;"><i class="fas fa-map-marker-alt"></i> ${data.governorate}، ${data.city} | ${data.area || 0} م²</p>

                            ${seoMarkup}

                            <!-- لوحة أزرار العمليات والتحكم المتكاملة الخالية من المعاينة والطلبات -->
                            <div class="actions-panel-row">
                              <!-- زر تعديل العقار يوجه لصفحة التعديل التلقائية edit-property.html لمنع بدء الإضافة من جديد -->
                              <a href="edit-property.html?id=${id}" class="btn-action-asset ${data.status === 'rejected' ? 'btn-action-edit-resubmit' : ''}">
                                <i class="fas fa-edit"></i> ${data.status === 'rejected' ? 'تعديل وإعادة الإرسال' : 'تعديل البيانات'}
                              </a>
                              
                              <!-- منسدل تعديل الوفرة حياً -->
                              <div class="status-select-wrapper">
                                <select class="status-select-el" onchange="window.updateAssetAvailability('${id}', this.value)">
                                  <option value="available" ${avail === 'available' ? 'selected' : ''}>متاح للجميع</option>
                                  <option value="reserved" ${avail === 'reserved' ? 'selected' : ''}>محجوز مؤقتاً</option>
                                  <option value="rented" ${avail === 'rented' ? 'selected' : ''}>مؤجر للنزلاء</option>
                                  <option value="sold" ${avail === 'sold' ? 'selected' : ''}>تم البيع</option>
                                  <option value="unavailable" ${avail === 'unavailable' ? 'selected' : ''}>غير متاح مؤقتاً</option>
                                </select>
                              </div>

                              <!-- زر إيقاف وتعطيل الإعلان المؤقت حياً بالـ Firestore -->
                              <button class="btn-action-asset" style="${data.isHidden ? 'background: rgba(16, 185, 129, 0.1); color: var(--success); border-color: var(--success);' : 'background: rgba(239, 68, 68, 0.1); color: var(--danger); border-color: var(--danger);'}" onclick="window.toggleAssetVisibility('${id}', ${!!data.isHidden})">
                                <i class="${data.isHidden ? 'fas fa-eye' : 'fas fa-eye-slash'}"></i> ${data.isHidden ? 'إظهار ونشر الإعلان' : 'إخفاء الإعلان'}
                              </button>
                            </div>
                        </div>
                    `;

                    listContainer.appendChild(card);
                });
            });

        } catch (err) {
            console.error("Error loading customer properties:", err);
            document.getElementById('myPropertiesList').innerHTML = "حدث خطأ غير متوقع أثناء استدعاء قائمة عقاراتك الاستثمارية.";
        }
    });

    // دالة تغيير حالة الوفرة حياً بداخل الـ Firestore
    window.updateAssetAvailability = async function(propertyId, newStatus) {
      try {
        await updateDoc(doc(db, "properties", propertyId), {
          availability: newStatus,
          updated_at: new Date().toISOString()
        });
        alert("✅ تم تحديث حالة الوفرة للعقار بنجاح.");
      } catch (e) {
        console.error("Failed to update availability status: ", e);
      }
    };

    // دالة إيقاف ونشر الإعلان حياً بداخل الـ Firestore دون حذفه
    window.toggleAssetVisibility = async function(propertyId, currentIsHidden) {
      try {
        await updateDoc(doc(db, "properties", propertyId), {
          isHidden: !currentIsHidden,
          updated_at: new Date().toISOString()
        });
        alert(currentIsHidden ? "✅ تم إعادة نشر وتفعيل الإعلان بنجاح." : "✅ تم إيقاف وإخفاء الإعلان مؤقتاً بنجاح.");
      } catch (e) {
        console.error("Failed to toggle visibility: ", e);
      }
    };
  </script>
</body>
</html>
