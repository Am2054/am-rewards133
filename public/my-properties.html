<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>عقاراتي - AM. Rewards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-primary: #0b0f19;
      --bg-secondary: rgba(22, 30, 49, 0.7);
      --bg-tertiary: #1f293d;
      --primary: #38bdf8;
      --text-primary: #f3f4f6;
      --text-muted: #9ca3af;
      --border: rgba(255, 255, 255, 0.08);
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --transition: all 0.3s ease;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Cairo', sans-serif; background-color: var(--bg-primary); color: var(--text-primary); padding: 2rem 1rem; }
    
    .properties-container { max-width: 1000px; margin: 0 auto; }
    
    /* زر العودة للوحة التحكم */
    .btn-back { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-muted); text-decoration: none; font-weight: 600; margin-bottom: 1.5rem; font-size: 0.95rem; transition: var(--transition); }
    .btn-back:hover { color: var(--primary); }

    h1 { font-weight: 900; margin-bottom: 2rem; color: var(--primary); font-size: 1.8rem; }
    
    /* تحسين الكارت ليكون متجاوب بالكامل */
    .prop-card { 
      background: var(--bg-secondary); 
      border: 1px solid var(--border); 
      border-radius: 16px; 
      padding: 1.5rem; 
      margin-bottom: 1.5rem; 
      display: flex; 
      gap: 1.5rem; 
      align-items: center; 
      transition: var(--transition);
    }
    .prop-card:hover { border-color: rgba(56, 189, 248, 0.3); box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    
    .prop-img { width: 140px; height: 110px; border-radius: 12px; object-fit: cover; background: var(--bg-tertiary); flex-shrink: 0; }
    .prop-details { flex: 1; display: flex; flex-direction: column; gap: 0.4rem; }
    .prop-title { font-size: 1.25rem; font-weight: 700; color: #fff; }
    
    /* بادجات تصنيف الحالات */
    .status-badge { width: max-content; padding: 0.3rem 0.75rem; border-radius: 8px; font-size: 0.8rem; font-weight: 700; display: inline-flex; align-items: center; gap: 0.4rem; margin-bottom: 0.25rem; }
    .status-pending { background: rgba(245, 158, 11, 0.12); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.2); }
    .status-approved { background: rgba(16, 185, 129, 0.12); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
    .status-rejected { background: rgba(239, 68, 68, 0.12); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
    
    .reason-box { background: rgba(239,68,68,0.04); border: 1px dashed rgba(239, 68, 68, 0.3); padding: 0.75rem; border-radius: 8px; margin-top: 0.5rem; font-size: 0.85rem; color: #fca5a5; }
    
    .seo-alert-box { background: rgba(56, 189, 248, 0.05); border: 1px solid rgba(56,189,248,0.2); padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.85rem; margin-top: 0.5rem; display: flex; align-items: center; gap: 0.5rem; color: #e0f2fe; }
    
    /* تحسين زر التعديل ليكون مرن ومكانه منسق وثابت */
    .btn-edit { 
      background: var(--primary); 
      color: var(--bg-primary); 
      padding: 0.6rem 1.25rem; 
      border: none; 
      border-radius: 8px; 
      font-weight: 700; 
      cursor: pointer; 
      text-decoration: none; 
      font-size: 0.85rem; 
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      white-space: nowrap;
      transition: var(--transition);
    }
    .btn-edit:hover { background: #0ea5e9; transform: translateY(-2px); }

    /* شاشات الموبايل الصغيرة للتحكم في التداخل وضمان عدم التغطية */
    @media (max-width: 680px) {
      .prop-card { flex-direction: column; align-items: stretch; text-align: center; gap: 1rem; }
      .prop-img { width: 100%; height: 160px; }
      .status-badge { margin: 0 auto 0.5rem auto; }
      .btn-edit { justify-content: center; width: 100%; margin-top: 0.5rem; }
      .seo-alert-box { text-align: right; }
    }
  </style>
</head>
<body>

  <div class="properties-container">
    <!-- إضافة زر العودة إلى لوحة التحكم -->
    <a href="dashboard.html" class="btn-back"><i class="fas fa-arrow-right"></i> العودة للوحة التحكم</a>
    
    <h1>أصول عقاراتي الاستثمارية</h1>
    <div id="myPropertiesList">جاري تحميل قائمة العقارات الخاصة بك...</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0",
        authDomain: "am--rewards.firebaseapp.com",
        projectId: "am--rewards",
        storageBucket: "am--rewards.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            document.getElementById('myPropertiesList').innerHTML = "يرجى تسجيل الدخول لعرض عقاراتك المعلقة والنشطة.";
            return;
        }
        
        try {
            const q = query(collection(db, "properties"), where("ownerId", "==", user.uid), orderBy("createdAt", "desc"));
            const querySnapshot = await getDocs(q);
            const listContainer = document.getElementById('myPropertiesList');
            listContainer.innerHTML = '';

            if(querySnapshot.empty) {
                listContainer.innerHTML = "لم تقم بإضافة أي عقارات حتى الآن بالموقع.";
                return;
            }

            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const id = docSnap.id;
                
                const card = document.createElement('div');
                card.className = 'prop-card';

                const imgUrl = data.coverImage || (data.images && data.images[0]) || '';
                
                let statusMarkup = '';
                let seoMarkup = '';

                if (data.status === 'pending') {
                    statusMarkup = `<span class="status-badge status-pending"><i class="fas fa-hourglass-half"></i> قيد المراجعة الإدارية</span>`;
                } else if (data.status === 'approved') {
                    statusMarkup = `<span class="status-badge status-approved"><i class="fas fa-check-circle"></i> تم النشر بالموقع تلقائياً</span>`;
                } else if (data.status === 'rejected') {
                    statusMarkup = `
                        <span class="status-badge status-rejected"><i class="fas fa-times-circle"></i> تم رفض الإعلان</span>
                        <div class="reason-box"><strong>سبب الرفض الإداري:</strong> ${data.rejectReason || 'مخالف لسياسة المحتوى'}</div>
                    `;
                }

                const hasOptionalDetails = data.finishing || data.electricityCard || (data.features && Object.values(data.features).includes(true));
                if (!hasOptionalDetails && data.status === 'approved') {
                    seoMarkup = `
                        <div class="seo-alert-box">
                          <i class="fas fa-lightbulb" style="color:var(--primary)"></i>
                          <span>أضف المزيد من التفاصيل (مثل التشطيب، المميزات والخدمات) لتحسين ظهور إعلانك في نتائج البحث والترشيحات المتقدمة.</span>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <img src="${imgUrl}" class="prop-img" alt="Property Cover">
                    <div class="prop-details">
                        <div>${statusMarkup}</div>
                        <div class="prop-title">${data.title}</div>
                        <p style="color:var(--text-muted); font-size:0.9rem;">${data.governorate}، ${data.city} | ${data.price} ج.م</p>
                        ${seoMarkup}
                    </div>
                    <a href="edit-property.html?id=${id}" class="btn-edit"><i class="fas fa-edit"></i> تعديل العقار</a>
                `;

                listContainer.appendChild(card);
            });

        } catch (err) {
            console.error("Error loading customer properties:", err);
            document.getElementById('myPropertiesList').innerHTML = "حدث خطأ غير متوقع أثناء استدعاء قائمة عقاراتك الاستثمارية.";
        }
    });
  </script>
</body>
</html>
