<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AM REWARDS | إدارة السحوبات</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #00f2ff;
      --secondary: #7000ff;
      --bg-dark: #0a0e27;
      --bg-darker: #050811;
      --card-bg: rgba(20, 28, 60, 0.5);
      --border-color: rgba(0, 242, 255, 0.1);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --gold: #fbbf24;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, var(--bg-darker) 0%, var(--bg-dark) 100%);
      color: var(--text-primary);
      min-height: 100vh;
      background-attachment: fixed;
    }

    /* ✅ Glassmorphism Effect */
    .glass {
      background: rgba(20, 28, 60, 0.4);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
    }

    /* ✅ Auth Gate */
    #auth-gate {
      position: fixed;
      inset: 0;
      background: var(--bg-darker);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      opacity: 1;
      transition: opacity 0.3s ease;
    }

    #auth-gate.hidden {
      pointer-events: none;
      opacity: 0;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      padding: 40px;
      background: linear-gradient(135deg, rgba(0, 242, 255, 0.1), rgba(112, 0, 255, 0.1));
      border: 2px solid var(--primary);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 242, 255, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      text-align: center;
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .auth-card h2 {
      font-family: 'Inter', sans-serif;
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--primary);
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    .auth-card input {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 20px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      background: rgba(0, 0, 0, 0.3);
      color: var(--text-primary);
      font-size: 1rem;
      text-align: center;
      transition: 0.3s;
      font-family: inherit;
    }

    .auth-card input:focus {
      border-color: var(--primary);
      background: rgba(0, 242, 255, 0.05);
      box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
      outline: none;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #000;
      font-weight: 900;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
      font-family: inherit;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 242, 255, 0.3);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ✅ Main Container */
    #main-ui {
      opacity: 1;
      transition: opacity 0.3s ease;
    }

    #main-ui.hidden {
      pointer-events: none;
      opacity: 0;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    /* ✅ Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 35px;
      padding: 25px 30px;
      background: var(--card-bg);
      border-radius: 20px;
      border: 1px solid var(--border-color);
      animation: fadeIn 0.5s ease 0.1s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    header h1 {
      font-family: 'Inter', sans-serif;
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0;
    }

    header h1 span {
      opacity: 0.6;
      font-weight: 400;
    }

    .btn-logout {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid var(--danger);
      color: var(--danger);
      padding: 10px 25px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      font-family: inherit;
      transition: 0.3s;
    }

    .btn-logout:hover {
      background: var(--danger);
      color: #fff;
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
    }

    /* ✅ Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 35px;
    }

    .stat-card {
      padding: 25px 30px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      animation: fadeIn 0.5s ease;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: linear-gradient(180deg, var(--primary), var(--secondary));
    }

    .stat-card strong {
      display: block;
      font-size: 2.5rem;
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      margin: 15px 0;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-card span {
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 600;
    }

    /* ✅ Table Container */
    .table-wrapper {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      overflow: hidden;
      animation: fadeIn 0.5s ease 0.2s both;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }

    /* ✅ Filters */
    .filter-section {
      padding: 20px 30px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .filter-section input,
    .filter-section select {
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      background: rgba(0, 0, 0, 0.2);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.95rem;
      transition: 0.3s;
      outline: none;
    }

    .filter-section input {
      flex: 1;
      min-width: 250px;
    }

    .filter-section input:focus,
    .filter-section select:focus {
      border-color: var(--primary);
      background: rgba(0, 242, 255, 0.05);
      box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
    }

    /* ✅ Table */
    .table-scroll {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      padding: 18px 30px;
      text-align: right;
      color: var(--primary);
      font-weight: 700;
      font-size: 0.85rem;
      border-bottom: 2px solid var(--border-color);
      background: rgba(0, 242, 255, 0.03);
      letter-spacing: 0.5px;
    }

    td {
      padding: 18px 30px;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.95rem;
      transition: 0.2s;
    }

    tbody tr:hover {
      background: rgba(0, 242, 255, 0.05);
    }

    /* ✅ Badges */
    .badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 900;
      letter-spacing: 0.5px;
    }

    .badge-pending {
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning);
      border: 1px solid rgba(245, 158, 11, 0.3);
    }

    .badge-completed {
      background: rgba(34, 197, 94, 0.15);
      color: var(--success);
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .badge-rejected {
      background: rgba(239, 68, 68, 0.15);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    /* ✅ Action Buttons */
    .btn-action {
      padding: 8px 16px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #000;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.3s;
      font-family: inherit;
    }

    .btn-action:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 242, 255, 0.3);
    }

    /* ✅ Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 11000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .modal-content {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 40px;
      width: 90%;
      max-width: 550px;
      box-shadow: 0 20px 60px rgba(0, 242, 255, 0.2);
      animation: slideUp 0.3s ease;
    }

    .modal-content h3 {
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: 25px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 0;
      border-bottom: 1px solid var(--border-color);
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 0.9rem;
    }

    .detail-value {
      font-weight: 700;
      font-family: 'Inter', sans-serif;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 30px;
    }

    .btn-group button {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-accept {
      background: linear-gradient(135deg, var(--success), #16a34a);
      color: #fff;
    }

    .btn-accept:hover {
      box-shadow: 0 10px 30px rgba(34, 197, 94, 0.3);
    }

    .btn-reject {
      background: linear-gradient(135deg, var(--danger), #991b1b);
      color: #fff;
    }

    .btn-reject:hover {
      box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3);
    }

    .textarea-box {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      background: rgba(0, 0, 0, 0.3);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.95rem;
      margin-bottom: 15px;
      outline: none;
      resize: vertical;
    }

    .textarea-box:focus {
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
    }

    /* ✅ Toast Notifications */
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 16px 24px;
      border-radius: 12px;
      border-left: 4px solid var(--primary);
      background: var(--card-bg);
      color: var(--text-primary);
      font-weight: 700;
      box-shadow: 0 10px 30px rgba(0, 242, 255, 0.2);
      animation: slideInRight 0.3s ease;
      z-index: 12000;
      max-width: 400px;
    }

    @keyframes slideInRight {
      from { transform: translateX(400px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .toast.success { border-left-color: var(--success); }
    .toast.danger { border-left-color: var(--danger); }
    .toast.warning { border-left-color: var(--warning); }

    /* ✅ Loading Spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0, 242, 255, 0.3);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ✅ Responsive */
    @media (max-width: 768px) {
      .container { padding: 15px; }
      header { flex-direction: column; gap: 15px; align-items: flex-start; }
      header h1 { font-size: 1.5rem; }
      .stats-grid { grid-template-columns: 1fr; }
      .filter-section { flex-direction: column; }
      th, td { padding: 12px 15px; font-size: 0.85rem; }
      .modal-content { width: 95%; padding: 25px; }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- ✅ Auth Gate -->
  <div id="auth-gate">
    <div class="auth-card">
      <h2>🔐 مدير السحوبات</h2>
      <input type="password" id="adm-pass" placeholder="أدخل رمز الوصول" />
      <button id="btn-login" class="btn-primary">دخول النظام</button>
      <p style="margin-top: 20px; color: var(--text-secondary); font-size: 0.9rem;">
        يتطلب صلاحيات إدارية للوصول
      </p>
    </div>
  </div>

  <!-- ✅ Main UI -->
  <div id="main-ui" class="hidden">
    <div class="container">
      <!-- Header -->
      <header>
        <div>
          <h1>💳 مدير <span>السحوبات</span></h1>
        </div>
        <button id="btnLogout" class="btn-logout">إنهاء الجلسة</button>
      </header>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <span>✅ عمليات ناجحة</span>
          <strong id="totalCompletedCount">0</strong>
        </div>
        <div class="stat-card">
          <span>💰 إجمالي المدفوع</span>
          <strong id="totalPaid">0.00 ج.م</strong>
        </div>
        <div class="stat-card">
          <span>⏳ قيد المراجعة</span>
          <strong id="pendingCount" style="color: var(--warning);">0</strong>
        </div>
      </div>

      <!-- Table -->
      <div class="table-wrapper">
        <div class="filter-section">
          <input type="text" id="searchInput" placeholder="ابحث باسم المستخدم أو البريد...">
          <select id="statusFilter" onchange="applyFilters()">
            <option value="All">عرض الكل</option>
            <option value="pending">⏳ المعلقة فقط</option>
            <option value="completed">✅ المكتملة فقط</option>
            <option value="rejected">❌ المرفوضة فقط</option>
          </select>
        </div>

        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>المستخدم</th>
                <th>التاريخ</th>
                <th>المبلغ</th>
                <th>المحفظة</th>
                <th>الحالة</th>
                <th>الإجراء</th>
              </tr>
            </thead>
            <tbody id="withdrawalsTbody">
              <tr>
                <td colspan="6" style="text-align: center; padding: 40px;">
                  <div class="spinner"></div>
                  جاري التحميل...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- ✅ Modal -->
  <div id="modal" class="modal-overlay">
    <div class="modal-content">
      <h3>📋 تفاصيل العملية</h3>
      <div id="modalContent" style="margin: 20px 0;"></div>

      <div id="action-buttons">
        <div class="btn-group">
          <button id="confirmAccept" class="btn-accept">✅ اعتماد الدفع</button>
          <button id="showRejectBox" class="btn-reject">❌ رفض الطلب</button>
        </div>
      </div>

      <div id="modal-reject-box" class="hidden" style="margin-top: 20px;">
        <textarea id="rejectReason" class="textarea-box" placeholder="اكتب سبب الرفض..."></textarea>
        <label style="display: flex; align-items: center; gap: 10px; color: var(--text-secondary); font-size: 0.9rem;">
          <input type="checkbox" id="refundPointsCheck" checked>
          إرجاع النقاط للمستخدم
        </label>
        <div class="btn-group" style="margin-top: 15px;">
          <button id="confirmReject" class="btn-reject">تأكيد الرفض</button>
          <button onclick="closeModal()" style="background: rgba(255,255,255,0.1); color: var(--text-primary); border: 1px solid var(--border-color);">إلغاء</button>
        </div>
      </div>

      <button onclick="closeModal()" style="width: 100%; margin-top: 15px; background: transparent; border: none; color: var(--text-secondary); cursor: pointer; padding: 10px; font-family: inherit;">إغلاق</button>
    </div>
  </div>

  <script>
    let allWithdrawals = [];
    let usersMap = {};
    let currentId = null;

    async function apiRequest(data) {
      try {
        const res = await fetch('/api/admin_users', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...data, module: 'withdraw' })
        });
        if (res.status === 401) {
          toggleUI(false);
          showToast('جلسة غير صالحة', 'danger');
          return null;
        }
        return res.json();
      } catch (e) {
        showToast('خطأ في الاتصال بالسيرفر', 'danger');
        return null;
      }
    }

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    async function loadData() {
      const res = await apiRequest({ action: 'get_withdrawals' });
      if (res) {
        allWithdrawals = res.withdrawals;
        usersMap = res.usersMap;
        applyFilters();
      }
    }

    function applyFilters() {
      const status = document.getElementById('statusFilter').value;
      const search = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allWithdrawals.filter(w =>
        (status === 'All' || w.status === status) &&
        ((usersMap[w.userId] || '').toLowerCase().includes(search) || w.wallet.includes(search))
      );
      renderTable(filtered);
      updateStats(allWithdrawals);
    }

    function renderTable(data) {
      const tbody = document.getElementById('withdrawalsTbody');
      const statusMap = { 'pending': '⏳ معلق', 'completed': '✅ مكتمل', 'rejected': '❌ مرفوض' };

      tbody.innerHTML = data.length === 0 ?
        '<tr><td colspan="6" style="text-align: center; padding: 40px; color: var(--text-secondary);">لا توجد بيانات</td></tr>' :
        data.map(w => `
          <tr>
            <td>
              <div style="font-weight: 700;">${usersMap[w.userId] || 'مستخدم'}</div>
              <div style="font-size: 0.8rem; color: var(--text-secondary);">${w.userId.slice(0, 12)}</div>
            </td>
            <td>${new Date(w.date._seconds * 1000).toLocaleDateString('ar-EG')}</td>
            <td style="font-weight: 900; color: var(--gold);">${w.amount} ج.م</td>
            <td style="font-family: 'Courier New'; direction: ltr;">${w.wallet}</td>
            <td><span class="badge badge-${w.status}">${statusMap[w.status]}</span></td>
            <td>${w.status === 'pending' ? `<button onclick="openReview('${w.id}')" class="btn-action">مراجعة</button>` : '—'}</td>
          </tr>
        `).join('');
    }

    function updateStats(data) {
      const completed = data.filter(x => x.status === 'completed');
      const pending = data.filter(x => x.status === 'pending');
      document.getElementById('totalCompletedCount').textContent = completed.length;
      document.getElementById('totalPaid').textContent = completed.reduce((a, b) => a + Number(b.amount || 0), 0).toFixed(2) + ' ج.م';
      document.getElementById('pendingCount').textContent = pending.length;
    }

    window.openReview = (id) => {
      currentId = id;
      const w = allWithdrawals.find(x => x.id === id);
      
      document.getElementById('modalContent').innerHTML = `
        <div class="detail-row">
          <span class="detail-label">👤 المستخدم</span>
          <span class="detail-value">${usersMap[w.userId]}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">💰 المبلغ الخام</span>
          <span class="detail-value">${w.amount} ج.م</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">✓ المبلغ الصافي</span>
          <span class="detail-value" style="color: var(--primary); font-size: 1.1rem; font-weight: 900;">${w.net} ج.م</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">📱 المحفظة</span>
          <span class="detail-value" style="font-family: 'Courier New'; direction: ltr;">${w.wallet}</span>
        </div>
      `;

      document.getElementById('modal').classList.add('show');
      document.getElementById('action-buttons').classList.remove('hidden');
      document.getElementById('modal-reject-box').classList.add('hidden');
    };

    document.getElementById('confirmAccept').onclick = async () => {
      if (!confirm('هل تأكدت من تحويل المبلغ يدوياً؟')) return;
      const res = await apiRequest({ action: 'approve_withdrawal', withdrawalId: currentId });
      if (res?.success) {
        showToast('✅ تم اعتماد العملية بنجاح', 'success');
        closeModal();
        loadData();
      }
    };

    document.getElementById('showRejectBox').onclick = () => {
      document.getElementById('action-buttons').classList.add('hidden');
      document.getElementById('modal-reject-box').classList.remove('hidden');
    };

    document.getElementById('confirmReject').onclick = async () => {
      const reason = document.getElementById('rejectReason').value.trim();
      if (!reason) {
        showToast('⚠️ اكتب سبب الرفض', 'warning');
        return;
      }
      const refund = document.getElementById('refundPointsCheck').checked;
      const res = await apiRequest({
        action: 'reject_withdrawal',
        withdrawalId: currentId,
        reason,
        refundPoints: refund
      });
      if (res?.success) {
        showToast('❌ تم رفض الطلب بنجاح', 'success');
        closeModal();
        loadData();
      }
    };

    function closeModal() {
      document.getElementById('modal').classList.remove('show');
    }

    function toggleUI(show) {
      document.getElementById('auth-gate').classList.toggle('hidden', show);
      document.getElementById('main-ui').classList.toggle('hidden', !show);
    }

    document.getElementById('btn-login').onclick = async () => {
      const btn = document.getElementById('btn-login');
      const pass = document.getElementById('adm-pass').value;

      if (!pass) {
        showToast('⚠️ أدخل رمز الوصول', 'warning');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner" style="margin-right: 8px;"></span>جاري التحقق...';

      const res = await apiRequest({ action: 'admin_login', password: pass });
      if (res?.success) {
        toggleUI(true);
        loadData();
        showToast('✅ تم التسجيل بنجاح', 'success');
      } else {
        showToast('❌ رمز وصول غير صحيح', 'danger');
      }

      btn.disabled = false;
      btn.innerHTML = 'دخول النظام';
    };

    document.getElementById('btnLogout').onclick = () => {
      document.cookie = 'adminToken=; max-age=0; path=/';
      location.reload();
    };

    document.getElementById('searchInput').oninput = applyFilters;
  </script>
</body>
</html>
