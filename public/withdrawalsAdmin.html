<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AM REWARDS | خزنة السحوبات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
          --bg: #050505; 
          --card: #0d0d0d; 
          --emerald: #00ff88;   
          --border: rgba(0, 255, 136, 0.1); 
          --text: #e0e0e0; 
          --red: #ff3e3e; 
          --gray: #2a2a2a;
        }

        body { 
            font-family: "Cairo", sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; padding: 0; 
            min-height: 100vh;
            background-image: 
                linear-gradient(rgba(0, 255, 136, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* دخول النظام */
        #auth-gate { 
            position: fixed; inset: 0; background: var(--bg); 
            display: flex; align-items: center; justify-content: center; z-index: 10000; 
        }
        .auth-card { 
            width: 350px; padding: 40px; background: var(--card); 
            border: 1px solid var(--emerald); border-radius: 20px; 
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.1); text-align: center;
        }
        .auth-card h2 { font-family: 'Cairo'; color: var(--emerald); font-weight: 900; letter-spacing: 1px; font-size: 1.2rem; }
        .auth-card input { 
            width: 100%; padding: 14px; margin-top: 20px; border-radius: 8px; 
            border: 1px solid var(--gray); background: #000; color: #fff; text-align: center; outline: none;
        }
        .auth-card button { 
            width: 100%; padding: 14px; margin-top: 20px; border-radius: 8px; 
            border: none; background: var(--emerald); color: #000; font-weight: 900; cursor: pointer; font-family: 'Cairo';
        }

        .container { max-width: 1300px; margin: 0 auto; padding: 30px; }

        /* Header */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px;
        }
        header h1 { font-family: 'Cairo'; font-weight: 900; font-size: 1.3rem; color: var(--emerald); margin: 0; }
        .btn-log { background: var(--red); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 700; font-family: 'Cairo'; }

        /* Stats Blocks */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { 
            background: var(--card); padding: 30px; border-radius: 15px; 
            border: 1px solid var(--border); position: relative;
        }
        .stat-card::after { content: ''; position: absolute; top: 0; right: 0; width: 4px; height: 100%; background: var(--emerald); border-radius: 0 15px 15px 0; }
        .stat-card strong { display: block; font-size: 2.2rem; font-family: 'Orbitron'; color: var(--emerald); }
        .stat-card span { font-size: 0.9rem; color: #888; font-weight: 700; }

        /* Main Table */
        .vault-table-wrap { 
            background: var(--card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .filter-bar { padding: 20px; display: flex; gap: 15px; background: rgba(255,255,255,0.02); }
        .filter-bar input, .filter-bar select { 
            background: #000; border: 1px solid var(--gray); color: #fff; 
            padding: 12px; border-radius: 8px; outline: none; flex: 1; font-family: 'Cairo';
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: #111; padding: 18px; text-align: right; color: var(--emerald); font-size: 0.85rem; font-weight: 900; }
        td { padding: 18px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        tr:hover { background: rgba(0, 255, 136, 0.03); }

        .badge { padding: 5px 12px; border-radius: 5px; font-size: 0.75rem; font-weight: 900; }
        .badge-pending { border: 1px solid #f97316; color: #f97316; }
        .badge-completed { border: 1px solid var(--emerald); color: var(--emerald); }
        .badge-rejected { border: 1px solid var(--red); color: var(--red); }

        /* Modal */
        .modal-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            display: flex; align-items: center; justify-content: center; z-index: 11000; backdrop-filter: blur(8px);
        }
        .modal-body { 
            background: var(--card); width: 90%; max-width: 500px; padding: 40px; 
            border-radius: 20px; border: 1px solid var(--emerald);
        }
        .btn-action { padding: 12px 20px; border-radius: 8px; border: none; font-weight: 900; cursor: pointer; flex: 1; font-family: 'Cairo'; }
        
        .hidden { display: none !important; }
        code { color: var(--emerald); background: #000; padding: 2px 8px; border-radius: 4px; font-family: 'monospace'; }
    </style>
</head>
<body>

<div id="auth-gate">
    <div class="auth-card">
        <h2>تسجيل دخول الخزنة</h2>
        <input type="password" id="adm-pass" placeholder="أدخل مفتاح العبور (ADMIN_PASSWORD3)">
        <button id="btn-login">فك التشفير والدخول</button>
    </div>
</div>

<div id="main-ui" class="container hidden">
    <header>
        <h1>نظام <span style="font-weight:300; opacity:0.5;">سحوبات الأرباح</span></h1>
        <button id="btnLogout" class="btn-log">إنهاء الجلسة</button>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <strong id="totalCompletedCount">0</strong>
            <span>الطلبات الناجحة</span>
        </div>
        <div class="stat-card">
            <strong id="totalPaid">0.00</strong>
            <span>إجمالي المبالغ المدفوعة (ج.م)</span>
        </div>
        <div class="stat-card" style="border-right-color: #f97316;">
            <strong id="pendingCount">0</strong>
            <span>طلبات قيد المراجعة</span>
        </div>
    </div>

    <div class="vault-table-wrap">
        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="ابحث بالاسم، الـ ID أو رقم المحفظة...">
            <select id="statusFilter" onchange="applyFilters()">
                <option value="All">عرض كل الحالات</option>
                <option value="pending">المعلقة فقط</option>
                <option value="completed">المكتملة فقط</option>
            </select>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>بيانات المستفيد</th>
                        <th>تاريخ الطلب</th>
                        <th>المبلغ الصافي</th>
                        <th>رقم المحفظة</th>
                        <th>حالة الطلب</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="withdrawalsTbody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="modal" class="modal-overlay hidden">
    <div class="modal-body">
        <h3 style="color:var(--emerald); font-family:'Cairo'; font-weight: 900;">مراجعة بيانات التحويل</h3>
        <div id="modalContent" style="margin: 25px 0; border-top: 1px solid var(--gray); padding-top: 20px; line-height: 2;"></div>
        
        <div id="action-buttons" style="display:flex; gap:10px;">
            <button id="confirmAccept" class="btn-action" style="background:var(--emerald); color:#000;">✅ اعتماد الدفع</button>
            <button id="showRejectBox" class="btn-action" style="background:var(--red); color:#fff;">❌ رفض الطلب</button>
        </div>

        <div id="modal-reject-box" class="hidden" style="margin-top:20px;">
            <textarea id="rejectReason" style="width:100%; background:#000; border:1px solid var(--gray); color:#fff; padding:15px; border-radius:10px; font-family:'Cairo';" rows="3" placeholder="اكتب سبب الرفض للمستخدم..."></textarea>
            <div style="margin: 15px 0; font-size: 0.9rem;">
                <input type="checkbox" id="refundPointsCheck" checked> إرجاع النقاط لرصيد المستخدم؟
            </div>
            <button id="confirmReject" class="btn-action" style="background:var(--red); color:#fff; width:100%;">تأكيد الرفض النهائي</button>
        </div>
        <button onclick="closeModal()" style="width:100%; margin-top:15px; background:none; border:none; color:#666; cursor:pointer; font-family:'Cairo';">إلغاء وإغلاق</button>
    </div>
</div>

<script>
    let allWithdrawals = [];
    let usersMap = {};
    let currentId = null;

    async function apiRequest(data) {
        const res = await fetch('/api/admin_withdraw', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        if (res.status === 401) { toggleUI(false); return null; }
        return res.json();
    }

    async function loadData() {
        const res = await apiRequest({ action: 'get_withdrawals' });
        if (res) {
            allWithdrawals = res.withdrawals;
            usersMap = res.usersMap;
            applyFilters();
        }
    }

    function applyFilters() {
        const status = document.getElementById('statusFilter').value;
        const search = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allWithdrawals.filter(w => 
            (status === 'All' || w.status === status) && 
            ((usersMap[w.userId] || '').toLowerCase().includes(search) || w.wallet.includes(search))
        );
        renderTable(filtered);
        updateStats(allWithdrawals);
    }

    function renderTable(data) {
        const tbody = document.getElementById('withdrawalsTbody');
        const statusAr = { 'pending': 'معلق', 'completed': 'مكتمل', 'rejected': 'مرفوض' };
        
        tbody.innerHTML = data.map(w => `
            <tr>
                <td><b>${usersMap[w.userId] || 'مستخدم غير معروف'}</b><br><small style="color:#666">معرف: ${w.userId.slice(0,10)}</small></td>
                <td>${new Date(w.date._seconds * 1000).toLocaleDateString('ar-EG')}</td>
                <td style="color:var(--emerald); font-weight:900;">${w.net} ج.م</td>
                <td><code>${w.wallet}</code></td>
                <td><span class="badge badge-${w.status}">${statusAr[w.status] || w.status}</span></td>
                <td>${w.status === 'pending' ? `<button class="btn-action" style="background:var(--emerald); color:#000; padding:5px 15px; font-size:0.8rem;" onclick="openReview('${w.id}')">فحص ومراجعة</button>` : '---'}</td>
            </tr>
        `).join('');
    }

    function updateStats(data) {
        const comp = data.filter(x => x.status === 'completed');
        const pend = data.filter(x => x.status === 'pending');
        document.getElementById('totalCompletedCount').textContent = comp.length;
        document.getElementById('totalPaid').textContent = comp.reduce((a,b)=>a+Number(b.amount || 0),0).toFixed(2);
        document.getElementById('pendingCount').textContent = pend.length;
    }

    window.openReview = (id) => {
        currentId = id;
        const w = allWithdrawals.find(x => x.id === id);
        document.getElementById('modal').classList.remove('hidden');
        document.getElementById('modalContent').innerHTML = `
            <p>اسم صاحب الطلب: <b>${usersMap[w.userId]}</b></p>
            <p>المبلغ الخام: <b>${w.amount} ج.م</b></p>
            <p>المبلغ الصافي للتحويل: <b style="color:var(--emerald); font-size:1.2rem;">${w.net} ج.م</b></p>
            <p>رقم المحفظة (فودافون كاش أو غيرها): <code>${w.wallet}</code></p>
        `;
    };

    document.getElementById('confirmAccept').onclick = async () => {
        if(!confirm("هل تأكدت من تحويل المبلغ يدوياً؟ سيتم الآن تحديث حالة الطلب وإضافة العمولة للداعي إن وجد.")) return;
        const res = await apiRequest({ action: 'approve_withdrawal', withdrawalId: currentId });
        if(res?.success) { alert("تم اعتماد العملية بنجاح!"); closeModal(); loadData(); }
    };

    document.getElementById('showRejectBox').onclick = () => {
        document.getElementById('action-buttons').classList.add('hidden');
        document.getElementById('modal-reject-box').classList.remove('hidden');
    };

    document.getElementById('confirmReject').onclick = async () => {
        const reason = document.getElementById('rejectReason').value;
        const refund = document.getElementById('refundPointsCheck').checked;
        if(!reason) return alert("من فضلك اكتب سبب الرفض ليظهر للمستخدم في حسابه");
        const res = await apiRequest({ action: 'reject_withdrawal', withdrawalId: currentId, reason, refundPoints: refund });
        if(res?.success) { alert("تم تسجيل رفض الطلب"); closeModal(); loadData(); }
    };

    function closeModal() {
        document.getElementById('modal').classList.add('hidden');
        document.getElementById('modal-reject-box').classList.add('hidden');
        document.getElementById('action-buttons').classList.remove('hidden');
    }

    function toggleUI(is) {
        document.getElementById('auth-gate').classList.toggle('hidden', is);
        document.getElementById('main-ui').classList.toggle('hidden', !is);
    }

    document.getElementById('btn-login').onclick = async () => {
        const pass = document.getElementById('adm-pass').value;
        const res = await apiRequest({ action: 'admin_login', password: pass });
        if(res?.success) { toggleUI(true); loadData(); } else { alert("مفتاح العبور غير صحيح!"); }
    };

    document.getElementById('btnLogout').onclick = () => {
        document.cookie = "adminToken=; max-age=0; path=/";
        location.reload();
    };

    document.getElementById('searchInput').oninput = applyFilters;

    window.onload = () => { if(document.cookie.includes('adminToken')) { toggleUI(true); loadData(); } };
</script>
</body>
</html>
