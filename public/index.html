<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta name="monetag" content="1eb3a0e9d50e3616ac245ff00d36d787">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="منصة Am Rewards تتيح لك الوصول لأدوات وخدمات ذكية في مصر لتسهيل حياتك الرقمية مع دعم فني حقيقي.">
  <meta name="theme-color" content="#030712">
  
  <title>Am Rewards - مركز الخدمات الذكية</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
  
  <style>
    /* ------------------------------------------- */
    /* ------------ Base & Reset ----------------- */
    /* ------------------------------------------- */
    :root {
      --primary: #38bdf8;
      --secondary: #facc15;
      --success: #22c55e;
      --dark: #030712;
      --glass: rgba(17, 24, 39, 0.75);
    }

    * { box-sizing: border-box; transition: all 0.3s ease; }

    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      color: #fff;
    }

    /* 🟢 شاشة التحميل المطورة */
    #splash-screen {
        position: fixed;
        inset: 0;
        background: var(--dark);
        z-index: 10000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }
    .splash-logo {
        width: 120px;
        filter: drop-shadow(0 0 20px var(--primary));
        animation: float 3s infinite ease-in-out;
    }
    .splash-loader {
        margin-top: 20px;
        width: 150px;
        height: 4px;
        background: rgba(255,255,255,0.1);
        border-radius: 10px;
        overflow: hidden;
        position: relative;
    }
    .splash-loader::after {
        content: '';
        position: absolute;
        left: 0; top: 0; height: 100%; width: 50%;
        background: var(--primary);
        box-shadow: 0 0 15px var(--primary);
        animation: load 1.5s infinite ease-in-out;
    }
    @keyframes load { 0% { left: -50%; } 100% { left: 100%; } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

    /* ------------------------------------------- */
    /* ------------ Animated Background ----------- */
    /* ------------------------------------------- */
    .bg-animation {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(circle at 50% 50%, #1e293b 0%, #030712 100%);
    }
    .bg-orb {
      position: absolute;
      width: 400px; height: 400px;
      background: var(--primary);
      filter: blur(100px);
      border-radius: 50%;
      opacity: 0.15;
      animation: moveOrb 15s infinite alternate;
    }
    @keyframes moveOrb {
      0% { transform: translate(-20%, -20%); }
      100% { transform: translate(50%, 50%); }
    }

    /* ------------------------------------------- */
    /* ------------ Main Container --------------- */
    /* ------------------------------------------- */
    .container {
      position: relative;
      z-index: 2;
      background: var(--glass);
      padding: 50px 35px;
      border-radius: 35px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      max-width: 450px;
      width: 90%;
      text-align: center;
      animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

    .logo-main {
      width: 80px; height: 80px;
      margin-bottom: 25px;
      border-radius: 50%;
      border: 3px solid var(--primary);
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
    }

    h1 {
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 10px;
      background: linear-gradient(to bottom, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .changing-text {
      font-size: 0.9rem;
      color: var(--primary);
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 25px;
      text-transform: uppercase;
      display: block;
    }

    p.main-desc {
      font-size: 1.1rem;
      line-height: 1.7;
      color: #cbd5e1;
      margin-bottom: 35px;
    }

    .highlight-box {
      background: rgba(250, 204, 21, 0.1);
      border: 1px dashed var(--secondary);
      padding: 10px;
      border-radius: 12px;
      color: var(--secondary);
      font-weight: 900;
      display: inline-block;
      margin: 10px 0;
    }

    /* ------------------------------------------- */
    /* ---------------- Buttons ------------------ */
    /* ------------------------------------------- */
    .btn-stack { display: flex; flex-direction: column; gap: 18px; }

    .btn-prime {
      background: var(--success);
      color: #fff;
      padding: 18px;
      border-radius: 16px;
      font-size: 1.2rem;
      font-weight: 900;
      border: none;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(34, 197, 94, 0.3);
      position: relative;
      overflow: hidden;
    }
    .btn-prime:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(34, 197, 94, 0.5);
      background: #4ade80;
    }
    .btn-prime::before {
        content: '';
        position: absolute;
        top: 0; left: -100%; width: 100%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        animation: shine 3s infinite;
    }
    @keyframes shine { 0% { left: -100%; } 20% { left: 100%; } 100% { left: 100%; } }

    .btn-sec {
      background: rgba(255,255,255,0.05);
      color: #fff;
      padding: 15px;
      border-radius: 16px;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
    }
    .btn-sec:hover { background: rgba(255,255,255,0.1); border-color: var(--primary); color: var(--primary); }

    /* ------------------------------------------- */
    /* 🟢 Footer & Navigation inside container --- */
    /* ------------------------------------------- */
    .footer-links {
        margin-top: 25px;
        padding-top: 15px;
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        justify-content: center;
        gap: 15px;
    }
    .footer-links a {
        color: #64748b;
        text-decoration: none;
        font-size: 0.8rem;
        font-weight: 700;
    }
    .footer-links a:hover { color: var(--primary); }

    .egypt-flag { width: 20px; vertical-align: middle; margin-right: 5px; }

  </style>
</head>
<body>
    
    <div id="splash-screen">
        <img src="logo.png" alt="Am Rewards" class="splash-logo" />
        <div class="splash-loader"></div>
        <p style="margin-top: 15px; font-size: 0.9rem; color: #64748b; font-family: 'Syncopate';">INITIALIZING SECURE GATEWAY</p>
    </div>

    <div class="bg-animation">
        <div class="bg-orb"></div>
        <div class="bg-orb" style="right:0; bottom:0; background: var(--secondary); animation-delay: -5s;"></div>
    </div>

    <div id="main-content" style="display:none; width:100%; justify-content:center; padding: 40px 0;">
        <div class="container">
            <img src="logo.png" alt="Am Rewards" class="logo-main" />
            
            <span class="changing-text" id="tipText">استكشف خدماتنا الذكية!</span>
            
            <h1>مركز خدمات Am Rewards</h1>
            
            <p class="main-desc">
              أدوات رقمية متطورة بين يديك
              <br>
              <span class="highlight-box">
                🛠️ خدمات ذكية لتسهيل حياتك اليومية!
              </span>
            </p>

            <div class="btn-stack">
              <button class="btn-prime" onclick="startNow()">اكتشف الخدمات الآن</button>
              <button class="btn-sec" onclick="goToLogin()">دخول لوحة التحكم</button>
            </div>
            
            <div style="margin-top:25px; font-size:0.8rem; color:#64748b;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/f/fe/Flag_of_Egypt.svg" class="egypt-flag" alt="Egypt">
                المركز الموثوق للخدمات الرقمية في مصر 🇪🇬
            </div>

            <nav class="footer-links">
                <a href="about.html">من نحن</a>
                <a href="terms.html">الشروط</a>
                <a href="feedback.html">الدعم الفني</a>
            </nav>
        </div>
    </div>
    
    <script>
        // 1. نظام التقاط كود الإحالة
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const refCode = urlParams.get('ref');
            if (refCode) {
                localStorage.setItem('pendingReferralCode', refCode);
                console.log("Referral Code Captured: " + refCode);
            }
        });

        // 2. دالة شاشة التحميل
        window.addEventListener('load', () => {
            const splash = document.getElementById('splash-screen');
            const mainContent = document.getElementById('main-content');
            
            setTimeout(() => {
                splash.style.opacity = 0;
                splash.style.transform = 'scale(1.1)';
                setTimeout(() => {
                    splash.style.display = 'none';
                    mainContent.style.display = 'flex';
                }, 500);
            }, 1500);
        });

        // 3. وظائف التنقل
        function startNow() { window.location.href = 'signup.html'; }
        function goToLogin() { window.location.href = 'login.html'; }

        // 4. تغيير النصوص التشويقية
        const tips = [
            "استكشف خدماتنا الذكية!",
            "حلول رقمية مبتكرة وسريعة!",
            "سهّل حياتك بأدواتنا الرقمية!",
            "آلاف المستخدمين يثقون بأدواتنا!"
        ];
        let index = 0;
        setInterval(() => {
            index = (index + 1) % tips.length;
            const el = document.getElementById("tipText");
            el.style.opacity = 0;
            setTimeout(() => {
                el.textContent = tips[index];
                el.style.opacity = 1;
            }, 500);
        }, 4000);
    </script>
</body>
</html>
