<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="منصة Sahel Stay - احجز شاليهك في الساحل الشمالي مباشرة من المالك وبأقل عمولة وبدون سماسرة.">
  <meta name="theme-color" content="#030712">
  
  <title>Sahel Stay - شاليهك من المالك مباشرة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
  
  <style>
    /* ------------------------------------------- */
    /* ------------ Base & Reset ----------------- */
    /* ------------------------------------------- */
    :root {
      --primary: #38bdf8; /* لون البحر اللبني */
      --secondary: #facc15; /* لون الرمل الذهبي */
      --success: #22c55e;
      --dark: #030712;
      --glass: rgba(17, 24, 39, 0.75);
    }

    * { box-sizing: border-box; transition: all 0.3s ease; }

    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      color: #fff;
    }

    /* 🟢 شاشة التحميل المطورة */
    #splash-screen {
        position: fixed;
        inset: 0;
        background: var(--dark);
        z-index: 10000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }
    .splash-logo {
        width: 120px;
        filter: drop-shadow(0 0 20px var(--primary));
        animation: float 3s infinite ease-in-out;
    }
    .splash-loader {
        margin-top: 20px;
        width: 150px;
        height: 4px;
        background: rgba(255,255,255,0.1);
        border-radius: 10px;
        overflow: hidden;
        position: relative;
    }
    .splash-loader::after {
        content: '';
        position: absolute;
        left: 0; top: 0; height: 100%; width: 50%;
        background: var(--primary);
        box-shadow: 0 0 15px var(--primary);
        animation: load 1.5s infinite ease-in-out;
    }
    @keyframes load { 0% { left: -50%; } 100% { left: 100%; } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

    /* ------------------------------------------- */
    /* ------------ Animated Background ----------- */
    /* ------------------------------------------- */
    .bg-animation {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(circle at 50% 50%, #111827 0%, #030712 100%);
    }
    .bg-orb {
      position: absolute;
      width: 400px; height: 400px;
      background: var(--primary);
      filter: blur(100px);
      border-radius: 50%;
      opacity: 0.12;
      animation: moveOrb 15s infinite alternate;
    }
    @keyframes moveOrb {
      0% { transform: translate(-20%, -20%); }
      100% { transform: translate(50%, 50%); }
    }

    /* ------------------------------------------- */
    /* ------------ Main Container --------------- */
    /* ------------------------------------------- */
    .container {
      position: relative;
      z-index: 2;
      background: var(--glass);
      padding: 50px 35px;
      border-radius: 35px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 50px rgba(0,0,0,0.6);
      max-width: 450px;
      width: 90%;
      text-align: center;
      animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

    .logo-main {
      width: 90px; height: 90px;
      margin-bottom: 20px;
      border-radius: 50%;
      border: 3px solid var(--primary);
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
      object-fit: cover;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 900;
      margin-bottom: 5px;
      background: linear-gradient(to bottom, #fff, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .changing-text {
      font-size: 0.95rem;
      color: var(--secondary);
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 25px;
      display: block;
    }

    p.main-desc {
      font-size: 1.1rem;
      line-height: 1.7;
      color: #94a3b8;
      margin-bottom: 35px;
    }

    .highlight-box {
      background: rgba(56, 189, 248, 0.1);
      border: 1px dashed var(--primary);
      padding: 12px;
      border-radius: 14px;
      color: #fff;
      font-weight: 700;
      display: inline-block;
      margin: 15px 0 5px 0;
    }

    /* ------------------------------------------- */
    /* ---------------- Buttons ------------------ */
    /* ------------------------------------------- */
    .btn-stack { display: flex; flex-direction: column; gap: 18px; }

    .btn-prime {
      background: var(--primary);
      color: #030712;
      padding: 18px;
      border-radius: 16px;
      font-size: 1.2rem;
      font-weight: 900;
      border: none;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2);
      position: relative;
      overflow: hidden;
    }
    .btn-prime:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(56, 189, 248, 0.4);
      background: #7dd3fc;
    }
    .btn-prime::before {
        content: '';
        position: absolute;
        top: 0; left: -100%; width: 100%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        animation: shine 3s infinite;
    }
    @keyframes shine { 0% { left: -100%; } 20% { left: 100%; } 100% { left: 100%; } }

    .btn-sec {
      background: rgba(255,255,255,0.05);
      color: #fff;
      padding: 16px;
      border-radius: 16px;
      font-weight: 700;
      font-size: 1rem;
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
    }
    .btn-sec:hover { background: rgba(255,255,255,0.08); border-color: var(--secondary); color: var(--secondary); }

    /* ------------------------------------------- */
    /* ---------------- Footer ------------------- */
    /* ------------------------------------------- */
    .footer-links {
        margin-top: 25px;
        padding-top: 15px;
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        justify-content: center;
        gap: 20px;
    }
    .footer-links a {
        color: #64748b; 
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 700;
    }
    .footer-links a:hover { 
        color: var(--primary); 
    }

    .egypt-flag { width: 18px; vertical-align: middle; margin-left: 5px; }

  </style>
</head>
<body>
    
    <!-- شاشة التحميل -->
    <div id="splash-screen">
        <img src="logo.png" alt="Sahel Stay" class="splash-logo" onerror="this.style.display='none'"/>
        <h2 style="color: var(--primary); font-family: 'Syncopate'; font-size: 1.2rem; margin: 0;">SAHEL STAY</h2>
        <div class="splash-loader"></div>
        <p style="margin-top: 10px; font-size: 0.75rem; color: #475569; font-family: 'Syncopate'; letter-spacing: 1px;">FINDING BEST BEACH HOUSES</p>
    </div>

    <!-- الخلفية المتحركة -->
    <div class="bg-animation">
        <div class="bg-orb"></div>
        <div class="bg-orb" style="right:0; bottom:0; background: var(--secondary); animation-delay: -5s; opacity: 0.08;"></div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div id="main-content" style="display:none; width:100%; justify-content:center; padding: 40px 0;">
        <div class="container">
            <img src="logo.png" alt="Sahel Stay" class="logo-main" onerror="this.style.src='https://via.placeholder.com/90'" />
            
            <span class="changing-text" id="tipText">احجز شاليهك بأقل عمولة في مصر!</span>
            
            <h1>منصة Sahel Stay</h1>
            
            <p class="main-desc">
              أكبر تجمع لشقق وشاليهات الساحل الشمالي من المالك مباشرة بدون سماسرة أو تعقيد.
              <br>
              <span class="highlight-box">
                🏖️ شقق موثقة 100% وأمان تام لعربونك!
              </span>
            </p>

            <div class="btn-stack">
              <button class="btn-prime" onclick="browseProperties()">تصفح الشاليهات المتاحة</button>
              <button class="btn-sec" onclick="addProperty()">أنا مالك (أضف شاليهك مجاناً)</button>
            </div>
            
            <div style="margin-top:25px; font-size:0.8rem; color:#64748b; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/f/fe/Flag_of_Egypt.svg" class="egypt-flag" alt="Egypt">
                تأجير مباشر وآمن في الساحل الشمالي 🇪🇬
            </div>

            <nav class="footer-links">
                <a href="#about" onclick="alert('منصة Sahel Stay تهدف لربط ملاك شاليهات الساحل بالمستأجرين مباشرة لكسر احتكار السماسرة وتوفير العمولات الضخمة.')">من نحن</a>
                <a href="#terms" onclick="alert('نحن نضمن جدية الحجز. يتم الاحتفاظ بالعربون وتأكيده لضمان حق المالك والمستأجر بالكامل.')">ضمان الأمان</a>
                <a href="https://wa.me/201200000000" target="_blank">الدعم الفني (واتساب)</a>
            </nav>
        </div>
    </div>
    
    <script>
        // دالة شاشة التحميل
        window.addEventListener('load', () => {
            const splash = document.getElementById('splash-screen');
            const mainContent = document.getElementById('main-content');
            
            setTimeout(() => {
                splash.style.opacity = 0;
                splash.style.transform = 'scale(1.1)';
                setTimeout(() => {
                    splash.style.display = 'none';
                    mainContent.style.display = 'flex';
                }, 500);
            }, 1200);
        });

        // وظائف أزرار التحكم
        function browseProperties() { 
            // هنا هتوجه المستخدم لصفحة عرض الشقق لما تعملها (مثلاً catalog.html)
            // حالياً ممكن نربطها بواتساب أو تطلع رسالة تشويقية
            window.location.href = 'catalog.html'; 
        }
        
        function addProperty() { 
            // هنا هتوجه المالك لصفحة الفورم اللي هيرفع فيها شقته (مثلاً add-property.html)
            window.location.href = 'add-property.html'; 
        }

        // تغيير النصوص التشويقية الخاصة بالساحل
        const tips = [
            "احجز شاليهك بأقل عمولة في مصر!",
            "شاليهات موثقة بالصور من المالك مباشرة!",
            "وفر فلوس السمسار وضمن حقك معنا!",
            "تواصل وحجز سريع بضمان المنصة!"
        ];
        let index = 0;
        setInterval(() => {
            index = (index + 1) % tips.length;
            const el = document.getElementById("tipText");
            el.style.opacity = 0;
            setTimeout(() => {
                el.textContent = tips[index];
                el.style.opacity = 1;
            }, 500);
        }, 4000);
    </script>
</body>
  </html>
