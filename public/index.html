<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="منصة AM - احجز وحدتك مباشرة من المالك وبأقل عمولة وبدون سماسرة.">
  <meta name="theme-color" content="#030712">
  
  <title>AM - مكانك من المالك مباشرة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
  
  <style>
    /* ------------------------------------------- */
    /* ------------ Base & Reset ----------------- */
    /* ------------------------------------------- */
    :root {
      --primary: #38bdf8; /* لون البحر اللبني */
      --secondary: #facc15; /* لون الرمل الذهبي */
      --success: #22c55e;
      --dark: #030712;
      --glass: rgba(17, 24, 39, 0.75);
    }

    * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      color: #fff;
    }

    /* 🟢 شاشة التحميل المطورة مع تأثير تلاشي ناعم */
    #splash-screen {
        position: fixed;
        inset: 0;
        background: var(--dark);
        z-index: 10000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .splash-logo {
        width: 120px;
        filter: drop-shadow(0 0 20px rgba(56, 189, 248, 0.4));
        animation: float 3s infinite ease-in-out;
    }
    .splash-loader {
        margin-top: 20px;
        width: 150px;
        height: 4px;
        background: rgba(255,255,255,0.1);
        border-radius: 10px;
        overflow: hidden;
        position: relative;
    }
    .splash-loader::after {
        content: '';
        position: absolute;
        left: 0; top: 0; height: 100%; width: 50%;
        background: var(--primary);
        box-shadow: 0 0 15px var(--primary);
        animation: load 1.5s infinite ease-in-out;
    }
    @keyframes load { 0% { left: -50%; } 100% { left: 100%; } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

    /* ------------------------------------------- */
    /* ------------ Animated Background ----------- */
    /* ------------------------------------------- */
    .bg-animation {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(circle at 50% 50%, #111827 0%, #030712 100%);
    }
    .bg-orb {
      position: absolute;
      width: 400px; height: 400px;
      background: var(--primary);
      filter: blur(120px);
      border-radius: 50%;
      opacity: 0.1;
      animation: moveOrb 18s infinite alternate ease-in-out;
    }
    @keyframes moveOrb {
      0% { transform: translate(-20%, -20%) scale(1); }
      100% { transform: translate(40%, 40%) scale(1.1); }
    }

    /* ------------------------------------------- */
    /* ------------ Main Container --------------- */
    /* ------------------------------------------- */
    .container {
      position: relative;
      z-index: 2;
      background: var(--glass);
      padding: 45px 35px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(25px);
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7);
      max-width: 450px;
      width: 90%;
      text-align: center;
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    .logo-main {
      width: 90px; height: 90px;
      margin-bottom: 20px;
      border-radius: 50%;
      border: 3px solid var(--primary);
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.25);
      object-fit: cover;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 900;
      margin: 0 0 5px 0;
      background: linear-gradient(to bottom, #fff, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .changing-text {
      font-size: 0.95rem;
      color: var(--secondary);
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 25px;
      display: block;
      transition: opacity 0.4s ease-in-out;
      opacity: 1;
    }

    p.main-desc {
      font-size: 1.05rem;
      line-height: 1.7;
      color: #94a3b8;
      margin-bottom: 30px;
    }

    .highlight-box {
      background: rgba(56, 189, 248, 0.08);
      border: 1px dashed rgba(56, 189, 248, 0.4);
      padding: 12px 16px;
      border-radius: 14px;
      color: #fff;
      font-weight: 700;
      display: inline-block;
      margin: 15px 0 5px 0;
      font-size: 0.95rem;
    }

    /* ------------------------------------------- */
    /* ---------------- Buttons ------------------ */
    /* ------------------------------------------- */
    .btn-stack { display: flex; flex-direction: column; gap: 15px; }

    .btn-prime {
      background: var(--primary);
      color: #030712;
      padding: 16px;
      border-radius: 14px;
      font-size: 1.15rem;
      font-weight: 900;
      border: none;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(56, 189, 248, 0.15);
      position: relative;
      overflow: hidden;
    }
    .btn-prime:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(56, 189, 248, 0.3);
      background: #7dd3fc;
    }
    .btn-prime::before {
        content: '';
        position: absolute;
        top: 0; left: -100%; width: 100%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
        animation: shine 3s infinite;
    }
    @keyframes shine { 0% { left: -100%; } 20% { left: 100%; } 100% { left: 100%; } }

    .btn-sec {
      background: rgba(255,255,255,0.03);
      color: #fff;
      padding: 15px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 1rem;
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
    }
    .btn-sec:hover { 
      background: rgba(255,255,255,0.06); 
      border-color: var(--secondary); 
      color: var(--secondary); 
    }

    /* ------------------------------------------- */
    /* ---------------- Footer ------------------- */
    /* ------------------------------------------- */
    .footer-links {
        margin-top: 25px;
        padding-top: 15px;
        border-top: 1px solid rgba(255,255,255,0.05);
        display: flex;
        justify-content: center;
        gap: 20px;
    }
    .footer-links a {
        color: #64748b; 
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 700;
    }
    .footer-links a:hover { 
        color: var(--primary); 
    }

    .egypt-flag { width: 18px; vertical-align: middle; margin-left: 5px; }

  </style>
</head>
<body>
    
    <!-- شاشة التحميل -->
    <div id="splash-screen">
        <img src="logo.png" alt="Sahel Stay" class="splash-logo" onerror="this.onerror=null; this.style.display='none'"/>
        <h2 style="color: var(--primary); font-family: 'Syncopate'; font-size: 1.2rem; margin: 0; margin-top: 15px;">AM</h2>
        <div class="splash-loader"></div>
        <p style="margin-top: 10px; font-size: 0.75rem; color: #475569; font-family: 'Syncopate'; letter-spacing: 1px;"> DIRECT FROM OWNER </p>
    </div>

    <!-- Background -->
    <div class="bg-animation">
        <div class="bg-orb"></div>
        <div class="bg-orb" style="right:0; bottom:0; background: var(--secondary); animation-delay: -5s; opacity: 0.06;"></div>
    </div>

    <!-- Main Content -->
    <div id="main-content" style="display:none; width:100%; justify-content:center; padding: 40px 0;">
        <div class="container">
            <img src="logo.png" alt="من المالك" class="logo-main" onerror="this.onerror=null; this.src='https://via.placeholder.com/90';" />
            
            <span class="changing-text" id="tipText">احجز مكانك بأقل عمولة في مصر!</span>
            
            <h1>AM</h1>
            <p style="margin-top:-5px; color:#38bdf8; font-weight:700; font-size: 1.1rem; margin-bottom: 20px;">
              شقتك من المالك مباشرة
            </p>
            
            <p class="main-desc">
              اعثر على ايجار شقتك أو شاليهك مباشرة من المالك، واستمتع بتجربة بحث سهلة، وأسعار واضحة، وتواصل مباشر بدون وسطاء.
              <br>
              <span class="highlight-box">
                🏖️ إعلانات موثقة 100% وأمان تام لعربونك!
              </span>
            </p>

            <div class="btn-stack">
              <button class="btn-prime" onclick="loginUser()">تسجيل الدخول</button>
              <button class="btn-sec" onclick="registerUser()">إنشاء حساب جديد</button>
            </div>
            
            <div style="margin-top:25px; font-size:0.8rem; color:#64748b; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/f/fe/Flag_of_Egypt.svg" class="egypt-flag" alt="Egypt">
                تأجير مباشر وآمن 🇪🇬
            </div>

            <nav class="footer-links">
                <a href="about.html">من نحن</a>
                <a href="https://wa.me/201210709490" target="_blank" rel="noopener noreferrer">الدعم الفني (واتساب)</a>
            </nav>
        </div>
    </div>
    
    <script>
        // دالة شاشة التحميل
        window.addEventListener('load', () => {
            const splash = document.getElementById('splash-screen');
            const mainContent = document.getElementById('main-content');
            
            setTimeout(() => {
                splash.style.opacity = '0';
                splash.style.transform = 'scale(1.05)';
                setTimeout(() => {
                    splash.style.display = 'none';
                    mainContent.style.display = 'flex';
                }, 500);
            }, 1200);
        });

        // وظائف أزرار التحكم
        function loginUser() {
            window.location.href = 'login.html';
        }

        function registerUser() { 
            window.location.href = 'signup.html'; 
        }

        // تغيير النصوص التشويقية بسلاسة بالغة
        const tips = [
            "احجز مكانك بأقل عمولة في مصر!",
            "وحدات موثقة بالصور من المالك مباشرة!",
            "وفر فلوس السمسار وضمن حقك معنا!",
            "تواصل وحجز سريع بضمان المنصة!"
        ];
        let index = 0;
        setInterval(() => {
            index = (index + 1) % tips.length;
            const el = document.getElementById("tipText");
            el.style.opacity = '0';
            setTimeout(() => {
                el.textContent = tips[index];
                el.style.opacity = '1';
            }, 400);
        }, 4000);
    </script>
</body>
</html>
