<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة عقار جديد</title>
    <!-- احتفظ بملفات الـ CSS والتصميم الخاصة بمشروعك هنا دون أي تغيير -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-primary: #0b0f19;
      --bg-secondary: rgba(22, 30, 49, 0.7);
      --bg-tertiary: #1f293d;
      --primary: #38bdf8;
      --primary-hover: #0ea5e9;
      --text-primary: #f3f4f6;
      --text-muted: #9ca3af;
      --border: rgba(255, 255, 255, 0.08);
      --success: #10b981;
      --danger: #ef4444;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Cairo', sans-serif; background-color: var(--bg-primary); color: var(--text-primary); min-height: 100vh; padding: 2rem; }
    .container { max-width: 900px; margin: 0 auto; background: var(--bg-secondary); border: 1px solid var(--border); padding: 2.5rem; border-radius: 16px; }
    h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 2rem; display: flex; align-items: center; gap: 0.75rem; color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 1rem;}
    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 1.5rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
    label { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); }
    input[type="text"], input[type="number"], select, textarea {
      width: 100%; padding: 0.85rem 1.25rem; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-family: 'Cairo', sans-serif; transition: var(--transition);
    }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 10px rgba(56,189,248,0.2); }
    .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; margin: 1.5rem 0; }
    .checkbox-item { display: flex; align-items: center; gap: 0.75rem; background: var(--bg-primary); padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; user-select: none; }
    .checkbox-item input { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }
    .upload-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 2.5rem 1.5rem; text-align: center; cursor: pointer; transition: var(--transition); background: var(--bg-primary); }
    .upload-zone:hover { border-color: var(--primary); }
    .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 1rem; margin-top: 1.5rem; }
    .preview-box { width: 100%; height: 100px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); position: relative; }
    .preview-box img { width: 100%; height: 100%; object-fit: cover; }
    .btn-submit { width: 100%; background: var(--primary); color: var(--bg-primary); border: none; padding: 1rem; border-radius: 8px; font-weight: 700; font-size: 1.1rem; cursor: pointer; font-family: 'Cairo', sans-serif; transition: var(--transition); margin-top: 2rem; }
    .btn-submit:hover { background: var(--primary-hover); }
    .btn-back { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-muted); text-decoration: none; font-weight: 600; margin-bottom: 1.5rem; transition: var(--transition); }
    .btn-back:hover { color: var(--primary); }
       </style>
</head>
<body>

    <!-- أولاً: إصلاح زر العودة ليغلق أو يعود للوحة التحكم دائماً -->
    <div class="navigation-actions">
        <a href="dashboard.html" class="btn btn-secondary">العودة للوحة التحكم</a>
    </div>

    <!-- نموذج إضافة العقار -->
    <form id="add-property-form">
        
        <!-- حقل نوع العقار الذي يعتمد عليه الفلترة الذكية -->
        <div class="form-group">
            <label for="property-type">نوع العقار</label>
            <select id="property-type" required>
                <option value="">اختر نوع العقار</option>
                <option value="أرض">أرض</option>
                <option value="محل">محل</option>
                <option value="مكتب">مكتب</option>
                <option value="شقة">شقة</option>
                <option value="فيلا">فيلا</option>
                <option value="دوبلكس">دوبلكس</option>
            </select>
        </div>

        <!-- الحقول والمميزات المستهدفة بالإخفاء والإظهار (تأكد أن الـ IDs تطابق مشروعك) -->
        <div id="rooms-group" class="form-group">
            <label for="rooms">عدد الغرفة</label>
            <input type="number" id="rooms">
        </div>

        <div id="bathrooms-group" class="form-group">
            <label for="bathrooms">عدد الحمامات</label>
            <input type="number" id="bathrooms">
        </div>

        <div id="floor-group" class="form-group">
            <label for="floor">الدور</label>
            <input type="number" id="floor">
        </div>

        <!-- قسم المميزات (مقسمة لسهولة التحكم بها) -->
        <div id="features-section">
            <label><input type="checkbox" id="feature-elevator"> مصعد</label>
            <label><input type="checkbox" id="feature-furnished"> مفروش</label>
            <label><input type="checkbox" id="feature-ac"> تكييف</label>
            <label><input type="checkbox" id="feature-balcony"> بلكونة</label>
            <!-- باقي المميزات الأخرى تترك هنا وتظل ظاهرة دائماً -->
        </div>

        <!-- ثالثاً: تعديل نظام الصور وتحديث النص المعروض -->
        <div class="form-group">
            <label for="property-images">صور العقار</label>
            <p class="help-text">يجب رفع من 5 إلى 10 صور للعقار.</p>
            <input type="file" id="property-images" multiple accept="image/*" required>
        </div>

        <!-- زر إرسال العقار للمراجعة -->
        <button type="submit" id="submit-btn" class="btn btn-primary">إرسال العقار للمراجعة</button>
        <div id="error-message" style="color: red; margin-top: 10px; display: none;"></div>
    </form>

    <!-- ========================================== -->
    <!-- السكريبت البرمجي لإدارة الصفحة والـ Firebase -->
    <!-- ========================================== -->
    <script type="module">
        // احتفظ باستيراد الـ Firebase والحقول الخاصة بـ Config كما هي في مشروعك دون تغيير
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.x/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.x/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.x/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.x/firebase-storage.js";

        // الـ config والـ Initialization الحالي لمشروعك يوضع هنا
        // const app = initializeApp(firebaseConfig);
        // const auth = getAuth(app);
        // const db = getFirestore(app);
        // const storage = getStorage(app);

        // العناصر الأساسية في الصفحة
        const propertyTypeSelect = document.getElementById('property-type');
        const roomsGroup = document.getElementById('rooms-group');
        const bathroomsGroup = document.getElementById('bathrooms-group');
        const floorGroup = document.getElementById('floor-group');
        
        const featureElevator = document.getElementById('feature-elevator')?.parentElement;
        const featureFurnished = document.getElementById('feature-furnished')?.parentElement;
        const featureAc = document.getElementById('feature-ac')?.parentElement;
        const featureBalcony = document.getElementById('feature-balcony')?.parentElement;

        const imageInput = document.getElementById('property-images');
        const propertyForm = document.getElementById('add-property-form');
        const submitBtn = document.getElementById('submit-btn');
        const errorDiv = document.getElementById('error-message');

        // --- ثانياً: الفلترة الذكية للحقول حسب نوع العقار ---
        function handleFieldFiltering() {
            const selectedType = propertyTypeSelect.value;

            // إعادة إظهار كل شيء كحالة افتراضية أولاً
            roomsGroup.style.display = 'block';
            bathroomsGroup.style.display = 'block';
            floorGroup.style.display = 'block';
            if(featureElevator) featureElevator.style.display = 'inline-block';
            if(featureFurnished) featureFurnished.style.display = 'inline-block';
            if(featureAc) featureAc.style.display = 'inline-block';
            if(featureBalcony) featureBalcony.style.display = 'inline-block';

            if (selectedType === 'أرض') {
                // إخفاء الحقول والمميزات التي لا تنطبق على الأراضي
                roomsGroup.style.display = 'none';
                bathroomsGroup.style.display = 'none';
                floorGroup.style.display = 'none';
                if(featureElevator) featureElevator.style.display = 'none';
                if(featureFurnished) featureFurnished.style.display = 'none';
                if(featureAc) featureAc.style.display = 'none';
                if(featureBalcony) featureBalcony.style.display = 'none';
            } 
            else if (selectedType === 'محل' || selectedType === 'مكتب') {
                // إخفاء عدد الغرف مع الإبقاء على الحمامات والدور
                roomsGroup.style.display = 'none';
            }
            // بالنسبة لـ شقة، فيلا، دوبلكس تظل ظاهرة بالكامل تلقائياً
        }

        // الاستماع للتغيير الفوري بدون إعادة تحميل الصفحة
        propertyTypeSelect.addEventListener('change', handleFieldFiltering);


        // --- رابعاً وخامساً: تشخيص زر الإرسال وتحسين تجربة المستخدم مع تتبع الـ Firebase ---
        propertyForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.style.display = 'none';
            errorDiv.innerText = '';

            // 1. التحقق البرمجي من عدد الصور المرفوعة (ثالثاً)
            const files = imageInput.files;
            if (files.length < 5) {
                alert('يجب رفع 5 صور على الأقل قبل نشر العقار.');
                return;
            }
            if (files.length > 10) {
                alert('الحد الأقصى هو 10 صور فقط.');
                return;
            }

            // تفعيل حالة التحميل وتعطيل الزر لـ UX ممتاز
            submitBtn.disabled = true;
            submitBtn.innerText = 'جاري رفع الصور وحفظ البيانات...';

            try {
                // الخطوة 1: التأكد أن المستخدم مسجل دخول بالفعل
                const currentUser = auth.currentUser;
                if (!currentUser) {
                    throw new Error("المستخدم غير مسجل دخول. يرجى تسجيل الدخول أولاً.");
                }

                // الخطوة 2: التأكد من تحميل بيانات المستخدم من الـ Collection المسمى users
                let userData = null;
                try {
                    const userDocRef = doc(db, "users", currentUser.uid);
                    const userDocSnap = await getDoc(userDocRef);
                    if (userDocSnap.exists()) {
                        userData = userDocSnap.data();
                    } else {
                        console.warn("جاري المتابعة بدون بيانات إضافية: لم يتم العثور على Document للمستخدم في Collection 'users'.");
                    }
                } catch (firestoreUserError) {
                    console.error("Firestore Users Error:", firestoreUserError);
                    throw new Error("فشل قراءة بيانات المستخدم أو انتهاء صلاحية الجلسة.");
                }

                // الخطوة 3 + 4: رفع الصور إلى Firebase Storage والحصول على روابط getDownloadURL
                const imageUrls = [];
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    // إنشاء مسار فريد لكل صورة داخل الـ Storage
                    const storageRef = ref(storage, `properties/${Date.now()}_${file.name}`);
                    
                    try {
                        const snapshot = await uploadBytes(storageRef, file);
                        const downloadUrl = await getDownloadURL(snapshot.ref);
                        imageUrls.push(downloadUrl);
                    } catch (storageError) {
                        console.error("Firebase Storage Error during upload:", storageError);
                        throw new Error("فشل رفع الصور. قد يكون السبب حجم الملفات أو أن Storage Rules تمنع الرفع.");
                    }
                }

                // تجميع بيانات العقار بشكل يوافق الحقول الحالية في مشروعك
                const propertyData = {
                    type: propertyTypeSelect.value,
                    images: imageUrls,
                    userId: currentUser.uid,
                    status: "pending", // للمراجعة
                    createdAt: new Date(),
                    // يتم إدراج باقي الحقول بناءً على الفلترة السابقة
                    rooms: propertyTypeSelect.value === 'أرض' || propertyTypeSelect.value === 'محل' || propertyTypeSelect.value === 'مكتب' ? 0 : Number(document.getElementById('rooms').value),
                    bathrooms: propertyTypeSelect.value === 'أرض' ? 0 : Number(document.getElementById('bathrooms').value),
                    floor: propertyTypeSelect.value === 'أرض' ? 0 : Number(document.getElementById('floor').value)
                    // أضف أي حقول مخصصة أخرى موجودة لديك هنا لضمان عدم ضياعها...
                };

                // الخطوة 5: التأكد من نجاح إضافة المستند لـ properties
                try {
                    await addDoc(collection(db, "properties"), propertyData);
                } catch (firestoreDocsError) {
                    console.error("Firestore Properties Rules/Network Error:", firestoreDocsError);
                    throw new Error("فشل الاتصال بـ Firestore أو أن الـ Firestore Rules تمنع إنشاء Document جديد.");
                }

                // الخطوة 6: نجاح العملية بالكامل والتوجه للصفحة المطلوبة
                alert("تم إرسال العقار للمراجعة بنجاح!");
                window.location.href = "pending-properties.html";

            } catch (error) {
                // في حالة الفشل: طباعة الخطأ الحقيقي في الـ Console لتشخيصه بدقة
                console.error("خطأ حركي أثناء معالجة العقار:", error.message, error);
                
                // عرض رسالة الخطأ الواضحة والمحددة للمستخدم في الواجهة
                errorDiv.innerText = error.message || "حدث خطأ غير متوقع أثناء معالجة البيانات.";
                errorDiv.style.display = 'block';

                // إعادة تفعيل الزر وإرجاع النص الأصلي (خامساً)
                submitBtn.disabled = false;
                submitBtn.innerText = 'إرسال العقار للمراجعة';
            }
        });
    </script>
</body>
</html>
