<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AM. Dashboard - إضافة عقار جديد</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  
  <style>
    :root {
      --bg-primary: #020617;
      --bg-secondary: rgba(15, 23, 42, 0.75);
      --bg-tertiary: #1f293d;
      --primary: #00f2ff; /* اللون السماوي المضيء */
      --primary-hover: #0ea5e9;
      --text-primary: #f3f4f6;
      --text-muted: #9ca3af;
      --border: rgba(255, 255, 255, 0.08);
      --success: #10b981;
      --danger: #ef4444;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --neon-purple: #7000ff;
      --radius: 24px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      font-family: 'Cairo', sans-serif; 
      background-color: var(--bg-primary); 
      color: var(--text-primary); 
      min-height: 100vh; 
      padding: 2.5rem 1.5rem; 
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(112, 0, 255, 0.15) 0%, transparent 35%),
        radial-gradient(circle at 100% 100%, rgba(0, 242, 255, 0.15) 0%, transparent 35%);
    }

    body::after {
      content: ""; position: fixed; inset: 0; z-index: -1;
      background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
      opacity: 0.15; pointer-events: none;
    }

    .container { 
      max-width: 900px; 
      margin: 0 auto; 
      background: var(--bg-secondary); 
      border: 1px solid var(--border); 
      padding: 45px 35px; 
      border-radius: var(--radius); 
      backdrop-filter: blur(20px);
      position: relative;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .container::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--neon-purple), var(--primary));
      border-radius: var(--radius) var(--radius) 0 0;
    }
    
    .steps-indicator { display: flex; justify-content: space-between; margin-bottom: 2.5rem; position: relative; }
    .steps-indicator::before { content: ''; position: absolute; top: 25px; left: 0; right: 0; height: 2px; background: var(--border); z-index: 1; }
    .step-tab { z-index: 2; text-align: center; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; opacity: 0.4; transition: var(--transition); }
    .step-tab.active { opacity: 1; }
    .step-tab.active .step-num { background: var(--primary); color: var(--bg-primary); box-shadow: 0 0 15px rgba(56,189,248,0.4); }
    .step-num { width: 50px; height: 50px; border-radius: 50%; background: var(--bg-tertiary); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.1rem; }
    .step-text { font-size: 0.85rem; font-weight: 700; color: #fff; }

    h2 { font-size: 1.8rem; font-weight: 900; margin-bottom: 2rem; display: flex; align-items: center; gap: 0.75rem; color: #fff; text-shadow: 0 0 15px rgba(0, 242, 255, 0.3); border-bottom: 1px solid var(--border); padding-bottom: 1rem;}
    h2 i { color: var(--primary); }
    .form-step-panel { display: none; }
    .form-step-panel.active { display: block; }

    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 1.5rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; position: relative; }
    label { font-size: 0.95rem; font-weight: 700; color: var(--text-muted); }
    input[type="text"], input[type="number"], select, textarea {
      width: 100%; padding: 0.85rem 1.25rem; background: rgba(0,0,0,0.25); border: 1px solid var(--border); border-radius: 10px; color: var(--text-primary); font-family: 'Cairo', sans-serif; font-weight: 600; transition: var(--transition); outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 12px rgba(0, 242, 255, 0.15); background: rgba(0,0,0,0.4); }
    
    .btn-toggle-more { background: transparent; border: 1px dashed var(--primary); color: var(--primary); padding: 0.75rem; border-radius: 10px; cursor: pointer; font-weight: 700; width: 100%; margin: 1rem 0; font-family: 'Cairo', sans-serif; transition: var(--transition); }
    .btn-toggle-more:hover { background: rgba(56,189,248,0.05); }

    .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; margin: 1.5rem 0; }
    .checkbox-item { display: flex; align-items: center; gap: 0.75rem; background: rgba(0,0,0,0.2); padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; }
    .checkbox-item input { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }
    
    /* ميديا زون */
    .upload-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 2.5rem 1.5rem; text-align: center; cursor: pointer; background: rgba(0,0,0,0.2); position: relative; margin-bottom: 1.5rem; }
    .upload-zone:hover { border-color: var(--primary); }
    .upload-zone p { font-weight: 700; color: var(--text-muted); margin-top: 10px; }
    
    .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 1rem; margin-top: 1.5rem; }
    .media-box { position: relative; width: 100%; height: 120px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); background: #000; cursor: grab; }
    .media-box img, .media-box video { width: 100%; height: 100%; object-fit: cover; }
    .media-box .badge-cover { position: absolute; bottom: 0; left: 0; right: 0; background: var(--primary); color: #020617; text-align: center; font-size: 0.75rem; font-weight: 900; padding: 2px 0; }
    .media-box .btn-del { position: absolute; top: 5px; left: 5px; background: var(--danger); border: none; color: white; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; z-index: 10; }
    
    /* واجهة الخريطة الجغرافية الجديدة */
    .map-section { background: rgba(0,0,0,0.2); border: 1px dashed var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .map-section-title { font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .map-section-title i { color: var(--primary); }
    .btn-map-trigger { background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 0.75rem 1.5rem; border-radius: 10px; cursor: pointer; font-weight: 700; font-family: 'Cairo', sans-serif; transition: var(--transition); display: inline-flex; align-items: center; gap: 0.5rem; }
    .btn-map-trigger:hover { background: var(--primary); color: var(--bg-primary); box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }
    .map-wrapper { height: 350px; border-radius: 10px; border: 1px solid var(--border); margin-top: 1rem; position: relative; display: none; overflow: hidden; }
    #map { width: 100%; height: 100%; background: #0b0f19; }
    .map-status-badge { display: inline-flex; align-items: center; gap: 0.4rem; background: rgba(16, 185, 129, 0.15); color: var(--success); font-size: 0.85rem; padding: 0.4rem 0.8rem; border-radius: 8px; font-weight: 700; border: 1px solid rgba(16, 185, 129, 0.2); margin-top: 0.5rem; }
    
    /* ستايل مخصص لتعتيم الخريطة لتناسب ثيم الـ Dashboard */
    .leaflet-layer, .leaflet-control-zoom-in, .leaflet-control-zoom-out { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
    
    .progress-container { background: rgba(0,0,0,0.3); border-radius: 8px; height: 12px; overflow: hidden; margin: 1.5rem 0; display: none; border: 1px solid var(--border); }
    .progress-bar { height: 100%; background: linear-gradient(90deg, var(--neon-purple), var(--primary)); width: 0%; transition: width 0.1s ease; }
    
    .nav-buttons { display: flex; justify-content: space-between; margin-top: 2rem; gap: 1rem; }
    .btn-nav { padding: 0.85rem 2rem; border-radius: 12px; font-weight: 900; cursor: pointer; border: none; transition: var(--transition); font-family: 'Cairo', sans-serif; font-size: 1rem; }
    .btn-next { background: linear-gradient(90deg, var(--neon-purple), var(--primary)); color: #fff; box-shadow: 0 5px 15px rgba(112,0,255,0.25); }
    .btn-next:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(112,0,255,0.4); }
    .btn-prev { background: rgba(255,255,255,0.05); color: var(--text-primary); border: 1px solid var(--border); }
    .btn-prev:hover { background: rgba(255,255,255,0.08); }
    .btn-submit-final { background: var(--success); color: white; display: none; }
    .btn-submit-final:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3); }
    
    .btn-back { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-muted); text-decoration: none; font-weight: 700; margin-bottom: 1.5rem; font-size: 0.95rem; }
    .btn-back:hover { color: var(--primary); }
    .hidden { display: none !important; }
    
    .review-item { background: rgba(0,0,0,0.2); padding: 1.25rem; border-radius: 12px; margin-bottom: 1.25rem; border: 1px solid var(--border); }
    .review-item h4 { color: var(--primary); margin-bottom: 0.75rem; font-size: 1rem; font-weight: 900; }
    .review-item p { font-size: 0.95rem; line-height: 1.7; font-weight: 600; color: #fff; }

    @media (max-width: 600px) {
      body { padding: 1.5rem 1rem; }
      .container { padding: 30px 16px; border-radius: 16px; }
      .form-row { grid-template-columns: 1fr; gap: 1rem; }
      .steps-indicator { margin-bottom: 1.75rem; }
      .step-num { width: 42px; height: 42px; font-size: 1rem; }
      .step-text { font-size: 0.75rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <a href="dashboard.html" class="btn-back"><i class="fas fa-arrow-right"></i> العودة للوحة التحكم</a>
    
    <div class="steps-indicator">
      <div class="step-tab active" id="tab-1"><div class="step-num">1</div><div class="step-text">البيانات الأساسية</div></div>
      <div class="step-tab" id="tab-2"><div class="step-num">2</div><div class="step-text">الوسائط المرفقة</div></div>
      <div class="step-tab" id="tab-3"><div class="step-num">3</div><div class="step-text">المراجعة والنشر</div></div>
    </div>

    <h2><i class="fas fa-plus-circle"></i> إضافة عقار جديد</h2>
    
    <form id="addPropertyForm" onsubmit="return false;">
      
      <div class="form-step-panel active" id="step-panel-1">
        <div class="form-row">
          <div class="form-group"><label>عنوان العقار *</label><input type="text" id="title" placeholder="مثال: شقة مودرن مطلة على النيل بمدخل خاص" required></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>نوع العملية *</label>
            <select id="purpose" required>
              <option value="sale">بيع وشراء 🏡</option>
              <option value="rent">إيجار تعاقدي 🏠</option>
            </select>
          </div>
          <div class="form-group"><label>نوع العقار *</label>
            <select id="propertyType" required>
              <option value="شقة">شقة</option>
              <option value="فيلا">فيلا</option>
              <option value="دوبلكس">دوبلكس</option>
              <option value="مكتب">مكتب</option>
              <option value="محل">محل</option>
              <option value="أرض">أرض</option>
            </select>
          </div>
        </div>

        <div id="rentFields" class="hidden">
          <div class="form-row">
            <div class="form-group"><label>دورة الإيجار *</label>
              <select id="rentCycle">
                <option value="شهري">شهري</option>
                <option value="أسبوعي">أسبوعي</option>
                <option value="سنوي">سنوي</option>
              </select>
            </div>
            <div class="form-group"><label>مدة عقد الإيجار (بالشهور/السنوات) *</label>
              <input type="text" id="leaseDuration" placeholder="مثال: سنة واحدة أو 6 أشهر">
            </div>
          </div>
        </div>

        <div id="saleFields">
          <div class="form-row">
            <div class="form-group"><label>نظام الدفع (للبيع) *</label>
              <select id="paymentMethod">
                <option value="كاش">كاش نقداً</option>
                <option value="تقسيط">تقسيط وجدولة</option>
              </select>
            </div>
            <div class="form-group hidden" id="field-installment">
              <label>المقدم المطلوب (ج.م) *</label>
              <input type="number" id="installmentDownpayment" placeholder="مثال: 150000" min="0">
            </div>
            <div class="form-group hidden" id="field-installment-years">
              <label>فترة سداد الأقساط (بالسنوات) *</label>
              <input type="number" id="installmentYears" placeholder="مثال: 5 سنوات" min="1">
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group"><label id="price-label">السعر المطلوب (ج.م) *</label><input type="number" id="price" required></div>
          <div class="form-group"><label>المساحة الإجمالية (م) *</label><input type="number" id="area" required></div>
        </div>
        
        <div class="form-row" id="dynamicFields">
          <div class="form-group" id="field-rooms"><label>عدد الغرف *</label><input type="number" id="rooms" value="3"></div>
          <div class="form-group" id="field-bathrooms"><label>عدد الحمامات *</label><input type="number" id="bathrooms" value="1"></div>
          <div class="form-group" id="field-floor"><label>الدور / الطابق والتشطيبات *</label><input type="text" id="floor" value="الأرضي متشطب"></div>
          <div class="form-group" id="field-building-floors"><label>عدد أدوار المبنى بالكامل *</label><input type="number" id="buildingFloors" placeholder="مثال: 5 أدوار" min="0"></div>
        </div>

        <div class="form-row">
          <div class="form-group"><label>المحافظة *</label><input type="text" id="governorate" required placeholder="مثال: القاهرة"></div>
          <div class="form-group"><label>المدينة *</label><input type="text" id="city" required placeholder="مثال: الشروق"></div>
          <div class="form-group"><label>المنطقة / الحي *</label><input type="text" id="district" required placeholder="مثال: الحي الثالث"></div>
        </div>

        <div class="map-section">
          <div class="map-section-title">
            <i class="fas fa-map-marked-alt"></i>
            <span>تحديد موقع العقار على الخريطة (اختياري)</span>
          </div>
          <button type="button" class="btn-map-trigger" id="btnToggleMap">
            <i class="fas fa-map-pin"></i> تحديد الموقع الجغرافي 
          </button>
          <div id="mapStatus" class="hidden"></div>
          
          <div class="map-wrapper" id="mapWrapper">
            <div id="map"></div>
          </div>
        </div>

        <div class="form-group"><label>وصف العقار التفصيلي والخدمات المجاورة *</label><textarea id="description" rows="4" placeholder="اكتب مواصفات العقار وتشطيباته وجيرانه ومزاياه لتسهيل الحجز والبيع المباشر..." required></textarea></div>

        <button type="button" class="btn-toggle-more" id="btnMoreDetails">إعادة تعيين وإضافة تفاصيل وتشطيبات أكثر (اختياري) <i class="fas fa-chevron-down"></i></button>
        
        <div id="optionalSection" class="hidden">
          <div class="form-row">
            <div class="form-group"><label>سنة بناء العقار</label><input type="number" id="constructionYear" placeholder="مثال: 2024"></div>
            <div class="form-group"><label>حالة التشطيب</label><select id="finishing"><option value="">اختر التشطيب</option><option value="سوبر لوكس">سوبر لوكس</option><option value="لوكس">لوكس</option><option value="نصف تشطيب">نصف تشطيب</option><option value="بدون">بدون تشطيب</option></select></div>
            <div class="form-group"><label>عداد الكهرباء</label><select id="electricityCard"><option value="">غير محدد</option><option value="كارت">كارت جديد</option><option value="قديم">عداد قديم</option></select></div>
            <div class="form-group"><label>عداد المياه</label><select id="waterCard"><option value="">غير محدد</option><option value="مستقل">مستقل</option><option value="مشترك">مشترك</option></select></div>
          </div>
          <label>المميزات الإضافية</label>
          <div class="checkbox-grid" id="featuresGrid">
            <label class="checkbox-item feat-item"><input type="checkbox" id="feat-elevator"><span>مصعد</span></label>
            <label class="checkbox-item feat-item"><input type="checkbox" id="feat-garage"><span>جراج</span></label>
            <label class="checkbox-item feat-item"><input type="checkbox" id="feat-security"><span>أمن حراسة</span></label>
            <label class="checkbox-item feat-item"><input type="checkbox" id="feat-balcony"><span>بلكونة</span></label>
            <label class="checkbox-item feat-item"><input type="checkbox" id="feat-airConditioner"><span>تكييف</span></label>
            <label class="checkbox-item feat-item"><input type="checkbox" id="feat-furnished"><span>مفروش</span></label>
            <label class="checkbox-item feat-item"><input type="checkbox" id="feat-naturalGas"><span>غاز طبيعي</span></label>
          </div>
        </div>
      </div>

      <div class="form-step-panel" id="step-panel-2">
        <div class="form-group">
          <label>ألبوم صور العقار (من 5 إلى 15 صورة كحد أقصى) * أول صورة هي الغلاف.</label>
          <div class="upload-zone" onclick="document.getElementById('imageFiles').click()">
            <p><i class="fas fa-images fa-2x" style="color:var(--primary)"></i><br>اضغط هنا لرفع الصور </p>
            <input type="file" id="imageFiles" multiple accept="image/*" class="hidden">
          </div>
          <div class="media-grid" id="imagesPreviewGrid"></div>
        </div>

        <div class="form-group hidden" style="margin-top: 2rem; display: none !important;">
          <label>فيديو للعقار (اختياري - فيديو واحد MP4 فقط - أقصى مدة 3 دقائق - الحجم الأقصى 100MB)</label>
          <div class="upload-zone" id="videoZone" onclick="document.getElementById('videoFile').click()">
            <p><i class="fas fa-video fa-2x" style="color:var(--primary)"></i><br>اضغط لاختيار فيديو جولة عقارية توضيحية</p>
            <input type="file" id="videoFile" accept="video/mp4" class="hidden">
          </div>
          <div class="media-grid" id="videoPreviewGrid"></div>
        </div>
      </div>

      <div class="form-step-panel" id="step-panel-3">
        <div class="review-item">
          <h4>تفاصيل العقار الأساسية والموقع الجغرافي</h4>
          <p id="reviewMainText"></p>
        </div>
        <div class="review-item">
          <h4>الخيارات المالية ونظام السداد</h4>
          <p id="reviewPaymentText"></p>
        </div>
        <div class="review-item">
          <h4>حالة الوسائط الجاهزة للإرسال</h4>
          <p id="reviewMediaText"></p>
        </div>
        
        <div class="progress-container" id="uploadProgressContainer">
          <div class="progress-bar" id="uploadProgressBar"></div>
        </div>
      </div>

      <div class="nav-buttons">
        <button type="button" class="btn-nav btn-prev hidden" id="btnPrevStep">السابق</button>
        <button type="button" class="btn-nav btn-next" id="btnNextStep">التالي</button>
        <button type="button" class="btn-nav btn-submit-final" id="btnSubmitFinal">تأكيد ونشر العقار للمراجعة 🚀</button>
      </div>

    </form>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0",
        authDomain: "am--rewards.firebaseapp.com",
        projectId: "am--rewards",
        storageBucket: "am--rewards.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentStep = 1;
    let uploadedImages = []; 
    let uploadedVideoFile = null;
    let currentUserData = null;

    // متغيرات الخريطة الجغرافية
    let map = null;
    let marker = null;
    let selectedGeoLocation = null; // ستخزن { lat: X, lng: Y } الكود الحقيقي والتقريبي الذكي

    // تهيئة واستقبال أحداث وعناصر الصفحة حركياً
    const initPageFlow = () => {
        const purposeSelect = document.getElementById('purpose');
        const paymentMethodSelect = document.getElementById('paymentMethod');
        const propertyTypeSelect = document.getElementById('propertyType');

        const handlePurposeChange = () => {
            const val = purposeSelect.value;
            const rentSect = document.getElementById('rentFields');
            const saleSect = document.getElementById('saleFields');
            const priceLabel = document.getElementById('price-label');

            if (val === 'rent') {
                rentSect.classList.remove('hidden');
                saleSect.classList.add('hidden');
                priceLabel.textContent = "القيمة الإيجارية المقترحة (ج.م) *";
            } else {
                rentSect.classList.add('hidden');
                saleSect.classList.remove('hidden');
                priceLabel.textContent = "السعر المطلوب الإجمالي (ج.م) *";
            }
        };

        const handlePaymentMethodChange = () => {
            const val = paymentMethodSelect.value;
            const isInstallment = (val === 'تقسيط');
            document.getElementById('field-installment').classList.toggle('hidden', !isInstallment);
            document.getElementById('field-installment-years').classList.toggle('hidden', !isInstallment);
        };

        const handlePropertyTypeChange = () => {
            const val = propertyTypeSelect.value;
            const fRooms = document.getElementById('field-rooms');
            const fBaths = document.getElementById('field-bathrooms');
            const fFloor = document.getElementById('field-floor');
            const fBuilding = document.getElementById('field-building-floors');
            const fGrid = document.getElementById('featuresGrid');

            fRooms.classList.remove('hidden'); 
            fBaths.classList.remove('hidden'); 
            fFloor.classList.remove('hidden');
            fBuilding.classList.remove('hidden');
            if (fGrid) fGrid.querySelectorAll('.checkbox-item').forEach(i => i.classList.remove('hidden'));

            if (val === 'أرض') {
                fRooms.classList.add('hidden'); 
                fBaths.classList.add('hidden'); 
                fFloor.classList.add('hidden');
                fBuilding.classList.add('hidden');
                if (fGrid) fGrid.querySelectorAll('.checkbox-item').forEach(i => i.classList.add('hidden'));
            } else if (val === 'محل' || val === 'مكتب') {
                fRooms.classList.add('hidden');
                fBuilding.classList.add('hidden');
            }
        };

        purposeSelect.addEventListener('change', handlePurposeChange);
        paymentMethodSelect.addEventListener('change', handlePaymentMethodChange);
        propertyTypeSelect.addEventListener('change', handlePropertyTypeChange);

        handlePurposeChange();
        handlePaymentMethodChange();
        handlePropertyTypeChange();

        document.getElementById('btnMoreDetails').addEventListener('click', () => {
            const sect = document.getElementById('optionalSection');
            sect.classList.toggle('hidden');
        });

        // تشغيل وإدارة الخريطة التفاعلية
        document.getElementById('btnToggleMap').addEventListener('click', initLeafletMap);
    };

    // نظام إدارة الخرائط التفاعلية (Leaflet.js)
    const initLeafletMap = () => {
        const wrapper = document.getElementById('mapWrapper');
        
        // إذا كانت الخريطة مفتوحة بالفعل، نقوم بإغلاقها
        if (wrapper.style.display === 'block') {
            wrapper.style.display = 'none';
            return;
        }

        wrapper.style.display = 'block';

        // الحفاظ على نقطة ارتكاز أولية (مصر كمثال افتراضي: القاهرة)
        const defaultLat = 30.0444;
        const defaultLng = 31.2357;

        if (!map) {
            // إنشاء الخريطة لأول مرة
            map = L.map('map').setView([defaultLat, defaultLng], 13);

            // جلب طبقات الخريطة المجانية من OpenStreetMap
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            // إنشاء دبوس التثبيت (Pin) ليكون قابلاً للسحب والإفلات برمجياً
            marker = L.marker([defaultLat, defaultLng], { draggable: true }).addTo(map);

            // دالة تحديث الإحداثيات وحساب النقطة العشوائية للخصوصية
            const updateCoordinates = (lat, lng) => {
                // دالة تشويش هندسي ذكي (Fuzzing) لإخفاء النقطة الحقيقية بنسبة بسيطة (حوالي 300 لـ 500 متر) للحفاظ على الخصوصية العامة
                const randomOffsetLat = (Math.random() - 0.5) * 0.005;
                const randomOffsetLng = (Math.random() - 0.5) * 0.005;

                selectedGeoLocation = {
                    realLatitude: lat,
                    realLongitude: lng,
                    approxLatitude: lat + randomOffsetLat, // التي ستعرض للعامة
                    approxLongitude: lng + randomOffsetLng
                };

                // تحديث واجهة المستخدم بإشعار نجاح فخم
                const statusBadge = document.getElementById('mapStatus');
                statusBadge.className = 'map-status-badge';
                statusBadge.innerHTML = `<i class="fas fa-check-circle"></i> تم التقاط إحداثيات الموقع الجغرافي بنجاح وجاهزة للحفظ الآمن.`;
            };

            // عند انتهاء سحب الماركر من المستخدم
            marker.on('dragend', function (e) {
                const position = marker.getLatLng();
                updateCoordinates(position.lat, position.lng);
            });

            // عند الضغط المباشر في أي مكان على سطح الخريطة
            map.on('click', function (e) {
                marker.setLatLng(e.latlng);
                updateCoordinates(e.latlng.lat, e.latlng.lng);
            });

            // محاولة التقاط موقع المستخدم الحالي عبر المتصفح تلقائياً لتسهيل التجربة (اختياري)
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const uLat = position.coords.latitude;
                    const uLng = position.coords.longitude;
                    map.setView([uLat, uLng], 15);
                    marker.setLatLng([uLat, uLng]);
                    updateCoordinates(uLat, uLng);
                }, () => {
                    console.log("Geolocation custom note: Permission denied or timeout, fallback to default center.");
                });
            }
        } else {
            // تحديث حجم وأبعاد الخريطة لمنع مشاكل العرض الرندر عند الفتح والغلق المستمر
            setTimeout(() => { map.invalidateSize(); }, 200);
        }
    };

    const updateStepUI = () => {
        document.querySelectorAll('.form-step-panel').forEach(panel => panel.classList.remove('active'));
        document.querySelectorAll('.step-tab').forEach(tab => tab.classList.remove('active'));
        
        document.getElementById(`step-panel-${currentStep}`).classList.add('active');
        for(let i=1; i<=currentStep; i++) {
            document.getElementById(`tab-${i}`).classList.add('active');
        }

        document.getElementById('btnPrevStep').classList.toggle('hidden', currentStep === 1);
        
        if (currentStep === 3) {
            document.getElementById('btnNextStep').style.display = 'none';
            document.getElementById('btnSubmitFinal').style.display = 'block';
            compileReviewData();
        } else {
            document.getElementById('btnNextStep').style.display = 'block';
            document.getElementById('btnSubmitFinal').style.display = 'none';
        }
    };

    document.getElementById('btnNextStep').addEventListener('click', () => {
        if (currentStep === 1) {
            const requiredInputs = document.getElementById('step-panel-1').querySelectorAll('[required]');
            let valid = true;
            requiredInputs.forEach(input => { if(!input.value.trim()) valid = false; });
            if (!valid) { alert('برجاء ملء جميع الحقول الإجبارية المحددة بعلامة (*) أولاً.'); return; }
            currentStep = 2;
        } else if (currentStep === 2) {
            if (uploadedImages.length < 5) { alert(`خطأ: لقد قمت باختيار ${uploadedImages.length} صور. الحد الأدنى لإرسال العقار هو 5 صور.`); return; }
            currentStep = 3;
        }
        updateStepUI();
    });

    document.getElementById('btnPrevStep').addEventListener('click', () => {
        if (currentStep > 1) { currentStep--; updateStepUI(); }
    });

    document.getElementById('imageFiles').addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        if (uploadedImages.length + files.length > 15) { alert('الحد الأقصى المسموح به هو 15 صورة فقط للعقار الواحدة.'); return; }
        
        for (let file of files) {
            if (!file.type.startsWith('image/')) { alert(`الملف ${file.name} غير مدعوم، يرجى رفع صور فقط.`); continue; }
            const compressed = await compressImage(file);
            uploadedImages.push(compressed);
        }
        renderImagesPreview();
    });

    const compressImage = (file) => {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const maxW = 1200;
                    let width = img.width; let height = img.height;
                    if (width > maxW) { height *= maxW / width; width = maxW; }
                    canvas.width = width; canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob((blob) => {
                        resolve(new File([blob], file.name, { type: 'image/jpeg' }));
                    }, 'image/jpeg', 0.8);
                };
            };
        });
    };

    const renderImagesPreview = () => {
        const grid = document.getElementById('imagesPreviewGrid');
        grid.innerHTML = '';
        uploadedImages.forEach((file, index) => {
          const box = document.createElement('div');
          box.className = 'media-box';
          box.draggable = true;
          box.dataset.index = index;
          
          box.addEventListener('dragstart', (e) => e.dataTransfer.setData('text/plain', index));
          box.addEventListener('dragover', (e) => e.preventDefault());
          box.addEventListener('drop', (e) => {
            e.preventDefault();
            const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
            const toIdx = parseInt(box.dataset.index);
            const movedItem = uploadedImages.splice(fromIdx, 1)[0];
            uploadedImages.splice(toIdx, 0, movedItem);
            renderImagesPreview();
          });

          const img = document.createElement('img');
          img.src = URL.createObjectURL(file);
          box.appendChild(img);

          if(index === 0) {
            const badge = document.createElement('div');
            badge.className = 'badge-cover';
            badge.innerText = 'صورة الغلاف';
            box.appendChild(badge);
          }

          const delBtn = document.createElement('button');
          delBtn.className = 'btn-del';
          delBtn.innerHTML = '<i class="fas fa-times"></i>';
          delBtn.onclick = (e) => {
            e.stopPropagation();
            uploadedImages.splice(index, 1);
            renderImagesPreview();
          };
          box.appendChild(delBtn);
          grid.appendChild(box);
        });
    };

    document.getElementById('videoFile').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.type !== 'video/mp4') { alert('عذراً، يقبل فيديو بصيغة MP4 فقط.'); return; }
        if (file.size > 100 * 1024 * 1024) { alert('الملف كبير جداً، الحد الأقصى للفيديو هو 100 ميجابايت.'); return; }

        const videoEl = document.createElement('video');
        videoEl.preload = 'metadata';
        videoEl.src = URL.createObjectURL(file);
        videoEl.onloadedmetadata = () => {
            if (videoEl.duration > 181) {
                alert('الحد الأقصى لطول مقطع الفيديو هو 3 دقائق (180 ثانية) لتأجير الشقق والشاليهات.');
                return;
            }
            uploadedVideoFile = file;
            renderVideoPreview();
        };
    });

    const renderVideoPreview = () => {
        const grid = document.getElementById('videoPreviewGrid');
        grid.innerHTML = '';
        if(!uploadedVideoFile) return;

        const box = document.createElement('div');
        box.className = 'media-box';
        box.style.width = '200px'; box.style.height = '120px';

        const vid = document.createElement('video');
        vid.src = URL.createObjectURL(uploadedVideoFile);
        vid.controls = true;
        box.appendChild(vid);

        const delBtn = document.createElement('button');
        delBtn.className = 'btn-del';
        delBtn.innerHTML = '<i class="fas fa-times"></i>';
        delBtn.onclick = () => { uploadedVideoFile = null; renderVideoPreview(); };
        box.appendChild(delBtn);
        grid.appendChild(box);
    };

    const compileReviewData = () => {
        const title = document.getElementById('title').value;
        const purposeVal = document.getElementById('purpose').value;
        const purposeText = purposeVal === 'sale' ? 'بيع تمليك 🏡' : 'إيجار تعاقدي 🏠';
        const type = document.getElementById('propertyType').value;
        const gov = document.getElementById('governorate').value;
        const city = document.getElementById('city').value;
        const district = document.getElementById('district').value;
        const price = document.getElementById('price').value;
        const area = document.getElementById('area').value;

        const rooms = document.getElementById('rooms').value;
        const bathrooms = document.getElementById('bathrooms').value;
        const floor = document.getElementById('floor').value;
        const buildingFloors = document.getElementById('buildingFloors').value;
        const description = document.getElementById('description').value;

        let specsText = `
          <strong>العنوان:</strong> ${title} <br>
          <strong>نوع الوحدة والعملية:</strong> ${type} (${purposeText}) <br>
          <strong>الموقع الجغرافي:</strong> محافظة ${gov} ، مدينة ${city} ، منطقة ${district} <br>
          <strong>الموقع على الخريطة:</strong> ${selectedGeoLocation ? '✅ تم التحديد جغرافياً بدقة' : '❌ لم يتم التحديد (مكتفٍ بالنص)'} <br>
          <strong>المساحة:</strong> ${area} متر مربع | <strong>السعر المطلق:</strong> ${Number(price).toLocaleString()} ج.م <br>
        `;

        if (type !== 'أرض') {
          specsText += `
            <strong>عدد الغرف:</strong> ${rooms} غرف | <strong>عدد الحمامات:</strong> ${bathrooms} حمام <br>
            <strong>الدور الحالي:</strong> ${floor || '-'} | <strong>إجمالي أدوار المبنى:</strong> ${buildingFloors || '-'} دور <br>
          `;
        }

        specsText += `<strong>الوصف التفصيلي:</strong> ${description}`;
        document.getElementById('reviewMainText').innerHTML = specsText;

        let paymentDetail = "";
        if (purposeVal === 'rent') {
          paymentDetail = `
            <strong>دورة الإيجار المحددة:</strong> ${document.getElementById('rentCycle').value} <br>
            <strong>مدة عقد الإيجار المطلوبة:</strong> ${document.getElementById('leaseDuration').value || 'غير محددة'}
          `;
        } else {
          const method = document.getElementById('paymentMethod').value;
          paymentDetail = `<strong>نظام السداد والجدولة:</strong> ${method}`;
          if (method === 'تقسيط') {
            const down = document.getElementById('installmentDownpayment').value;
            const years = document.getElementById('installmentYears').value;
            paymentDetail += ` <br> (مقدم الحجز الكاش: ${Number(down).toLocaleString()} ج.م ، التقسيط على ${years} سنوات)`;
          }
        }
        document.getElementById('reviewPaymentText').innerHTML = paymentDetail;

        // تم تعديل المراجعة لتتجاهل الفيديو بشكل منسق مع الإخفاء
        document.getElementById('reviewMediaText').innerHTML = `
          <strong>ألبوم الصور:</strong> تم ضغط وتجهيز ${uploadedImages.length} صور جاهزة للرفع <br>
          <strong>الوسائط الأخرى:</strong> تم الاكتفاء بالصور فقط.
        `;
    };

    document.getElementById('btnSubmitFinal').addEventListener('click', async () => {
        const user = auth.currentUser;
        if(!user) { alert('يجب تسجيل الدخول أولاً لإرسال العقارات.'); return; }
        
        const finalBtn = document.getElementById('btnSubmitFinal');
        const progContainer = document.getElementById('uploadProgressContainer');
        const progBar = document.getElementById('uploadProgressBar');
        
        finalBtn.disabled = true;
        progContainer.style.display = 'block';
        progBar.style.width = '10%';

        try {
            const userSnap = await getDoc(doc(db, "users", user.uid));
            const ownerName = userSnap.exists() ? (userSnap.data().name || "مستخدم غير مسمى") : "مستخدم عام";
            const ownerPhone = userSnap.exists() ? (userSnap.data().phone || "غير مسجل") : "غير مسجل";

            progBar.style.width = "20%";

            const uploadedImageUrls = [];
            for (let i = 0; i < uploadedImages.length; i++) {
                const fd = new FormData();
                fd.append("files", uploadedImages[i]);

                const response = await fetch("/api/upload-media", {
                    method: "POST",
                    body: fd
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error || ("فشل رفع الصورة " + (i + 1)));

                uploadedImageUrls.push(data.images[0]);
                progBar.style.width = `${20 + ((i + 1) / uploadedImages.length) * 50}%`;
            }

            let uploadedVideoUrl = null;
            if (uploadedVideoFile) {
                const fd = new FormData();
                fd.append("files", uploadedVideoFile);

                const response = await fetch("/api/upload-media", {
                    method: "POST",
                    body: fd
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error || "فشل رفع الفيديو");

                uploadedVideoUrl = data.video;
            }

            progBar.style.width = "80%";

            // بناء كائن العقار بكافة الحقول القديمة والجديدة مع دعم الخرائط
            const propertyPayload = {
                ownerId: user.uid,
                ownerName: ownerName,
                ownerPhone: ownerPhone,
                title: document.getElementById('title').value,
                purpose: document.getElementById('purpose').value,
                propertyType: document.getElementById('propertyType').value,
                governorate: document.getElementById('governorate').value,
                city: document.getElementById('city').value,
                district: document.getElementById('district').value,
                price: parseFloat(document.getElementById('price').value),
                area: parseFloat(document.getElementById('area').value),
                description: document.getElementById('description').value,
                
                // تخزين البيانات الجغرافية بدقة عالية للبحث الخلفي والتقريبي للمستخدمين لحماية الخصوصية
                hasCoordinates: selectedGeoLocation ? true : false,
                coordinates: selectedGeoLocation ? {
                    latitude: selectedGeoLocation.realLatitude,
                    longitude: selectedGeoLocation.realLongitude,
                    approxLatitude: selectedGeoLocation.approxLatitude,
                    approxLongitude: selectedGeoLocation.approxLongitude
                } : null,

                rooms: parseInt(document.getElementById('rooms').value) || 0,
                bathrooms: parseInt(document.getElementById('bathrooms').value) || 0,
                floor: document.getElementById('floor').value || "",
                buildingFloors: parseInt(document.getElementById('buildingFloors').value) || 0,

                rentCycle: document.getElementById('purpose').value === 'rent' ? document.getElementById('rentCycle').value : "",
                leaseDuration: document.getElementById('purpose').value === 'rent' ? document.getElementById('leaseDuration').value : "",
                paymentMethod: document.getElementById('purpose').value === 'sale' ? document.getElementById('paymentMethod').value : "",
                downPayment: (document.getElementById('purpose').value === 'sale' && document.getElementById('paymentMethod').value === 'تقسيط') ? parseFloat(document.getElementById('installmentDownpayment').value) : 0,
                installmentYears: (document.getElementById('purpose').value === 'sale' && document.getElementById('paymentMethod').value === 'تقسيط') ? parseInt(document.getElementById('installmentYears').value) : 0,

                constructionYear: parseInt(document.getElementById('constructionYear').value) || 0,
                finishing: document.getElementById('finishing').value || "",
                electricityCard: document.getElementById('electricityCard').value || "",
                waterCard: document.getElementById('waterCard').value || "",
                features: {
                    elevator: document.getElementById('feat-elevator').checked,
                    garage: document.getElementById('feat-garage').checked,
                    security: document.getElementById('feat-security').checked,
                    balcony: document.getElementById('feat-balcony').checked,
                    airConditioner: document.getElementById('feat-airConditioner').checked,
                    furnished: document.getElementById('feat-furnished').checked,
                    naturalGas: document.getElementById('feat-naturalGas').checked,
                },

                images: uploadedImageUrls, 
                coverImage: uploadedImageUrls[0], 
                video: uploadedVideoUrl || null, 
                
                status: "pending",
                rejectReason: "",
                approvedAt: null,
                approvedBy: null,
                rejectedAt: null,
                rejectedBy: null,
                createdAt: serverTimestamp(),
                updatedAt: serverTimestamp()
            };

            await addDoc(collection(db, "properties"), propertyPayload);
            progBar.style.width = '100%';
            
            alert('تم إرسال العقار بنجاح، وهو الآن قيد المراجعة في لوحة الإدارة.');
            window.location.href = "my-properties.html";

        } catch (error) {
            console.error("Critical submission error:", error);
            alert(`حدث خطأ أثناء معالجة العقار ونشره: ${error.message}`);
            finalBtn.disabled = false;
            progContainer.style.display = 'none';
        }
    });

    window.addEventListener('DOMContentLoaded', () => {
        initPageFlow();
        onAuthStateChanged(auth, async (user) => {
          if (!user) {
            window.location.href = "login.html";
            return;
          }
          try {
            const userSnap = await getDoc(doc(db, "users", user.uid));
            if (userSnap.exists()) currentUserData = userSnap.data();
          } catch (e) {
            console.warn("User profile retrieval warning:", e);
          }
        });
    });
  </script>
