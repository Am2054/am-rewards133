<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AM. Dashboard - إضافة عقار جديد</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-primary: #0b0f19;
      --bg-secondary: rgba(22, 30, 49, 0.7);
      --bg-tertiary: #1f293d;
      --primary: #38bdf8;
      --primary-hover: #0ea5e9;
      --text-primary: #f3f4f6;
      --text-muted: #9ca3af;
      --border: rgba(255, 255, 255, 0.08);
      --success: #10b981;
      --danger: #ef4444;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Cairo', sans-serif; background-color: var(--bg-primary); color: var(--text-primary); min-height: 100vh; padding: 2rem; }
    .container { max-width: 900px; margin: 0 auto; background: var(--bg-secondary); border: 1px solid var(--border); padding: 2.5rem; border-radius: 16px; }
    h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 2rem; display: flex; align-items: center; gap: 0.75rem; color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 1rem;}
    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 1.5rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
    label { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); }
    input[type="text"], input[type="number"], select, textarea {
      width: 100%; padding: 0.85rem 1.25rem; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-family: 'Cairo', sans-serif; transition: var(--transition);
    }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 10px rgba(56,189,248,0.2); }
    .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; margin: 1.5rem 0; }
    .checkbox-item { display: flex; align-items: center; gap: 0.75rem; background: var(--bg-primary); padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; }
    .checkbox-item input { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }
    .upload-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 2.5rem 1.5rem; text-align: center; cursor: pointer; background: var(--bg-primary); }
    .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 1rem; margin-top: 1.5rem; }
    .preview-box { width: 100%; height: 100px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
    .preview-box img { width: 100%; height: 100%; object-fit: cover; }
    .btn-submit { width: 100%; background: var(--primary); color: var(--bg-primary); border: none; padding: 1rem; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 2rem; transition: var(--transition); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-back { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-muted); text-decoration: none; font-weight: 600; margin-bottom: 1.5rem; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="container">
    <a href="dashboard.html" class="btn-back"><i class="fas fa-arrow-right"></i> العودة للوحة التحكم</a>
    <h2><i class="fas fa-plus-circle"></i> إضافة عقار استثماري جديد</h2>
    
    <form id="addPropertyForm">
      <div class="form-row">
        <div class="form-group"><label>عنوان العقار *</label><input type="text" id="title" required></div>
      </div>

      <div class="form-row">
        <div class="form-group"><label>نوع العملية *</label><select id="purpose" required><option value="sale">بيع</option><option value="rent">إيجار</option></select></div>
        <div class="form-group"><label>نوع العقار *</label><select id="propertyType" id="propertyType" required>
            <option value="شقة">شقة</option><option value="فيلا">فيلا</option><option value="دوبلكس">دوبلكس</option>
            <option value="مكتب">مكتب</option><option value="محل">محل</option><option value="أرض">أرض</option>
        </select></div>
      </div>

      <div class="form-row">
        <div class="form-group"><label>المحافظة *</label><input type="text" id="governorate" required></div>
        <div class="form-group"><label>المدينة *</label><input type="text" id="city" required></div>
        <div class="form-group"><label>المنطقة *</label><input type="text" id="district" required></div>
      </div>

      <div class="form-row">
        <div class="form-group"><label>السعر (ج.م) *</label><input type="number" id="price" required></div>
        <div class="form-group"><label>المساحة (م) *</label><input type="number" id="area" required></div>
        <div class="form-group"><label>التشطيب *</label><select id="finishing"><option value="سوبر لوكس">سوبر لوكس</option><option value="بدون">بدون</option></select></div>
      </div>

      <div class="form-row" id="dynamicFields">
        <div class="form-group" id="field-rooms"><label>عدد الغرف *</label><input type="number" id="rooms" value="0"></div>
        <div class="form-group" id="field-bathrooms"><label>عدد الحمامات *</label><input type="number" id="bathrooms" value="0"></div>
        <div class="form-group" id="field-floor"><label>الدور *</label><input type="text" id="floor" value="الأرضي"></div>
      </div>

      <div class="form-group"><label>وصف العقار *</label><textarea id="description" rows="4" required></textarea></div>

      <label>المميزات الإضافية</label>
      <div class="checkbox-grid" id="featuresGrid">
        <label class="checkbox-item feat-item"><input type="checkbox" id="feat-elevator"><span>مصعد</span></label>
        <label class="checkbox-item feat-item"><input type="checkbox" id="feat-garage"><span>جراج</span></label>
        <label class="checkbox-item feat-item"><input type="checkbox" id="feat-furnished"><span>مفروش</span></label>
        <label class="checkbox-item feat-item"><input type="checkbox" id="feat-airConditioner"><span>تكييف</span></label>
        <label class="checkbox-item feat-item"><input type="checkbox" id="feat-balcony"><span>بلكونة</span></label>
      </div>

      <div class="form-group" style="margin-top: 1.5rem;">
        <label>ألبوم صور العقار «يجب رفع من 5 إلى 10 صور للعقار.» *</label>
        <div class="upload-zone" onclick="document.getElementById('imageFiles').click()">
          <p>اضغط لاختيار الصور</p>
          <input type="file" id="imageFiles" multiple accept="image/*" class="hidden">
        </div>
        <div class="preview-grid" id="previewGrid"></div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">إرسال العقار للمراجعة</button>
    </form>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0",
        authDomain: "am--rewards.firebaseapp.com",
        projectId: "am--rewards",
        storageBucket: "am--rewards.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const storage = getStorage(app);

    const typeSelect = document.getElementById('propertyType');
    
    // فلترة الحقول ديناميكياً
    typeSelect.addEventListener('change', () => {
        const type = typeSelect.value;
        const isLand = type === 'أرض';
        const isComm = (type === 'محل' || type === 'مكتب');

        document.getElementById('field-rooms').classList.toggle('hidden', isLand || isComm);
        document.getElementById('field-bathrooms').classList.toggle('hidden', isLand);
        document.getElementById('field-floor').classList.toggle('hidden', isLand);
        
        // إخفاء المميزات للأراضي
        document.querySelectorAll('.feat-item').forEach(el => {
            el.classList.toggle('hidden', isLand);
        });
    });

    let selectedFiles = [];
    document.getElementById('imageFiles').addEventListener('change', (e) => {
        const files = Array.from(e.target.files);
        if (selectedFiles.length + files.length > 10) { alert("الحد الأقصى 10 صور فقط"); return; }
        files.forEach(file => {
            selectedFiles.push(file);
            const reader = new FileReader();
            reader.onload = (ev) => {
                const div = document.createElement('div');
                div.className = 'preview-box';
                div.innerHTML = `<img src="${ev.target.result}">`;
                document.getElementById('previewGrid').appendChild(div);
            };
            reader.readAsDataURL(file);
        });
    });

    document.getElementById('addPropertyForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        
        if (selectedFiles.length < 5) { alert("يجب رفع 5 صور على الأقل."); return; }
        
        btn.disabled = true;
        btn.textContent = "جاري رفع الصور وحفظ البيانات...";

        try {
            const user = auth.currentUser;
            if (!user) throw new Error("المستخدم غير مسجل دخول");

            const userSnap = await getDoc(doc(db, "users", user.uid));
            if (!userSnap.exists()) throw new Error("فشل قراءة بيانات المستخدم");
            
            const imageUrls = [];
            for (const file of selectedFiles) {
                const storageRef = ref(storage, `properties/${user.uid}_${Date.now()}_${Math.random()}`);
                const snapshot = await uploadBytes(storageRef, file);
                imageUrls.push(await getDownloadURL(snapshot.ref));
            }

            await addDoc(collection(db, "properties"), {
                ownerId: user.uid,
                ownerName: userSnap.data().name,
                title: document.getElementById('title').value,
                propertyType: typeSelect.value,
                images: imageUrls,
                status: "pending",
                createdAt: serverTimestamp()
            });

            alert("تم النجاح!");
            window.location.href = "pending-properties.html";
        } catch (err) {
            console.error("خطأ تقني:", err);
            alert("فشل العملية: " + err.message);
            btn.disabled = false;
            btn.textContent = "إرسال العقار للمراجعة";
        }
    });
  </script>
</body>
</html>
