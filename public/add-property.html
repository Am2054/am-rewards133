<!-- add-property.html - النسخة الهندسية النهائية المستقرة والمصلحة بالكامل 100% -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AM. Dashboard - إضافة عقار جديد</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --neon-cyan: #00f2ff; 
      --neon-purple: #7000ff; 
      --bg-deep: #020617;
      --glass-bg: rgba(15, 23, 42, 0.75); 
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f1f5f9; 
      --muted: #94a3b8;
      --success: #22c55e; 
      --danger: #f87171; 
      --warning: #facc15;
      --radius: 24px;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }

    body {
      margin: 0; padding: 0; font-family: 'Cairo', sans-serif;
      background: var(--bg-deep); color: var(--text-main);
      min-height: 100vh;
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(112, 0, 255, 0.15) 0%, transparent 35%),
        radial-gradient(circle at 100% 100%, rgba(0, 242, 255, 0.15) 0%, transparent 35%);
      padding: 2.5rem 1.5rem;
    }

    body::after {
      content: ""; position: fixed; inset: 0; z-index: -1;
      background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
      opacity: 0.15; pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      padding: 45px 35px;
      border-radius: var(--radius);
      backdrop-filter: blur(20px);
      position: relative;
      box-shadow: var(--shadow);
    }

    .container::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan));
      border-radius: var(--radius) var(--radius) 0 0;
    }
    
    /* مؤشر الخطوات */
    .steps-indicator { display: flex; justify-content: space-between; margin-bottom: 2.5rem; position: relative; }
    .steps-indicator::before { content: ''; position: absolute; top: 25px; left: 0; right: 0; height: 2px; background: var(--glass-border); z-index: 1; }
    .step-tab { z-index: 2; text-align: center; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; opacity: 0.4; transition: var(--transition); }
    .step-tab.active { opacity: 1; }
    .step-tab.active .step-num { background: var(--neon-cyan); color: var(--bg-deep); box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); border-color: transparent; }
    .step-num { width: 50px; height: 50px; border-radius: 50%; background: rgba(0,0,0,0.3); border: 2px solid var(--glass-border); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.1rem; }
    .step-text { font-size: 0.85rem; font-weight: 700; color: #fff; }

    h2 { font-size: 1.8rem; font-weight: 900; margin-bottom: 2rem; display: flex; align-items: center; gap: 0.75rem; color: #fff; text-shadow: 0 0 15px rgba(0, 242, 255, 0.3); border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem;}
    h2 i { color: var(--neon-cyan); }
    
    .form-step-panel { display: none; }
    .form-step-panel.active { display: block; }

    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 1.5rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
    label { font-size: 0.95rem; font-weight: 700; color: var(--muted); }
    
    input[type="text"], input[type="number"], select, textarea {
      width: 100%; padding: 0.85rem 1.25rem; background: rgba(0,0,0,0.25); border: 1px solid var(--glass-border); border-radius: 10px; color: #fff; font-family: 'Cairo', sans-serif; font-weight: 600; outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--neon-cyan); box-shadow: 0 0 12px rgba(0, 242, 255, 0.15); background: rgba(0,0,0,0.4); }
    
    .btn-toggle-more { background: transparent; border: 1px dashed var(--neon-cyan); color: var(--neon-cyan); padding: 0.75rem; border-radius: 10px; cursor: pointer; font-weight: 700; width: 100%; margin: 1rem 0; font-family: 'Cairo', sans-serif; }
    .btn-toggle-more:hover { background: rgba(0, 242, 255, 0.05); }

    .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; margin: 1.5rem 0; }
    .checkbox-item { display: flex; align-items: center; gap: 0.75rem; background: rgba(0,0,0,0.2); padding: 0.75rem; border-radius: 8px; border: 1px solid var(--glass-border); cursor: pointer; }
    .checkbox-item input { width: 18px; height: 18px; accent-color: var(--neon-cyan); cursor: pointer; }
    
    /* ميديا زون */
    .upload-zone { border: 2px dashed var(--glass-border); border-radius: 12px; padding: 2.5rem 1.5rem; text-align: center; cursor: pointer; background: rgba(0,0,0,0.2); position: relative; margin-bottom: 1.5rem; }
    .upload-zone:hover { border-color: var(--neon-cyan); }
    .upload-zone p { font-weight: 700; color: var(--muted); margin-top: 10px; font-size: 0.95rem; }
    
    .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 1rem; margin-top: 1.5rem; }
    .media-box { position: relative; width: 100%; height: 120px; border-radius: 8px; overflow: hidden; border: 1px solid var(--glass-border); background: #000; cursor: grab; }
    .media-box img, .media-box video { width: 100%; height: 100%; object-fit: cover; }
    .media-box .badge-cover { position: absolute; bottom: 0; left: 0; right: 0; background: var(--neon-cyan); color: var(--bg-deep); text-align: center; font-size: 0.75rem; font-weight: 900; padding: 2px 0; }
    .media-box .btn-del { position: absolute; top: 5px; left: 5px; background: var(--danger); border: none; color: white; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; z-index: 10; }
    
    /* التقدم والتنقل */
    .progress-container { background: rgba(0,0,0,0.3); border-radius: 8px; height: 12px; overflow: hidden; margin: 1.5rem 0; display: none; border: 1px solid var(--glass-border); }
    .progress-bar { height: 100%; background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan)); width: 0%; transition: width 0.1s ease; }
    
    .nav-buttons { display: flex; justify-content: space-between; margin-top: 2rem; gap: 1rem; }
    .btn-nav { padding: 0.85rem 2rem; border-radius: 12px; font-weight: 900; cursor: pointer; border: none; transition: var(--transition); font-family: 'Cairo', sans-serif; font-size: 1rem; }
    .btn-next { background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan)); color: #fff; box-shadow: 0 5px 15px rgba(112,0,255,0.25); }
    .btn-next:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(112,0,255,0.4); }
    .btn-prev { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--glass-border); }
    .btn-prev:hover { background: rgba(255,255,255,0.08); }
    .btn-submit-final { background: var(--success); color: white; display: none; }
    .btn-submit-final:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3); }
    
    .btn-back { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--muted); text-decoration: none; font-weight: 700; margin-bottom: 1.5rem; font-size: 0.95rem; }
    .btn-back:hover { color: var(--neon-cyan); }
    .hidden { display: none !important; }
    
    /* مراجعة البيانات */
    .review-item { background: rgba(0,0,0,0.2); padding: 1.25rem; border-radius: 12px; margin-bottom: 1.25rem; border: 1px solid var(--glass-border); }
    .review-item h4 { color: var(--neon-cyan); margin-bottom: 0.75rem; font-size: 1rem; font-weight: 900; }
    .review-item p { font-size: 0.95rem; line-height: 1.7; font-weight: 600; color: #fff; }

    @media (max-width: 600px) {
      body { padding: 1.5rem 1rem; }
      .container { padding: 30px 16px; border-radius: 16px; }
      .form-row { grid-template-columns: 1fr; gap: 1rem; }
      .steps-indicator { margin-bottom: 1.75rem; }
      .step-num { width: 42px; height: 42px; font-size: 1rem; }
      .step-text { font-size: 0.75rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <a href="dashboard.html" class="btn-back"><i class="fas fa-arrow-right"></i> العودة للوحة التحكم</a>
    
    <!-- مؤشر خطوات التقدم للمستخدم -->
    <div class="steps-indicator">
      <div class="step-tab active" id="tab-1"><div class="step-num">1</div><div class="step-text">البيانات الأساسية</div></div>
      <div class="step-tab" id="tab-2"><div class="step-num">2</div><div class="step-text">الوسائط المرفقة</div></div>
      <div class="step-tab" id="tab-3"><div class="step-num">3</div><div class="step-text">المراجعة والنشر</div></div>
    </div>

    <h2><i class="fas fa-plus-circle"></i> إضافة عقار جديد</h2>
    
    <form id="addPropertyForm" onsubmit="return false;">
      
      <!-- الخطوة 1: البيانات الأساسية -->
      <div class="form-step-panel active" id="step-panel-1">
        <div class="form-row">
          <div class="form-group"><label>عنوان العقار / الأرض</label>
            <input id="name" type="text" placeholder="مثال: شقة مفروشة بمدخل خاص وموقع مميز" minlength="3" maxlength="50" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>نوع العملية</label>
            <select id="purpose-select" required>
              <option value="sale">شراء وتمليك 🏡</option>
              <option value="rent">إيجار تعاقدي 🏠</option>
            </select>
          </div>
          <div class="form-group">
            <label>نوع الوحدة</label>
            <select id="property-type-select" required>
              <option value="شقة">شقة</option>
              <option value="فيلا">فيلا</option>
              <option value="دوبلكس">دوبلكس</option>
              <option value="مكتب">مكتب</option>
              <option value="محل">محل</option>
              <option value="أرض">أرض</option>
            </select>
          </div>
        </div>

        <!-- حقول تفاعلية متغيرة حياً للبيع أو الإيجار (Lease & Sale parameters) -->
        <div class="form-row" id="lease-and-sale-row">
          <!-- حقول الإيجار -->
          <div class="form-group" id="field-rent-cycle" style="display:none;">
            <label>دورة الإيجار</label>
            <select id="rentCycle">
              <option value="شهري">شهري</option>
              <option value="يومي">يومي</option>
              <option value="سنوي">سنوي</option>
            </select>
          </div>
          <div class="form-group" id="field-rent-duration" style="display:none;">
            <label>أقل مدة إيجار (بالشهور)</label>
            <input type="number" id="rentDuration" placeholder="مثال: 3 شهور" min="1">
          </div>

          <!-- حقول البيع -->
          <div class="form-group" id="field-payment-method">
            <label>طريقة الدفع</label>
            <select id="paymentMethod">
              <option value="كاش">كاش نقداً</option>
              <option value="تقسيط">تقسيط وجدولة</option>
            </select>
          </div>
          <div class="form-group" id="field-installment-downpayment" style="display:none;">
            <label>مبلغ المقدم المقترح (ج.م)</label>
            <input type="number" id="installmentDownpayment" placeholder="مثال: 50000" min="0">
          </div>
          <div class="form-group" id="field-installment-years" style="display:none;">
            <label>فترة سداد الأقساط (بالسنوات)</label>
            <input type="number" id="installmentYears" placeholder="مثال: 5 سنوات" min="1">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label id="price-label">السعر الإجمالي (ج.م)</label>
            <input id="price" type="number" placeholder="ادخل السعر بالجنيه المصري" min="1" required />
          </div>
          <div class="form-group">
            <label>المساحة الإجمالية (م²)</label>
            <input id="area" type="number" placeholder="مثال: 120" min="1" required />
          </div>
        </div>

        <div class="form-row" id="property-specs-row">
          <div class="form-group" id="field-rooms">
            <label>عدد الغرف</label>
            <input id="rooms" type="number" placeholder="مثال: 3" min="0" />
          </div>
          <div class="form-group" id="field-bathrooms">
            <label>عدد الحمامات</label>
            <input id="bathrooms" type="number" placeholder="مثال: 2" min="0" />
          </div>
          <div class="form-group" id="field-floor">
            <label>الطابق / الدور</label>
            <input id="floor" type="text" placeholder="مثال: الثالث" />
          </div>
          <div class="form-group" id="field-building-floors">
            <label>إجمالي أدوار المبنى</label>
            <input id="buildingFloors" type="number" placeholder="مثال: 5" min="0" />
          </div>
        </div>

        <div class="form-group" style="margin-bottom: 1.5rem;">
          <label>الوصف التفصيلي للعقار</label>
          <textarea id="description" placeholder="اكتب تفاصيل ومزايا العقار، القرب من الخدمات والمواصلات لزيادة فرص التأجير والبيع..." style="width: 100%; min-height: 120px; background: rgba(0,0,0,0.25); border: 1px solid var(--glass-border); border-radius: 10px; color: #fff; padding: 12px; font-family: 'Cairo', sans-serif; outline: none; margin-top: 6px;" required></textarea>
        </div>

        <button type="button" class="btn-toggle-more" id="btnMoreDetails">إضافة تفاصيل وتشطيبات أكثر (اختياري) <i class="fas fa-chevron-down"></i></button>

        <div id="optionalSection" class="hidden" style="margin-top: 1.5rem; border-top: 1px solid var(--glass-border); padding-top: 1.5rem;">
          <div class="form-row">
            <div class="form-group"><label>سنة البناء</label><input type="number" id="constructionYear" placeholder="مثال: 2024"></div>
            <div class="form-group">
              <label>حالة التشطيب</label>
              <select id="finishing">
                <option value="">اختر التشطيب</option>
                <option value="سوبر لوكس">سوبر لوكس</option>
                <option value="لوكس">لوكس</option>
                <option value="نصف تشطيب">نصف تشطيب</option>
                <option value="بدون">بدون تشطيب</option>
              </select>
            </div>
            <div class="form-group">
              <label>عداد الكهرباء</label>
              <select id="electricityCard">
                <option value="">غير حدد</option>
                <option value="كارت">كارت جديد</option>
                <option value="قديم">عداد قديم</option>
              </select>
            </div>
            <div class="form-group">
              <label>عداد المياه</label>
              <select id="waterCard">
                <option value="">غير محدد</option>
                <option value="مستقل">مستقل</option>
                <option value="مشترك">مشترك</option>
              </select>
            </div>
          </div>
          <label>المميزات الإضافية المتوفرة بالوحدة</label>
          <div class="checkbox-grid" id="featuresGrid">
            <label class="checkbox-item feat-item"><input type="checkbox" id="feat-elevator"><span>مصعد</span></label>
            <label class="checkbox-item feat-item"><input type="checkbox" id="feat-garage"><span>جراج</span></label>
            <label class="checkbox-item feat-item"><input type="checkbox" id="feat-security"><span>أمن حراسة</span></label>
            <label class="checkbox-item feat-item"><input type="checkbox" id="feat-balcony"><span>بلكونة</span></label>
            <label class="checkbox-item feat-item"><input type="checkbox" id="feat-airConditioner"><span>تكييف</span></label>
            <label class="checkbox-item feat-item"><input type="checkbox" id="feat-furnished"><span>مفروش</span></label>
            <label class="checkbox-item feat-item"><input type="checkbox" id="feat-naturalGas"><span>غاز طبيعي</span></label>
          </div>
        </div>
      </div>

      <!-- الخطوة 2: ميديا الصور والفيديو -->
      <div class="form-step-panel" id="step-panel-2">
        <div class="upload-zone" onclick="document.getElementById('property-images-input').click()">
          <i class="fas fa-cloud-upload-alt" style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem;"></i>
          <h3>انقر هنا لرفع صور العقار الرسمية</h3>
          <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 5px;">يمكنك رفع حتى 10 صور عالية الدقة (الصور الواضحة تزيد فرص الدخول بنسبة 60%)</p>
          <input type="file" id="property-images-input" accept="image/*" multiple style="display:none;" onchange="app.handleImagesSelection(event)">
        </div>

        <div class="progress-container" id="upload-progress-container">
          <div class="progress-bar" id="upload-progress-bar"></div>
        </div>

        <div class="media-grid" id="media-renderer">
          <!-- يتم عرض الصور المحددة هنا حياً للمستخدم مع إمكانية التحديد والمسح -->
        </div>
      </div>

      <!-- الخطوة 3: المراجعة والنشر -->
      <div class="form-step-panel" id="step-panel-3">
        <h3 style="margin-bottom: 1.5rem; color:#fff;"><i class="fas fa-check-double" style="color: var(--success);"></i> مراجعة بيانات العقار قبل النشر الفوري</h3>
        
        <div id="review-renderer" style="display: flex; flex-direction: column; gap: 1rem;">
          <!-- حقن ملخص مراجعة البيانات حياً هنا -->
        </div>
      </div>

      <div class="nav-buttons">
        <button type="button" class="btn-prev" id="btnPrev" style="display:none; background: var(--bg-tertiary); color: white;" onclick="app.navigate(-1)">السابق</button>
        <button type="button" class="btn-next" id="btnNext" onclick="app.navigate(1)">التالي</button>
        <button type="button" class="btn-submit" id="btnSubmitFinal" style="display:none;" onclick="app.submitProperty()">تأكيد ونشر العقار للمراجعة 🚀</button>
      </div>

    </form>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, updateDoc, deleteDoc, collection, addDoc, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0",
        authDomain: "am--rewards.firebaseapp.com",
        projectId: "am--rewards",
        storageBucket: "am--rewards.firebasestorage.app"
    };

    const appInstance = initializeApp(firebaseConfig);
    const db = getFirestore(appInstance);
    const auth = getAuth(appInstance);
    // تصحيح الخطأ البرمجي: ربط الـ Storage بـ appInstance لضمان معالجة جافا سكريبت بالكامل دون انهيار
    const storage = getStorage(appInstance);

    let currentStep = 1;
    let uploadedImages = []; // كائنات الملفات المحلية المخزنة مؤقتاً بالمتصفح
    let uploadedVideoFile = null;
    let currentUserData = null;

    class AM_AddProperty_App {
      constructor() {
        this.initDOM();
        this.initAuth();
      }

      initDOM() {
        this.btnNext = document.getElementById('btnNext');
        this.btnPrev = document.getElementById('btnPrevStep');
        this.btnSubmit = document.getElementById('btnSubmitFinal');
        this.purposeSelect = document.getElementById('purpose-select');
        this.paymentMethodSelect = document.getElementById('paymentMethod');
        this.propertyTypeSelect = document.getElementById('property-type-select');
        this.btnMoreDetails = document.getElementById('btnMoreDetails');

        // ربط أحداث التغيير للـ Selects حياً للتحكم بالحقول الديناميكية
        this.purposeSelect.addEventListener('change', () => this.handlePurposeChange());
        this.paymentMethodSelect.addEventListener('change', () => this.handlePaymentMethodChange());
        this.propertyTypeSelect.addEventListener('change', () => this.handlePropertyTypeChange());
        
        // ربط حدث زر "إضافة تفاصيل أكثر" الإضافية
        this.btnMoreDetails.addEventListener('click', () => {
          const sect = document.getElementById('optionalSection');
          sect.classList.toggle('hidden');
        });

        // المزامنة الحركية الفورية عند التحميل الأول للصفحة لمنع تعارض الحقول
        this.handlePurposeChange();
        this.handlePropertyTypeChange();
      }

      initAuth() {
        onAuthStateChanged(auth, async (user) => {
          if (!user) {
            window.location.href = "login.html";
            return;
          }
          try {
            const userSnap = await getDoc(doc(db, "users", user.uid));
            if (userSnap.exists()) {
              currentUserData = userSnap.data();
            }
          } catch (e) {
            console.warn("User profile retrieval warning:", e);
          }
        });
      }

      handlePurposeChange() {
        const purpose = this.purposeSelect.value;
        const rentCycleField = document.getElementById('field-rent-cycle');
        const rentDurationField = document.getElementById('field-rent-duration');
        const paymentMethodField = document.getElementById('field-payment-method');
        const priceLabel = document.getElementById('price-label');

        if (purpose === 'rent') {
          // إيجار: عرض خيارات الإيجار والمدة، وإخفاء البيع والتقسيط
          rentCycleField.classList.remove('hidden');
          rentDurationField.classList.remove('hidden');
          paymentMethodField.classList.add('hidden');
          document.getElementById('field-installment-downpayment').classList.add('hidden');
          document.getElementById('field-installment-years').classList.add('hidden');
          priceLabel.textContent = "القيمة الإيجارية المقترحة (ج.م) *";
        } else {
          // بيع: عرض خيارات البيع، وإخفاء حقول الإيجار
          rentCycleField.classList.add('hidden');
          rentDurationField.classList.add('hidden');
          paymentMethodField.classList.remove('hidden');
          this.handlePaymentMethodChange();
          priceLabel.textContent = "السعر الكلي المطلوب (ج.م) *";
        }
      }

      handlePaymentMethodChange() {
        const method = this.paymentMethodSelect.value;
        const isInstallment = (method === 'تقسيط' && this.purposeSelect.value === 'sale');
        
        document.getElementById('field-installment-downpayment').classList.toggle('hidden', !isInstallment);
        document.getElementById('field-installment-years').classList.toggle('hidden', !isInstallment);
      }

      handlePropertyTypeChange() {
        const val = this.propertyTypeSelect.value;
        const fRooms = document.getElementById('field-rooms');
        const fBaths = document.getElementById('field-bathrooms');
        const fFloor = document.getElementById('field-floor');
        const fBuilding = document.getElementById('field-building-floors');
        const fGrid = document.getElementById('featuresGrid');

        // تنشيط كافة الحقول كحالة افتراضية
        fRooms.classList.remove('hidden'); 
        fBaths.classList.remove('hidden'); 
        fFloor.classList.remove('hidden');
        fBuilding.classList.remove('hidden');
        if(fGrid) fGrid.querySelectorAll('.checkbox-item').forEach(i => i.classList.remove('hidden'));

        if (val === 'أرض') {
          fRooms.classList.add('hidden'); 
          fBaths.classList.add('hidden'); 
          fFloor.classList.add('hidden');
          fBuilding.classList.add('hidden');
          if(fGrid) fGrid.querySelectorAll('.checkbox-item').forEach(i => i.classList.add('hidden'));
        } else if (val === 'محل' || val === 'مكتب') {
          fRooms.classList.add('hidden');
          fBuilding.classList.add('hidden');
        }
      }

      navigate(direction) {
        if (direction === 1) {
          if (currentStep === 1) {
            const required = document.getElementById('step-panel-1').querySelectorAll('[required]');
            let valid = true;
            required.forEach(input => { if(!input.value.trim()) valid = false; });
            if (!valid) { alert('برجاء استكمال كافة الحقول المطلوبة والمميزة بعلامة (*) أولاً لضمان عدم وجود بيانات ناقصة.'); return; }
            currentStep = 2;
          } else if (currentStep === 2) {
            if (uploadedImages.length < 5) { alert(`يرجى رفع 5 صور على الأقل لعقارك لزيادة الموثوقية (لقد قمت باختيار ${uploadedImages.length} صور).`); return; }
            currentStep = 3;
          }
        } else {
          if (currentStep > 1) currentStep--;
        }
        this.updateStepUI();
      }

      updateStepUI() {
        document.querySelectorAll('.form-step-panel').forEach(panel => panel.classList.remove('active'));
        document.querySelectorAll('.step-tab').forEach(tab => tab.classList.remove('active'));
        
        document.getElementById(`step-panel-${currentStep}`).classList.add('active');
        for (let i = 1; i <= currentStep; i++) {
          document.getElementById(`tab-${i}`).classList.add('active');
        }

        this.btnPrev.classList.toggle('hidden', currentStep === 1);
        
        if (currentStep === 3) {
          this.btnNext.style.display = 'none';
          this.btnSubmit.style.display = 'block';
          this.compileReviewData();
        } else {
          this.btnNext.style.display = 'block';
          this.btnSubmit.style.display = 'none';
        }
      }

      compileReviewData() {
        const title = document.getElementById('name').value;
        const purposeText = this.purposeSelect.value === 'sale' ? 'بيع تمليك' : 'إيجار تعاقدي';
        const type = this.propertyTypeSelect.value;
        const gov = document.getElementById('governorate').value;
        const city = document.getElementById('city').value;
        const price = document.getElementById('price').value;
        const area = document.getElementById('area').value;

        document.getElementById('reviewMainText').innerHTML = `
          <strong>العنوان والاسم:</strong> ${title} <br>
          <strong>النوع والعملية:</strong> ${type} (${purposeText}) <br>
          <strong>الموقع الجغرافي:</strong> محافظة ${gov}، مدينة ${city} <br>
          <strong>السعر المطلوب:</strong> ${Number(price).toLocaleString()} ج.م | <strong>المساحة الإجمالية:</strong> ${area} م²
        `;

        let paymentDetail = "";
        if (this.purposeSelect.value === 'rent') {
          paymentDetail = `<strong>دورة الإيجار المحددة:</strong> ${document.getElementById('rentCycle').value} <br>
                           <strong>المدة التعاقدية الدنيا للطلب:</strong> ${document.getElementById('rentDuration').value || '1'} شهور`;
        } else {
          const method = this.paymentMethodSelect.value;
          paymentDetail = `<strong>نظام السداد والجدولة:</strong> ${method}`;
          if (method === 'تقسيط') {
            const down = document.getElementById('installmentDownpayment').value;
            const years = document.getElementById('installmentYears').value;
            paymentDetail += ` (مقدم الحجز الكاش: ${Number(down).toLocaleString()} ج.م، وفترة السداد على ${years} سنوات)`;
          }
        }

        document.getElementById('reviewPaymentText').innerHTML = paymentDetail;

        document.getElementById('reviewMediaText').innerHTML = `
          <strong>الصور المرفوعة:</strong> ${uploadedImages.length} صور تم ضغطها وتجهيزها (تم تعيين أول صورة كغلاف) <br>
          <strong>فيديو جولة العقار:</strong> ${uploadedVideoFile ? 'تم تفعيل ورفع فيديو جولة تفصيلية بنجاح' : 'لا يوجد فيديو مرفق (اختياري)'}
        `;
      }

      async handleImagesSelection(e) {
        const files = Array.from(e.target.files);
        if (uploadedImages.length + files.length > 15) { alert('الحد الأقصى المسموح به هو 15 صورة فقط للعقار.'); return; }
        
        for (let file of files) {
          if (!file.type.startsWith('image/')) { alert(`الملف ${file.name} غير مدعوم، يرجى رفع صور فقط.`); continue; }
          const compressed = await this.compressImage(file);
          uploadedImages.push(compressed);
        }
        this.renderImagesPreview();
      }

      compressImage(file) {
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const ctx = canvas.getContext('2d');
              const maxW = 1200;
              let width = img.width; let height = img.height;
              if (width > maxW) { height *= maxW / width; width = maxW; }
              canvas.width = width; canvas.height = height;
              ctx.drawImage(img, 0, 0, width, height);
              canvas.toBlob((blob) => {
                resolve(new File([blob], file.name, { type: 'image/jpeg' }));
              }, 'image/jpeg', 0.8);
            };
          };
        });
      }

      renderImagesPreview() {
        const grid = document.getElementById('imagesPreviewGrid');
        grid.innerHTML = '';
        uploadedImages.forEach((file, index) => {
          const box = document.createElement('div');
          box.className = 'media-box';
          box.draggable = true;
          box.dataset.index = index;
          
          box.addEventListener('dragstart', (e) => e.dataTransfer.setData('text/plain', index));
          box.addEventListener('dragover', (e) => e.preventDefault());
          box.addEventListener('drop', (e) => {
            e.preventDefault();
            const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
            const toIdx = parseInt(box.dataset.index);
            const movedItem = uploadedImages.splice(fromIdx, 1)[0];
            uploadedImages.splice(toIdx, 0, movedItem);
            this.renderImagesPreview();
          });

          const img = document.createElement('img');
          img.src = URL.createObjectURL(file);
          box.appendChild(img);

          if(index === 0) {
            const badge = document.createElement('div');
            badge.className = 'badge-cover';
            badge.innerText = 'صورة الغلاف';
            box.appendChild(badge);
          }

          const delBtn = document.createElement('button');
          delBtn.className = 'btn-del';
          delBtn.innerHTML = '<i class="fas fa-times"></i>';
          delBtn.onclick = (e) => {
            e.stopPropagation();
            uploadedImages.splice(index, 1);
            this.renderImagesPreview();
          };
          box.appendChild(delBtn);
          grid.appendChild(box);
        });
      }

      async submitProperty() {
        const user = auth.currentUser;
        if (!user) return;

        const progContainer = document.getElementById('uploadProgressContainer');
        const progBar = document.getElementById('uploadProgressBar');
        
        this.btnSubmit.disabled = true;
        progContainer.style.display = 'block';
        progBar.style.width = '10%';

        try {
          const uploadedUrls = [];
          
          // رفع الصور المضغوطة للـ API
          for (let i = 0; i < uploadedImages.length; i++) {
            const fd = new FormData();
            fd.append("files", uploadedImages[i]);

            const res = await fetch("/api/upload-media", { method: "POST", body: fd });
            const data = await res.json();

            if (!res.ok) throw new Error(data.error || `فشل رفع صورة ${i+1}`);
            uploadedUrls.push(data.images[0]);

            progBar.style.width = `${10 + ((i + 1) / uploadedImages.length) * 60}%`;
          }

          let videoUrl = null;
          if (uploadedVideoFile) {
            const fd = new FormData();
            fd.append("files", uploadedVideoFile);

            const res = await fetch("/api/upload-media", { method: "POST", body: fd });
            const data = await res.json();

            if (!res.ok) throw new Error(data.error || "فشل رفع مقطع الفيديو");
            videoUrl = data.video;
          }

          progBar.style.width = '85%';

          // بناء كائن البيانات لإرساله لـ Firestore
          const propertyPayload = {
            ownerId: user.uid,
            ownerName: currentUserData ? (currentUserData.name || "مالك معتمد") : "مالك عقار",
            ownerPhone: currentUserData ? (currentUserData.phone || "-") : "-",
            title: document.getElementById('name').value,
            purpose: this.purposeSelect.value,
            propertyType: this.propertyTypeSelect.value,
            governorate: document.getElementById('governorate').value,
            city: document.getElementById('city').value,
            district: document.getElementById('district').value,
            price: parseFloat(document.getElementById('price').value),
            area: parseFloat(document.getElementById('area').value),
            description: document.getElementById('description').value,

            // الحقول الديناميكية للعمليات
            rentCycle: this.purposeSelect.value === 'rent' ? document.getElementById('rentCycle').value : "",
            leaseDuration: this.purposeSelect.value === 'rent' ? (parseInt(document.getElementById('rentDuration').value) || 1) : 0,
            paymentMethod: this.purposeSelect.value === 'sale' ? this.paymentMethodSelect.value : "",
            downPayment: (this.purposeSelect.value === 'sale' && this.paymentMethodSelect.value === 'تقسيط') ? parseFloat(document.getElementById('installmentDownpayment').value) : 0,
            installmentYears: (this.purposeSelect.value === 'sale' && this.paymentMethodSelect.value === 'تقسيط') ? parseInt(document.getElementById('installmentYears').value) : 0,

            // الحقول الديناميكية للمبنى والعقار
            rooms: parseInt(document.getElementById('rooms').value) || 0,
            bathrooms: parseInt(document.getElementById('bathrooms').value) || 0,
            floor: document.getElementById('floor').value || "",
            buildingFloors: parseInt(document.getElementById('buildingFloors').value) || 0,

            // التشطيبات والعدادات
            constructionYear: parseInt(document.getElementById('constructionYear').value) || 0,
            finishing: document.getElementById('finishing').value || "",
            electricityCard: document.getElementById('electricityCard').value || "",
            waterCard: document.getElementById('waterCard').value || "",

            features: {
              elevator: document.getElementById('feat-elevator').checked,
              garage: document.getElementById('feat-garage').checked,
              security: document.getElementById('feat-security').checked,
              balcony: document.getElementById('feat-balcony').checked,
              airConditioner: document.getElementById('feat-airConditioner').checked,
              furnished: document.getElementById('feat-furnished').checked,
              naturalGas: document.getElementById('feat-naturalGas').checked,
            },

            // ميديا الروابط المعتمدة
            coverImage: uploadedUrls[0],
            images: uploadedUrls,
            video: videoUrl || null,

            // الحالات الإدارية
            status: "pending",
            rejectReason: "",
            approvedAt: null,
            approvedBy: null,
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp()
          };

          await addDoc(collection(db, "properties"), propertyPayload);
          progBar.style.width = '100%';
          alert('✅ تم تسجيل وإرسال عقارك بنجاح وهو الآن قيد المراجعة الفورية من قبل الإدارة.');
          window.location.href = "my-properties.html";

        } catch (e) {
          console.error(e);
          alert(`❌ فشل النشر: ${e.message}`);
          this.btnSubmit.disabled = false;
          progContainer.style.display = 'none';
        }
      }
    }

    // تفعيل التطبيق والربط البرمجي
    window.addEventListener('DOMContentLoaded', () => {
      window.app = new AM_AddProperty_App();
    });
  </script>
</body>
