<!-- fraud-detection.html - صفحة كشف الاحتيال -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>كشف الاحتيال | AM Rewards</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00f2ff;
      --danger: #f87171;
      --warning: #facc15;
      --success: #22c55e;
      --bg: #020617;
      --card: rgba(15, 23, 42, 0.7);
      --border: rgba(0, 242, 255, 0.1);
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: #f1f5f9;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      background-image: radial-gradient(circle at 10% 10%, rgba(0, 242, 255, 0.05) 0%, transparent 40%);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      color: var(--primary);
      font-size: 2.5rem;
      margin: 0 0 10px 0;
      text-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
    }

    .header p {
      color: #94a3b8;
      font-size: 1.05rem;
    }

    .filters {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .filter-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: #f1f5f9;
      padding: 10px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      transition: 0.3s;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--primary);
      color: #000;
      border-color: var(--primary);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      transition: 0.3s;
    }

    .stat-card:hover {
      border-color: var(--primary);
      background: rgba(0, 242, 255, 0.05);
    }

    .stat-value {
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--primary);
      margin: 10px 0;
    }

    .stat-label {
      color: #94a3b8;
      font-size: 0.9rem;
      font-weight: 700;
    }

    .table-wrapper {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 30px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: rgba(0, 242, 255, 0.1);
      padding: 15px;
      text-align: right;
      color: var(--primary);
      font-weight: 900;
      font-size: 0.9rem;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 15px;
      border-bottom: 1px solid var(--border);
      text-align: right;
    }

    tr:hover {
      background: rgba(0, 242, 255, 0.05);
    }

    .risk-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 8px;
      font-weight: 900;
      font-size: 0.8rem;
    }

    .risk-low {
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
      border: 1px solid #22c55e;
    }

    .risk-medium {
      background: rgba(250, 204, 21, 0.2);
      color: #facc15;
      border: 1px solid #facc15;
    }

    .risk-high {
      background: rgba(248, 113, 113, 0.2);
      color: #f87171;
      border: 1px solid #f87171;
    }

    .action-btns {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.85rem;
      transition: 0.3s;
    }

    .btn-view {
      background: var(--primary);
      color: #000;
    }

    .btn-ban {
      background: var(--danger);
      color: #fff;
    }

    .btn-unban {
      background: var(--success);
      color: #fff;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 30px;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--primary);
      margin-bottom: 20px;
    }

    .detail-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .detail-label {
      color: #94a3b8;
      font-weight: 700;
    }

    .detail-value {
      color: #f1f5f9;
      font-weight: 700;
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 30px;
    }

    .pagination button {
      background: var(--card);
      border: 1px solid var(--border);
      color: #f1f5f9;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
    }

    .pagination button.active {
      background: var(--primary);
      color: #000;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #94a3b8;
    }

    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 1.8rem;
      }

      table {
        font-size: 0.9rem;
      }

      th, td {
        padding: 10px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>🛡️ نظام كشف الاحتيال</h1>
      <p>مراقبة والتحكم في محاولات الاحتيال والنشاطات المريبة</p>
    </div>

    <!-- ✅ الإحصائيات -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">🚨 حسابات مريبة</div>
        <div class="stat-value" id="suspiciousCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">⛔ حسابات محظورة</div>
        <div class="stat-value" id="bannedCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">⚠️ محاولات متكررة</div>
        <div class="stat-value" id="attemptsCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">✅ حسابات نظيفة</div>
        <div class="stat-value" id="cleanCount">0</div>
      </div>
    </div>

    <!-- ✅ التصفية -->
    <div class="filters">
      <button class="filter-btn active" onclick="filterFraud('all')">الكل</button>
      <button class="filter-btn" onclick="filterFraud('high')">خطر عالي 🔴</button>
      <button class="filter-btn" onclick="filterFraud('medium')">خطر متوسط 🟡</button>
      <button class="filter-btn" onclick="filterFraud('low')">خطر منخفض 🟢</button>
    </div>

    <!-- ✅ الجدول -->
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>المستخدم</th>
            <th>البريد</th>
            <th>المخاطر</th>
            <th>درجة الخطر</th>
            <th>الإجراء</th>
          </tr>
        </thead>
        <tbody id="fraudTable">
          <tr>
            <td colspan="5" style="text-align: center;">
              <div class="loading">
                <div class="spinner"></div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- ✅ الترقيم -->
    <div class="pagination" id="pagination"></div>
  </div>

  <!-- ✅ نافذة التفاصيل -->
  <div class="modal" id="detailModal">
    <div class="modal-content">
      <div class="modal-header">📋 تفاصيل المستخدم</div>
      <div id="detailsContent"></div>
      <button class="btn btn-view" onclick="document.getElementById('detailModal').classList.remove('show')" style="width: 100%; margin-top: 20px;">إغلاق</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, query, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0",
      authDomain: "am--rewards.firebaseapp.com",
      projectId: "am--rewards"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let fraudData = [];
    let currentFilter = 'all';
    let currentPage = 1;
    const itemsPerPage = 10;

    let isAdmin = false;

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = 'index.html';
        return;
      }

      // ✅ التحقق من صلاحيات الإدمن
      const response = await fetch('/api/admin-auth');
      const data = await response.json();
      if (!data.valid) {
        window.location.href = 'admin.html';
        return;
      }

      isAdmin = true;
      loadFraudData();
    });

    async function loadFraudData() {
      try {
        // جلب البيانات من collection fraudLogs
        const fraudLogsSnap = await getDocs(collection(db, "fraudLogs"));
        const usersSnap = await getDocs(collection(db, "users"));

        const usersMap = {};
        usersSnap.forEach(doc => {
          usersMap[doc.id] = doc.data();
        });

        fraudData = [];

        // معالجة كل مستخدم
        usersSnap.forEach(doc => {
          const userData = doc.data();
          const userId = doc.id;

          // حساب درجة الخطر
          let riskScore = 0;
          let risks = [];

          // 1. فحص الحظر
          if (userData.isBanned) {
            riskScore += 100;
            risks.push('محظور');
          }

          // 2. فحص محاولات الدخول الفاشلة
          const failedAttempts = fraudLogsSnap.docs.filter(d =>
            d.data().userId === userId &&
            d.data().type === 'login_failed'
          ).length;

          if (failedAttempts >= 5) {
            riskScore += 40;
            risks.push(`${failedAttempts} محاولات فاشلة`);
          }

          // 3. فحص النشاط المريب
          const fraudLogs = fraudLogsSnap.docs.filter(d => d.data().userId === userId);
          fraudLogs.forEach(log => {
            const reason = log.data().reasons || [];
            if (reason.length > 0) {
              riskScore += 20;
              risks.push(...reason);
            }
          });

          // 4. فحص النقاط المريبة (نمو سريع جداً)
          if (userData.points > 10000 && userData.createdAt) {
            const daysOld = (Date.now() - userData.createdAt.toMillis()) / (1000 * 60 * 60 * 24);
            if (daysOld < 7 && userData.points > 5000) {
              riskScore += 35;
              risks.push('نمو نقاط سريع غير طبيعي');
            }
          }

          // 5. فحص السحوبات الكثيرة
          const withdrawalCount = userData.referralCount || 0;
          if (withdrawalCount > 20) {
            riskScore += 25;
            risks.push(`${withdrawalCount} سحب متكرر`);
          }

          // تحديد درجة الخطر
          let riskLevel = 'low';
          if (riskScore >= 70) riskLevel = 'high';
          else if (riskScore >= 40) riskLevel = 'medium';

          fraudData.push({
            userId,
            name: userData.name || 'مستخدم',
            email: userData.email,
            phone: userData.phone,
            points: userData.points || 0,
            withdrawn: userData.withdrawn || 0,
            referralCount: userData.referralCount || 0,
            lastLogin: userData.lastLogin,
            createdAt: userData.createdAt,
            isBanned: userData.isBanned || false,
            riskScore,
            riskLevel,
            risks: risks.slice(0, 3), // أول 3 مخاطر فقط
            allRisks: risks
          });
        });

        // ترتيب حسب درجة الخطر
        fraudData.sort((a, b) => b.riskScore - a.riskScore);

        renderTable();
        updateStats();
      } catch (error) {
        console.error("Error loading fraud data:", error);
      }
    }

    function updateStats() {
      const suspicious = fraudData.filter(f => f.riskLevel === 'high').length;
      const banned = fraudData.filter(f => f.isBanned).length;
      const attempts = fraudData.filter(f => f.riskLevel === 'medium').length;
      const clean = fraudData.filter(f => f.riskLevel === 'low').length;

      document.getElementById('suspiciousCount').textContent = suspicious;
      document.getElementById('bannedCount').textContent = banned;
      document.getElementById('attemptsCount').textContent = attempts;
      document.getElementById('cleanCount').textContent = clean;
    }

    window.filterFraud = (level) => {
      currentFilter = level;
      currentPage = 1;
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      renderTable();
    };

    function renderTable() {
      const filtered = fraudData.filter(f => {
        if (currentFilter === 'all') return true;
        return f.riskLevel === currentFilter;
      });

      const start = (currentPage - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const paginated = filtered.slice(start, end);

      const tbody = document.getElementById('fraudTable');
      tbody.innerHTML = paginated.length === 0 ?
        '<tr><td colspan="5" style="text-align: center; padding: 30px;">لا توجد بيانات</td></tr>' :
        paginated.map(f => `
          <tr>
            <td><strong>${f.name}</strong></td>
            <td style="font-size: 0.9rem;">${f.email}</td>
            <td style="font-size: 0.85rem;">${f.risks.join(', ')}</td>
            <td>
              <span class="risk-badge risk-${f.riskLevel}">
                ${f.riskLevel === 'high' ? '🔴 عالي' : f.riskLevel === 'medium' ? '🟡 متوسط' : '🟢 منخفض'}
              </span>
            </td>
            <td>
              <div class="action-btns">
                <button class="btn btn-view" onclick="window.viewDetails('${f.userId}')">عرض</button>
                ${f.isBanned ?
                  `<button class="btn btn-unban" onclick="window.toggleBan('${f.userId}', false)">فك الحظر</button>` :
                  `<button class="btn btn-ban" onclick="window.toggleBan('${f.userId}', true)">حظر</button>`
                }
              </div>
            </td>
          </tr>
        `).join('');

      renderPagination(filtered.length);
    }

    window.viewDetails = (userId) => {
      const user = fraudData.find(f => f.userId === userId);
      if (!user) return;

      const detailsHtml = `
        ${user.allRisks.map(r => `<div class="detail-item"><span class="detail-label">⚠️</span><span class="detail-value">${r}</span></div>`).join('')}
        <div class="detail-item">
          <span class="detail-label">النقاط</span>
          <span class="detail-value">${user.points}</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">المسحوب</span>
          <span class="detail-value">${user.withdrawn} ج</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">الإحالات</span>
          <span class="detail-value">${user.referralCount}</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">درجة الخطر</span>
          <span class="detail-value">${user.riskScore}/100</span>
        </div>
      `;

      document.getElementById('detailsContent').innerHTML = detailsHtml;
      document.getElementById('detailModal').classList.add('show');
    };

    window.toggleBan = async (userId, ban) => {
      if (!confirm(`هل أنت متأكد من رغبتك في ${ban ? 'حظر' : 'فك حظر'} هذا المستخدم؟`)) return;

      try {
        const userRef = doc(db, "users", userId);
        await updateDoc(userRef, {
          isBanned: ban,
          banReason: ban ? 'تم الحظر بسبب نشاط مريب' : null
        });

        // إعادة تحميل البيانات
        await loadFraudData();
        alert(ban ? '✅ تم حظر المستخدم' : '✅ تم فك حظر المستخدم');
      } catch (error) {
        console.error("Error updating ban status:", error);
        alert('❌ حدث خطأ');
      }
    };

    function renderPagination(total) {
      const pages = Math.ceil(total / itemsPerPage);
      const pagination = document.getElementById('pagination');
      pagination.innerHTML = '';

      for (let i = 1; i <= pages; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        btn.className = i === currentPage ? 'active' : '';
        btn.onclick = () => {
          currentPage = i;
          renderTable();
        };
        pagination.appendChild(btn);
      }
    }
  </script>
</body>
  </html>
