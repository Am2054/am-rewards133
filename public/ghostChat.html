<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار الأشباح PRO | تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --cyan: #00f2ff; --purple: #7000ff; --dark: #010409; --danger: #ff4444; --glass: rgba(13, 17, 23, 0.8); --border: rgba(0, 242, 255, 0.1); }
        
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Tajawal', sans-serif; background: var(--dark); color: #fff; margin: 0; padding: 10px; overflow-x: hidden; }

        /* الهيدر المطور */
        .header {
            background: linear-gradient(180deg, rgba(0, 242, 255, 0.05) 0%, transparent 100%);
            padding: 40px 20px;
            border-radius: 0 0 40px 40px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
            text-align: center;
            position: relative;
        }
        .header h1 { font-size: 26px; font-weight: 900; color: var(--cyan); margin: 0; text-shadow: 0 0 20px rgba(0, 242, 255, 0.3); }

        /* زر النفي الجماعي الأنيق */
        .nuke-all-btn {
            position: absolute; top: 15px; left: 15px;
            background: rgba(255, 68, 68, 0.1); border: 1px solid var(--danger);
            color: var(--danger); padding: 8px 16px; border-radius: 30px;
            font-size: 10px; font-weight: 900; cursor: pointer; backdrop-filter: blur(10px);
        }
        .nuke-all-btn:hover { background: var(--danger); color: #fff; box-shadow: 0 0 15px rgba(255, 68, 68, 0.4); transform: translateY(-2px); }

        /* منطقة المراقبة */
        .monitor-box {
            max-width: 800px; margin: auto; height: 65vh; overflow-y: auto;
            background: var(--glass); border-radius: 30px; border: 1px solid var(--border);
            padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* كارت الرسالة المطور */
        .msg-card {
            background: rgba(255, 255, 255, 0.02);
            border-right: 4px solid var(--purple);
            padding: 18px; border-radius: 15px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .msg-card:hover { background: rgba(255, 255, 255, 0.05); transform: translateX(5px); border-right-color: var(--cyan); }
        .msg-card.deleted { border-right-color: #334155; opacity: 0.5; }

        .msg-text { display: block; margin-top: 8px; font-size: 15px; color: #cbd5e1; line-height: 1.6; }
        .ghost-info { font-size: 12px; font-weight: 900; color: var(--cyan); }
        .uid-tag { font-size: 9px; color: #64748b; background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; margin-right: 8px; }

        .actions { display: flex; gap: 8px; }
        .btn { border: none; padding: 8px 14px; border-radius: 10px; font-family: 'Tajawal'; font-weight: bold; cursor: pointer; font-size: 11px; }
        .btn-nuke { background: #334155; color: #fff; }
        .btn-ban { background: var(--danger); color: #fff; }

        .stats-bar {
            max-width: 800px; margin: 20px auto; display: flex;
            justify-content: space-around; font-size: 12px; font-weight: 700; color: var(--cyan);
        }

        /* ستايل سكرول بار */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 10px; }
        
        /* ستايل حقول الدخول */
        .login-input {
            width: 100%; padding: 12px; margin-bottom: 10px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: #fff; border-radius: 10px; text-align: center;
        }
        .btn-login {
            background: var(--purple); color: #fff; padding: 12px 20px;
            border: none; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="header">
    <button class="nuke-all-btn" onclick="nukeAllToday()">🧹 NUKE ALL</button>
    <h1>🕯️ رادار الأشباح PRO</h1>
    <div id="dayIndicator" style="font-size: 11px; opacity: 0.6; margin-top: 8px;">بانتظار تسجيل الدخول...</div>
</div>

<div id="monitor" class="monitor-box">
    <div id="loginArea" style="text-align:center; padding-top:50px;">
        <h2 style="color:var(--cyan)">تسجيل دخول الأدمن</h2>
        <input type="email" id="email" class="login-input" placeholder="البريد الإلكتروني" value="amirfg992005@gmail.com">
        <input type="password" id="password" class="login-input" placeholder="كلمة المرور" value="01113538931">
        <button class="btn-login" onclick="adminLogin()">دخول</button>
    </div>
</div>

<div class="stats-bar">
    <span id="activeUsers">النشطون: --</span>
    <span id="msgCount">رسايل اليوم: --</span>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", 
        authDomain: "am--rewards.firebaseapp.com", 
        databaseURL: "https://am--rewards-default-rtdb.firebaseio.com", 
        projectId: "am--rewards", 
        storageBucket: "am--rewards.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    let currentDay = "";

    // دالة تسجيل الدخول
    window.adminLogin = () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
            console.log("تم تسجيل دخول الأدمن بنجاح 🕯️");
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('dayIndicator').innerText = "تم تسجيل الدخول.. جاري المزامنة";
            
            // بدء المراقبة بعد الدخول
            startApplication();
        })
        .catch((error) => {
            console.error("خطأ:", error);
            Swal.fire("فشل الدخول", "تأكد من البيانات والـ Rules", "error");
        });
    }

    function startApplication() {
        onValue(ref(db, 'system/last_reset_date'), (snap) => {
            currentDay = snap.val();
            if (currentDay) {
                document.getElementById('dayIndicator').innerText = "تاريخ البث: " + currentDay;
                listenToMessages(currentDay);
            }
        });

        onValue(ref(db, 'users_online'), s => {
            const count = s.exists() ? (typeof s.val() === 'object' ? Object.keys(s.val()).length : 0) : 0;
            document.getElementById('activeUsers').innerText = `النشطون: ${count}`;
        });
    }

    function listenToMessages(day) {
        const paths = [`messages/global/${day}`, 'lastMessage'];
        
        paths.forEach(path => {
            onValue(ref(db, path), (snap) => {
                const container = document.getElementById('monitor');
                if(path.includes('lastMessage')) {
                    if(snap.exists()) renderSingleCard(snap.val(), 'last_msg_id');
                    return;
                }

                container.innerHTML = "";
                let count = 0;

                if(!snap.exists()) {
                    container.innerHTML = '<p style="text-align:center; opacity:0.3; padding-top:100px;">لا توجد أرواح تتحدث حالياً</p>';
                    return;
                }

                snap.forEach(child => {
                    renderSingleCard(child.val(), child.key, day);
                    count++;
                });
                document.getElementById('msgCount').innerText = `همسات اليوم: ${count}`;
            });
        });
    }

    function renderSingleCard(m, id, day = currentDay) {
        const container = document.getElementById('monitor');
        if (document.getElementById(`card-${id}`)) return;

        const card = document.createElement('div');
        card.id = `card-${id}`;
        card.className = `msg-card ${m.deleted ? 'deleted' : ''}`;
        card.innerHTML = `
            <div style="flex:1">
                <div class="ghost-info">
                    <span>${m.sender || 'شبح'}</span>
                    <span class="uid-tag">${m.uid ? m.uid.substring(0,8) : '??'}</span>
                    ${m.isConfession ? '<span style="color:var(--danger); font-size:10px;">🕯️ اعتراف</span>' : ''}
                </div>
                <span class="msg-text">${m.text || (typeof m === 'string' ? m : '')}</span>
            </div>
            <div class="actions">
                ${(!m.deleted && day) ? `<button class="btn btn-nuke" onclick="nukeMsg('${day}', '${id}')">نفي</button>` : ''}
                <button class="btn btn-ban" onclick="banSpirit('${m.uid}', '${m.sender}')">حظر</button>
            </div>
        `;
        container.prepend(card);
    }

    window.nukeMsg = async (day, id) => {
        if(id === 'last_msg_id') {
             await update(ref(db, 'lastMessage'), { deleted: true, text: "تلاشت الهمسة..." });
             return;
        }
        await update(ref(db, `messages/global/${day}/${id}`), {
            deleted: true, text: "هذه الهمسة تلاشت في العدم... (بأمر الإدارة)"
        });
    };

    window.nukeAllToday = async () => {
        const { isConfirmed } = await Swal.fire({
            title: 'تطهير شامل؟',
            text: "سيمسح كل كلام اليوم!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ff4444',
            confirmButtonText: 'تطهير'
        });

        if (isConfirmed && currentDay) {
            const snap = await get(ref(db, `messages/global/${currentDay}`));
            const updates = {};
            if(snap.exists()){
                snap.forEach(c => {
                    updates[`${c.key}/deleted`] = true;
                    updates[`${c.key}/text`] = "تطهير شامل: العالم أصبح صامتاً...";
                });
                await update(ref(db, `messages/global/${currentDay}`), updates);
            }
            await set(ref(db, 'lastMessage'), "تم التطهير");
        }
    };

    window.banSpirit = async (uid, name) => {
        if(!uid) return;
        const { isConfirmed } = await Swal.fire({
            title: `حظر ${name}؟`,
            icon: 'error',
            showCancelButton: true,
            confirmButtonText: 'نفي الأبد'
        });

        if (isConfirmed) {
            await set(ref(db, `banned_users/${uid}`), { bannedAt: Date.now(), name: name });
            Swal.fire("تم نفي الروح");
        }
    };

</script>
</body>
</html>
