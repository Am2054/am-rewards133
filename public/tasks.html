<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز المجرة | Am Rewards</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        :root { --neon-purple: #7000ff; --neon-cyan: #00f2ff; --glass-bg: rgba(31, 41, 55, 0.7); } 
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: #f9fafb; margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; } 
        .stars-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.3; } 
        
        .main-box { 
            display: none; 
            opacity: 0; 
            transition: opacity 0.5s ease; 
            position: relative; 
            z-index: 2; 
            max-width: 600px; 
            margin: 0 auto; 
            padding-bottom: 40px; 
        } 

        header { text-align: center; background: linear-gradient(180deg, rgba(112, 0, 255, 0.2) 0%, transparent 100%); padding: 30px 0; border-radius: 0 0 30px 30px; } 
        h1 { font-size: 1.8rem; font-weight: 900; margin: 0; text-shadow: 0 0 15px var(--neon-cyan); color: var(--neon-cyan); } 
        .tabs-nav { display: flex; justify-content: center; gap: 10px; margin: 20px 0; } 
        .tab-btn { background: var(--glass-bg); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-family: 'Tajawal'; font-weight: 700; transition: 0.3s; } 
        .tab-btn.active { background: var(--neon-purple); border-color: var(--neon-cyan); box-shadow: 0 0 15px var(--neon-purple); } 
        .points-box { background: var(--glass-bg); padding: 15px; margin: 10px 15px; border-radius: 20px; border: 1px solid var(--neon-purple); text-align: center; backdrop-filter: blur(10px); transition: 0.3s; } 
        .point-price { display: block; font-size: 0.8rem; color: var(--neon-cyan); margin-top: 5px; } 
        .task-container { display: none; padding: 0 15px; animation: fadeIn 0.4s ease; } 
        .task-container.active { display: block; } 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } } 
        .task-card { display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 15px; margin-bottom: 12px; padding: 15px 20px; transition: 0.3s; } 
        .task-card:hover { border-color: var(--neon-cyan); background: rgba(0, 242, 255, 0.05); } 
        .task-info { display: flex; align-items: center; gap: 15px; } 
        .task-icon { font-size: 1.5rem; } 
        .task-name { font-weight: 700; font-size: 1rem; } 
        .task-reward { font-size: 0.75rem; color: #94a3b8; display: block; } 
        .start-btn { background: linear-gradient(90deg, var(--neon-purple), #4f46e5); color: white; border: none; padding: 8px 18px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 0.9rem; } 
        .service-btn { background: linear-gradient(90deg, #10b981, #059669); } 
        .back-btn { display: block; margin: 20px auto; background: none; border: 1px solid #4f46e5; color: #fff; padding: 10px 25px; border-radius: 12px; cursor: pointer; }

        .points-glow { animation: pointsUpdate 0.5s ease-out; }
        @keyframes pointsUpdate {
            0% { transform: scale(1); box-shadow: 0 0 0px var(--neon-cyan); }
            50% { transform: scale(1.05); box-shadow: 0 0 20px var(--neon-cyan); }
            100% { transform: scale(1); box-shadow: 0 0 0px var(--neon-cyan); }
        }
        .skeleton { position: relative; overflow: hidden; background: rgba(255,255,255,0.05); color: transparent !important; border-radius: 5px; }
        .skeleton::after { content: ""; position: absolute; inset: 0; transform: translateX(-100%); background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 100% { transform: translateX(100%); } }

        .soon-msg { text-align: center; color: #64748b; font-size: 0.9rem; margin-top: 20px; font-style: italic; }
    </style>
</head>
<body>
    <div class="stars-bg"></div>
    <div class="main-box" id="galaxyMainBox">
        <header>
            <h1>مركز المجرة 🌌</h1>
        </header>

        <div class="points-box" id="pointsBox">
            رصيدك: <span id="userPoints" class="skeleton">0000</span> نقطة
            <span class="point-price">سعر النقطة 0.07 ج.م</span>
        </div>

        <div class="tabs-nav"> 
            <button class="tab-btn active" onclick="switchTab('services', this)">🛠️ الخدمات</button> 
            <button class="tab-btn" onclick="switchTab('tasks', this)">🚀 المهام</button> 
        </div> 

        <div id="services" class="task-container active">
            <div id="servicesList">
                <p class="soon-msg">جاري تحميل الخدمات...</p>
            </div>
        </div> 

        <div id="tasks" class="task-container"> 
            <div class="task-card"> 
                <div class="task-info"><span class="task-icon">🔗</span><div><span class="task-name">روابط مختصرة</span><span class="task-reward">اربح نقاطاً مقابل كل تخطّي</span></div></div> 
                <button class="start-btn" onclick="location.href='shortlinks.html'">إبدأ</button> 
            </div> 
            <p class="soon-msg">سيتم إضافة العديد من المهام قريباً، تابعنا!</p>
        </div> 

        <button class="back-btn" onclick="window.location.href='dashboard.html'">⬅️ العودة للرئيسية</button> 
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", authDomain: "am--rewards.firebaseapp.com", projectId: "am--rewards" }; 
        firebase.initializeApp(firebaseConfig); 
        const auth = firebase.auth(); 
        const db = firebase.firestore(); 

        let currentPoints = 0;
        let contentShown = false; 

        auth.onAuthStateChanged(user => { 
            if (user) { 
                if (!contentShown) {
                    const mainBox = document.getElementById('galaxyMainBox');
                    mainBox.style.display = 'block';
                    setTimeout(() => mainBox.style.opacity = '1', 50);
                    contentShown = true;
                }
                listenToPoints(user.uid); 
                loadServices(); // جلب الخدمات تلقائياً عند الدخول
            } else { 
                window.location.replace("index.html"); 
            } 
        }); 

        // دالة جلب الخدمات من Firestore
        function loadServices() {
            const servicesList = document.getElementById("servicesList");
            
            db.collection("services").orderBy("order", "asc").get().then((querySnapshot) => {
                servicesList.innerHTML = ""; // مسح رسالة التحميل

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    
                    // بناء كارت الخدمة بنفس التصميم الأصلي
                    const card = document.createElement('div');
                    card.className = 'task-card';
                    if(data.specialBorder) card.style.border = `1px solid ${data.specialBorder}`;

                    card.innerHTML = `
                        <div class="task-info">
                            <span class="task-icon">${data.icon || '🛠️'}</span>
                            <div>
                                <span class="task-name">${data.title}</span>
                                <span class="task-reward">${data.description || ''}</span>
                            </div>
                        </div> 
                        <button class="start-btn ${data.btnClass || 'service-btn'}" 
                                style="${data.btnStyle || ''}" 
                                onclick="location.href='${data.link}'">
                            ${data.btnText || 'ابدأ'}
                        </button>
                    `;
                    servicesList.appendChild(card);
                });
            }).catch(err => {
                console.error("Error loading services:", err);
                servicesList.innerHTML = '<p class="soon-msg">حدث خطأ في تحميل الخدمات.</p>';
            });
        }

        function listenToPoints(userId) { 
            db.collection("users").doc(userId).onSnapshot(doc => { 
                if (doc.exists) { 
                    const newPoints = Math.floor(doc.data().points || 0);
                    const pointsElement = document.getElementById("userPoints");
                    const pointsBox = document.getElementById("pointsBox");
                    pointsElement.classList.remove('skeleton');
                    if (newPoints !== currentPoints) {
                        animateValue(pointsElement, currentPoints, newPoints, 1000);
                        pointsBox.classList.remove('points-glow');
                        void pointsBox.offsetWidth; 
                        pointsBox.classList.add('points-glow');
                        currentPoints = newPoints;
                    } else {
                        pointsElement.textContent = newPoints;
                    }
                } 
            }); 
        } 

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        function switchTab(tabId, btn) { 
            document.querySelectorAll('.task-container').forEach(c => c.classList.remove('active')); 
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); 
            document.getElementById(tabId).classList.add('active'); 
            btn.classList.add('active'); 
        }
    </script>
</body>
</html>
