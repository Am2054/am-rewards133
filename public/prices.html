<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بورصة الأسعار والإشعارات</title>
    <style>
        body { background: #0b0e14; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 500px; margin: 20px auto; }
        .card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid #30363d; }
        .val { color: #00ff88; font-weight: bold; font-size: 1.2rem; }
        .btn { width: 100%; max-width: 500px; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .update-btn { background: #1c7cd6; color: white; }
        .notify-btn { background: #ff9f43; color: white; }
    </style>
</head>
<body>

    <h2>📈 لوحة الأسعار اللحظية</h2>
    
    <button class="btn update-btn" onclick="fetchPrices()">تحديث الأسعار 🔄</button>
    <button class="btn notify-btn" onclick="setupNotifications()">تفعيل التنبيهات على الموبايل 🔔</button>

    <div id="pricesDisplay">
        <div class="grid" id="container"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
        // إعدادات Firebase (نفس بيانات شات الأشباح)
        const firebaseConfig = {
            apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0",
            projectId: "am--rewards",
            messagingSenderId: "744783579735",
            appId: "1:744783579735:web:45e00de9998893bbc9b112"
        };
        firebase.initializeApp(firebaseConfig);
        const messaging = firebase.messaging();
        const db = firebase.firestore();

        async function fetchPrices() {
            const res = await fetch('/api/get-all-prices');
            const data = await res.json();
            const all = [...data.currency, ...data.gold, ...data.crypto];
            document.getElementById('container').innerHTML = all.map(item => `
                <div class="card">
                    <div style="font-size: 0.8rem; color: #8b949e;">${item.name}</div>
                    <div class="val">${item.price} <small>${item.symbol}</small></div>
                </div>
            `).join('');
        }

        async function setupNotifications() {
            try {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    // استخدام الـ VapidKey الخاص بك
                    const token = await messaging.getToken({ vapidKey: 'BMwqkR2kvqo82g9YHUATcYO4c2yNJ0becNFKtpC91DZLTyl2xlWXlfTRqxLkSzvUJ0QjZkwq0utZhTKzIj-shws' });
                    const user = firebase.auth().currentUser;
                    if (user && token) {
                        await db.collection('users').doc(user.uid).update({ fcmToken: token });
                        alert("جاهز! هتوصلك إشعارات بالأسعار الجديدة.");
                    } else {
                        alert("سجل دخولك أولاً!");
                    }
                }
            } catch (e) { alert("حدث خطأ في التفعيل"); }
        }

        fetchPrices();
    </script>
</body>
</html>
