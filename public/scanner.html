<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاحص الروابط الآمن</title>
    <style>
        body {
            background-color: #0b0e14;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white;
            background-image: radial-gradient(circle at center, #1a1f2c 0%, #0b0e14 100%);
        }

        /* تحسين بار المعلومات */
        .info-bar {
            position: fixed;
            top: 20px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }
        .info-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 210, 255, 0.3);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.95rem;
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: 0.3s;
        }
        .info-card:hover { border-color: #00d2ff; transform: translateY(-2px); }
        .info-card span { color: #00d2ff; font-weight: bold; text-shadow: 0 0 10px rgba(0, 210, 255, 0.5); }

        /* تحسين الكونتينر الرئيسي */
        .service-container {
            width: 90%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
            margin-top: 80px;
            position: relative;
            overflow: hidden;
        }

        .service-container::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, transparent, #00d2ff, transparent);
        }

        .header h2 {
            font-size: 1.8rem;
            margin: 0;
            background: linear-gradient(90deg, #00d2ff, #9d50bb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .header p { color: #8b949e; font-size: 0.9rem; margin-top: 10px; }

        .input-group { position: relative; margin: 30px 0; }
        .url-input {
            width: 100%;
            padding: 18px;
            background: rgba(13, 17, 23, 0.8);
            border: 2px solid #30363d;
            border-radius: 18px;
            color: white;
            outline: none;
            text-align: left;
            transition: 0.3s;
            box-sizing: border-box;
        }
        .url-input:focus { border-color: #00d2ff; box-shadow: 0 0 15px rgba(0, 210, 255, 0.2); }

        .scan-button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2);
        }
        .scan-button:hover { transform: scale(1.02); box-shadow: 0 15px 25px rgba(0, 210, 255, 0.3); }
        .scan-button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        #resultBox {
            margin-top: 25px;
            padding: 20px;
            border-radius: 18px;
            display: none;
            font-weight: 600;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .safe-result { background: rgba(46, 160, 67, 0.1); color: #3fb950; border: 1px solid rgba(46, 160, 67, 0.3); }
        .danger-result { background: rgba(248, 81, 73, 0.1); color: #f85149; border: 1px solid rgba(248, 81, 73, 0.3); }
        
        .loader {
            display: none; width: 22px; height: 22px; border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="info-bar">
        <div class="info-card">🪙 النقاط: <span id="userPoints">..</span></div>
        <div class="info-card">📊 محاولات اليوم: <span id="scanCount">0</span>/5</div>
    </div>

    <div class="service-container">
        <div class="header">
            <h2>🛡️ فاحص الروابط الآمن</h2>
            <p>مجاناً لأول فحصين، ثم 2 نقطة لكل فحص إضافي</p>
        </div>

        <div class="input-group">
            <input type="text" id="urlInput" class="url-input" placeholder="https://..." dir="ltr">
        </div>

        <button class="scan-button" id="btnAction">
            <span id="btnText">تحليل الرابط الآن</span>
            <div id="loader" class="loader"></div>
        </button>

        <div id="resultBox"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", 
            authDomain: "am--rewards.firebaseapp.com", 
            projectId: "am--rewards" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // مراقبة النقاط والبيانات لايف
        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        document.getElementById('userPoints').innerText = data.points || 0;
                        
                        const today = new Date().toISOString().split('T')[0];
                        if (data.scanStats && data.scanStats.date === today) {
                            document.getElementById('scanCount').innerText = data.scanStats.count;
                        } else {
                            document.getElementById('scanCount').innerText = 0;
                        }
                    }
                });
            } else {
                window.location.href = "login.html"; 
            }
        });

        window.startScan = async function() {
            const url = document.getElementById('urlInput').value.trim();
            const btnAction = document.getElementById('btnAction');
            const resultBox = document.getElementById('resultBox');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btnText');
            const currentCount = parseInt(document.getElementById('scanCount').innerText);

            if (!url) return alert("أدخل الرابط!");

            // 🛑 تنبيه خصم النقاط (التعديل المطلوب)
            if (currentCount >= 2 && currentCount < 5) {
                const confirmPay = confirm("لقد انتهت المحاولات المجانية. هل تريد إتمام الفحص مقابل خصم 2 نقطة؟");
                if (!confirmPay) return;
            }
            
            btnAction.disabled = true;
            btnText.style.display = "none";
            loader.style.display = "block";
            resultBox.style.display = "none";

            try {
                const res = await fetch('/api/check-link', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, userId: auth.currentUser.uid })
                });

                const data = await res.json();

                if (res.ok) {
                    resultBox.style.display = "block";
                    resultBox.className = data.safe ? "safe-result" : "danger-result";
                    resultBox.innerHTML = data.safe ? "✅ الرابط آمن وموثوق." : "⚠️ تحذير: هذا الرابط قد يكون خطيراً!";
                } else {
                    alert(data.error);
                }
            } catch (err) {
                alert("خطأ في الاتصال بالسيرفر");
            } finally {
                btnAction.disabled = false;
                btnText.style.display = "block";
                loader.style.display = "none";
            }
        };

        document.getElementById('btnAction').addEventListener('click', window.startScan);
    </script>
</body>
</html>
