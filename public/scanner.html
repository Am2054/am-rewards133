<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاحص الروابط الآمن</title>
    <style>
        body {
            background-color: #0b0e14;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column; /* للسماح بالبار العلوي */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white;
        }

        /* بار المعلومات العلوي */
        .info-bar {
            position: fixed;
            top: 20px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }
        .info-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 210, 255, 0.2);
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .info-card span { color: #00d2ff; font-weight: bold; }

        .service-container {
            width: 90%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
            margin-top: 60px;
        }

        .header h2 {
            font-size: 1.6rem;
            margin: 0;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group { position: relative; margin: 25px 0; }
        .url-input {
            width: 100%;
            padding: 15px;
            background: #0d1117;
            border: 2px solid #30363d;
            border-radius: 15px;
            color: white;
            outline: none;
            text-align: left;
        }

        .scan-button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #2188ff, #1c7cd6);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        #resultBox {
            margin-top: 25px;
            padding: 15px;
            border-radius: 12px;
            display: none;
        }
        .safe-result { background: rgba(46, 160, 67, 0.15); color: #3fb950; border: 1px solid #2ea043; }
        .danger-result { background: rgba(248, 81, 73, 0.15); color: #f85149; border: 1px solid #f85143; }
        
        .loader {
            display: none; width: 20px; height: 20px; border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="info-bar">
        <div class="info-card">🪙 النقاط: <span id="userPoints">..</span></div>
        <div class="info-card">📊 محاولات اليوم: <span id="scanCount">0</span>/5</div>
    </div>

    <div class="service-container">
        <div class="header">
            <h2>🛡️ فاحص الروابط الآمن</h2>
            <p>مجاناً لأول فحصين، ثم 2 نقطة لكل فحص إضافي</p>
        </div>

        <div class="input-group">
            <input type="text" id="urlInput" class="url-input" placeholder="https://..." dir="ltr">
        </div>

        <button class="scan-button" id="btnAction">
            <span id="btnText">تحليل الرابط الآن</span>
            <div id="loader" class="loader"></div>
        </button>

        <div id="resultBox"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", 
            authDomain: "am--rewards.firebaseapp.com", 
            projectId: "am--rewards" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // مراقبة النقاط والبيانات لايف
        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        document.getElementById('userPoints').innerText = data.points || 0;
                        
                        // تحديث العداد (لو تاريخ اليوم مطابق)
                        const today = new Date().toISOString().split('T')[0];
                        if (data.scanStats && data.scanStats.date === today) {
                            document.getElementById('scanCount').innerText = data.scanStats.count;
                        } else {
                            document.getElementById('scanCount').innerText = 0;
                        }
                    }
                });
            } else {
                window.location.href = "login.html"; // توجيه لو مش مسجل
            }
        });

        window.startScan = async function() {
            const url = document.getElementById('urlInput').value.trim();
            const btnAction = document.getElementById('btnAction');
            const resultBox = document.getElementById('resultBox');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btnText');

            if (!url) return alert("أدخل الرابط!");
            
            btnAction.disabled = true;
            btnText.style.display = "none";
            loader.style.display = "block";
            resultBox.style.display = "none";

            try {
                const res = await fetch('/api/check-link', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, userId: auth.currentUser.uid })
                });

                const data = await res.json();

                if (res.ok) {
                    resultBox.style.display = "block";
                    resultBox.className = data.safe ? "safe-result" : "danger-result";
                    resultBox.innerHTML = data.safe ? "✅ الرابط آمن." : "⚠️ تحذير: الرابط خطر!";
                } else {
                    alert(data.error);
                }
            } catch (err) {
                alert("خطأ في الاتصال بالسيرفر");
            } finally {
                btnAction.disabled = false;
                btnText.style.display = "block";
                loader.style.display = "none";
            }
        };

        document.getElementById('btnAction').addEventListener('click', window.startScan);
    </script>
</body>
</html>
