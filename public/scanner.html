<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاحص الروابط الآمن</title>
    <style>
        /* إعدادات الخط والألوان الأساسية */
        body {
            background-color: #0b0e14;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white;
        }

        /* حاوية الخدمة (Card) */
        .service-container {
            width: 90%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        /* العنوان */
        .header {
            margin-bottom: 25px;
        }

        .header h2 {
            font-size: 1.6rem;
            margin: 0;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #8b949e;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        /* حقل الإدخال */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .url-input {
            width: 100%;
            padding: 15px 20px;
            background: #0d1117;
            border: 2px solid #30363d;
            border-radius: 15px;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            outline: none;
            text-align: left; /* الروابط دايماً يسار */
        }

        .url-input:focus {
            border-color: #58a6ff;
            box-shadow: 0 0 15px rgba(88, 166, 255, 0.2);
        }

        /* الزرار */
        .scan-button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #2188ff, #1c7cd6);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .scan-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(33, 136, 255, 0.4);
        }

        .scan-button:active {
            transform: scale(0.98);
        }

        .scan-button:disabled {
            background: #30363d;
            cursor: not-allowed;
            transform: none;
        }

        /* صندوق النتيجة */
        #resultBox {
            margin-top: 25px;
            padding: 15px;
            border-radius: 12px;
            display: none; /* مخفي حتى تظهر النتيجة */
            font-weight: 500;
            line-height: 1.6;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .safe-result {
            background: rgba(46, 160, 67, 0.15);
            color: #3fb950;
            border: 1px solid #2ea043;
        }

        .danger-result {
            background: rgba(248, 81, 73, 0.15);
            color: #f85149;
            border: 1px solid #f85143;
        }

        /* لودر بسيط (Spinner) */
        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="service-container">
        <div class="header">
            <h2>🛡️ فاحص الروابط الآمن</h2>
            <p>افحص الروابط المشبوهة قبل فتحها لحماية جهازك من الفيروسات</p>
        </div>

        <div class="input-group">
            <input type="text" id="urlInput" class="url-input" placeholder="ضع الرابط هنا (https://...)" dir="ltr">
        </div>

        <button class="scan-button" onclick="startScan()" id="btnAction">
            <span id="btnText">تحليل الرابط الآن</span>
            <div id="loader" class="loader"></div>
        </button>

        <div id="resultBox"></div>
    </div>

    <script>
        async function startScan() {
            const urlInput = document.getElementById('urlInput');
            const url = urlInput.value.trim();
            const resultBox = document.getElementById('resultBox');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const btnAction = document.getElementById('btnAction');

            // جلب معرف المستخدم (بافتراض استخدام Firebase Auth)
            // إذا كنت تستخدم نظاماً آخر، قم بتعديل طريقة الحصول على الـ userId هنا
            const userId = typeof firebase !== 'undefined' ? firebase.auth().currentUser?.uid : null;

            if (!url) {
                alert("برجاء إدخال الرابط أولاً");
                return;
            }

            if (!userId) {
                alert("يجب تسجيل الدخول لاستخدام هذه الخدمة");
                return;
            }

            // تجهيز حالة التحميل
            btnAction.disabled = true;
            btnText.style.display = "none";
            loader.style.display = "block";
            resultBox.style.display = "none";

            try {
                const res = await fetch('/api/check-link', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url, userId: userId })
                });
                
                const data = await res.json();
                
                if (res.status === 402) {
                    alert("انتهت الفحوصات المجانية اليوم. تحتاج إلى 2 نقطة لإتمام هذا الفحص!");
                    return;
                } 
                
                if (res.status === 403) {
                    alert("لقد استنفدت جميع محاولات الفحص المسموحة لليوم (5/5). عد غداً!");
                    return;
                }

                if (res.ok) {
                    resultBox.style.display = "block";
                    if (data.safe) {
                        resultBox.className = "safe-result";
                        resultBox.innerHTML = "✅ الرابط آمن للاستخدام.";
                    } else {
                        resultBox.className = "danger-result";
                        resultBox.innerHTML = "⚠️ تحذير: هذا الرابط خطر جداً!";
                    }
                } else {
                    throw new Error(data.error || "خطأ غير معروف");
                }
            } catch (err) {
                console.error(err);
                alert("حدث خطأ أثناء الفحص، تأكد من اتصال الإنترنت أو حاول مجدداً");
            } finally {
                // إعادة الزرار لحالته الأصلية
                btnAction.disabled = false;
                btnText.style.display = "block";
                loader.style.display = "none";
            }
        }
    </script>

</body>
</html>
