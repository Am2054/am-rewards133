<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاحص الروابط الآمن</title>
    <style>
        body {
            background-color: #0b0e14;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white;
            background-image: radial-gradient(circle at center, #1a1f2c 0%, #0b0e14 100%);
        }

        .info-bar {
            position: fixed;
            top: 20px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }
        .info-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 210, 255, 0.3);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.95rem;
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        .info-card span { color: #00d2ff; font-weight: bold; }

        .service-container {
            width: 90%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
            margin-top: 80px;
        }

        .header h2 {
            font-size: 1.8rem;
            margin: 0;
            background: linear-gradient(90deg, #00d2ff, #9d50bb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .input-group { position: relative; margin: 30px 0; }
        .url-input {
            width: 100%;
            padding: 18px;
            background: rgba(13, 17, 23, 0.8);
            border: 2px solid #30363d;
            border-radius: 18px;
            color: white;
            outline: none;
            text-align: left;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .scan-button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        /* رسالة التأكيد الرايقة (Modal) */
        #confirmModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: #161b22;
            border: 1px solid #30363d;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            max-width: 350px;
            width: 85%;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
        }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; }
        .btn-confirm { background: #00d2ff; color: #000; }
        .btn-cancel { background: #30363d; color: #fff; }

        #resultBox { margin-top: 25px; padding: 20px; border-radius: 18px; display: none; }
        .safe-result { background: rgba(46, 160, 67, 0.1); color: #3fb950; border: 1px solid rgba(46, 160, 67, 0.3); }
        .danger-result { background: rgba(248, 81, 73, 0.1); color: #f85149; border: 1px solid rgba(248, 81, 73, 0.3); }
        .loader { display: none; width: 22px; height: 22px; border: 3px solid rgba(255, 255, 255, 0.3); border-top: 3px solid #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="info-bar">
        <div class="info-card">🪙 النقاط: <span id="userPoints">..</span></div>
        <div class="info-card">📊 محاولات اليوم: <span id="scanCount">0</span>/5</div>
    </div>

    <div id="confirmModal">
        <div class="modal-content">
            <h3 style="margin-top:0">انتهت المحاولات المجانية 🪙</h3>
            <p style="color: #8b949e">سيتم خصم 2 نقطة لإتمام هذا الفحص. هل تريد الاستمرار؟</p>
            <div class="modal-btns">
                <button class="modal-btn btn-confirm" id="confirmOk">استمرار</button>
                <button class="modal-btn btn-cancel" id="confirmCancel">إلغاء</button>
            </div>
        </div>
    </div>

    <div class="service-container">
        <div class="header">
            <h2>🛡️ فاحص الروابط الآمن</h2>
            <p>مجاناً لأول فحصين، ثم 2 نقطة لكل فحص إضافي</p>
        </div>
        <div class="input-group">
            <input type="text" id="urlInput" class="url-input" placeholder="https://..." dir="ltr">
        </div>
        <button class="scan-button" id="btnAction">
            <span id="btnText">تحليل الرابط الآن</span>
            <div id="loader" class="loader"></div>
        </button>
        <div id="resultBox"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", authDomain: "am--rewards.firebaseapp.com", projectId: "am--rewards" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let lastCheckedUrl = ""; // لحفظ آخر رابط مفحوص
        let lastResult = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        document.getElementById('userPoints').innerText = data.points || 0;
                        const today = new Date().toISOString().split('T')[0];
                        document.getElementById('scanCount').innerText = (data.scanStats && data.scanStats.date === today) ? data.scanStats.count : 0;
                    }
                });
            } else { window.location.href = "login.html"; }
        });

        async function executeScan(url) {
            const btnAction = document.getElementById('btnAction');
            const resultBox = document.getElementById('resultBox');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btnText');

            // منطق عدم احتساب المحاولة لو نفس الرابط
            if (url === lastCheckedUrl && lastResult !== null) {
                displayResult(lastResult);
                return;
            }

            btnAction.disabled = true;
            btnText.style.display = "none";
            loader.style.display = "block";
            resultBox.style.display = "none";

            try {
                const res = await fetch('/api/check-link', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, userId: auth.currentUser.uid })
                });
                const data = await res.json();
                if (res.ok) {
                    lastCheckedUrl = url;
                    lastResult = data;
                    displayResult(data);
                } else { alert(data.error); }
            } catch (err) { alert("خطأ في الاتصال"); } 
            finally {
                btnAction.disabled = false;
                btnText.style.display = "block";
                loader.style.display = "none";
            }
        }

        function displayResult(data) {
            const resultBox = document.getElementById('resultBox');
            resultBox.style.display = "block";
            resultBox.className = data.safe ? "safe-result" : "danger-result";
            resultBox.innerHTML = data.safe ? "✅ الرابط آمن وموثوق." : "⚠️ تحذير: هذا الرابط قد يكون خطيراً!";
            if (data.isRepeated) resultBox.innerHTML += " <br><small>(تم الفحص مسبقاً - لم يتم خصم نقاط)</small>";
        }

        document.getElementById('btnAction').addEventListener('click', () => {
            const url = document.getElementById('urlInput').value.trim();
            const currentCount = parseInt(document.getElementById('scanCount').innerText);
            if (!url) return alert("أدخل الرابط!");

            // لو نفس الرابط، افحص فوراً بدون ميثاق الخصم
            if (url === lastCheckedUrl) return executeScan(url);

            if (currentCount >= 2 && currentCount < 5) {
                document.getElementById('confirmModal').style.display = 'flex';
                document.getElementById('confirmOk').onclick = () => {
                    document.getElementById('confirmModal').style.display = 'none';
                    executeScan(url);
                };
                document.getElementById('confirmCancel').onclick = () => {
                    document.getElementById('confirmModal').style.display = 'none';
                };
            } else { executeScan(url); }
        });
    </script>
</body>
</html>
