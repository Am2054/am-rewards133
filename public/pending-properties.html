<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AM. Dashboard - عقاراتي المدرجة ومراجعتها</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-primary: #0b0f19;
      --bg-secondary: rgba(22, 30, 49, 0.7);
      --bg-tertiary: #1f293d;
      --primary: #38bdf8;
      --text-primary: #f3f4f6;
      --text-muted: #9ca3af;
      --border: rgba(255, 255, 255, 0.08);
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --transition: all 0.3s ease;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Cairo', sans-serif; background-color: var(--bg-primary); color: var(--text-primary); min-height: 100vh; padding: 2rem; }
    .container { max-width: 1100px; margin: 0 auto; }
    h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 2rem; color: var(--primary); display: flex; align-items: center; gap: 0.75rem; }
    .btn-back { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-muted); text-decoration: none; font-weight: 600; margin-bottom: 1.5rem; transition: var(--transition); }
    .btn-back:hover { color: var(--primary); }
    .properties-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
    .property-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; transition: var(--transition); display: flex; flex-direction: column; }
    .property-card:hover { transform: translateY(-4px); border-color: var(--primary); }
    .property-image { height: 190px; width: 100%; background: var(--bg-tertiary); position: relative; }
    .property-image img { width: 100%; height: 100%; object-fit: cover; }
    .status-badge { position: absolute; top: 1rem; right: 1rem; padding: 0.35rem 0.85rem; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
    .status-badge.pending { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
    .status-badge.rejected { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
    .property-content { padding: 1.25rem; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
    .property-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--text-primary); }
    .property-info { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; }
    .property-price { font-size: 1.25rem; font-weight: 800; color: var(--primary); margin-bottom: 0.75rem; }
    .reject-reason-box { background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.2); padding: 0.75rem; border-radius: 8px; font-size: 0.85rem; color: #fca5a5; margin-top: 0.75rem; }
    .no-data { text-align: center; color: var(--text-muted); padding: 4rem; font-size: 1.1rem; grid-column: span 3; }
  </style>
</head>
<body>

  <div class="container">
    <a href="index.html" class="btn-back"><i class="fas fa-arrow-right"></i> العودة للوحة التحكم الرئيسية</a>
    <h2><i class="fas fa-building"></i> عقاراتي قيد المراجعة والمرفوضة</h2>
    
    <div class="properties-grid" id="pendingRenderer">
      <div class="no-data">جاري تحميل البيانات من Firestore...</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0",
      authDomain: "am--rewards.firebaseapp.com",
      databaseURL: "https://am--rewards-default-rtdb.firebaseio.com",
      projectId: "am--rewards",
      storageBucket: "am--rewards.firebasestorage.app",
      messagingSenderId: "744783579735",
      appId: "1:744783579735:web:45e00de9998893bbc9b112",
      measurementId: "G-CV3GLT2TTJ"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db = getFirestore(firebaseApp);
    const auth = getAuth(firebaseApp);

    const pendingRenderer = document.getElementById('pendingRenderer');

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      const q = query(
        collection(db, "properties"),
        where("ownerId", "==", user.uid)
      );

      onSnapshot(q, (snapshot) => {
        pendingRenderer.innerHTML = "";
        
        // تصفية العقارات لعرض المعلقة والمرفوضة فقط (المقبولةApproved تختفي تلقائياً هنا لتظهر بالموقع الرئيسي)
        const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))
                                  .filter(item => item.status === "pending" || item.status === "rejected");

        if (items.length === 0) {
          pendingRenderer.innerHTML = `<div class="no-data"><i class="fas fa-folder-open" style="font-size: 2rem; display:block; margin-bottom:1rem;"></i>لا توجد أي عقارات معلقة أو مرفوضة مضافة حالياً.</div>`;
          return;
        }

        items.forEach(prop => {
          const firstImg = (prop.images && prop.images.length > 0) ? prop.images[0] : 'https://via.placeholder.com/400x250?text=No+Image';
          const dateStr = prop.createdAt ? new Date(prop.createdAt.seconds * 1000).toLocaleDateString('ar-EG') : '-';
          
          let statusText = 'قيد المراجعة';
          let statusClass = 'pending';
          if(prop.status === 'rejected') {
            statusText = 'مرفوض';
            statusClass = 'rejected';
          }

          const card = document.createElement('div');
          card.className = 'property-card';
          card.innerHTML = `
            <div class="property-image">
              <img src="${firstImg}" alt="Property Image">
              <span class="status-badge ${statusClass}">${statusText}</span>
            </div>
            <div class="property-content">
              <div>
                <h3 class="property-title">${prop.title || 'بدون عنوان'}</h3>
                <p class="property-info"><i class="fas fa-map-marker-alt" style="color:var(--primary)"></i> ${prop.city || '-'}، ${prop.governorate || '-'}</p>
                <p class="property-info"><i class="fas fa-calendar-alt"></i> تاريخ الإرسال: ${dateStr}</p>
              </div>
              <div>
                <div class="property-price">${prop.price ? prop.price.toLocaleString() : 0} ج.م</div>
                ${prop.status === 'rejected' && prop.rejectReason ? `
                  <div class="reject-reason-box">
                    <strong><i class="fas fa-exclamation-circle"></i> سبب الرفض:</strong>
                    <p style="margin-top: 0.25rem;">${prop.rejectReason}</p>
                  </div>
                ` : ''}
              </div>
            </div>
          `;
          pendingRenderer.appendChild(card);
        });
      }, (error) => {
        console.error("Firestore loading error: ", error);
        pendingRenderer.innerHTML = `<div class="no-data" style="color: var(--danger)">حدث خطأ أثناء تحميل البيانات.</div>`;
      });
    });
  </script>
</body>
</html>
