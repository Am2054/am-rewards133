<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <title>تسجيل الدخول - Am Rewards</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        /* كود الـ CSS بالكامل كما هو بدون أي تغيير للحفاظ على التصميم */
        :root {
            --main-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 60%, #38bdf8 100%);
            --dark-box-bg: rgba(2,6,23,0.95);
            --glass-bg: rgba(255,255,255,0.13);
            --glass-border: rgba(56,189,248,0.18);
            --input-bg: rgba(30,41,59,0.9);
            --input-focus: #38bdf8;
            --input-border: #334155;
            --error: #f87171;
            --success: #22c55e;
            --muted: #a5f3fc;
            --radius: 28px;
            --shadow: 0 8px 32px 0 rgba(2,6,23,0.4);
            --gold: #FFD369;
            --gold-dark: #bfa243;
        }
        *{box-sizing:border-box}
        html, body {
            height: 100%; margin: 0; padding: 0;
            font-family: "Cairo", "Montserrat", sans-serif;
            color: #f1f6fb; direction: rtl;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), var(--main-gradient);
            background-size: cover; background-attachment: fixed;
            overflow-y: auto !important;
        }
        .bg-glass { position: fixed; inset: 0; z-index: 0; pointer-events: none; background: radial-gradient(circle at 65% 17%, rgba(56,189,248,0.05) 0%, transparent 90%); filter: blur(28px); }
        .center-box { width: 100%; max-width: 420px; margin: 56px auto; padding: 38px 18px; border-radius: var(--radius); background: var(--dark-box-bg); box-shadow: var(--shadow); border: 2px solid var(--glass-border); z-index: 2; position: relative; display: flex; flex-direction: column; align-items: center; }
        h2 { margin-bottom: 20px; font-size: 1.7rem; font-weight: 900; color: #38bdf8; text-shadow: 0 0 10px #38bdf8a2; text-align: center; }
        .subtitle { color: var(--muted); font-size: 1rem; margin-bottom: 19px; font-weight: 700; text-align: center; }
        .gold-name { display: block; background: var(--gold); color: var(--gold-dark); padding: 10px 17px; border-radius: 12px; font-weight: 900; margin-bottom: 18px; }
        .form-row { width: 100%; margin-bottom: 18px; position: relative; }
        label { font-size: 1.08rem; color: var(--muted); margin-bottom: 6px; display: block; font-weight: 700; }
        input { width: 100%; padding: 16px; border-radius: 15px; border: 2px solid var(--input-border); background: var(--input-bg); color: #fff; font-family: "Cairo"; outline: none; }
        input:focus { border-color: var(--input-focus); box-shadow: 0 0 12px #38bdf8a6; }
        .password-eye { position: absolute; left: 14px; top: 70%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #38bdf8; }
        button.login-btn { width: 100%; padding: 14px; border-radius: 15px; cursor: pointer; border: none; background: linear-gradient(90deg,#FFD369 0%,#bfa243 100%); color: #2e2300; font-weight: 900; font-family: "Montserrat"; margin-top: 10px; }
        .switcher { color: var(--muted); font-size: 1rem; text-decoration: underline; cursor: pointer; margin-top: 15px; }
        .message { width: 100%; padding: 12px; margin-bottom: 13px; border-radius: 11px; font-weight: bold; text-align: center; display: none; }
        .error { background: #ffeaea; color: #c00; border: 2px solid #ff6b6b; }
        .success { background: #e7ffea; color: #049c3f; border: 2px solid #22c55e; }
        .footer { margin-top: 16px; font-size: .8rem; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="bg-glass"></div>
    <div class="center-box">
        <h2>تسجيل الدخول</h2>
        <div class="subtitle">انضم وابدأ رحلتك للربح بسهولة وأمان</div>
        <span class="gold-name">Am Rewards</span>
        
        <div id="msg" class="message">
            <span id="msg-text"></span>
        </div>

        <form id="login-form">
            <div class="form-row">
                <label>البريد الإلكتروني</label>
                <input type="email" id="login-email" placeholder="example@mail.com" required autocomplete="username">
            </div>
            <div class="form-row">
                <label>كلمة المرور</label>
                <input type="password" id="login-password" placeholder="كلمة المرور" required autocomplete="current-password">
                <button type="button" class="password-eye" id="password-toggle-btn">👁️</button>
            </div>
            <button class="login-btn" id="login-btn" type="submit">تسجيل الدخول</button>
        </form>

        <a href="signup.html" class="switcher">أو أنشئ حساب جديد</a>
        <div class="footer">© 2025 Am Rewards • كل الحقوق محفوظة</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, setPersistence, browserLocalPersistence, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0",
            authDomain: "am--rewards.firebaseapp.com",
            projectId: "am--rewards",
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const loginForm = document.getElementById("login-form");
        const msgEl = document.getElementById("msg");
        const msgTextEl = document.getElementById("msg-text");
        const loginEmail = document.getElementById("login-email");
        const loginPassword = document.getElementById("login-password");
        const loginBtn = document.getElementById("login-btn");
        const passwordToggleBtn = document.getElementById("password-toggle-btn");

        function showMessage(text, type = "success") {
            msgTextEl.textContent = text;
            msgEl.style.display = "block";
            msgEl.className = "message " + type;
            if (type !== "error") setTimeout(() => msgEl.style.display = "none", 3000);
        }

        // دالة ترجمة الأخطاء الدقيقة (الثغرة التي طلبت حلها)
        function translateError(code) {
            switch (code) {
                case "auth/invalid-email": return "البريد الإلكتروني غير صالح";
                case "auth/user-not-found": return "هذا الحساب غير مسجل لدينا";
                case "auth/wrong-password": return "كلمة السر التي أدخلتها غير صحيحة";
                case "auth/invalid-credential": return "بيانات الدخول غير صحيحة";
                case "auth/too-many-requests": return "محاولات كثيرة خاطئة، انتظر قليلاً";
                default: return "حدث خطأ أثناء تسجيل الدخول";
            }
        }

        async function updateLastLogin(uid, email) {
            try {
                await setDoc(doc(db, "users", uid), {
                    uid: uid,
                    email: email,
                    lastLogin: serverTimestamp()
                }, { merge: true });
            } catch (e) { console.error("Firestore Update Error"); }
        }

        async function login(event) {
            event.preventDefault();
            const email = loginEmail.value.trim();
            const password = loginPassword.value.trim();

            loginBtn.textContent = "جاري التحقق...";
            loginBtn.disabled = true;

            try {
                // 1. تسجيل الدخول في Firebase (يتحقق من وجود الحساب وصحة الباسورد)
                await setPersistence(auth, browserLocalPersistence);
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. تحديث بيانات الدخول
                await updateLastLogin(user.uid, email);

                // 3. التحقق من السيرفر (Backend) للحصول على صلاحيات الأدمن
                const serverRes = await fetch("/api/admin-auth", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action: "login", email: email, password: password })
                });

                if (serverRes.ok) {
                    showMessage("✅ تم تسجيل دخول الإدارة بنجاح", "success");
                    setTimeout(() => window.location.href = "admin.html", 1000);
                } else {
                    showMessage("✅ تم تسجيل دخول المستخدم بنجاح", "success");
                    setTimeout(() => window.location.href = "dashboard.html", 1000);
                }

            } catch (error) {
                loginBtn.textContent = "تسجيل الدخول";
                loginBtn.disabled = false;
                showMessage(translateError(error.code), "error");
            }
        }

        passwordToggleBtn.onclick = () => {
            loginPassword.type = loginPassword.type === "password" ? "text" : "password";
        };

        loginForm.onsubmit = login;
    </script>
</body>
</html>
