<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الاتصال | Secure Gate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: rgba(15, 23, 42, 0.9); --gold: #f5c542; --accent: #00f2ff; --text: #f8fafc; --border: rgba(0, 242, 255, 0.1); }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; background-image: radial-gradient(circle at top, #1e1b4b, #020617); }
        
        .gate-box { text-align: center; padding: 40px; border: 1px solid var(--border); border-radius: 30px; background: var(--card); backdrop-filter: blur(12px); box-shadow: 0 0 50px rgba(0, 242, 255, 0.1); max-width: 90%; width: 400px; }
        
        .code-display { font-size: 5rem; font-weight: 900; color: var(--gold); margin: 20px 0; letter-spacing: 12px; text-shadow: 0 0 30px rgba(245, 197, 66, 0.3); font-family: sans-serif; }
        
        .timer-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 25px; overflow: hidden; }
        .progress { width: 100%; height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold)); transition: 1s linear; }
        
        #msg { color: var(--accent); font-size: 1.5rem; margin-bottom: 5px; font-weight: 900; }
        .challenge-text { font-size: 0.9rem; color: #f87171; font-weight: bold; margin-bottom: 20px; display: none; }
    </style>
</head>
<body>

    <div class="gate-box">
        <span class="challenge-text" id="challengeNote"></span>
        <h2 id="msg">احفظ الكود السري فوراً</h2>
        <div class="code-display" id="randomCode">--</div>
        <p style="opacity:0.8; font-weight: 700;">سيتم إعادتك للمكافأة خلال <span id="secs" style="color:var(--accent); font-weight:900">4</span> ثوانٍ</p>
        <div class="timer-bar"><div class="progress" id="bar"></div></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", authDomain: "am--rewards.firebaseapp.com", projectId: "am--rewards" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const code = Math.floor(10 + Math.random() * 89);
    document.getElementById('randomCode').innerText = code;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const pIdx = localStorage.getItem('p_idx');
            if (pIdx !== null) {
                await setDoc(doc(db, "linkSessions", user.uid + "_" + pIdx), {
                    code: code.toString(),
                    createdAt: serverTimestamp()
                });
                startTimer();
            }
        } else {
            window.location.href = "index.html";
        }
    });

    function startTimer() {
        let timeLeft = 4;
        const bar = document.getElementById('bar');
        const countdown = setInterval(() => {
            timeLeft--;
            document.getElementById('secs').innerText = timeLeft;
            bar.style.width = (timeLeft / 4 * 100) + "%";
            if(timeLeft <= 0) {
                clearInterval(countdown);
                window.location.href = "shortlinks.html?verify=true"; 
            }
        }, 1000);
    }
</script>
</body>
</html>
