<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الاتصال | Secure Gate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: white; font-family: 'Cairo', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .gate-box { text-align: center; padding: 40px; border: 2px solid #00f2ff; border-radius: 30px; background: rgba(0, 242, 255, 0.05); box-shadow: 0 0 50px rgba(0, 242, 255, 0.2); max-width: 90%; }
        .code-display { font-size: 6rem; font-weight: 900; color: #f5c542; margin: 15px 0; letter-spacing: 12px; text-shadow: 0 0 30px rgba(245, 197, 66, 0.5); font-family: sans-serif; }
        .timer-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 25px; overflow: hidden; }
        .progress { width: 100%; height: 100%; background: linear-gradient(90deg, #00f2ff, #f5c542); transition: 1s linear; }
        #msg { color: #00f2ff; font-size: 1.5rem; margin-bottom: 5px; }
        .challenge-text { font-size: 0.9rem; color: #f87171; font-weight: bold; margin-bottom: 20px; display: block; }
    </style>
</head>
<body>

    <div class="gate-box">
        <span class="challenge-text" id="challengeNote">جاري تأمين الجلسة...</span>
        <h2 id="msg">احفظ الكود السري فوراً</h2>
        <div class="code-display" id="randomCode">--</div>
        <p style="opacity:0.8">سيتم إعادتك للمكافأة خلال <span id="secs" style="color:#00f2ff; font-weight:900">4</span> ثوانٍ</p>
        <div class="timer-bar"><div class="progress" id="bar"></div></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", authDomain: "am--rewards.firebaseapp.com", projectId: "am--rewards" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const code = Math.floor(10 + Math.random() * 89);
    document.getElementById('randomCode').innerText = code;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const pIdx = localStorage.getItem('p_idx');
            if (pIdx !== null) {
                // تخزين الكود في Firebase بدلاً من localStorage
                await setDoc(doc(db, "linkSessions", user.uid + "_" + pIdx), {
                    code: code.toString(),
                    createdAt: serverTimestamp()
                });
                
                const insults = ["مش قولتلك مش هتعرف تعمله؟ اثبتلي العكس!", "شكلك تعبت.. الرقم ده هو تذكرتك للنقاط", "أخيراً وصلت؟ ركز عشان الرقم ميهربش منك", "الرابط الصعب محتاج ذاكرة حديدية.. حفظت؟"];
                document.getElementById('challengeNote').innerText = insults[Math.floor(Math.random() * insults.length)];
                startTimer();
            }
        } else {
            window.location.href = "index.html";
        }
    });

    function startTimer() {
        let timeLeft = 4;
        const bar = document.getElementById('bar');
        const countdown = setInterval(() => {
            timeLeft--;
            document.getElementById('secs').innerText = timeLeft;
            bar.style.width = (timeLeft / 4 * 100) + "%";
            if(timeLeft <= 0) {
                clearInterval(countdown);
                window.location.href = "shortlinks.html?verify=true"; 
            }
        }, 1000);
    }
</script>
</body>
</html>
