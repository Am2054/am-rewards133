<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AM REWARDS | تحليلات المهام</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #020617; --card: #0f172a; --blue: #38bdf8; 
      --border: rgba(56, 189, 248, 0.2); --text: #f1f5f9; --accent: #22d3ee;
    }
    body { 
        font-family: "Cairo", sans-serif; background: var(--bg); color: var(--text); 
        margin: 0; padding: 20px; min-height: 100vh;
        background-image: radial-gradient(circle at 0% 0%, #1e293b 0%, transparent 50%);
    }

    #auth-gate { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
    .auth-box { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid var(--blue); text-align: center; width: 320px; }
    
    .wrap { max-width: 1100px; margin: 0 auto; }
    header { 
        display: flex; justify-content: space-between; align-items: center; 
        margin-bottom: 30px; padding: 20px; background: var(--card); border-radius: 15px; border: 1px solid var(--border);
    }
    header h1 { font-family: 'Orbitron', 'Cairo'; font-size: 1.1rem; color: var(--blue); margin: 0; }

    .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .metric-card { 
        background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--border);
        text-align: center; position: relative; overflow: hidden;
    }
    .metric-card strong { display: block; font-size: 2.5rem; font-family: 'Orbitron'; color: var(--blue); text-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
    .metric-card span { font-size: 0.85rem; color: #94a3b8; font-weight: 700; }

    .chart-container { 
        background: var(--card); padding: 25px; border-radius: 25px; border: 1px solid var(--border);
        margin-bottom: 30px; height: 350px;
    }

    .task-table-card { background: var(--card); border-radius: 25px; padding: 25px; border: 1px solid var(--border); }
    .controls { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
    select, input, .btn { 
        background: #000; border: 1px solid var(--border); color: #fff; 
        padding: 10px 15px; border-radius: 10px; outline: none; font-family: 'Cairo';
    }
    .btn { background: var(--blue); color: #000; font-weight: 900; border: none; cursor: pointer; }

    .task-item { 
        display: flex; justify-content: space-between; align-items: center; 
        padding: 15px; margin-bottom: 10px; background: rgba(255,255,255,0.02); 
        border-radius: 12px; border-right: 4px solid var(--blue);
    }
    .count-badge { background: var(--blue); color: #000; padding: 4px 12px; border-radius: 20px; font-weight: 900; font-family: 'Orbitron'; }

    .hidden { display: none !important; }
    .loader { width: 20px; height: 20px; border: 2px solid #fff; border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="auth-gate">
  <div class="auth-box">
    <h2 style="font-family:'Orbitron'; color:var(--blue); margin-bottom:20px;">ANALYTICS KEY</h2>
    <input type="password" id="adm-pass" placeholder="كلمة السر (ADMIN_PASSWORD4)" style="width:90%; margin-bottom:15px; background:#000; border:1px solid #333; color:#fff; padding:10px; text-align:center;">
    <button id="btn-login" class="btn" style="width:100%;">دخول النظام</button>
  </div>
</div>

<div id="main-ui" class="wrap hidden">
  <header>
    <h1>تحليلات <span style="color:#fff;">العمليات والمهام</span></h1>
    <button id="btnLogout" style="background:none; border:1px solid #ef4444; color:#ef4444; padding:5px 15px; border-radius:8px; cursor:pointer;">خروج</button>
  </header>

  <div class="metrics-grid">
    <div class="metric-card">
      <strong id="totalTasks">0</strong>
      <span>إجمالي المهام المنجزة</span>
    </div>
    <div class="metric-card">
      <strong id="todayTasks">0</strong>
      <span>عمليات اليوم</span>
    </div>
    <div class="metric-card">
      <strong id="uniqueTasks">0</strong>
      <span>أنواع المهام النشطة</span>
    </div>
  </div>

  <div class="chart-container">
    <canvas id="mainChart"></canvas>
  </div>

  <div class="task-table-card">
    <div class="controls">
        <select id="timeFilter" onchange="fetchData()">
            <option value="today">اليوم</option>
            <option value="7days">آخر 7 أيام</option>
            <option value="30days" selected>آخر 30 يوم</option>
            <option value="all">كل الأوقات</option>
        </select>
        <button onclick="fetchData()" class="btn">🔄 تحديث البيانات</button>
        <span id="syncText" style="font-size: 0.7rem; color: #64748b; margin-top: 10px;"></span>
    </div>

    <h3 style="color:var(--blue); border-bottom: 1px solid var(--border); padding-bottom: 10px;">🏆 المهام الأكثر إنجازاً</h3>
    <div id="topTasksList" style="margin-top:20px;"></div>
  </div>
</div>

<script>
    let myChart = null;

    async function apiRequest(data) {
        const res = await fetch('/api/admin_tasks', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        if (res.status === 401) { toggleUI(false); return null; }
        return res.json();
    }

    async function fetchData() {
        const filter = document.getElementById('timeFilter').value;
        const res = await apiRequest({ action: 'get_analytics', filter });
        if (res) {
            document.getElementById('totalTasks').textContent = res.totalTasks.toLocaleString();
            document.getElementById('todayTasks').textContent = res.todayCount.toLocaleString();
            document.getElementById('uniqueTasks').textContent = res.uniqueTypes;
            
            renderList(res.topTasks);
            updateChart(res.topTasks);
            document.getElementById('syncText').textContent = 'آخر مزامنة: ' + new Date().toLocaleTimeString();
        }
    }

    function renderList(data) {
        const list = document.getElementById('topTasksList');
        list.innerHTML = data.map(([name, count], i) => `
            <div class="task-item">
                <span><b>#${i+1}</b> &nbsp; ${name}</span>
                <span class="count-badge">${count}</span>
            </div>
        `).join('') || '<p style="text-align:center; opacity:0.5;">لا توجد بيانات لهذا النطاق</p>';
    }

    function updateChart(data) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.map(d => d[0]),
                datasets: [{
                    label: 'عدد المرات',
                    data: data.map(d => d[1]),
                    borderColor: '#38bdf8',
                    backgroundColor: 'rgba(56, 189, 248, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { grid: { color: 'rgba(255,255,255,0.05)' } },
                    x: { grid: { display: false } }
                }
            }
        });
    }

    function toggleUI(is) {
        document.getElementById('auth-gate').classList.toggle('hidden', is);
        document.getElementById('main-ui').classList.toggle('hidden', !is);
    }

    document.getElementById('btn-login').onclick = async () => {
        const pass = document.getElementById('adm-pass').value;
        const res = await apiRequest({ action: 'admin_login', password: pass });
        if (res?.success) { toggleUI(true); fetchData(); } else { alert("رمز الدخول خاطئ"); }
    };

    document.getElementById('btnLogout').onclick = () => {
        document.cookie = "taskToken=; max-age=0; path=/";
        location.reload();
    };

    window.onload = () => {
        if (document.cookie.includes('taskToken')) { toggleUI(true); fetchData(); }
    };
</script>
</body>
</html>
