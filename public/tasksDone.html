<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AM REWARDS | تحليلات المهام</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #00f2ff;
      --secondary: #7c3aed;
      --bg-dark: #0a0e27;
      --bg-darker: #050811;
      --card-bg: rgba(20, 28, 60, 0.5);
      --border-color: rgba(0, 242, 255, 0.1);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --success: #22c55e;
      --warning: #f59e0b;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, var(--bg-darker) 0%, var(--bg-dark) 100%);
      color: var(--text-primary);
      min-height: 100vh;
      background-attachment: fixed;
    }

    /* ✅ Auth Gate */
    #auth-gate {
      position: fixed;
      inset: 0;
      background: var(--bg-darker);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      opacity: 1;
      transition: opacity 0.3s ease;
    }

    #auth-gate.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .auth-box {
      width: 100%;
      max-width: 420px;
      padding: 40px;
      background: linear-gradient(135deg, rgba(0, 242, 255, 0.1), rgba(124, 58, 237, 0.1));
      border: 2px solid var(--primary);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 242, 255, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      text-align: center;
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .auth-box h2 {
      font-family: 'Inter', sans-serif;
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--primary);
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    .auth-box input {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 20px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      background: rgba(0, 0, 0, 0.3);
      color: var(--text-primary);
      font-size: 1rem;
      text-align: center;
      transition: 0.3s;
      font-family: inherit;
      outline: none;
    }

    .auth-box input:focus {
      border-color: var(--primary);
      background: rgba(0, 242, 255, 0.05);
      box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #000;
      font-weight: 900;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
      font-family: inherit;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 242, 255, 0.3);
    }

    /* ✅ Main Container */
    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 30px 20px;
      opacity: 1;
      transition: opacity 0.3s ease;
    }

    .wrap.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ✅ Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 35px;
      padding: 25px 30px;
      background: var(--card-bg);
      border-radius: 20px;
      border: 1px solid var(--border-color);
      animation: fadeIn 0.5s ease 0.1s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    header h1 {
      font-family: 'Inter', sans-serif;
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0;
    }

    header h1 span {
      opacity: 0.6;
      font-weight: 400;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .btn-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      background: transparent;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 1.2rem;
      transition: 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
    }

    .btn-icon:hover {
      border-color: var(--primary);
      background: rgba(0, 242, 255, 0.1);
    }

    .btn-logout {
      border-color: #ef4444 !important;
      color: #ef4444 !important;
    }

    .btn-logout:hover {
      background: rgba(239, 68, 68, 0.15) !important;
    }

    /* ✅ Metrics */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 35px;
    }

    .metric-card {
      background: var(--card-bg);
      padding: 25px;
      border: 1px solid var(--border-color);
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      animation: fadeIn 0.5s ease;
    }

    .metric-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: linear-gradient(180deg, var(--primary), var(--secondary));
    }

    .metric-card strong {
      display: block;
      font-size: 2.5rem;
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      margin: 15px 0;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .metric-card span {
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 600;
    }

    /* ✅ Chart Container */
    .chart-container {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 35px;
      animation: fadeIn 0.5s ease 0.1s both;
      height: 350px;
    }

    /* ✅ Controls */
    .controls {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
      flex-wrap: wrap;
      align-items: center;
    }

    .controls select,
    .controls button {
      padding: 12px 20px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      background: rgba(0, 0, 0, 0.2);
      color: var(--text-primary);
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
      outline: none;
    }

    .controls button {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #000;
    }

    .controls button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 242, 255, 0.3);
    }

    .sync-text {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    /* ✅ Tasks Table */
    .task-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      overflow: hidden;
      animation: fadeIn 0.5s ease 0.2s both;
    }

    .table-section-title {
      padding: 20px 30px;
      border-bottom: 1px solid var(--border-color);
      background: rgba(0, 242, 255, 0.03);
      font-weight: 700;
      color: var(--primary);
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .task-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 30px;
      border-bottom: 1px solid var(--border-color);
      transition: 0.3s;
    }

    .task-item:hover {
      background: rgba(0, 242, 255, 0.05);
    }

    .task-item:last-child {
      border-bottom: none;
    }

    .task-rank {
      font-weight: 900;
      color: var(--primary);
      font-size: 1rem;
      margin-right: 15px;
    }

    .task-name {
      flex: 1;
      font-weight: 700;
      color: var(--text-primary);
    }

    .task-count {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #000;
      padding: 6px 16px;
      border-radius: 20px;
      font-weight: 900;
      font-family: 'Inter', sans-serif;
    }

    /* ✅ Toast */
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 16px 24px;
      border-radius: 12px;
      background: var(--card-bg);
      border-left: 4px solid var(--primary);
      color: var(--text-primary);
      font-weight: 700;
      box-shadow: 0 10px 30px rgba(0, 242, 255, 0.2);
      z-index: 12000;
      animation: slideInRight 0.3s ease;
    }

    @keyframes slideInRight {
      from { transform: translateX(400px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .toast.danger { border-left-color: #ef4444; }

    /* ✅ Responsive */
    @media (max-width: 768px) {
      .wrap { padding: 15px; }
      header { flex-direction: column; gap: 15px; }
      header h1 { font-size: 1.5rem; }
      .metrics-grid { grid-template-columns: 1fr; }
      .controls { flex-direction: column; }
      .controls select, .controls button { width: 100%; }
      .chart-container { height: 300px; }
      .task-item { flex-direction: column; gap: 12px; align-items: flex-start; }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- ✅ Auth Gate -->
  <div id="auth-gate">
    <div class="auth-box">
      <h2>📊 تحليلات المهام</h2>
      <input type="password" id="adm-pass" placeholder="أدخل رمز الوصول" />
      <button id="btn-login" class="btn-primary">دخول النظام</button>
      <p style="margin-top: 20px; color: var(--text-secondary); font-size: 0.9rem;">
        يتطلب صلاحيات إدارية للوصول
      </p>
    </div>
  </div>

  <!-- ✅ Main UI -->
  <div id="main-ui" class="wrap hidden">
    <!-- Header -->
    <header>
      <div>
        <h1>📊 تحليلات <span>العمليات والمهام</span></h1>
      </div>
      <div class="header-actions">
        <button id="refreshBtn" class="btn-icon" title="تحديث البيانات">🔄</button>
        <button id="btnLogout" class="btn-icon btn-logout" title="تسجيل الخروج">🚪</button>
      </div>
    </header>

    <!-- Metrics -->
    <div class="metrics-grid">
      <div class="metric-card">
        <span>🎯 المهام المنجزة</span>
        <strong id="totalTasks">0</strong>
      </div>
      <div class="metric-card">
        <span>📅 عمليات اليوم</span>
        <strong id="todayTasks">0</strong>
      </div>
      <div class="metric-card">
        <span>🔤 أنواع المهام</span>
        <strong id="uniqueTasks">0</strong>
      </div>
    </div>

    <!-- Chart -->
    <div class="chart-container">
      <canvas id="mainChart"></canvas>
    </div>

    <!-- Controls & Tasks -->
    <div class="task-card">
      <div class="table-section-title">🏆 أفضل المهام أداءً</div>

      <div style="padding: 30px;">
        <div class="controls">
          <select id="timeFilter" onchange="fetchData()">
            <option value="today">📅 اليوم</option>
            <option value="7days">📊 آخر 7 أيام</option>
            <option value="30days" selected>📈 آخر 30 يوم</option>
            <option value="all">🕐 كل الأوقات</option>
          </select>
          <button onclick="fetchData()" class="btn-primary" style="flex: 1; max-width: 150px;">تحديث البيانات</button>
          <div class="sync-text" id="syncText"></div>
        </div>
      </div>

      <div id="topTasksList"></div>
    </div>
  </div>

  <script>
    let myChart = null;

    async function apiRequest(data) {
      try {
        const res = await fetch('/api/admin_tasks', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...data, module: 'tasks' })
        });
        if (res.status === 401) {
          toggleUI(false);
          showToast('جلسة غير صالحة', 'danger');
          return null;
        }
        return res.json();
      } catch (e) {
        showToast('خطأ في الاتصال بالسيرفر', 'danger');
        return null;
      }
    }

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    async function fetchData() {
      const filter = document.getElementById('timeFilter').value;
      const res = await apiRequest({ action: 'get_analytics', filter });
      if (res) {
        document.getElementById('totalTasks').textContent = res.totalTasks.toLocaleString();
        document.getElementById('todayTasks').textContent = res.todayCount.toLocaleString();
        document.getElementById('uniqueTasks').textContent = res.uniqueTypes;

        renderList(res.topTasks);
        updateChart(res.topTasks);
        document.getElementById('syncText').textContent = '✓ آخر مزامنة: ' + new Date().toLocaleTimeString('ar-EG');
      }
    }

    function renderList(data) {
      const list = document.getElementById('topTasksList');
      list.innerHTML = (data && data.length > 0) ?
        data.map(([name, count], i) => `
          <div class="task-item">
            <div style="display: flex; align-items: center;">
              <span class="task-rank">#${i + 1}</span>
              <span class="task-name">${name}</span>
            </div>
            <span class="task-count">${count}</span>
          </div>
        `).join('') :
        '<div style="text-align: center; padding: 40px; color: var(--text-secondary);">لا توجد بيانات لهذا النطاق</div>';
    }

    function updateChart(data) {
      const ctx = document.getElementById('mainChart').getContext('2d');
      if (myChart) myChart.destroy();

      myChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: data.map(d => d[0]),
          datasets: [{
            label: 'عدد المهام',
            data: data.map(d => d[1]),
            backgroundColor: 'rgba(0, 242, 255, 0.2)',
            borderColor: '#00f2ff',
            borderWidth: 2,
            borderRadius: 12,
            tension: 0.4,
            fill: true
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: {
              grid: { color: 'rgba(255, 255, 255, 0.05)' },
              ticks: { color: '#94a3b8' }
            },
            x: {
              grid: { display: false },
              ticks: { color: '#94a3b8' }
            }
          }
        }
      });
    }

    function toggleUI(show) {
      document.getElementById('auth-gate').classList.toggle('hidden', show);
      document.getElementById('main-ui').classList.toggle('hidden', !show);
    }

    document.getElementById('btn-login').onclick = async () => {
      const btn = document.getElementById('btn-login');
      const pass = document.getElementById('adm-pass').value;

      if (!pass) {
        showToast('⚠️ أدخل رمز الوصول', 'warning');
        return;
      }

      btn.disabled = true;
      btn.textContent = '⏳ جاري التحقق...';

      const res = await apiRequest({ action: 'admin_login', password: pass });
      if (res?.success) {
        toggleUI(true);
        fetchData();
        showToast('✅ تم التسجيل بنجاح', 'success');
      } else {
        showToast('❌ رمز وصول غير صحيح', 'danger');
      }

      btn.disabled = false;
      btn.textContent = 'دخول النظام';
    };

    document.getElementById('btnLogout').onclick = () => {
      document.cookie = 'adminToken=; max-age=0; path=/';
      location.reload();
    };

    document.getElementById('refreshBtn').onclick = fetchData;

    window.onload = () => {
      if (document.cookie.includes('adminToken')) {
        toggleUI(true);
        fetchData();
      }
    };
  </script>
</body>
  </html>
