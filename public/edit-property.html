<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AM. Dashboard - تعديل العقار</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-primary: #020617;
      --bg-secondary: rgba(15, 23, 42, 0.75);
      --bg-tertiary: #1f293d;
      --primary: #00f2ff; /* اللون السماوي المضيء الموحد مع الإضافة */
      --primary-hover: #0ea5e9;
      --text-primary: #f3f4f6;
      --text-muted: #9ca3af;
      --border: rgba(255, 255, 255, 0.08);
      --success: #10b981;
      --danger: #ef4444;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --neon-purple: #7000ff;
      --radius: 24px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      font-family: 'Cairo', sans-serif; 
      background-color: var(--bg-primary); 
      color: var(--text-primary); 
      min-height: 100vh; 
      padding: 2.5rem 1.5rem; 
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(112, 0, 255, 0.15) 0%, transparent 35%),
        radial-gradient(circle at 100% 100%, rgba(0, 242, 255, 0.15) 0%, transparent 35%);
    }

    body::after {
      content: ""; position: fixed; inset: 0; z-index: -1;
      background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
      opacity: 0.15; pointer-events: none;
    }

    .container { 
      max-width: 900px; 
      margin: 0 auto; 
      background: var(--bg-secondary); 
      border: 1px solid var(--border); 
      padding: 45px 35px; 
      border-radius: var(--radius); 
      backdrop-filter: blur(20px);
      position: relative;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .container::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--neon-purple), var(--primary));
      border-radius: var(--radius) var(--radius) 0 0;
    }
    
    /* مؤشر الخطوات */
    .steps-indicator { display: flex; justify-content: space-between; margin-bottom: 2.5rem; position: relative; }
    .steps-indicator::before { content: ''; position: absolute; top: 25px; left: 0; right: 0; height: 2px; background: var(--border); z-index: 1; }
    .step-tab { z-index: 2; text-align: center; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; opacity: 0.4; transition: var(--transition); }
    .step-tab.active { opacity: 1; }
    .step-tab.active .step-num { background: var(--primary); color: var(--bg-primary); box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
    .step-num { width: 50px; height: 50px; border-radius: 50%; background: var(--bg-tertiary); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.1rem; }
    .step-text { font-size: 0.85rem; font-weight: 700; color: #fff; }

    h2 { font-size: 1.8rem; font-weight: 900; margin-bottom: 2rem; display: flex; align-items: center; gap: 0.75rem; color: #fff; text-shadow: 0 0 15px rgba(0, 242, 255, 0.3); border-bottom: 1px solid var(--border); padding-bottom: 1rem;}
    h2 i { color: var(--primary); }
    .form-step-panel { display: none; }
    .form-step-panel.active { display: block; }

    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 1.5rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; position: relative; }
    label { font-size: 0.95rem; font-weight: 700; color: var(--text-muted); }
    input[type="text"], input[type="number"], select, textarea {
      width: 100%; padding: 0.85rem 1.25rem; background: rgba(0,0,0,0.25); border: 1px solid var(--border); border-radius: 10px; color: var(--text-primary); font-family: 'Cairo', sans-serif; font-weight: 600; transition: var(--transition); outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 12px rgba(0, 242, 255, 0.15); background: rgba(0,0,0,0.4); }
    
    .btn-toggle-more { background: transparent; border: 1px dashed var(--primary); color: var(--primary); padding: 0.75rem; border-radius: 10px; cursor: pointer; font-weight: 700; width: 100%; margin: 1rem 0; font-family: 'Cairo', sans-serif; transition: var(--transition); }
    .btn-toggle-more:hover { background: rgba(56,189,248,0.05); }

    .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; margin: 1.5rem 0; }
    .checkbox-item { display: flex; align-items: center; gap: 0.75rem; background: rgba(0,0,0,0.2); padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; }
    .checkbox-item input { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }
    
    /* ميديا زون */
    .upload-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 2.5rem 1.5rem; text-align: center; cursor: pointer; background: rgba(0,0,0,0.2); position: relative; margin-bottom: 1.5rem; }
    .upload-zone:hover { border-color: var(--primary); }
    
    .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 1rem; margin-top: 1.5rem; }
    .media-box { position: relative; width: 100%; height: 120px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); background: #000; cursor: grab; }
    .media-box img, .media-box video { width: 100%; height: 100%; object-fit: cover; }
    .media-box .badge-cover { position: absolute; bottom: 0; left: 0; right: 0; background: var(--primary); color: #020617; text-align: center; font-size: 0.75rem; font-weight: 900; padding: 2px 0; }
    .media-box .btn-del { position: absolute; top: 5px; left: 5px; background: var(--danger); border: none; color: white; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; z-index: 10; }
    
    /* التقدم والتنقل */
    .progress-container { background: rgba(0,0,0,0.3); border-radius: 8px; height: 12px; overflow: hidden; margin: 1.5rem 0; display: none; border: 1px solid var(--border); }
    .progress-bar { height: 100%; background: linear-gradient(90deg, var(--neon-purple), var(--primary)); width: 0%; transition: width 0.1s ease; }
    
    .nav-buttons { display: flex; justify-content: space-between; margin-top: 2rem; gap: 1rem; }
    .btn-nav { padding: 0.85rem 2rem; border-radius: 12px; font-weight: 900; cursor: pointer; border: none; transition: var(--transition); font-family: 'Cairo'; font-size: 1rem; }
    .btn-next { background: linear-gradient(90deg, var(--neon-purple), var(--primary)); color: #fff; box-shadow: 0 5px 15px rgba(112,0,255,0.25); }
    .btn-next:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(112,0,255,0.4); }
    .btn-prev { background: rgba(255,255,255,0.05); color: var(--text-primary); border: 1px solid var(--border); }
    .btn-prev:hover { background: rgba(255,255,255,0.08); }
    .btn-submit-final { background: var(--success); color: white; display: none; }
    .btn-submit-final:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3); }
    
    .btn-back { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-muted); text-decoration: none; font-weight: 700; margin-bottom: 1.5rem; font-size: 0.95rem; }
    .btn-back:hover { color: var(--primary); }
    .hidden { display: none !important; }
    
    /* مراجعة البيانات */
    .review-item { background: rgba(0,0,0,0.2); padding: 1.25rem; border-radius: 12px; margin-bottom: 1.25rem; border: 1px solid var(--border); }
    .review-item h4 { color: var(--primary); margin-bottom: 0.75rem; font-size: 1rem; font-weight: 900; }
    .review-item p { font-size: 0.95rem; line-height: 1.7; font-weight: 600; color: #fff; }
    
    /* شاشة التحميل المبدئية لجلب البيانات */
    .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-primary); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; gap: 1rem; }
    .spinner { width: 50px; height: 50px; border: 5px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- شاشة التحميل قبل جلب بيانات المستند -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
    <p>جاري جلب بيانات العقار وتجهيزها للتعديل المعتمد...</p>
  </div>

  <div class="container">
    <a href="my-properties.html" class="btn-back"><i class="fas fa-arrow-right"></i> العودة لعقاراتي</a>
    
    <!-- مؤشر خطوات التقدم للمستخدم -->
    <div class="steps-indicator">
      <div class="step-tab active" id="tab-1"><div class="step-num">1</div><div class="step-text">البيانات الأساسية</div></div>
      <div class="step-tab" id="tab-2"><div class="step-num">2</div><div class="step-text">الوسائط المرفقة</div></div>
      <div class="step-tab" id="tab-3"><div class="step-num">3</div><div class="step-text">المراجعة والتعديل</div></div>
    </div>

    <h2><i class="fas fa-edit"></i> طلب تعديل بيانات العقار</h2>
    
    <form id="editPropertyForm" onsubmit="return false;">
      
      <!-- الخطوة 1: البيانات الأساسية -->
      <div class="form-step-panel active" id="step-panel-1">
        <div class="form-row">
          <div class="form-group"><label>عنوان العقار *</label><input type="text" id="title" required></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>نوع العملية *</label><select id="purpose" required><option value="sale">بيع</option><option value="rent">إيجار</option></select></div>
          <div class="form-group"><label>نوع العقار *</label>
            <select id="propertyType" required>
              <option value="شقة">شقة</option>
              <option value="فيلا">فيلا</option>
              <option value="دوبلكس">دوبلكس</option>
              <option value="مكتب">مكتب</option>
              <option value="محل">محل</option>
              <option value="أرض">أرض</option>
            </select>
          </div>
        </div>

        <!-- حقل تفاصيل هيكل السكن الديناميكي بالكامل المتطابق مع صفحة الإضافة -->
        <div class="form-row hidden" id="residentialSubtypeRow">
          <div class="form-group">
            <label>تفاصيل هيكل السكن *</label>
            <select id="residentialSubtype" class="styled-select">
              <!-- يتم التحكم في الخيارات برمجيًا من الجافا سكريبت -->
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group"><label>المحافظة *</label><input type="text" id="governorate" required></div>
          <div class="form-group"><label>المدينة *</label><input type="text" id="city" required></div>
          <div class="form-group"><label>المنطقة *</label><input type="text" id="district" required></div>
        </div>
        
        <!-- الموقع الجغرافي الخرائطي -->
        <div class="form-row">
          <div class="form-group" style="grid-column: span 2;">
            <label><i class="fas fa-map-marker-alt" style="color:var(--primary)"></i> رابط الموقع الجغرافي من خرائط جوجل (اختياري)</label>
            <input type="text" id="googleMapsLink" placeholder="https://maps.google.com/?q=...">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>خط العرض (Latitude) - اختياري</label><input type="text" id="latitude" placeholder="e.g. 30.0444"></div>
          <div class="form-group"><label>خط الطول (Longitude) - اختياري</label><input type="text" id="longitude" placeholder="e.g. 31.2357"></div>
        </div>

        <div class="form-row">
          <div class="form-group"><label>السعر (ج.م) *</label><input type="number" id="price" required></div>
          <div class="form-group"><label>المساحة (م) *</label><input type="number" id="area" required></div>
        </div>
        
        <!-- حقول ديناميكية تتبع نوع العقار المختار بالتوافق التام مع الإضافة -->
        <div class="form-row" id="dynamicFields">
          <div class="form-group" id="field-rooms"><label>عدد الغرف *</label><input type="number" id="rooms" value="3"></div>
          <div class="form-group" id="field-bathrooms"><label>عدد الحمامات *</label><input type="number" id="bathrooms" value="1"></div>
        </div>

        <!-- حقول الأدوار والهيكل السكني المحدثة والديناميكية المضافة حديثاً -->
        <div class="form-row hidden" id="dynamicResidentialFields">
          <div class="form-group" id="field-floor-select-group">
            <label id="floorSelectLabel">الدور / الطابق المخصص *</label>
            <select id="floorSelect" class="styled-select">
              <option value="الأرضي">الأرضي</option>
              <option value="الأول">الأول</option>
              <option value="الثاني">الثاني</option>
              <option value="الثالث">الثالث</option>
              <option value="أعلى من الثالث">أعلى من الثالث</option>
              <option value="الأخير">الأخير</option>
            </select>
          </div>
          <div class="form-group" id="field-building-floors-group">
            <label id="buildingFloorsLabel">إجمالي عدد أدوار العمارة *</label>
            <input type="number" id="buildingFloors" placeholder="مثال: مكون من 5 أدوار" min="1" value="5">
          </div>
        </div>

        <div class="form-group"><label>وصف العقار *</label><textarea id="description" rows="4" required></textarea></div>

        <!-- تفاصيل إضافية وتشطيبات -->
        <button type="button" class="btn-toggle-more" id="btnMoreDetails">عرض تفاصيل أكثر (اختياري) <i class="fas fa-chevron-down"></i></button>
        
        <div id="optionalSection" class="hidden">
          <div class="form-row">
            <div class="form-group"><label>التشطيب</label><select id="finishing"><option value="">اختر التشطيب</option><option value="سوبر لوكس">سوبر لوكس</option><option value="لوكس">لوكس</option><option value="بدون">بدون تشطيب</option></select></div>
            <div class="form-group"><label>عداد الكهرباء</label><select id="electricityCard"><option value="">غير محدد</option><option value="كارت">كارت جديد</option><option value="قديم">عداد قديم</option></select></div>
            <div class="form-group"><label>عداد المياه</label><select id="waterCard"><option value="">غير محدد</option><option value="مستقل">مستقل</option><option value="مشترك">مشترك</option></select></div>
          </div>
          <label>المميزات الإضافية</label>
          <div class="checkbox-grid" id="featuresGrid">
            <label class="checkbox-item feat-item"><input type="checkbox" id="feat-elevator"><span>مصعد</span></label>
            <label class="checkbox-item feat-item"><input type="checkbox" id="feat-garage"><span>جراج</span></label>
            <label class="checkbox-item feat-item"><input type="checkbox" id="feat-security"><span>أمن حراسة</span></label>
            <label class="checkbox-item feat-item"><input type="checkbox" id="feat-balcony"><span>بلكونة</span></label>
            <label class="checkbox-item feat-item"><input type="checkbox" id="feat-airConditioner"><span>تكييف</span></label>
            <label class="checkbox-item feat-item"><input type="checkbox" id="feat-furnished"><span>مفروش</span></label>
            <label class="checkbox-item feat-item"><input type="checkbox" id="feat-naturalGas"><span>غاز طبيعي</span></label>
          </div>
        </div>
      </div>

      <!-- الخطوة 2: ميديا الصور والفيديو -->
      <div class="form-step-panel" id="step-panel-2">
        <div class="form-group">
          <label>ألبوم صور العقار (من 5 إلى 15 صورة كحد أقصى) * أول صورة هي الغلاف.</label>
          <div class="upload-zone" onclick="document.getElementById('imageFiles').click()">
            <p><i class="fas fa-images fa-2x" style="color:var(--primary)"></i><br>اضغط أو اسحب صوراً إضافية هنا للرفع</p>
            <input type="file" id="imageFiles" multiple accept="image/*" class="hidden">
          </div>
          <div class="media-grid" id="imagesPreviewGrid"></div>
        </div>

        <!-- 🚫 تم إخفاء قسم الفيديو بصرياً وبرمجياً بالكامل بناء على طلبك -->
        <div class="form-group hidden" style="margin-top: 2rem; display: none !important;">
          <label>فيديو للعقار (اختياري - فيديو واحد MP4 فقط - أقصى مدة 60 ثانية - الحجم الأقصى 100MB)</label>
          <div class="upload-zone" id="videoZone" onclick="document.getElementById('videoFile').click()">
            <p><i class="fas fa-video fa-2x" style="color:var(--primary)"></i><br>اضغط لاختيار أو تعديل الفيديو التوضيحي</p>
            <input type="file" id="videoFile" accept="video/mp4" class="hidden">
          </div>
          <div class="media-grid" id="videoPreviewGrid"></div>
        </div>
      </div>

      <!-- الخطوة 3: المراجعة النهائية قبل الرفع -->
      <div class="form-step-panel" id="step-panel-3">
        <div class="review-item">
          <h4>تفاصيل العقار الأساسية والموقع</h4>
          <p id="reviewMainText"></p>
        </div>
        <div class="review-item">
          <h4>حالة الوسائط الجاهزة للإرسال</h4>
          <p id="reviewMediaText"></p>
        </div>
        
        <div class="progress-container" id="uploadProgressContainer">
          <div class="progress-bar" id="uploadProgressBar"></div>
        </div>
      </div>

      <!-- أزرار التحكم بالخطوات والتنقل -->
      <div class="nav-buttons">
        <button type="button" class="btn-nav btn-prev hidden" id="btnPrevStep">السابق</button>
        <button type="button" class="btn-nav btn-next" id="btnNextStep">التالي</button>
        <button type="button" class="btn-nav btn-submit-final" id="btnSubmitFinal">حفظ التعديلات وإرسال للمراجعة</button>
      </div>

    </form>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0",
        authDomain: "am--rewards.firebaseapp.com",
        projectId: "am--rewards",
        storageBucket: "am--rewards.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // استخراج معرف العقار (id) من رابط الصفحة (Query Parameters)
    const urlParams = new URLSearchParams(window.location.search);
    const propertyId = urlParams.get('id');

    let currentStep = 1;
    let uploadedImages = []; 
    let uploadedVideoFile = null; 
    let existingVideoUrl = null; 
    let currentUserName = "مستخدم مسجل"; 
    let originalPropertyData = null; // للاحتفاظ بنسخة كاملة من البيانات القديمة لرفعها في طلب التعديل

    const propertyTypeSelect = document.getElementById('propertyType');
    const residentialSubtypeSelect = document.getElementById('residentialSubtype');

    if (!propertyId) {
        alert("خطأ: لم يتم تحديد معرف العقار المطلوب تعديله.");
        window.location.href = "my-properties.html";
    }

    // التحقق من صلاحية المستخدم وجلب بيانات العقار المبدئية
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            alert("يجب تسجيل الدخول أولاً للوصول لهذه الصفحة.");
            window.location.href = "login.html";
            return;
        }
        currentUserName = user.displayName || "مستخدم مسجل";
        await loadPropertyData();
    });

    // دالة التحكم التفاعلي والديناميكي في عرض الحقول وتغيير مسمياتها المتطابقة تماماً مع الإضافة
    const applyDynamicFloorRules = () => {
        const type = propertyTypeSelect.value;
        const subtype = residentialSubtypeSelect.value;

        const fRooms = document.getElementById('field-rooms');
        const fBaths = document.getElementById('field-bathrooms');
        const fDynamicResFields = document.getElementById('dynamicResidentialFields');
        const fFloorGroup = document.getElementById('field-floor-select-group');
        const fBuildingFloorsGroup = document.getElementById('field-building-floors-group');
        const fGrid = document.getElementById('featuresGrid');

        // إرجاع الوضع الافتراضي النظيف للحقول
        fRooms.classList.remove('hidden'); 
        fBaths.classList.remove('hidden'); 
        fDynamicResFields.classList.add('hidden');
        if (fGrid) fGrid.querySelectorAll('.checkbox-item').forEach(i => i.classList.remove('hidden'));

        // إخفاء الحقول غير الملائمة عند اختيار "أرض"
        if (type === 'أرض') {
            fRooms.classList.add('hidden'); 
            fBaths.classList.add('hidden'); 
            fDynamicResFields.classList.add('hidden');
            document.getElementById('residentialSubtypeRow').classList.add('hidden');
            if (fGrid) fGrid.querySelectorAll('.checkbox-item').forEach(i => i.classList.add('hidden'));
            return;
        } 
        // إخفاء الحقول غير الملائمة عند اختيار "مكتب" أو "محل"
        else if (type === 'محل' || type === 'مكتب') {
            fRooms.classList.add('hidden');
            fDynamicResFields.classList.add('hidden');
            document.getElementById('residentialSubtypeRow').classList.add('hidden');
            return;
        }

        // معالجة الوحدات السكنية حسب نوع هيكلها المحدد
        if (type === 'شقة') {
            document.getElementById('residentialSubtypeRow').classList.remove('hidden');
            fDynamicResFields.classList.remove('hidden');

            if (subtype === 'apartment_in_building') {
                fFloorGroup.classList.remove('hidden');
                document.getElementById('floorSelectLabel').textContent = "الدور / الطابق المخصص *";
                fBuildingFloorsGroup.classList.remove('hidden');
                document.getElementById('buildingFloorsLabel').textContent = "إجمالي أدوار العمارة *";
            } else if (subtype === 'independent_house') {
                fFloorGroup.classList.add('hidden');
                fBuildingFloorsGroup.classList.remove('hidden');
                document.getElementById('buildingFloorsLabel').textContent = "عدد أدوار المبنى *";
            }
        } 
        else if (type === 'دوبلكس') {
            document.getElementById('residentialSubtypeRow').classList.remove('hidden');
            fDynamicResFields.classList.remove('hidden');

            if (subtype === 'duplex_in_building') {
                fFloorGroup.classList.remove('hidden');
                document.getElementById('floorSelectLabel').textContent = "الدور الذي يبدأ منه *";
                fBuildingFloorsGroup.classList.remove('hidden');
                document.getElementById('buildingFloorsLabel').textContent = "إجمالي أدوار العمارة *";
            } else if (subtype === 'independent_duplex') {
                fFloorGroup.classList.add('hidden');
                fBuildingFloorsGroup.classList.remove('hidden');
                document.getElementById('buildingFloorsLabel').textContent = "عدد أدوار المبنى *";
            }
        } 
        else if (type === 'فيلا') {
            document.getElementById('residentialSubtypeRow').classList.add('hidden');
            fDynamicResFields.classList.remove('hidden');
            
            fFloorGroup.classList.add('hidden');
            fBuildingFloorsGroup.classList.remove('hidden');
            document.getElementById('buildingFloorsLabel').textContent = "عدد أدوار الفيلا *";
        }
    };

    const handlePropertyTypeChange = () => {
        const val = propertyTypeSelect.value;
        
        if (val === 'شقة') {
            residentialSubtypeSelect.innerHTML = `
              <option value="apartment_in_building">شقة داخل عمارة 🏢</option>
              <option value="independent_house">منزل مستقل 🏠</option>
            `;
            residentialSubtypeSelect.value = "apartment_in_building";
        } else if (val === 'دوبلكس') {
            residentialSubtypeSelect.innerHTML = `
              <option value="duplex_in_building">دوبلكس داخل عمارة 🏢</option>
              <option value="independent_duplex">دوبلكس مستقل 🏠</option>
            `;
            residentialSubtypeSelect.value = "duplex_in_building";
        }

        applyDynamicFloorRules();
    };

    propertyTypeSelect.addEventListener('change', handlePropertyTypeChange);
    residentialSubtypeSelect.addEventListener('change', applyDynamicFloorRules);

    // جلب البيانات من Firestore وتعبئة الحقول
    async function loadPropertyData() {
        try {
            const docRef = doc(db, "properties", propertyId);
            const docSnap = await getDoc(docRef);

            if (!docSnap.exists()) {
                alert("العقار المطلوب غير موجود أو تم حذفه.");
                window.location.href = "my-properties.html";
                return;
            }

            const data = docSnap.data();
            originalPropertyData = data; // الاحتفاظ بنسخة كاملة من البيانات القديمة للمقارنة لاحقاً بطلب التعديل

            // التحقق من أن المستخدم الحالي هو صاحب العقار
            if (data.ownerId !== auth.currentUser.uid) {
                alert("عذراً، لا تملك الصلاحية لتعديل هذا العقار.");
                window.location.href = "my-properties.html";
                return;
            }

            // ملء الحقول الأساسية
            document.getElementById('title').value = data.title || "";
            document.getElementById('purpose').value = data.purpose || "sale";
            
            // تهيئة حقول نوع وهيكل العقار تفاعلياً
            propertyTypeSelect.value = data.propertyType || "شقة";
            handlePropertyTypeChange();

            if (data.residentialSubtype) {
                residentialSubtypeSelect.value = data.residentialSubtype;
                applyDynamicFloorRules();
            }

            document.getElementById('governorate').value = data.governorate || "";
            document.getElementById('city').value = data.city || "";
            document.getElementById('district').value = data.district || "";
            document.getElementById('price').value = data.price || "";
            document.getElementById('area').value = data.area || "";
            document.getElementById('description').value = data.description || "";

            // تعبئة حقول الموقع الجغرافي إن وجدت
            document.getElementById('googleMapsLink').value = data.googleMapsLink || "";
            document.getElementById('latitude').value = data.latitude || "";
            document.getElementById('longitude').value = data.longitude || "";

            // الحقول الديناميكية للأعداد والأدوار الموحدة
            document.getElementById('rooms').value = data.rooms ?? 3;
            document.getElementById('bathrooms').value = data.bathrooms ?? 1;
            
            if (data.floor && data.floor !== "مستقل") {
                document.getElementById('floorSelect').value = data.floor;
            }
            if (data.buildingFloors) {
                document.getElementById('buildingFloors').value = data.buildingFloors;
            }

            // حقول التفاصيل الإضافية والاختيارية
            if (data.finishing || data.electricityCard || data.waterCard || data.features) {
                document.getElementById('optionalSection').classList.remove('hidden');
                document.getElementById('finishing').value = data.finishing || "";
                document.getElementById('electricityCard').value = data.electricityCard || "";
                document.getElementById('waterCard').value = data.waterCard || "";
                
                if (data.features) {
                    document.getElementById('feat-elevator').checked = !!data.features.elevator;
                    document.getElementById('feat-garage').checked = !!data.features.garage;
                    document.getElementById('feat-security').checked = !!data.features.security;
                    document.getElementById('feat-balcony').checked = !!data.features.balcony;
                    document.getElementById('feat-airConditioner').checked = !!data.features.airConditioner;
                    document.getElementById('feat-furnished').checked = !!data.features.furnished;
                    document.getElementById('feat-naturalGas').checked = !!data.features.naturalGas;
                }
            }

            // جلب ميديا الصور والفيديوهات القديمة
            if (data.images && Array.isArray(data.images)) {
                uploadedImages = [...data.images];
                renderImagesPreview();
            }
            if (data.video) {
                existingVideoUrl = data.video;
                renderVideoPreview();
            }

            // إخفاء شاشة التحميل
            document.getElementById('loadingOverlay').style.display = 'none';

        } catch (error) {
            console.error("Error loading property details:", error);
            alert("حدث خطأ أثناء جلب بيانات العقار: " + error.message);
        }
    }

    // إدارة التنقل بين الخطوات الثلاثة والتحقق من المدخلات
    const updateStepUI = () => {
        document.querySelectorAll('.form-step-panel').forEach(panel => panel.classList.remove('active'));
        document.querySelectorAll('.step-tab').forEach(tab => tab.classList.remove('active'));
        
        document.getElementById(`step-panel-${currentStep}`).classList.add('active');
        for(let i=1; i<=currentStep; i++) {
            document.getElementById(`tab-${i}`).classList.add('active');
        }

        document.getElementById('btnPrevStep').classList.toggle('hidden', currentStep === 1);
        
        if (currentStep === 3) {
            document.getElementById('btnNextStep').style.display = 'none';
            document.getElementById('btnSubmitFinal').style.display = 'block';
            compileReviewData();
        } else {
            document.getElementById('btnNextStep').style.display = 'block';
            document.getElementById('btnSubmitFinal').style.display = 'none';
        }
    };

    document.getElementById('btnNextStep').addEventListener('click', () => {
        if (currentStep === 1) {
            const requiredInputs = document.getElementById('step-panel-1').querySelectorAll('[required]');
            let valid = true;
            requiredInputs.forEach(input => { if(!input.value.trim()) valid = false; });
            if (!valid) { alert('برجاء ملء جميع الحقول الإجبارية المحددة بعلامة (*) أولاً.'); return; }
            currentStep = 2;
        } else if (currentStep === 2) {
            if (uploadedImages.length < 5) { alert(`خطأ: لقد قمت باختيار ${uploadedImages.length} صور. الحد الأدنى لإرسال العقار هو 5 صور.`); return; }
            currentStep = 3;
        }
        updateStepUI();
    });

    document.getElementById('btnPrevStep').addEventListener('click', () => {
        if (currentStep > 1) { currentStep--; updateStepUI(); }
    });

    document.getElementById('btnMoreDetails').addEventListener('click', () => {
        const sect = document.getElementById('optionalSection');
        sect.classList.toggle('hidden');
    });

    // إدارة وضغط ومعاينة الصور والوسائط
    document.getElementById('imageFiles').addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        if (uploadedImages.length + files.length > 15) { alert('الحد الأقصى المسموح به هو 15 صورة فقط للعقار الواحد.'); return; }
        
        for (let file of files) {
            if (!file.type.startsWith('image/')) { alert(`الملف ${file.name} غير مدعوم، يرجى رفع صور فقط.`); continue; }
            const compressed = await compressImage(file);
            uploadedImages.push(compressed);
        }
        renderImagesPreview();
    });

    const compressImage = (file) => {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const maxW = 1200;
                    let width = img.width; let height = img.height;
                    if (width > maxW) { height *= maxW / width; width = maxW; }
                    canvas.width = width; canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob((blob) => {
                        resolve(new File([blob], file.name, { type: 'image/jpeg' }));
                    }, 'image/jpeg', 0.8);
                };
            };
        });
    };

    const renderImagesPreview = () => {
        const grid = document.getElementById('imagesPreviewGrid');
        grid.innerHTML = '';
        uploadedImages.forEach((item, index) => {
            const box = document.createElement('div');
            box.className = 'media-box';
            box.draggable = true;
            box.dataset.index = index;
            
            box.addEventListener('dragstart', (e) => e.dataTransfer.setData('text/plain', index));
            box.addEventListener('dragover', (e) => e.preventDefault());
            box.addEventListener('drop', (e) => {
                e.preventDefault();
                const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
                const toIdx = parseInt(box.dataset.index);
                const movedItem = uploadedImages.splice(fromIdx, 1)[0];
                uploadedImages.splice(toIdx, 0, movedItem);
                renderImagesPreview();
            });

            const img = document.createElement('img');
            if (typeof item === 'string') {
                img.src = item; 
            } else {
                img.src = URL.createObjectURL(item);
            }
            box.appendChild(img);

            if(index === 0) {
                const badge = document.createElement('div');
                badge.className = 'badge-cover';
                badge.innerText = 'صورة الغلاف';
                box.appendChild(badge);
            }

            const delBtn = document.createElement('button');
            delBtn.className = 'btn-del';
            delBtn.innerHTML = '<i class="fas fa-times"></i>';
            delBtn.onclick = (e) => {
                e.stopPropagation();
                uploadedImages.splice(index, 1);
                renderImagesPreview();
            };
            box.appendChild(delBtn);
            grid.appendChild(box);
        });
    };

    const renderVideoPreview = () => {
        const grid = document.getElementById('videoPreviewGrid');
        grid.innerHTML = '';
        if(!uploadedVideoFile && !existingVideoUrl) return;

        const box = document.createElement('div');
        box.className = 'media-box';
        box.style.width = '200px'; box.style.height = '120px';

        const vid = document.createElement('video');
        vid.src = uploadedVideoFile ? URL.createObjectURL(uploadedVideoFile) : existingVideoUrl;
        vid.controls = true;
        box.appendChild(vid);

        const delBtn = document.createElement('button');
        delBtn.className = 'btn-del';
        delBtn.innerHTML = '<i class="fas fa-times"></i>';
        delBtn.onclick = () => { 
            uploadedVideoFile = null; 
            existingVideoUrl = null;
            renderVideoPreview(); 
        };
        box.appendChild(delBtn);
        grid.appendChild(box);
    };

    const compileReviewData = () => {
        const typeSelect = document.getElementById('propertyType');
        document.getElementById('reviewMainText').innerText = `العنوان: ${document.getElementById('title').value} | النوع: ${typeSelect.value} (${document.getElementById('purpose').value === 'sale' ? 'بيع' : 'إيجار'}) \nالموقع: ${document.getElementById('governorate').value}، ${document.getElementById('city').value}، ${document.getElementById('district').value} \nالسعر المطلوب: ${document.getElementById('price').value} ج.م | المساحة: ${document.getElementById('area').value} متر مربع.`;
        document.getElementById('reviewMediaText').innerText = `إجمالي الصور النهائي: ${uploadedImages.length} صورة`;
    };

    // 5. التحديث المطور برفع طلب التعديل لـ property_edit_requests وإرسال الإشعار
    document.getElementById('btnSubmitFinal').addEventListener('click', async () => {
        const user = auth.currentUser;
        if(!user) { alert('يجب تسجيل الدخول أولاً لتعديل العقارات.'); return; }
        
        const finalBtn = document.getElementById('btnSubmitFinal');
        const progContainer = document.getElementById('uploadProgressContainer');
        const progBar = document.getElementById('uploadProgressBar');
        
        finalBtn.disabled = true;
        progContainer.style.display = 'block';
        progBar.style.width = '10%';

        try {
            const finalImageUrls = [];
            progBar.style.width = "20%";

            // إدارة رفع ميديا الصور
            for (let i = 0; i < uploadedImages.length; i++) {
                const item = uploadedImages[i];
                
                if (typeof item === 'string') {
                    finalImageUrls.push(item);
                } else {
                    const fd = new FormData();
                    fd.append("files", item);

                    const response = await fetch("/api/upload-media", {
                        method: "POST",
                        body: fd
                    });

                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error || (`فشل رفع الصورة رقم ${i + 1}`));

                    finalImageUrls.push(data.images[0]);
                }
                progBar.style.width = `${20 + ((i + 1) / uploadedImages.length) * 50}%`;
            }

            progBar.style.width = "80%";

            // تحديد بيانات الأدوار بناءً على اختيار الهيكل السكني الموحد
            const isFloorHidden = document.getElementById('field-floor-select-group').classList.contains('hidden');
            let finalFloorValue = isFloorHidden ? "مستقل" : document.getElementById('floorSelect').value;
            let finalBuildingFloorsCount = parseInt(document.getElementById('buildingFloors').value) || 0;

            // بناء كائن التحديث بالبيانات الجديدة المقترحة
            const propertyUpdatePayload = {
                title: document.getElementById('title').value,
                purpose: document.getElementById('purpose').value,
                propertyType: propertyTypeSelect.value,
                residentialSubtype: propertyTypeSelect.value === 'شقة' || propertyTypeSelect.value === 'دوبلكس' ? residentialSubtypeSelect.value : "none",
                governorate: document.getElementById('governorate').value,
                city: document.getElementById('city').value,
                district: document.getElementById('district').value,
                
                googleMapsLink: document.getElementById('googleMapsLink').value,
                latitude: document.getElementById('latitude').value,
                longitude: document.getElementById('longitude').value,

                price: parseFloat(document.getElementById('price').value),
                area: parseFloat(document.getElementById('area').value),
                description: document.getElementById('description').value,
                
                rooms: parseInt(document.getElementById('rooms').value) || 0,
                bathrooms: parseInt(document.getElementById('bathrooms').value) || 0,
                floor: finalFloorValue,
                buildingFloors: finalBuildingFloorsCount,

                finishing: document.getElementById('finishing').value || "",
                electricityCard: document.getElementById('electricityCard').value || "",
                waterCard: document.getElementById('waterCard').value || "",
                features: {
                    elevator: document.getElementById('feat-elevator').checked,
                    garage: document.getElementById('feat-garage').checked,
                    security: document.getElementById('feat-security').checked,
                    balcony: document.getElementById('feat-balcony').checked,
                    airConditioner: document.getElementById('feat-airConditioner').checked,
                    furnished: document.getElementById('feat-furnished').checked,
                    naturalGas: document.getElementById('feat-naturalGas').checked,
                },

                images: finalImageUrls, 
                coverImage: finalImageUrls[0] || null, 
                video: null, 
                
                status: "pending",
                updatedAt: serverTimestamp()
            };

            // الرفع والحفظ في الكولكشن الجديدة: property_edit_requests
            const editRequestsCollection = collection(db, "property_edit_requests");
            await addDoc(editRequestsCollection, {
                propertyId: propertyId,
                ownerId: user.uid,
                oldData: originalPropertyData,
                newData: propertyUpdatePayload,
                status: "pending",
                createdAt: serverTimestamp()
            });
            
            progBar.style.width = '90%';

            // 🔔 إرسال إشعار تليجرام للمسؤول بوجود طلب تعديل قيد الانتظار عبر رابط Vercel المباشر
            try {
                await fetch("https://am-property.vercel.app/api/send-telegram", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        type: "edit_property",
                        data: {
                            title: propertyUpdatePayload.title,
                            type: propertyUpdatePayload.propertyType,
                            price: propertyUpdatePayload.price,
                            owner: currentUserName,
                            propertyId: propertyId
                        }
                    })
                });
            } catch (notifError) {
                console.error("Failed to send Telegram notification:", notifError);
            }

            progBar.style.width = '100%';
            alert('تم إرسال طلب التعديل بنجاح، وسيقوم المسؤول بمراجعته واعتماده قريباً.');
            window.location.href = "my-properties.html";

        } catch (error) {
            console.error("Critical edit requests submission error:", error);
            alert(`حدث خطأ أثناء إرسال طلب التعديل: ${error.message}`);
            finalBtn.disabled = false;
            progContainer.style.display = 'none';
        }
    });
  </script>
