<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المحادثات الفورية - AM. Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* ============================================
       THEME VARIABLES & BASE STYLES
       ============================================ */
    :root {
      --neon-cyan: #00f2ff; 
      --neon-purple: #7000ff; 
      --bg-deep: #020617;
      --bg-tertiary: rgba(30, 41, 59, 0.7);
      --glass-bg: rgba(15, 23, 42, 0.75); 
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f1f5f9; 
      --muted: #94a3b8;
      --success: #22c55e; 
      --danger: #f87171; 
      --radius: 20px;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background-color: var(--bg-deep);
      color: var(--text-main);
      overflow: hidden;
      height: 100vh;
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(112, 0, 255, 0.12) 0%, transparent 35%),
        radial-gradient(circle at 100% 100%, rgba(0, 242, 255, 0.12) 0%, transparent 35%);
    }

    body::after {
      content: ""; position: fixed; inset: 0; z-index: -1;
      background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
      opacity: 0.15; pointer-events: none;
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--neon-cyan); }

    /* ============================================
       LAYOUT STRUCTURE
       ============================================ */
    .app-layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      height: 100vh;
      width: 100%;
      overflow: hidden;
    }

    /* ============================================
       SIDEBAR & THREADS LIST
       ============================================ */
    .sidebar {
      background: rgba(15, 23, 42, 0.85);
      border-left: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .back-dashboard-btn {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      padding: 8px 14px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: var(--transition);
    }

    .back-dashboard-btn:hover {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
      color: var(--neon-cyan);
    }

    .threads-container {
      flex: 1;
      overflow-y: auto;
    }

    .thread-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px;
      border-bottom: 1px solid var(--glass-border);
      cursor: pointer;
      transition: var(--transition);
    }

    .thread-item:hover, .thread-item.active {
      background: rgba(0, 242, 255, 0.04);
      border-left: 3px solid var(--neon-cyan);
    }

    .thread-avatar {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      object-fit: cover;
      border: 1px solid var(--glass-border);
    }

    .thread-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .thread-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .thread-title {
      font-weight: 900;
      color: #fff;
      font-size: 0.9rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .thread-time {
      font-size: 0.7rem;
      color: var(--muted);
    }

    .thread-preview {
      font-size: 0.8rem;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .unread-badge {
      background: var(--neon-cyan);
      color: #020617;
      font-size: 0.7rem;
      font-weight: 900;
      padding: 2px 7px;
      border-radius: 10px;
      min-width: 18px;
      text-align: center;
    }

    /* ============================================
       CHAT VIEWPORT & PREMIUM BACKGROUND
       ============================================ */
    .chat-viewport {
      display: flex;
      flex-direction: column;
      background: rgba(2, 6, 23, 0.4);
      height: 100%;
      overflow: hidden;
      position: relative;
    }

    .chat-header {
      padding: 15px 25px;
      background: rgba(15, 23, 42, 0.8);
      border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-info {
      display: flex;
      align-items: center;
      gap: 15px;
      min-width: 0;
    }

    .header-avatar {
      width: 45px;
      height: 45px;
      border-radius: 10px;
      object-fit: cover;
      border: 1px solid var(--glass-border);
    }

    .header-details {
      min-width: 0;
    }

    .header-title {
      font-weight: 900;
      color: #fff;
      font-size: 1rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .header-presence {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .chat-messages-container {
      flex: 1;
      padding: 25px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      background: linear-gradient(rgba(2, 6, 23, 0.83), rgba(2, 6, 23, 0.88)), url('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?q=80&w=1200&auto=format&fit=crop') no-repeat center center;
      background-size: cover;
      background-attachment: local;
    }

    /* ============================================
       BUBBLES DESIGN
       ============================================ */
    .msg-bubble {
      max-width: 65%;
      padding: 12px 18px;
      border-radius: 16px;
      font-size: 0.95rem;
      line-height: 1.6;
      font-weight: 600;
      margin-bottom: 15px;
      position: relative;
      cursor: pointer;
      animation: bubbleIn 0.3s ease;
    }

    @keyframes bubbleIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-bubble.sent {
      background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan));
      color: #fff;
      align-self: flex-start;
      border-top-right-radius: 2px;
      margin-right: auto;
    }

    .msg-bubble.received {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--text-main);
      align-self: flex-end;
      border-top-left-radius: 2px;
      margin-left: auto;
    }

    .msg-meta-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 6px;
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .quoted-msg-box {
      background: rgba(0, 0, 0, 0.25);
      border-right: 3px solid var(--neon-cyan);
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 8px;
      direction: rtl;
      text-align: right;
    }
    .quoted-sender {
      font-weight: 900;
      color: var(--neon-cyan);
      font-size: 0.72rem;
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* ============================================
       CHAT FOOTER & INPUTS
       ============================================ */
    .chat-footer {
      padding: 18px 25px;
      background: rgba(15, 23, 42, 0.9);
      border-top: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-input-wrapper {
      flex: 1;
      position: relative;
    }

    .chat-text-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid var(--glass-border);
      color: #fff;
      padding: 14px 20px;
      border-radius: 12px;
      font-family: 'Cairo', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: var(--transition);
    }

    .chat-text-input:focus {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 15px rgba(0, 242, 255, 0.15);
    }

    .action-btn {
      background: none;
      border: none;
      color: var(--neon-cyan);
      font-size: 1.25rem;
      cursor: pointer;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .action-btn:hover {
      transform: scale(1.1);
      text-shadow: 0 0 10px rgba(0, 242, 255, 0.4);
    }

    .send-btn {
      background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan));
      border: none;
      color: #fff;
      padding: 12px 22px;
      border-radius: 12px;
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: var(--transition);
    }

    .send-btn:hover {
      box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
    }

    /* ============================================
       UTILITIES & DELETED BANNER
       ============================================ */
    .deleted-banner {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid var(--danger);
      border-radius: 14px;
      padding: 22px;
      margin-bottom: 22px;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 700;
      border-radius: 8px;
      margin: 15px 25px 0 25px;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 15px;
      color: var(--muted);
      text-align: center;
    }

    .empty-state i {
      font-size: 4rem;
      color: var(--glass-border);
      text-shadow: 0 0 30px rgba(0, 242, 255, 0.05);
    }

    .overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      z-index: 9000;
      display: none;
      opacity: 0;
      transition: var(--transition);
    }
    .overlay.active { display: block; opacity: 1; }

    /* خيارات مخصصة للمودال */
    .custom-modal {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      background: var(--bg-deep);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 2.2rem;
      width: 90%;
      max-width: 420px;
      z-index: 10000;
      display: none;
      opacity: 0;
      transition: var(--transition);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
    }
    .custom-modal.active {
      display: block;
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    .modal-title { font-size: 1.4rem; font-weight: 900; margin-bottom: 1rem; text-align: center; color: #fff; }
    .modal-options-list { display: flex; flex-direction: column; gap: 1.25rem; margin-top: 1.5rem; }
    .modal-opt-btn {
      display: flex; align-items: center; gap: 1rem;
      width: 100%; padding: 1.1rem; background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--glass-border); border-radius: 12px;
      color: #fff; font-family: 'Cairo', sans-serif;
      font-weight: 700; cursor: pointer; text-align: right;
    }
    .modal-opt-btn:hover { border-color: var(--neon-cyan); background: rgba(0,242,255,0.05); }
    .modal-opt-btn i { font-size: 1.35rem; }
    .modal-close-btn {
      margin-top: 1.75rem; width: 100%; background: transparent;
      border: none; color: var(--muted); cursor: pointer;
      font-family: 'Cairo', sans-serif; font-size: 0.95rem; text-align: center;
      font-weight: 700;
    }
    .modal-close-btn:hover { color: var(--danger); }

    /* ============================================
       RESPONSIVE MOBILE LOGIC
       ============================================ */
    .mobile-back-btn {
      display: none;
    }

    @media (max-width: 768px) {
      .app-layout {
        grid-template-columns: 1fr;
      }
      .sidebar {
        display: flex;
      }
      .chat-viewport {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 100;
      }
      .app-layout.show-active-chat .sidebar {
        display: none;
      }
      .app-layout.show-active-chat .chat-viewport {
        display: flex;
      }
      .mobile-back-btn {
        display: block;
      }
    }
  </style>
</head>
<body>

  <div class="overlay" id="overlay"></div>

  <div id="image-viewer-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); backdrop-filter:blur(15px); z-index:20000; align-items:center; justify-content:center; flex-direction:column; direction:rtl; select-none;">
    <div style="position:absolute; top:20px; left:20px; right:20px; display:flex; justify-content:space-between; align-items:center; z-index:20001; direction:rtl;">
      <div style="display:flex; gap:10px;">
        <button id="viewer-zoom-in" style="background:rgba(255,255,255,0.08); border:1px solid var(--glass-border); color:#fff; width:40px; height:40px; border-radius:50%; cursor:pointer; font-size:1.1rem; display:flex; align-items:center; justify-content:center; transition:0.2s;"><i class="fas fa-search-plus"></i></button>
        <button id="viewer-zoom-out" style="background:rgba(255,255,255,0.08); border:1px solid var(--glass-border); color:#fff; width:40px; height:40px; border-radius:50%; cursor:pointer; font-size:1.1rem; display:flex; align-items:center; justify-content:center; transition:0.2s;"><i class="fas fa-search-minus"></i></button>

        <button class="modal-btn" style="background:var(--neon-cyan); color:#000; font-family:'Cairo'; font-weight:bold; width:100%; padding:12px; border:none; border-radius:10px; cursor:pointer;" id="editBtn">✏️ تعديل الهمسة</button>

        <button class="modal-btn" style="background:transparent; border:none; color:var(--muted); font-family:'Cairo'; font-weight:bold; width:100%; padding:8px; cursor:pointer;" onclick="document.getElementById('actionModal').style.display='none'">إلغاء</button>
    </div>
  </div>

  <div id="property-info-modal" class="custom-modal" style="display:none; z-index:15000; max-width:600px; max-height:85vh; overflow-y:auto;">
    <h3 class="modal-title" style="font-size:1.15rem; color:var(--neon-cyan);"><i class="fas fa-building"></i> مواصفات وبيانات العقار المعني</h3>
    <div id="prop-modal-loader" style="text-align:center; padding:2rem; color:var(--neon-cyan);"><i class="fas fa-spinner fa-spin"></i> جاري جلب مواصفات العقار...</div>

       <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px; font-size:0.85rem;">

         <div style="background:rgba(255,255,255,0.02); padding:10px; border-radius:8px; border:1px solid var(--glass-border);"><b>السعر:</b> <span id="pm-price" style="color:var(--neon-cyan); font-weight:bold;"></span></div>

         <div style="background:rgba(255,255,255,0.02); padding:10px; border-radius:8px; border:1px solid var(--glass-border);"><b>نوع العملية:</b> <span id="pm-purpose"></span></div>

    const viewerContainer = document.getElementById('viewer-image-container');

    const updateImageTransform = () => {
      viewerImg.style.transform = `scale(${zoomScale}) translate(${translateX}px, ${translateY}px)`;
    };

    const resetViewerState = () => {
      zoomScale = 1;
      translateX = 0;
      translateY = 0;
      updateImageTransform();
      if (viewerContainer) viewerContainer.style.cursor = 'grab';
    };

    const StorageService = {
      async compressImage(file, maxWidth, maxHeight, quality) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
              const canvas = document.createElement('canvas');
              let width = img.width;
              let height = img.height;

              if (width > height) {
                if (width > maxWidth) {
                  height = Math.round((height * maxWidth) / width);
                  width = maxWidth;
                }
              } else {
                if (height > maxHeight) {
                  width = Math.round((width * maxHeight) / height);
                  height = maxHeight;
                }
              }

              canvas.width = width;
              canvas.height = height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);

              canvas.toBlob((blob) => {
                if (blob) {
                  resolve(new File([blob], file.name.replace(/\.[^/.]+$/, "") + ".jpg", {
                    type: 'image/jpeg',
                    lastModified: Date.now()
                  }));
                } else {
                  reject(new Error("فشل ضغط الصورة محلياً"));
                }
              }, 'image/jpeg', quality);
            };
            img.onerror = reject;
          };
          reader.onerror = reject;
        });
      },

      async uploadToVercelBlob(file) {
        const formData = new FormData();
        formData.append('file', file);

        try {
          const response = await fetch('/api/upload', {
            method: 'POST',
            body: formData
          });

          if (!response.ok) {
            throw new Error("فشل الرفع من خادم الويب");
          }

          const result = await response.json();
          return result.url;
        } catch (e) {
          console.warn("Vercel Blob fallback base64 used:", e);
          return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.readAsDataURL(file);
          });
        }
      }
    };

    class StandaloneChatApp {
      constructor() {
        this.initAuth();
        this.initGlobalEvents();

      initGlobalEvents() {
        document.getElementById('close-viewer').addEventListener('click', () => {
          document.getElementById('image-viewer-modal').style.display = 'none';
          resetViewerState();
        });

        document.getElementById('viewer-zoom-in').addEventListener('click', () => {
          zoomScale = Math.min(zoomScale + 0.25, 4);
          updateImageTransform();
        });

        document.getElementById('viewer-zoom-out').addEventListener('click', () => {
          zoomScale = Math.max(zoomScale - 0.25, 0.5);
          updateImageTransform();
        });

        document.getElementById('viewer-reset').addEventListener('click', resetViewerState);

        viewerContainer.addEventListener('mousedown', (e) => {
          e.preventDefault();
          isDragging = true;
          viewerContainer.style.cursor = 'grabbing';
          startX = e.clientX - translateX * zoomScale;
          startY = e.clientY - translateY * zoomScale;
        });

        window.addEventListener('mousemove', (e) => {
          if (!isDragging) return;
          translateX = (e.clientX - startX) / zoomScale;
          translateY = (e.clientY - startY) / zoomScale;
          updateImageTransform();
        });

        window.addEventListener('mouseup', () => {
          isDragging = false;
          viewerContainer.style.cursor = 'grab';
        });

        viewerContainer.addEventListener('touchstart', (e) => {
          if (e.touches.length === 1) {
            isDragging = true;
            startX = e.touches[0].clientX - translateX * zoomScale;
            startY = e.touches[0].clientY - translateY * zoomScale;
          }
        });

        viewerContainer.addEventListener('touchmove', (e) => {
          if (!isDragging || e.touches.length !== 1) return;
          translateX = (e.touches[0].clientX - startX) / zoomScale;
          translateY = (e.touches[0].clientY - startY) / zoomScale;
          updateImageTransform();
        });

        viewerContainer.addEventListener('touchend', () => {
          isDragging = false;
        });

        document.getElementById('actionModal').addEventListener('click', () => {
          document.getElementById('actionModal').style.display = 'none';
        });

        document.getElementById('close-prop-modal').addEventListener('click', () => {
          document.getElementById('property-info-modal').classList.remove('active');
          document.getElementById('property-info-modal').style.display = 'none';
          document.getElementById('overlay').classList.remove('active');
        });
      }

      initPresence(userId) {
        const userStatusRef = ref(rtdb, `status/${userId}`);
        const connectedRef = ref(rtdb, '.info/connected');

        onValue(connectedRef, (snap) => {
          if (snap.val() === true) {
            set(userStatusRef, {
              state: 'online',
              lastChanged: Date.now()
            });

            onDisconnect(userStatusRef).set({
              state: 'offline',
              lastSeen: Date.now(),
              lastChanged: Date.now()
            });
          }
        });
      }

                  return getToken(messaging, {

      loadThreads(currentUserId) {
        const threadsContainer = document.getElementById('threads-list-renderer');
        if (!threadsContainer) return;

        const roomsRef = ref(rtdb, 'chatRooms');

        onValue(roomsRef, (snapshot) => {
          let rooms = [];
          snapshot.forEach((childSnap) => {
            const room = childSnap.val();
            if (room.participants && room.participants[currentUserId]) {
              rooms.push(room);
            }
          });

          rooms.sort((a, b) => (b.lastMessageTime || 0) - (a.lastMessageTime || 0));

          if (rooms.length === 0) {
            threadsContainer.innerHTML = `<p style="color:var(--muted); text-align:center; padding:3rem; font-size:0.85rem;">لا توجد محادثات سابقة حتى الآن.</p>`;
            return;
          }

          threadsContainer.innerHTML = '';

          rooms.forEach((room) => {
            const targetUserId = room.buyerId === currentUserId ? room.ownerId : room.buyerId;
            const unreadCountRef = ref(rtdb, `unreadCounts/${room.roomId}/${currentUserId}`);
            
            onValue(unreadCountRef, (unreadSnap) => {
              const unreadCount = unreadSnap.val() || 0;
              const badgeHtml = unreadCount > 0 ? `<span class="unread-badge">${unreadCount}</span>` : '';
              
              const isAvailable = room.propertyStatus === 'available';
              const statusBadge = isAvailable 
                ? `<span style="color:var(--success); font-size:0.75rem; font-weight:bold;">● متاح</span>` 
                : `<span style="color:var(--danger); font-size:0.75rem; font-weight:bold;">● غير متاح</span>`;

              const timeString = room.lastMessageTime ? new Date(room.lastMessageTime).toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'}) : '';
              const isActive = ChatState.activeRoomId === room.roomId ? 'active' : '';

              const threadItem = document.createElement('div');
              threadItem.className = `thread-item ${isActive}`;
              threadItem.id = `thread-element-${room.roomId}`;
              
              threadItem.innerHTML = `
                <img src="${room.propertyImage}" class="thread-avatar">
                <div class="thread-info">
                  <div class="thread-meta">
                    <span class="thread-title">${room.propertyTitle}</span>
                    <span class="thread-time">${timeString}</span>
                  </div>
                  <div style="display:flex; justify-content:space-between; align-items:center; margin-top:2px;">
                    <span class="thread-preview">${room.lastMessage}</span>
                    <div style="display:flex; align-items:center; gap:8px;">
                      ${statusBadge}
                      ${badgeHtml}
                    </div>
                  </div>
                </div>
              `;

              threadItem.addEventListener('click', () => {
                document.querySelectorAll('.thread-item').forEach(el => el.classList.remove('active'));
                threadItem.classList.add('active');
                
                document.getElementById('app-layout-wrapper').classList.add('show-active-chat');
                this.openChat(room.roomId, currentUserId, targetUserId);
              });

              if (existingNode) {
                existingNode.replaceWith(threadItem);
              } else {
                threadsContainer.appendChild(threadItem);
              }
            });
          });
        });

            if (isMe) {
              if (msg.status === 'seen') {
                statusTicks = `<i class="fas fa-check-double" style="color:var(--neon-cyan); font-size:0.75rem; margin-right:4px;"></i>`;
              } else if (msg.status === 'delivered') {
                statusTicks = `<i class="fas fa-check-double" style="color:var(--muted); font-size:0.75rem; margin-right:4px;"></i>`;
              } else {
                statusTicks = `<i class="fas fa-check" style="color:var(--muted); font-size:0.75rem; margin-right:4px;"></i>`;
              }
            }

            const isReply = msg.text && msg.text.startsWith('رد على @');
            let replyQuoteHtml = '';
            let displayTargetText = msg.text;

            if (isReply) {
              const parts = msg.text.split(': ');
              const targetName = parts[0].replace('رد على @', '');
              displayTargetText = parts.slice(1).join(': ');
              replyQuoteHtml = `
                <div class="quoted-msg-box" style="background: rgba(0, 0, 0, 0.2); border-right: 3px solid var(--neon-cyan); padding: 8px 12px; border-radius: 6px; margin-bottom: 8px; text-align: right; direction: rtl;">
                  <div style="font-size: 0.72rem; font-weight: 900; color: var(--neon-cyan); margin-bottom: 2px; display: flex; align-items: center; gap: 5px;">
                    <i class="fas fa-reply" style="font-size:0.65rem;"></i> رد على @${targetName}
                  </div>
                </div>
              `;
            }

            if (msg.type === 'image') {
              const chatPreviewSrc = msg.preview || msg.image || "https://images.unsplash.com/photo-1545324418-cc1a9917ecff?w=500&fit=crop";
              const targetOriginalSrc = msg.original || msg.image || chatPreviewSrc;

              bubble.innerHTML = `
                <div class="sender" style="font-size: 10px; font-weight: 900; color: var(--neon-cyan); margin-bottom: 6px; text-align: right;">
                  <span>${isMe ? 'أنت' : targetUserName}</span>
                </div>
                <div style="position:relative; border-radius:8px; overflow:hidden; margin-bottom:4px;">
                  <img src="${chatPreviewSrc}" class="chat-image-previewable" style="max-width:100%; max-height:220px; display:block; object-fit:cover; border-radius:8px;" loading="lazy">
                </div>
                ${(msg.caption && !msg.caption.startsWith('jpg.') && !msg.caption.startsWith('png.') && !msg.caption.toLowerCase().includes('screenshot')) ? `<div class="text" style="font-size:0.85rem; color:#fff; margin-bottom:4px; font-weight:600;">${msg.caption}</div>` : ''}
                <div class="msg-meta-row" style="display:flex; justify-content:flex-end; align-items:center; font-size:0.65rem; color:var(--muted); gap:4px; margin-top:4px;">
                  <span>${msgTime}</span>
                  ${statusTicks}
                </div>
              `;
              
              bubble.querySelector('.chat-image-previewable').addEventListener('click', (e) => {
                e.stopPropagation();
                resetViewerState();
                viewerImg.src = targetOriginalSrc;
                document.getElementById('viewer-caption').textContent = (msg.caption && !msg.caption.startsWith('jpg.') && !msg.caption.startsWith('png.') && !msg.caption.toLowerCase().includes('screenshot')) ? msg.caption : '';
                document.getElementById('image-viewer-modal').style.display = 'flex';
              });
            } else {
              bubble.innerHTML = `
                <div class="sender" style="font-size: 10px; font-weight: 900; color: var(--neon-cyan); margin-bottom: 6px; text-align: right;">
                  <span>${isMe ? 'أنت' : targetUserName}</span>
                </div>
                ${replyQuoteHtml}
                <div class="text">${displayTargetText}</div>
                <div class="msg-meta-row" style="display:flex; justify-content:flex-end; align-items:center; font-size:0.65rem; color:var(--muted); gap:4px; margin-top:4px;">
                  <span>${msgTime}</span>
                  ${statusTicks}
                </div>
              `;
            }

            bubble.onclick = () => {
                if (isMe) {
                    this.showMsgActions(msgId, msg);
                } else {
                    ChatState.replyingToMsg = {
                        id: msgId,
                        text: msg.type === 'image' ? "📷 صورة" : displayTargetText,
                        senderName: targetUserName
                    };
                    document.getElementById('replyTargetName').innerText = `رد على ${targetUserName}`;
                    document.getElementById('replyTargetText').innerText = ChatState.replyingToMsg.text;
                    document.getElementById('replyContainer').style.display = 'flex';
                }
            };

            messagesStream.appendChild(bubble);
          });

          if (Object.keys(updates).length > 0) {
            update(ref(rtdb), updates);
          }

          messagesStream.scrollTop = messagesStream.scrollHeight;
        });

        const textInput = document.getElementById('message-text-field');
        const sendBtn = document.getElementById('send-msg-btn');
        const attachBtn = document.getElementById('attach-image-btn');
        const fileInput = document.getElementById('hidden-file-input');

        textInput.addEventListener('input', () => {
          set(ref(rtdb, `typing/${roomId}/${currentUserId}`), true);
          clearTimeout(this.typingTimeout);
          this.typingTimeout = setTimeout(() => {
            set(ref(rtdb, `typing/${roomId}/${currentUserId}`), null);
          }, 1500);
        });

        const handleSend = async () => {
          if (ChatState.stagedFile) {
            const file = ChatState.stagedFile;
            const captionText = textInput.value.trim();

            this.cancelImageStaging(); 

            const streamContainer = document.getElementById('chat-messages-stream-node');
            const loadingBubble = document.createElement('div');
            loadingBubble.style.cssText = "align-self: center; background: rgba(0, 242, 255, 0.08); border: 1px solid var(--neon-cyan); color: #fff; padding: 10px 18px; border-radius: 12px; font-size: 0.85rem; text-align: center; margin: 10px auto; width: max-content; font-weight: 700;";
            loadingBubble.innerHTML = `<span><i class="fas fa-spinner fa-spin"></i> جاري معالجة ورفع الصورة للـ CDN...</span>`;
            streamContainer.appendChild(loadingBubble);
            streamContainer.scrollTop = streamContainer.scrollHeight;

            try {
              const compressedPreview = await StorageService.compressImage(file, 400, 400, 0.65);
              const compressedOriginal = await StorageService.compressImage(file, 1920, 1920, 0.91);

              const previewUrl = await StorageService.uploadToVercelBlob(compressedPreview);
              const originalUrl = await StorageService.uploadToVercelBlob(compressedOriginal);

              await this.sendMessageImage(roomId, currentUserId, targetUserId, previewUrl, originalUrl, captionText);
            } catch(err) {
              console.error("Staged image upload error:", err);
              alert("⚠️ فشل رفع الصورة للسيرفر.");
            } finally {
              loadingBubble.remove();
            }
            return;
          }

          this.sendMessageText(roomId, currentUserId, targetUserId, textInput.value);
          textInput.value = '';
        };

        textInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') handleSend();
        });

        sendBtn.addEventListener('click', handleSend);

        attachBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', async (e) => {
          const file = e.target.files[0];
          if (!file) return;

          ChatState.stagedFile = file;
          const localPreviewUrl = URL.createObjectURL(file);
          
          document.getElementById('staged-thumb').src = localPreviewUrl;
          document.getElementById('imageStagingContainer').style.display = 'flex';

          textInput.placeholder = "اكتب شرحاً أو وصفاً لهذه الصورة قبل الإرسال (اختياري)...";
          textInput.focus();
        });
      }

      showMsgActions(msgId, msg) {
        const modal = document.getElementById('actionModal');
        modal.style.display = 'flex';
        
        document.getElementById('deleteBtn').onclick = async () => {
          try {
            const roomId = ChatState.activeRoomId;
            await update(ref(rtdb, `messages/${roomId}/${msgId}`), {
              deleted: true,
              preview: null,
              original: null
            });
            
            if (ChatState.activeRoomData && (ChatState.activeRoomData.lastMessage === msg.text || ChatState.activeRoomData.lastMessage === "📷 صورة" || ChatState.activeRoomData.lastMessage.startsWith('رد على @'))) {
              await update(ref(rtdb, `chatRooms/${roomId}`), {
                lastMessage: '🚫 تم حذف الرسالة',
                lastMessageTime: Date.now()
              });
            }
          } catch (e) {
            console.error("Error deleting message: ", e);
          }
          modal.style.display = 'none';
        };
        
        const editBtn = document.getElementById('editBtn');
        if (msg.type === 'text') {
          editBtn.style.display = 'block';
          editBtn.onclick = () => {
            let currentText = msg.text;
            if (msg.text.startsWith('رد على @')) {
              const parts = msg.text.split(': ');
              currentText = parts.slice(1).join(': ');
            }
            
            const input = document.getElementById('message-text-field');
            input.value = currentText;
            ChatState.editingMessageId = msgId;
            modal.style.display = 'none';
            input.focus();
            
            document.getElementById('replyTargetName').innerText = `تعديل الرسالة`;
            document.getElementById('replyTargetText').innerText = currentText;
            document.getElementById('replyContainer').style.display = 'flex';
          };
        } else {
          editBtn.style.display = 'none';
        }
      }

      cancelReply() {
        ChatState.replyingToMsg = null;
        ChatState.editingMessageId = null;
        const replyContainer = document.getElementById('replyContainer');
        if (replyContainer) replyContainer.style.display = 'none';
        const textInput = document.getElementById('message-text-field');
        if (textInput) {
          textInput.placeholder = "اهمس أو اعترف بـ #...";
          textInput.value = '';
        }
      }

      cancelImageStaging() {
        ChatState.stagedFile = null;
        const stagingContainer = document.getElementById('imageStagingContainer');
        if (stagingContainer) stagingContainer.style.display = 'none';
        const textInput = document.getElementById('message-text-field');
        if (textInput) {
          textInput.placeholder = "اهمس أو اعترف بـ #...";
          textInput.value = '';
        }
      }

      async openPropertyInfoModal(propertyId) {
        const modal = document.getElementById('property-info-modal');
        const loader = document.getElementById('prop-modal-loader');
        const content = document.getElementById('prop-modal-content');
        const overlay = document.getElementById('overlay');

        overlay.classList.add('active');
        modal.classList.add('active');
        modal.style.display = 'block';
        loader.style.display = 'block';
        content.style.display = 'none';

        try {
          const docRef = doc(db, "properties", propertyId);
          const docSnap = await getDoc(docRef);
          
          if (docSnap.exists()) {
            const prop = docSnap.data();
            
            document.getElementById('prop-modal-cover').src = prop.coverImage || (prop.images && prop.images[0]) || '';
            document.getElementById('pm-title').textContent = prop.title || 'عقار معتمد بالمنصة';
            document.getElementById('pm-price').textContent = `${Number(prop.price || 0).toLocaleString()} ج.م`;
            document.getElementById('pm-area').textContent = prop.area || 0;
            document.getElementById('pm-purpose').textContent = prop.purpose === 'sale' ? 'بيع' : 'إيجار';
            document.getElementById('pm-rooms').textContent = prop.rooms || 0;
            document.getElementById('pm-baths').textContent = prop.bathrooms || 0;
            document.getElementById('pm-desc').textContent = prop.description || 'لا يوجد وصف كتابي مضاف.';

            loader.style.display = 'none';
            content.style.display = 'block';
          } else {
            loader.innerHTML = '<span style="color:var(--danger)">⚠️ تعذر العثور على مواصفات هذا العقار بالسيرفر.</span>';
          }
        } catch (e) {
          console.error("Error loading property detail card inside chat:", e);
          loader.innerHTML = '<span style="color:var(--danger)">⚠️ حدث خطأ فني أثناء جلب مستندات العقار.</span>';
        }
      }

      // 📢 دالة مساعدة مضافة لإرسال طلب الـ Push Notification لخادم الـ Vercel API الجديد
      async triggerPushNotification(receiverId, bodyText, titleText = null) {
        try {
          const response = await fetch('https://am-property.vercel.app/api/send-notification', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              receiverId: receiverId,
              senderName: ChatState.currentUserName, // اسمك الفعلي لجعل الإشعار مميزاً
              title: titleText || `💬 رسالة جديدة من ${ChatState.currentUserName}`,
              body: bodyText,
              roomId: ChatState.activeRoomId
            })
          });
          const resData = await response.json();
          console.log("📨 Push notification Vercel status:", resData);
        } catch (err) {
          console.error("❌ Failed to send push notification via Vercel:", err);
        }
      }

      async sendMessageText(roomId, senderId, receiverId, text) {
        if (!text.trim()) return;

        if (ChatState.editingMessageId) {
          const msgId = ChatState.editingMessageId;
          try {
            let textToSave = text;
            const msgRef = ref(rtdb, `messages/${roomId}/${msgId}`);
            const originalSnap = await get(msgRef);
            
            if (originalSnap.exists() && originalSnap.val().text.startsWith('رد على @')) {
              const originalText = originalSnap.val().text;
              const prefix = originalText.split(': ')[0];
              textToSave = `${prefix}: ${text}`;
            }

            await update(ref(rtdb, `messages/${roomId}/${msgId}`), {
              text: textToSave,
              edited: true
            });

            await update(ref(rtdb, `chatRooms/${roomId}`), {
              lastMessage: textToSave,
              lastMessageTime: Date.now()
            });
          } catch(e) {
            console.error("Error editing message:", e);
          }
          this.cancelReply();
          return;
        }

        const msgRef = push(ref(rtdb, `messages/${roomId}`));
        const timestamp = Date.now();

        let textToSend = ChatState.replyingToMsg ? `رد على @${ChatState.replyingToMsg.senderName}: ${text}` : text;

        const newMsg = {
          senderId: senderId,
          receiverId: receiverId,
          type: "text",
          text: textToSend,
          image: "",
          createdAt: timestamp,
          status: "sent"
        };

        const targetStatusSnap = await get(ref(rtdb, `status/${receiverId}`));
        if (targetStatusSnap.exists() && targetStatusSnap.val().state === 'online') {
          newMsg.status = 'delivered';
        }

        await set(msgRef, newMsg);

        await update(ref(rtdb, `chatRooms/${roomId}`), {
          lastMessage: textToSend,
          lastMessageTime: timestamp
        });

        const unreadRef = ref(rtdb, `unreadCounts/${roomId}/${receiverId}`);
        const unreadSnap = await get(unreadRef);
        const currentUnread = unreadSnap.exists() ? unreadSnap.val() : 0;
        await set(unreadRef, currentUnread + 1);

        // 🔔 تشغيل الإشعار
        this.triggerPushNotification(receiverId, textToSend);

        this.cancelReply();
      }

      async sendMessageImage(roomId, senderId, receiverId, previewUrl, originalUrl, captionText) {
        const msgRef = push(ref(rtdb, `messages/${roomId}`));
        const timestamp = Date.now();

        const newMsg = {
          senderId: senderId,
          receiverId: receiverId,
          type: "image",
          preview: previewUrl,
          original: originalUrl,
          image: previewUrl,
          caption: captionText || "",
          createdAt: timestamp,
          status: "sent"
        };

        if (ChatState.replyingToMsg) {
          newMsg.replyTo = {
            senderName: ChatState.replyingToMsg.senderName,
            text: ChatState.replyingToMsg.text
          };
          this.cancelReply();
        }

        const targetStatusSnap = await get(ref(rtdb, `status/${receiverId}`));
        if (targetStatusSnap.exists() && targetStatusSnap.val().state === 'online') {
          newMsg.status = 'delivered';
        }

        await set(msgRef, newMsg);

        await update(ref(rtdb, `chatRooms/${roomId}`), {
          lastMessage: "📷 صورة",
          lastMessageTime: timestamp
        });

        const unreadRef = ref(rtdb, `unreadCounts/${roomId}/${receiverId}`);
        const unreadSnap = await get(unreadRef);
        const currentUnread = unreadSnap.exists() ? unreadSnap.val() : 0;
        await set(unreadRef, currentUnread + 1);

        // 🔔 تشغيل الإشعار للصورة
        const notificationText = captionText ? `📷 صورة: ${captionText}` : "📷 أرسل إليك صورة";
        this.triggerPushNotification(receiverId, notificationText);
      }
    }

    window.chatApp = new StandaloneChatApp();
  </script>
</body>
</html>
