<!-- withdraw.html - النسخة النهائية المحسّنة -->
<!DOCTYPE html>  
<html lang="ar" dir="rtl">  
<head>  
    <meta charset="UTF-8">  
    <title>سحب الأرباح | AM Rewards</title>  
    <meta name="viewport" content="width=device-width, initial-scale=1">  
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">  
    <style>  
        :root {  
          --neon-cyan: #00f2ff; --neon-purple: #7000ff; --bg-deep: #020617;  
          --glass-bg: rgba(15, 23, 42, 0.7); --glass-border: rgba(255, 255, 255, 0.1);  
          --success: #22c55e; --error: #f87171; --warning: #facc15; --text-main: #f1f5f9;  
        }  
        * { box-sizing: border-box; transition: transform 0.3s ease, box-shadow 0.3s ease; }  
        body {  
          font-family: 'Cairo', sans-serif; background: var(--bg-deep); color: var(--text-main);  
          margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden;  
          background-image: radial-gradient(circle at 0% 0%, rgba(112, 0, 255, 0.15) 0%, transparent 35%), radial-gradient(circle at 100% 100%, rgba(0, 242, 255, 0.15) 0%, transparent 35%);  
        }  
        body::after { content: ""; position: fixed; inset: 0; z-index: -1; background-image: url('https://www.transparenttextures.com/patterns/stardust.png'); opacity: 0.15; }  
        .container { max-width: 480px; margin: 20px auto; background: var(--glass-bg); padding: 25px; border-radius: 24px; backdrop-filter: blur(20px); border: 1px solid var(--glass-border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; z-index: 2; }  
        h1 { text-align: center; margin-bottom: 25px; color: var(--neon-cyan); font-weight: 900; text-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }  
        .balance-info-card { background: linear-gradient(135deg, rgba(112, 0, 255, 0.1), rgba(0, 242, 255, 0.1)); border-radius: 20px; padding: 20px; border: 1px solid var(--glass-border); margin-bottom: 20px; text-align: center; }  
        .points-large { font-family: 'Montserrat'; font-size: 35px; display: block; color: var(--neon-cyan); }  
        .limits-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }  
        .limit-box { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px; font-size: 11px; }  
        .limit-box span { display: block; color: var(--neon-cyan); font-weight: 700; font-size: 14px; }  
        
        .withdrawal-method {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 10px;
          margin-bottom: 15px;
        }
        .method-btn {
          padding: 15px;
          border-radius: 12px;
          border: 2px solid var(--glass-border);
          background: rgba(0,0,0,0.2);
          color: #fff;
          cursor: pointer;
          font-weight: 700;
          transition: 0.3s;
        }
        .method-btn.active {
          border-color: var(--neon-cyan);
          background: rgba(0, 242, 255, 0.1);
        }
        .method-btn:hover {
          border-color: var(--neon-cyan);
        }
        
        label { display:block; margin:15px 0 8px; font-weight:700; color: #94a3b8; font-size: 13px; }  
        input { width: 100%; padding: 14px; margin-bottom: 5px; border: 1px solid var(--glass-border); border-radius: 12px; background: rgba(0,0,0,0.3); color: #fff; font-size: 16px; outline: none; }  
        input:focus { border-color: var(--neon-cyan); }  
        
        .calc-details { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 15px; margin: 15px 0; display: flex; justify-content: space-around; text-align: center; border: 1px dashed var(--glass-border); }  
        .calc-item b { display: block; font-family: 'Montserrat'; color: var(--neon-purple); }  
        
        #confirmBtn { width: 100%; background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan)); color: #fff; font-weight: 900; padding: 16px; border: none; border-radius: 16px; cursor: pointer; font-size: 18px; box-shadow: 0 10px 20px rgba(112, 0, 255, 0.3); }  
        #confirmBtn:disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }  
        
        .history { margin-top: 35px; }  
        .table-responsive { border-radius: 15px; overflow: hidden; border: 1px solid var(--glass-border); }  
        table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.2); }  
        th { background: rgba(112, 0, 255, 0.2); color: var(--neon-cyan); padding: 12px; font-size: 12px; }  
        td { padding: 12px 8px; text-align: center; border-bottom: 1px solid var(--glass-border); font-size: 12px; }  
        .row-pending { color: var(--warning); } 
        .row-completed { color: var(--success); } 
        .row-rejected { color: var(--error); }  
        
        #customModal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(10px); }  
        .modal-content { background: var(--bg-deep); padding: 30px; border-radius: 24px; width: 90%; max-width: 380px; text-align: center; border: 1px solid var(--neon-purple); }  
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }  
        .modal-actions button { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; }  
        #confirmActionBtn { background: var(--success); color: #fff; }  
        #cancelActionBtn { background: #334155; color: #fff; }  
        
        .status-msg { text-align: center; margin-top: 15px; font-weight: 700; padding: 10px; border-radius: 10px; display: none; }  
        .status-msg.show { display: block; }
        
        .alert { padding: 12px; border-radius: 10px; margin-bottom: 15px; font-size: 12px; display: none; }
        .alert.show { display: block; }
        .alert-error { background: rgba(248, 113, 113, 0.1); border: 1px solid var(--error); color: var(--error); }
        .alert-warning { background: rgba(250, 204, 21, 0.1); border: 1px solid var(--warning); color: var(--warning); }
        
        .cooldown-timer { color: var(--warning); font-weight: 900; text-align: center; margin-top: 10px; }
    </style>  
</head>  
<body>  
    <div class="container">  
        <h1>💸 سحب الأرباح</h1>  
        
        <div id="errorAlert" class="alert alert-error"></div>
        <div id="warningAlert" class="alert alert-warning"></div>
        
        <div class="balance-info-card">  
            <span style="font-size: 13px; opacity: 0.7;">رصيدك الحالي</span>  
            <span class="points-large" id="pointsVal">0</span>  
            <span style="font-size:16px;">≈ <span id="egpVal">0.00</span> ج.م</span>  
            <div class="limits-row">  
                <div class="limit-box">المتبقي اليوم <span id="remainingLimitVal">200</span></div>  
                <div class="limit-box">عمليات متبقية <span id="remainingOpsVal">--</span></div>  
            </div>  
        </div>  
        
        <label>طريقة السحب</label>
        <div class="withdrawal-method">
          <button class="method-btn active" onclick="selectMethod('vodafone', this)">📱 فودافون كاش</button>
          <button class="method-btn" onclick="selectMethod('orange', this)">🟠 أورانج موني</button>
        </div>
        
        <label>رقم المحفظة <span id="methodLabel">(فودافون كاش)</span></label>  
        <input type="text" id="walletVod" placeholder="01xxxxxxxxx" maxlength="11">  
        
        <label>المبلغ (الحد الأدنى 20 ج.م)</label>  
        <input type="number" id="amountInp" placeholder="أدخل المبلغ" step="1" min="20">  
        
        <div id="limitWarning" style="color:var(--error); font-size:12px; text-align:center; display:none; margin-top:10px;"></div>  
        
        <div class="calc-details">  
            <div class="calc-item">الخصم (10%)<b id="feeVal">0.00</b></div>  
            <div class="calc-item">الصافي<b id="netVal" style="color:var(--neon-cyan)">0.00</b></div>  
            <div class="calc-item">النقاط<b id="needPts">0</b></div>  
        </div>  
        
        <button id="confirmBtn" disabled>إرسال طلب السحب</button>  
        
        <div id="cooldownMsg" class="cooldown-timer" style="display: none;"></div>
        
        <div id="msg" class="status-msg"></div>  
        
        <div class="history">  
            <h2 style="font-size:16px; text-align:center; color:var(--neon-cyan);">📜 سجل العمليات</h2>  
            <div class="table-responsive">  
                <table>  
                    <thead><tr><th>المبلغ</th><th>الحالة</th><th>التاريخ</th></tr></thead>  
                    <tbody id="withdrawalsTable"><tr><td colspan="3">جارِ التحميل...</td></tr></tbody>  
                </table>  
            </div>  
        </div>  
    </div>  

    <div id="customModal">  
        <div class="modal-content">  
            <h3 style="color:var(--neon-cyan)">تأكيد السحب</h3>  
            <p style="font-size:14px;">سيتم سحب <span id="modalAmount"></span> ج.م إلى الرقم <br><b id="modalWallet" style="color:var(--neon-purple)"></b></p>  
            <div class="modal-actions">  
                <button id="cancelActionBtn">تعديل</button>  
                <button id="confirmActionBtn">تأكيد</button>  
            </div>  
        </div>  
    </div>  

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>  
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>  
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>  
    
<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", 
        authDomain: "am--rewards.firebaseapp.com", 
        projectId: "am--rewards" 
    };  
    firebase.initializeApp(firebaseConfig);  
    const auth = firebase.auth(); 
    const db = firebase.firestore();  
    
    const POINT_VALUE = 0.07; 
    const LIMITS = { min: 20, maxDaily: 200, maxOps: 2, cooldown: 3600000 };  
    const METHODS = {
      vodafone: { name: 'فودافون كاش', regex: /^010\d{8}$/ },
      orange: { name: 'أورانج موني', regex: /^012\d{8}$/ }
    };

    let userId, currentPoints, todayOps = 0, todayAmt = 0, selectedMethod = 'vodafone', lastWithdrawalTime = 0;  

    const translateStatus = (s) => ({ 
        'pending': 'قيد الانتظار ⏳', 
        'completed': 'تم الدفع ✅', 
        'rejected': 'مرفوض ❌' 
    }[s] || s);  

    // ✅ اختيار طريقة السحب
    window.selectMethod = function(method, btn) {
      selectedMethod = method;
      document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('methodLabel').textContent = `(${METHODS[method].name})`;
      document.getElementById('walletVod').placeholder = method === 'vodafone' ? '01xxxxxxxxx' : '012xxxxxxxx';
      document.getElementById('walletVod').value = '';
      updateCalc();
    };

    // ✅ فحص الـ Cooldown
    async function checkCooldown() {
      if (!userId) return false;
      
      const snap = await db.collection("withdrawals")
        .where("userId", "==", userId)
        .where("status", "==", "completed")
        .orderBy("date", "desc")
        .limit(1)
        .get();

      if (!snap.empty) {
        const lastTime = snap.docs[0].data().date.toMillis();
        const timePassed = Date.now() - lastTime;
        
        if (timePassed < LIMITS.cooldown) {
          const remainingMs = LIMITS.cooldown - timePassed;
          const remainingMins = Math.ceil(remainingMs / 60000);
          lastWithdrawalTime = Date.now() + remainingMs;
          
          startCooldownTimer(remainingMs);
          return true;
        }
      }
      
      return false;
    }

    // ✅ таймер الـ Cooldown
    function startCooldownTimer(ms) {
      const msg = document.getElementById('cooldownMsg');
      msg.style.display = 'block';
      
      const timer = setInterval(() => {
        const remaining = Math.ceil((lastWithdrawalTime - Date.now()) / 60000);
        
        if (remaining <= 0) {
          msg.style.display = 'none';
          clearInterval(timer);
          updateCalc();
        } else {
          msg.textContent = `⏳ يجب الانتظار ${remaining} دقيقة قبل السحب التالي`;
        }
      }, 1000);
    }

    // ✅ حساب الحدود اليومية
    async function checkLimits() {  
        if (!userId) return;  
        const start = new Date(); start.setUTCHours(0,0,0,0);  
        const snap = await db.collection("withdrawals")
            .where("userId", "==", userId)
            .where("date", ">=", start).get();  
        todayOps = 0; todayAmt = 0;  
        snap.forEach(doc => { 
          if(doc.data().status !== 'rejected') { 
            todayOps++; 
            todayAmt += doc.data().amount; 
          } 
        });  
        document.getElementById('remainingOpsVal').textContent = Math.max(0, LIMITS.maxOps - todayOps);  
        document.getElementById('remainingLimitVal').textContent = Math.max(0, LIMITS.maxDaily - todayAmt).toFixed(2);  
    }  

    auth.onAuthStateChanged(user => {  
        if (user) {  
            userId = user.uid; 
            checkLimits();
            checkCooldown();
            
            db.collection('users').doc(userId).onSnapshot(doc => {  
                if (doc.exists) {  
                    currentPoints = doc.data().points || 0;  
                    document.getElementById('pointsVal').textContent = Math.floor(currentPoints).toLocaleString();  
                    document.getElementById('egpVal').textContent = (currentPoints * POINT_VALUE).toFixed(2);  
                    updateCalc();  
                }  
            });  
            
            db.collection("withdrawals")
                .where("userId", "==", userId)
                .orderBy("date", "desc")
                .limit(10)
                .onSnapshot(snap => {  
                    const table = document.getElementById('withdrawalsTable'); 
                    table.innerHTML = "";  
                    snap.forEach(doc => {  
                        const w = doc.data(); 
                        const tr = document.createElement('tr'); 
                        tr.className = `row-${w.status}`;  
                        
                        let statusHTML = translateStatus(w.status);
                        if (w.status === 'rejected' && w.rejectionReason) {
                            statusHTML += `<br><small style="color:#ff4d4d; font-size:10px; font-weight:bold;">السبب: ${w.rejectionReason}</small>`;
                        }

                        const dateStr = w.date?.toDate ? w.date.toDate().toLocaleDateString('ar-EG') : 'N/A';
                        tr.innerHTML = `<td>${w.amount} ج</td><td>${statusHTML}</td><td>${dateStr}</td>`;  
                        table.appendChild(tr);  
                    });  
                });  
        } else { 
            window.location.href = "login.html"; 
        }  
    });  

    // ✅ حساب التفاصيل
    function updateCalc() {  
        const amtInput = document.getElementById('amountInp');
        const amt = parseFloat(amtInput.value);  
        const wallet = document.getElementById('walletVod').value.trim();  
        const ptsNeeded = Math.ceil(amt / POINT_VALUE);  
        const warning = document.getElementById('limitWarning');  
        warning.style.display = 'none';  

        const methodRegex = METHODS[selectedMethod].regex;
        const isWalletValid = methodRegex.test(wallet);

        const isCoolingDown = lastWithdrawalTime > Date.now();

        if (amt >= LIMITS.min && !isNaN(amt)) {  
            document.getElementById('feeVal').textContent = (amt * 0.1).toFixed(2);  
            document.getElementById('netVal').textContent = (amt * 0.9).toFixed(2);  
            document.getElementById('needPts').textContent = ptsNeeded.toLocaleString();  
            
            const canSubmit = ptsNeeded <= currentPoints && isWalletValid && (todayAmt + amt) <= LIMITS.maxDaily && todayOps < LIMITS.maxOps && !isCoolingDown;  
            document.getElementById('confirmBtn').disabled = !canSubmit;  
            
            if (ptsNeeded > currentPoints) { 
                warning.textContent = "⚠️ نقاطك لا تكفي"; 
                warning.style.display = "block"; 
            } else if (wallet.length > 0 && !isWalletValid) {
                warning.textContent = `⚠️ رقم غير صحيح لـ ${METHODS[selectedMethod].name}`;
                warning.style.display = "block";
            } else if ((todayAmt + amt) > LIMITS.maxDaily) {
                warning.textContent = `⚠️ تجاوزت الحد اليومي المسموح`;
                warning.style.display = "block";
            } else if (todayOps >= LIMITS.maxOps) {
                warning.textContent = `⚠️ وصلت للحد الأقصى للعمليات اليومية`;
                warning.style.display = "block";
            }
        } else { 
            document.getElementById('confirmBtn').disabled = true; 
        }  
    }  

    document.getElementById('amountInp').oninput = updateCalc;  
    document.getElementById('walletVod').oninput = updateCalc;  

    document.getElementById('confirmBtn').onclick = () => {  
        document.getElementById('modalAmount').textContent = document.getElementById('amountInp').value;  
        document.getElementById('modalWallet').textContent = document.getElementById('walletVod').value;  
        document.getElementById('customModal').style.display = 'flex';  
    };  

    document.getElementById('cancelActionBtn').onclick = () => {
      document.getElementById('customModal').style.display = 'none';  
    };

    document.getElementById('confirmActionBtn').onclick = async () => {  
        document.getElementById('customModal').style.display = 'none';  
        const btn = document.getElementById('confirmBtn'); 
        btn.disabled = true; 
        btn.textContent = "جارِ الإرسال...";  

        const errorAlert = document.getElementById('errorAlert');
        errorAlert.innerHTML = '';
        errorAlert.classList.remove('show');

        try {  
            const idToken = await auth.currentUser.getIdToken();  
            const response = await fetch('/api/withdraw', { 
                method: 'POST',  
                headers: { 
                    'Content-Type': 'application/json', 
                    'Authorization': `Bearer ${idToken}` 
                },  
                body: JSON.stringify({ 
                    amount: parseFloat(document.getElementById('amountInp').value),
                    wallet: document.getElementById('walletVod').value.trim(),
                    method: selectedMethod
                })  
            });  

            const text = await response.text();
            let data;
            try { data = JSON.parse(text); } catch { data = { message: text }; }

            if (!response.ok) throw new Error(data.message || data.error || "حدث خطأ غير معروف");  

            const msgEl = document.getElementById('msg');
            msgEl.textContent = "✅ " + data.message;  
            msgEl.className = "status-msg show";
            msgEl.style.background = 'rgba(34, 197, 94, 0.2)';
            msgEl.style.color = '#22c55e';
            
            document.getElementById('amountInp').value = ""; 
            document.getElementById('walletVod').value = "";
            checkLimits();
            checkCooldown();
        } catch (err) {  
            errorAlert.textContent = "❌ " + err.message;  
            errorAlert.classList.add('show');
        } finally { 
            btn.textContent = "إرسال طلب السحب"; 
            updateCalc(); 
        }  
    };
</script>
</body>  
            </html>
