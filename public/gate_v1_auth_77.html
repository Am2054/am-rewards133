<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الاتصال | Secure Gate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: white; font-family: 'Cairo', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .gate-box { text-align: center; padding: 40px; border: 1px solid #00f2ff; border-radius: 30px; background: rgba(0, 242, 255, 0.05); box-shadow: 0 0 30px rgba(0, 242, 255, 0.1); }
        .code-display { font-size: 5rem; font-weight: 900; color: #f5c542; margin: 20px 0; letter-spacing: 10px; text-shadow: 0 0 20px rgba(245, 197, 66, 0.4); }
        .timer-bar { width: 100%; height: 5px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 20px; overflow: hidden; }
        .progress { width: 100%; height: 100%; background: #00f2ff; transition: linear; }
    </style>
</head>
<body>

    <div class="gate-box">
        <h2 id="msg">احفظ الرقم التالي</h2>
        <div class="code-display" id="randomCode">--</div>
        <p style="opacity:0.6">سيتم إعادتك تلقائياً بعد <span id="secs">3</span> ثوانٍ</p>
        <div class="timer-bar"><div class="progress" id="bar"></div></div>
    </div>

    <script>
        // 1. توليد رقم عشوائي من رقمين
        const code = Math.floor(10 + Math.random() * 89); 
        document.getElementById('randomCode').innerText = code;

        // 2. تخزين الرقم في sessionStorage (يختفي بمجرد إغلاق المتصفح)
        localStorage.setItem('gate_token', code);

        // 3. عداد تنازلي للإرجاع
        let timeLeft = 3;
        const bar = document.getElementById('bar');
        
        const countdown = setInterval(() => {
            timeLeft--;
            document.getElementById('secs').innerText = timeLeft;
            bar.style.width = (timeLeft / 3 * 100) + "%";
            
            if(timeLeft <= 0) {
                clearInterval(countdown);
                // العودة لصفحة المهام (تأكد من كتابة اسم ملف صفحة المهام صح)
                window.location.href = "shortlinks.html?verify=true"; 
            }
        }, 1000);
    </script>
</body>
</html>
