<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AM REWARDS | ADMIN PANEL</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #030712; --card: rgba(17, 24, 39, 0.7); --gold: #f5c542; 
      --border: rgba(245, 197, 66, 0.1); --text: #eef2f7; --accent: #00fa9a;
      --red: #ef4444; --blue: #3b82f6;
    }
    body { font-family: "Cairo", sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; min-height: 100vh; background-image: radial-gradient(circle at top right, #1e293b, #030712); }
    .wrap { max-width: 1400px; margin: 0 auto; }
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; padding: 25px; background: var(--card); border-radius: 24px; border: 1px solid var(--border); backdrop-filter: blur(15px); }
    header h1 { margin: 0; font-family: 'Syncopate'; color: var(--gold); font-size: 1.3rem; letter-spacing: 2px; }
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-item { background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid var(--border); border-bottom: 3px solid var(--gold); transition: 0.3s; }
    .stat-item strong { display: block; font-size: 1.8rem; font-family: 'Syncopate'; color: #fff; margin-bottom: 5px; }
    .stat-item span { color: var(--gold); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; opacity: 0.7; }
    .table-card { background: var(--card); border-radius: 28px; padding: 10px; border: 1px solid var(--border); backdrop-filter: blur(15px); box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
    .controls { display: flex; gap: 15px; padding: 20px; flex-wrap: wrap; align-items: center; }
    .controls input { background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: #fff; padding: 14px 25px; border-radius: 16px; outline: none; flex: 1; min-width: 250px; font-family: 'Cairo'; }
    .table-container { overflow-x: auto; border-radius: 20px; }
    table { width: 100%; border-collapse: separate; border-spacing: 0 8px; padding: 0 15px; }
    th { padding: 15px 20px; color: var(--gold); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 900; border-bottom: 1px solid var(--border); }
    td { padding: 15px 20px; background: rgba(255,255,255,0.02); vertical-align: middle; transition: 0.3s; }
    td:first-child { border-radius: 0 15px 15px 0; }
    td:last-child { border-radius: 15px 0 0 15px; }
    tr:hover td { background: rgba(245, 197, 66, 0.08); }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .avatar { width: 40px; height: 40px; background: linear-gradient(45deg, var(--gold), #b48a1d); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 900; font-family: 'Syncopate'; }
    .uid-tag { font-family: monospace; font-size: 0.7rem; color: #64748b; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; }
    .points-badge { color: var(--gold); font-weight: 900; font-size: 1rem; display: flex; align-items: center; gap: 5px; }
    .action-btn { padding: 10px 18px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 0.75rem; display: flex; align-items: center; justify-content: center; }
    .btn-edit { background: var(--gold); color: #000; }
    .btn-ban { background: rgba(239, 68, 68, 0.1); color: var(--red); border: 1px solid var(--red); }
    .btn-ban:hover { background: var(--red); color: #fff; }
    .fraud-warn { border-right: 4px solid var(--red) !important; }
    .pagination-box { padding: 20px; display: flex; justify-content: center; gap: 10px; }
    .hidden { display: none !important; }
    #loginBox { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
    .auth-box { width: 350px; padding: 40px; background: var(--card); border: 1px solid var(--gold); border-radius: 30px; text-align: center; }
    .auth-box input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 15px; border: 1px solid var(--border); background: #000; color: #fff; text-align: center; }
    .auth-box button { width: 100%; padding: 15px; border-radius: 15px; background: var(--gold); font-weight: 900; cursor: pointer; border: none; }
  </style>
</head>
<body>

  <div id="loginBox">
    <div class="auth-box">
      <h2 style="font-family:'Syncopate'; color:var(--gold);">ADMIN ACCESS</h2>
      <input id="adminPass" type="password" placeholder="ENTER ADMIN PASSWORD" />
      <button id="loginBtn">AUTHORIZE SYSTEM</button>
    </div>
  </div>

  <div id="main-ui" class="wrap hidden">
    <header>
      <h1>USERS <span style="color:#64748b; font-size:0.9rem;">MANAGEMENT</span></h1>
      <div style="display:flex; gap:12px;">
        <button id="refreshBtn" class="action-btn" style="background:rgba(255,255,255,0.05); color:#fff; border:1px solid var(--border);">🔄 تحديث القائمة</button>
        <button id="logoutBtn" class="action-btn" style="background:var(--red); color:#fff;">LOGOUT</button>
      </div>
    </header>

    <div class="metrics">
      <div class="stat-item">
        <strong id="metricAllUsersVal">0</strong> <span>إجمالي المستخدمين</span>
      </div>
      <div class="stat-item">
        <strong id="metricActiveUsersVal">0</strong> <span>نشط حالياً</span>
      </div>
    </div>

    <div class="table-card">
      <div class="controls">
        <input id="searchInput" type="search" placeholder="بحث بالبريد الإلكتروني أو الـ UID...">
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>المستخدم</th>
              <th>البريد الإلكتروني</th>
              <th>الإحالات</th>
              <th>الرصيد</th>
              <th>آخر ظهور</th>
              <th>التحكم</th>
            </tr>
          </thead>
          <tbody id="usersTbody"></tbody>
        </table>
      </div>
      
      <div class="pagination-box">
          <button id="prevPage" class="action-btn" style="background: var(--card); color: var(--gold); border: 1px solid var(--gold);">السابق</button>
          <button id="nextPage" class="action-btn btn-edit">التالي</button>
      </div>
    </div>
  </div>

  <script>
    let lastDocId = null;
    const fingerprint = btoa(navigator.userAgent).slice(0, 16);

    async function apiCall(data) {
        const res = await fetch('/api/admin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-fingerprint': fingerprint },
            body: JSON.stringify(data)
        });
        if (res.status === 401) { toggleUI(false); return null; }
        return res.json();
    }

    async function loadData(isNext = false) {
        const search = document.getElementById('searchInput').value;
        const result = await apiCall({
            action: 'get_users',
            lastId: isNext ? lastDocId : null,
            searchQuery: search
        });

        if (result && result.users) {
            renderTable(result.users);
            document.getElementById('metricAllUsersVal').textContent = result.total || 0;
            if (result.users.length > 0) lastDocId = result.users[result.users.length - 1].id;
        }
    }

    function renderTable(users) {
        const tbody = document.getElementById('usersTbody');
        tbody.innerHTML = '';
        users.forEach(u => {
            const tr = document.createElement('tr');
            if (u.isSuspicious) tr.classList.add('fraud-warn');
            tr.innerHTML = `
                <td>
                    <div class="user-info">
                        <div class="avatar">${(u.name || 'U').charAt(0)}</div>
                        <div>
                            <div style="font-weight:900;">${u.name || 'No Name'}</div>
                            <div class="uid-tag">${u.id.slice(0,8)}</div>
                        </div>
                    </div>
                </td>
                <td>${u.email}</td>
                <td>${u.referralCount || 0}</td>
                <td><div class="points-badge">🪙 ${Number(u.points || 0).toLocaleString()}</div></td>
                <td style="font-size:0.7rem;">${u.lastLoginText || 'N/A'}</td>
                <td>
                    <div style="display:flex; gap:5px;">
                        <button onclick="editPoints('${u.id}', ${u.points})" class="action-btn btn-edit">🪙</button>
                        <button onclick="toggleBan('${u.id}', '${u.status}')" class="action-btn btn-ban">${u.status === 'banned' ? '✅' : '🚫'}</button>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function editPoints(id, current) {
        const p = prompt("تعديل النقاط:", current);
        if (p !== null) {
            const res = await apiCall({ action: 'edit_points', uid: id, points: p });
            if (res?.success) loadData();
        }
    }

    async function toggleBan(id, status) {
        if (confirm("تغيير حالة الحظر؟")) {
            const res = await apiCall({ action: 'toggle_ban', uid: id, status: status === 'banned' ? 'active' : 'banned' });
            if (res?.success) loadData();
        }
    }

    function toggleUI(isLoggedIn) {
        document.getElementById('loginBox').classList.toggle('hidden', isLoggedIn);
        document.getElementById('main-ui').classList.toggle('hidden', !isLoggedIn);
    }

    document.getElementById('loginBtn').onclick = async () => {
        const pass = document.getElementById('adminPass').value;
        const res = await apiCall({ action: 'admin_login', password: pass });
        if (res?.success) { toggleUI(true); loadData(); } else { alert("كلمة المرور خاطئة"); }
    };

    document.getElementById('logoutBtn').onclick = () => { document.cookie = "adminToken=; max-age=0"; location.reload(); };
    document.getElementById('refreshBtn').onclick = () => { lastDocId = null; loadData(); };
    document.getElementById('nextPage').onclick = () => loadData(true);
    document.getElementById('prevPage').onclick = () => { lastDocId = null; loadData(); };
    
    // البحث الحي (يوفر قراءات لأنه يجلب 10 نتائج فقط)
    let searchTimer;
    document.getElementById('searchInput').oninput = () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => { lastDocId = null; loadData(); }, 500);
    };
  </script>
</body>
</html>
