<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AM REWARDS | USERS MANAGEMENT</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #030712; 
      --card: rgba(17, 24, 39, 0.7);
      --gold: #f5c542; 
      --border: rgba(245, 197, 66, 0.1);
      --text: #eef2f7;
      --accent: #00fa9a;
      --red: #ef4444; 
      --blue: #3b82f6;
    }

    body {
      font-family: "Cairo", sans-serif;
      background: var(--bg); color: var(--text); margin: 0; padding: 20px;
      background-image: radial-gradient(circle at top right, #1e293b, #030712);
      min-height: 100vh;
    }

    .wrap { max-width: 1400px; margin: 0 auto; }
    
    header { 
      display: flex; align-items: center; justify-content: space-between; 
      margin-bottom: 30px; padding: 25px; background: var(--card); 
      border-radius: 24px; border: 1px solid var(--border);
      backdrop-filter: blur(15px);
    }
    header h1 { margin: 0; font-family: 'Syncopate'; color: var(--gold); font-size: 1.3rem; letter-spacing: 2px; }

    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-item { 
      background: var(--card); padding: 25px; border-radius: 24px; 
      border: 1px solid var(--border); border-bottom: 3px solid var(--gold);
      transition: 0.3s;
    }
    .stat-item:hover { transform: translateY(-5px); border-color: var(--gold); }
    .stat-item strong { display: block; font-size: 1.8rem; font-family: 'Syncopate'; color: #fff; margin-bottom: 5px; }
    .stat-item span { color: var(--gold); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; opacity: 0.7; }

    .table-card { 
      background: var(--card); border-radius: 28px; padding: 10px; 
      border: 1px solid var(--border); backdrop-filter: blur(15px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }
    
    .controls { display: flex; gap: 15px; padding: 20px; flex-wrap: wrap; align-items: center; }
    .controls input { 
      background: rgba(0,0,0,0.3); border: 1px solid var(--border); 
      color: #fff; padding: 14px 25px; border-radius: 16px; 
      outline: none; flex: 1; min-width: 250px; font-family: 'Cairo';
    }

    .table-container { overflow-x: auto; border-radius: 20px; }
    table { width: 100%; border-collapse: separate; border-spacing: 0 8px; padding: 0 15px; }
    
    th { 
      padding: 15px 20px; color: var(--gold); font-size: 0.75rem; 
      text-transform: uppercase; letter-spacing: 1px; font-weight: 900;
      border-bottom: 1px solid var(--border);
    }

    td { padding: 15px 20px; background: rgba(255,255,255,0.02); vertical-align: middle; transition: 0.3s; }
    
    td:first-child { border-radius: 0 15px 15px 0; }
    td:last-child { border-radius: 15px 0 0 15px; }

    tr:hover td { background: rgba(245, 197, 66, 0.08); transform: scale(1.002); }

    .user-info { display: flex; align-items: center; gap: 12px; }
    .avatar { 
      width: 40px; height: 40px; background: linear-gradient(45deg, var(--gold), #b48a1d); 
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      color: #000; font-weight: 900; font-family: 'Syncopate'; font-size: 1.1rem;
    }
    
    .uid-tag { 
        font-family: monospace; font-size: 0.7rem; color: #64748b; 
        background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; 
    }

    .points-badge { 
      color: var(--gold); font-weight: 900; font-size: 1rem; 
      display: flex; align-items: center; gap: 5px;
    }
    .points-badge::before { content: '🪙'; font-size: 0.8rem; }

    .action-btn { 
      padding: 10px 18px; border-radius: 12px; border: none; 
      font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 0.75rem;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-edit { background: var(--gold); color: #000; box-shadow: 0 4px 15px rgba(245, 197, 66, 0.2); }
    .btn-edit:hover { background: #fff; transform: translateY(-2px); }
    .btn-ban { background: rgba(239, 68, 68, 0.1); color: var(--red); border: 1px solid var(--red); }
    .btn-ban:hover { background: var(--red); color: #fff; }

    /* تحسين إضافي: مؤشر الحسابات المشبوهة */
    .fraud-warn { border-right: 4px solid var(--red) !important; animation: pulseRed 2s infinite; }
    @keyframes pulseRed { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

    .pagination-box { padding: 20px; display: flex; justify-content: center; gap: 10px; }

    .hidden { display: none !important; }
    #loginBox { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
    .auth-box { width: 350px; padding: 40px; background: var(--card); border: 1px solid var(--gold); border-radius: 30px; text-align: center; }
    .auth-box input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 15px; border: 1px solid var(--border); background: #000; color: #fff; text-align: center; }
    .auth-box button { width: 100%; padding: 15px; border-radius: 15px; background: var(--gold); font-weight: 900; cursor: pointer; border: none; }

  </style>
</head>
<body>

  <div id="loginBox">
    <div class="auth-box">
      <h2 style="font-family:'Syncopate'; color:var(--gold);">ADMIN LOGIN</h2>
      <input id="adminEmail" type="email" placeholder="EMAIL" value="amirfg992005@gmail.com" />
      <input id="adminPass" type="password" placeholder="PASSWORD" />
      <button id="loginBtn">AUTHORIZE</button>
    </div>
  </div>

  <div id="main-ui" class="wrap hidden">
    <header>
      <div>
        <h1>USERS <span style="color:#64748b; font-size:0.9rem;">MANAGEMENT</span></h1>
      </div>
      <div style="display:flex; gap:12px;">
        <button id="refreshBtn" class="action-btn" style="background:rgba(255,255,255,0.05); color:#fff; border:1px solid var(--border);">🔄 تحديث</button>
        <button id="logoutBtn" class="action-btn" style="background:var(--red); color:#fff;">LOGOUT</button>
      </div>
    </header>

    <div class="metrics">
      <div class="stat-item">
        <strong id="metricAllUsersVal">0</strong> <span>Total Members</span>
      </div>
      <div class="stat-item">
        <strong id="metricActiveUsersVal">0</strong> <span>Active (24h)</span>
      </div>
      <div class="stat-item">
        <strong id="metricPointsTodayVal">0</strong> <span>Points Generated</span>
      </div>
    </div>

    <div class="table-card">
      <div class="controls">
        <input id="searchInput" type="search" placeholder="Search by name, email or UID...">
        <div style="display:flex; gap:10px;">
            <button id="btnShowAll" class="action-btn btn-edit">ALL</button>
            <button id="btnShowTop20" class="action-btn" style="background:var(--blue); color:#fff;">TOP 20 🏆</button>
        </div>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>المستخدم</th>
              <th>البريد الإلكتروني</th>
              <th>عدد الإحالات</th>
              <th>الرصيد الحالي</th>
              <th>آخر ظهور</th>
              <th>التحكم</th>
            </tr>
          </thead>
          <tbody id="usersTbody">
            </tbody>
        </table>
      </div>
      
      <div class="pagination-box">
          <button id="prevPage" class="action-btn" style="background: var(--card); color: var(--gold); border: 1px solid var(--gold); opacity: 0.5;">السابق</button>
          <button id="nextPage" class="action-btn btn-edit">التالي</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, getDocs, query, where, doc, limit, startAfter, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0",
      authDomain: "am--rewards.firebaseapp.com",
      projectId: "am--rewards",
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const ADMIN_EMAIL = "amirfg992005@gmail.com";
    let allUsers = []; 
    let lastDoc = null; 
    const PAGE_SIZE = 50;

    async function verifyAdmin() {
        try {
            const fp = localStorage.getItem('admin_fingerprint') || 'unknown';
            const res = await fetch('/api/admin-login', { headers: { 'x-fingerprint': fp } });
            const data = await res.json();
            return data.valid;
        } catch(e) { return false; }
    }

    async function loadData(isNext = false) {
      if(!(await verifyAdmin())) { signOut(auth); return; }

      let q = query(collection(db, 'users'), orderBy('lastLogin', 'desc'), limit(PAGE_SIZE));
      if(isNext && lastDoc) q = query(collection(db, 'users'), orderBy('lastLogin', 'desc'), startAfter(lastDoc), limit(PAGE_SIZE));

      const usersSnap = await getDocs(q);
      if(usersSnap.empty) return;

      lastDoc = usersSnap.docs[usersSnap.docs.length - 1];
      allUsers = usersSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      
      document.getElementById('metricAllUsersVal').textContent = "..."; 
      renderTable(allUsers);
    }

    function renderTable(data) {
      const tbody = document.getElementById('usersTbody');
      tbody.innerHTML = '';
      data.forEach((u) => {
        const tr = document.createElement('tr');
        const lastLogin = u.lastLogin?.toDate?.() || (u.lastLogin ? new Date(u.lastLogin) : new Date(0));
        const initial = (u.name || 'U').charAt(0).toUpperCase();
        const isBanned = u.status === 'banned';

        const isSuspicious = data.filter(x => x.deviceId === u.deviceId && x.id !== u.id && u.deviceId).length > 0;
        if(isSuspicious) tr.classList.add('fraud-warn');

        tr.innerHTML = `
          <td>
            <div class="user-info">
              <div class="avatar" style="${isBanned ? 'filter: grayscale(1); opacity: 0.5;' : ''}">${initial}</div>
              <div>
                <div style="font-weight:900; color:${isBanned ? 'var(--red)' : '#fff'};">${u.name || 'No Name'} ${isBanned ? '(BANNED)' : ''}</div>
                <div class="uid-tag">${u.id.slice(0,10)}...</div>
              </div>
            </div>
          </td>
          <td><span style="font-size:0.85rem; opacity:0.8;">${u.email || '-'}</span></td>
          <td><b style="color:var(--accent); font-family:'Syncopate';">${u.referralCount || 0}</b></td>
          <td><div class="points-badge">${Number(u.points || 0).toLocaleString()}</div></td>
          <td style="font-size:0.75rem; color:#64748b;">${lastLogin.toLocaleString('ar-EG', {dateStyle:'short', timeStyle:'short'})}</td>
          <td>
            <div style="display:flex; gap:5px;">
                <button class="action-btn btn-edit edit-pts-trigger" data-id="${u.id}">🪙</button>
                <a href="auditUser.html?uid=${u.id}" class="action-btn" style="background:var(--blue); color:#fff; text-decoration:none;">🔍</a>
                <button class="action-btn btn-ban ban-trigger" data-id="${u.id}" data-status="${u.status}">${isBanned ? '✅' : '🚫'}</button>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      });

      document.querySelectorAll('.edit-pts-trigger').forEach(btn => {
          btn.addEventListener('click', () => handleEditPoints(btn.dataset.id));
      });
      document.querySelectorAll('.ban-trigger').forEach(btn => {
          btn.addEventListener('click', () => handleToggleBan(btn.dataset.id, btn.dataset.status));
      });
    }

    async function handleEditPoints(id) {
        if(!(await verifyAdmin())) return;
        const u = allUsers.find(x => x.id === id);
        const newPts = prompt(`تعديل نقاط ${u.name}:`, u.points);
        if (newPts !== null && !isNaN(newPts)) {
            try {
                const res = await fetch('/api/admin/update-user', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-fingerprint': localStorage.getItem('admin_fingerprint') 
                    },
                    body: JSON.stringify({ uid: id, points: Number(newPts), action: 'edit_points' })
                });
                if(res.ok) {
                    alert("تم تحديث النقاط بنجاح");
                    loadData();
                } else {
                    const err = await res.json();
                    alert("خطأ: " + err.error);
                }
            } catch(e) { alert("فشل الاتصال بالسيرفر"); }
        }
    }

    async function handleToggleBan(id, currentStatus) {
        if(!(await verifyAdmin())) return;
        const newStatus = currentStatus === 'banned' ? 'active' : 'banned';
        if(confirm(`هل أنت متأكد من ${newStatus === 'banned' ? 'حظر' : 'فك حظر'} هذا المستخدم؟`)) {
            try {
                const res = await fetch('/api/admin/update-user', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-fingerprint': localStorage.getItem('admin_fingerprint') 
                    },
                    body: JSON.stringify({ uid: id, status: newStatus, action: 'toggle_ban' })
                });
                if(res.ok) loadData();
                else alert("فشل تنفيذ العملية");
            } catch(e) { alert("خطأ في الشبكة"); }
        }
    }

    document.getElementById('searchInput').oninput = (e) => {
        const val = e.target.value.toLowerCase();
        renderTable(allUsers.filter(u => (u.name||'').toLowerCase().includes(val) || (u.email||'').toLowerCase().includes(val) || u.id.toLowerCase().includes(val)));
    };

    document.getElementById('nextPage').onclick = () => loadData(true);
    document.getElementById('prevPage').onclick = () => { lastDoc = null; loadData(); }; 
    document.getElementById('btnShowAll').onclick = () => { lastDoc = null; loadData(); };
    document.getElementById('refreshBtn').onclick = () => { lastDoc = null; loadData(); };

    document.getElementById('loginBtn').onclick = async () => {
      try { await signInWithEmailAndPassword(auth, document.getElementById('adminEmail').value, document.getElementById('adminPass').value); }
      catch (e) { alert("خطأ في بيانات الدخول"); }
    };
    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    onAuthStateChanged(auth, async user => {
      if (user && user.email === ADMIN_EMAIL) {
        if(await verifyAdmin()) {
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            loadData();
        } else { signOut(auth); }
      } else {
        document.getElementById('loginBox').classList.remove('hidden');
        document.getElementById('main-ui').classList.add('hidden');
      }
    });
  </script>
</body>
</html>
