<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AM REWARDS | NEON USERS</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050505;
      --primary: #00f2ff;
      --secondary: #bc13fe;
      --card: rgba(20, 20, 20, 0.8);
      --border: rgba(255, 255, 255, 0.05);
      --text: #ffffff;
      --danger: #ff0055;
      --success: #00ffc3;
    }

    body {
      margin: 0; font-family: 'Cairo', sans-serif;
      background: var(--bg); color: var(--text);
      background-image: radial-gradient(circle at 50% -20%, #1a1a2e, #050505);
      min-height: 100vh; overflow-x: hidden;
    }

    .wrap { max-width: 1400px; margin: 0 auto; padding: 20px; }

    #loginBox {
      position: fixed; inset: 0; background: #000;
      display: flex; align-items: center; justify-content: center; z-index: 10000;
    }
    .auth-box {
      width: 380px; padding: 40px; background: var(--card);
      border: 1px solid var(--primary); border-radius: 25px;
      box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); text-align: center;
    }
    .auth-box h2 { font-family: 'Syncopate'; letter-spacing: 5px; color: var(--primary); margin-bottom: 30px; }
    .auth-box input {
      width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 12px;
      border: 1px solid var(--border); background: #111; color: #fff; text-align: center; box-sizing: border-box;
    }
    .auth-box button {
      width: 100%; padding: 15px; border-radius: 12px; border: none;
      background: var(--primary); color: #000; font-weight: 900; cursor: pointer;
    }

    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 25px; background: var(--card); border-radius: 20px;
      border: 1px solid var(--border); backdrop-filter: blur(10px); margin-bottom: 25px;
    }
    header h1 { font-family: 'Syncopate'; font-size: 1.2rem; color: var(--primary); margin: 0; }

    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 25px; }
    .stat-item {
      background: var(--card); padding: 25px; border-radius: 20px;
      border-left: 4px solid var(--primary); position: relative; overflow: hidden;
    }
    .stat-item strong { display: block; font-size: 2rem; font-family: 'Syncopate'; margin-bottom: 5px; }
    .stat-item span { color: #888; font-size: 0.8rem; font-weight: 700; }

    .table-card {
      background: var(--card); border-radius: 25px; border: 1px solid var(--border);
      overflow: hidden; backdrop-filter: blur(10px);
    }
    .controls { padding: 20px; border-bottom: 1px solid var(--border); display: flex; gap: 15px; flex-wrap: wrap; }
    .controls input, .controls select {
      padding: 15px 20px; border-radius: 15px; border: 1px solid var(--border);
      background: rgba(0,0,0,0.5); color: #fff; outline: none; transition: 0.3s; font-family: 'Cairo';
    }
    .controls input { flex: 2; min-width: 250px; }
    .controls select { flex: 1; cursor: pointer; }

    table { width: 100%; border-collapse: collapse; }
    th { padding: 20px; text-align: right; color: var(--primary); font-size: 0.8rem; border-bottom: 1px solid var(--border); }
    td { padding: 20px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    
    .user-row:hover { background: rgba(255,255,255,0.02); }
    .banned-row { opacity: 0.4; filter: grayscale(1); }

    .avatar {
      width: 45px; height: 45px; border-radius: 12px; background: linear-gradient(45deg, var(--primary), var(--secondary));
      display: flex; align-items: center; justify-content: center; font-weight: 900; color: #000;
    }
    .status-badge { padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 900; }
    .status-active { background: rgba(0, 255, 195, 0.1); color: var(--success); }
    .status-banned { background: rgba(255, 0, 85, 0.1); color: var(--danger); }

    .action-btn {
      width: 35px; height: 35px; border-radius: 10px; border: 1px solid var(--border);
      background: transparent; cursor: pointer; transition: 0.3s; color: #fff;
    }
    .btn-points:hover { background: var(--primary); color: #000; }
    .btn-ban-toggle:hover { background: var(--danger); color: #fff; }

    .pagination { padding: 20px; display: flex; justify-content: center; gap: 15px; }
    .hidden { display: none !important; }

    @media (max-width: 768px) {
      .controls { flex-direction: column; }
      th:nth-child(3), td:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>

  <div id="loginBox">
    <div class="auth-box">
      <h2>SECURE ACCESS</h2>
      <input id="adminPass" type="password" placeholder="ENTER MASTER KEY" />
      <button id="loginBtn">UNLOCK SYSTEM</button>
    </div>
  </div>

  <div id="main-ui" class="wrap hidden">
    <header>
      <h1>CORE <span style="font-weight:300; opacity:0.5;">DATABASE</span></h1>
      <div style="display:flex; gap:10px;">
        <button onclick="resetAndLoad()" class="action-btn" style="width:auto; padding:0 20px;">🔄 Sync</button>
        <button id="logoutBtn" class="action-btn" style="width:auto; padding:0 20px; border-color:var(--danger); color:var(--danger);">LOGOUT</button>
      </div>
    </header>

    <div class="metrics">
      <div class="stat-item">
        <strong id="metricTotal">0</strong> <span>إجمالي المستخدمين</span>
      </div>
      <div class="stat-item" style="border-color:var(--secondary);">
        <strong id="metricActive">...</strong> <span>الحالة: متصل</span>
      </div>
    </div>

    <div class="table-card">
      <div class="controls">
        <input id="searchInput" type="text" placeholder="البحث بالايميل...">
        <select id="sortSelect" onchange="resetAndLoad()">
          <option value="lastLogin">آخر تسجيل دخول</option>
          <option value="points">الأعلى نقاطاً</option>
        </select>
      </div>

      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>المستخدم</th>
              <th>الرصيد</th>
              <th>الحالة</th>
              <th>آخر نشاط</th>
              <th>إجراءات</th>
            </tr>
          </thead>
          <tbody id="usersTbody"></tbody>
        </table>
      </div>

      <div class="pagination">
        <button id="prevBtn" class="action-btn" style="width:auto; padding:0 30px;">البداية</button>
        <button id="nextBtn" class="action-btn" style="width:auto; padding:0 30px; background:var(--primary); color:#000;">التالي (عرض 10)</button>
      </div>
    </div>
  </div>

  <script>
    let lastDocId = null;

    async function apiRequest(data) {
      try {
        const res = await fetch('/api/admin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        if (res.status === 401) { toggleUI(false); return null; }
        return res.json();
      } catch(e) { return null; }
    }

    function resetAndLoad() {
      lastDocId = null;
      loadData();
    }

    async function loadData(isNext = false) {
      const search = document.getElementById('searchInput').value;
      const sortBy = document.getElementById('sortSelect').value;
      
      const res = await apiRequest({
        action: 'get_users',
        lastId: isNext ? lastDocId : null,
        searchQuery: search,
        sortBy: sortBy
      });

      if (res && res.users) {
        renderTable(res.users);
        document.getElementById('metricTotal').textContent = res.total;
        if (res.users.length > 0) {
            lastDocId = res.users[res.users.length - 1].id;
        }
      }
    }

    function renderTable(users) {
      const tbody = document.getElementById('usersTbody');
      tbody.innerHTML = '';
      users.forEach(u => {
        const isBanned = u.status === 'banned';
        const tr = document.createElement('tr');
        tr.className = `user-row ${isBanned ? 'banned-row' : ''}`;
        
        tr.innerHTML = `
          <td>
            <div style="display:flex; align-items:center; gap:15px;">
              <div class="avatar">${(u.name || 'A').charAt(0)}</div>
              <div>
                <div style="font-weight:900;">${u.name || 'مستخدم'}</div>
                <div style="font-size:0.7rem; color:#666;">${u.email}</div>
              </div>
            </div>
          </td>
          <td><span style="color:var(--primary); font-weight:900;">🪙 ${Number(u.points || 0).toLocaleString()}</span></td>
          <td><span class="status-badge ${isBanned ? 'status-banned' : 'status-active'}">${isBanned ? 'BANNED' : 'ACTIVE'}</span></td>
          <td style="font-size:0.75rem; color:#888;">${u.lastLoginText}</td>
          <td>
            <div style="display:flex; gap:8px;">
              <button onclick="editPoints('${u.id}', ${u.points})" class="action-btn btn-points">🪙</button>
              <button onclick="toggleBan('${u.id}', '${u.status}')" class="action-btn btn-ban-toggle">${isBanned ? '🔓' : '🚫'}</button>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function editPoints(uid, current) {
      const p = prompt("القيمة الجديدة:", current);
      if (p !== null && !isNaN(p)) {
        const res = await apiRequest({ action: 'edit_points', uid, points: p });
        if (res?.success) loadData();
      }
    }

    async function toggleBan(uid, currentStatus) {
      const nextStatus = currentStatus === 'banned' ? 'active' : 'banned';
      if (confirm(`تحويل الحالة إلى ${nextStatus}؟`)) {
        const res = await apiRequest({ action: 'toggle_ban', uid, status: nextStatus });
        if (res?.success) loadData();
      }
    }

    function toggleUI(isLoggedIn) {
      document.getElementById('loginBox').classList.toggle('hidden', isLoggedIn);
      document.getElementById('main-ui').classList.toggle('hidden', !isLoggedIn);
    }

    document.getElementById('loginBtn').onclick = async () => {
      const pass = document.getElementById('adminPass').value;
      const res = await apiRequest({ action: 'admin_login', password: pass });
      if (res?.success) { toggleUI(true); loadData(); } else { alert("رمز خاطئ"); }
    };

    document.getElementById('logoutBtn').onclick = () => {
      document.cookie = "adminToken=; max-age=0; path=/";
      location.reload();
    };

    document.getElementById('nextBtn').onclick = () => loadData(true);
    document.getElementById('prevBtn').onclick = () => resetAndLoad();

    let searchTimer;
    document.getElementById('searchInput').oninput = () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => resetAndLoad(), 800);
    };

    window.onload = () => { if(document.cookie.includes('adminToken')) { toggleUI(true); loadData(); } };
  </script>
</body>
</html>
