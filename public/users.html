<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AM REWARDS | إدارة المستخدمين</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #00f2ff;
      --secondary: #7000ff;
      --bg-dark: #0a0e27;
      --bg-darker: #050811;
      --card-bg: rgba(20, 28, 60, 0.5);
      --border-color: rgba(0, 242, 255, 0.1);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --success: #22c55e;
      --danger: #ef4444;
      --gold: #fbbf24;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, var(--bg-darker) 0%, var(--bg-dark) 100%);
      color: var(--text-primary);
      min-height: 100vh;
      background-attachment: fixed;
    }

    /* ✅ Auth Gate */
    #loginBox {
      position: fixed;
      inset: 0;
      background: var(--bg-darker);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      opacity: 1;
      transition: opacity 0.3s ease;
    }

    #loginBox.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .auth-box {
      width: 100%;
      max-width: 420px;
      padding: 40px;
      background: linear-gradient(135deg, rgba(0, 242, 255, 0.1), rgba(112, 0, 255, 0.1));
      border: 2px solid var(--primary);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 242, 255, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      text-align: center;
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .auth-box h2 {
      font-family: 'Inter', sans-serif;
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--primary);
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    .auth-box input {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 20px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      background: rgba(0, 0, 0, 0.3);
      color: var(--text-primary);
      text-align: center;
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: 0.3s;
    }

    .auth-box input:focus {
      border-color: var(--primary);
      background: rgba(0, 242, 255, 0.05);
      box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #000;
      font-weight: 900;
      cursor: pointer;
      font-family: inherit;
      transition: 0.3s;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 242, 255, 0.3);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ✅ Main */
    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 30px 20px;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ✅ Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 35px;
      padding: 25px 30px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      backdrop-filter: blur(20px);
    }

    header h1 {
      font-family: 'Inter', sans-serif;
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0;
    }

    header h1 span {
      opacity: 0.6;
      font-weight: 400;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .btn-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      background: transparent;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 1.2rem;
      transition: 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
    }

    .btn-icon:hover {
      border-color: var(--primary);
      background: rgba(0, 242, 255, 0.1);
    }

    .btn-logout {
      border-color: var(--danger) !important;
      color: var(--danger) !important;
    }

    .btn-logout:hover {
      background: rgba(239, 68, 68, 0.15) !important;
    }

    /* ✅ Stats */
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 35px;
    }

    .stat-item {
      padding: 25px 30px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      animation: fadeIn 0.5s ease;
    }

    .stat-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: linear-gradient(180deg, var(--primary), var(--secondary));
    }

    .stat-item strong {
      display: block;
      font-size: 2.5rem;
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      margin: 15px 0;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-item span {
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 600;
    }

    /* ✅ Table */
    .table-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      animation: fadeIn 0.5s ease 0.1s both;
    }

    .controls {
      padding: 20px 30px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .controls input,
    .controls select {
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      background: rgba(0, 0, 0, 0.2);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: 0.3s;
    }

    .controls input {
      flex: 1;
      min-width: 250px;
    }

    .controls input:focus,
    .controls select:focus {
      border-color: var(--primary);
      background: rgba(0, 242, 255, 0.05);
      box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
    }

    .table-scroll {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      padding: 18px 30px;
      text-align: right;
      color: var(--primary);
      font-weight: 700;
      font-size: 0.85rem;
      border-bottom: 2px solid var(--border-color);
      background: rgba(0, 242, 255, 0.03);
      letter-spacing: 0.5px;
    }

    td {
      padding: 18px 30px;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.95rem;
      transition: 0.2s;
    }

    tbody tr:hover {
      background: rgba(0, 242, 255, 0.05);
    }

    /* ✅ Avatar */
    .avatar {
      width: 45px;
      height: 45px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      color: #000;
      margin-right: 12px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .user-detail {
      font-weight: 700;
    }

    .user-email {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* ✅ Badges */
    .status-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 900;
      letter-spacing: 0.5px;
    }

    .status-active {
      background: rgba(34, 197, 94, 0.15);
      color: var(--success);
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .status-banned {
      background: rgba(239, 68, 68, 0.15);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    /* ✅ Action Buttons */
    .action-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      background: transparent;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 1rem;
      transition: 0.3s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      margin-left: 8px;
    }

    .action-btn:hover {
      border-color: var(--primary);
      background: rgba(0, 242, 255, 0.1);
      color: var(--primary);
    }

    .btn-ban:hover {
      border-color: var(--danger) !important;
      background: rgba(239, 68, 68, 0.1) !important;
      color: var(--danger) !important;
    }

    /* ✅ Pagination */
    .pagination {
      padding: 20px 30px;
      display: flex;
      justify-content: center;
      gap: 12px;
      border-top: 1px solid var(--border-color);
    }

    .btn-page {
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      background: transparent;
      color: var(--text-primary);
      cursor: pointer;
      font-weight: 700;
      font-family: inherit;
      transition: 0.3s;
    }

    .btn-page:hover,
    .btn-page.active {
      border-color: var(--primary);
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #000;
    }

    /* ✅ Responsive */
    @media (max-width: 768px) {
      .wrap { padding: 15px; }
      header { flex-direction: column; gap: 15px; align-items: flex-start; }
      header h1 { font-size: 1.5rem; }
      .metrics { grid-template-columns: 1fr; }
      .controls { flex-direction: column; }
      th, td { padding: 12px 15px; font-size: 0.85rem; }
      .user-info { flex-direction: column; gap: 8px; }
      .avatar { margin-right: 0; }
    }

    .hidden { display: none !important; }

    /* ✅ Toast */
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 16px 24px;
      border-radius: 12px;
      background: var(--card-bg);
      border-left: 4px solid var(--primary);
      color: var(--text-primary);
      font-weight: 700;
      box-shadow: 0 10px 30px rgba(0, 242, 255, 0.2);
      z-index: 12000;
      animation: slideInRight 0.3s ease;
    }

    @keyframes slideInRight {
      from { transform: translateX(400px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .toast.success { border-left-color: var(--success); }
    .toast.danger { border-left-color: var(--danger); }
  </style>
</head>
<body>

  <!-- ✅ Login -->
  <div id="loginBox">
    <div class="auth-box">
      <h2>👥 مدير المستخدمين</h2>
      <input id="adminPass" type="password" placeholder="أدخل رمز الوصول" />
      <button id="loginBtn" class="btn-primary">دخول النظام</button>
      <p style="margin-top: 20px; color: var(--text-secondary); font-size: 0.9rem;">
        يتطلب صلاحيات إدارية للوصول
      </p>
    </div>
  </div>

  <!-- ✅ Main -->
  <div id="main-ui" class="wrap hidden">
    <header>
      <div>
        <h1>👥 إدارة <span>المستخدمين</span></h1>
      </div>
      <div class="header-actions">
        <button id="syncBtn" class="btn-icon" title="تحديث البيانات">🔄</button>
        <button id="logoutBtn" class="btn-icon btn-logout" title="تسجيل الخروج">🚪</button>
      </div>
    </header>

    <div class="metrics">
      <div class="stat-item">
        <span>👥 إجمالي المستخدمين</span>
        <strong id="metricTotal">0</strong>
      </div>
      <div class="stat-item" style="border-color: var(--success);">
        <span>✅ الحالة: نشط</span>
        <strong id="metricActive" style="color: var(--success);">متصل</strong>
      </div>
    </div>

    <div class="table-card">
      <div class="controls">
        <input id="searchInput" type="text" placeholder="ابحث باسم أو بريد...">
        <select id="sortSelect" onchange="resetAndLoad()">
          <option value="lastLogin">📅 آخر تسجيل دخول</option>
          <option value="points">🪙 الأعلى نقاطاً</option>
        </select>
      </div>

      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>المستخدم</th>
              <th>الرصيد</th>
              <th>الحالة</th>
              <th>آخر نشاط</th>
              <th>الإجراءات</th>
            </tr>
          </thead>
          <tbody id="usersTbody">
            <tr>
              <td colspan="5" style="text-align: center; padding: 40px;">جاري التحميل...</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="pagination">
        <button id="prevBtn" class="btn-page">← السابق</button>
        <button id="nextBtn" class="btn-page">التالي →</button>
      </div>
    </div>
  </div>

  <script>
    let lastDocId = null;

    async function apiRequest(data) {
      try {
        const res = await fetch('/api/admin_users', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...data, module: 'users' })
        });
        if (res.status === 401) {
          toggleUI(false);
          showToast('جلسة غير صالحة', 'danger');
          return null;
        }
        return res.json();
      } catch (e) {
        showToast('خطأ في الاتصال', 'danger');
        return null;
      }
    }

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function resetAndLoad() {
      lastDocId = null;
      loadData();
    }

    async function loadData(isNext = false) {
      const search = document.getElementById('searchInput').value;
      const sortBy = document.getElementById('sortSelect').value;

      const res = await apiRequest({
        action: 'get_users',
        lastId: isNext ? lastDocId : null,
        searchQuery: search,
        sortBy: sortBy
      });

      if (res && res.users) {
        renderTable(res.users);
        document.getElementById('metricTotal').textContent = res.total;
        if (res.users.length > 0) {
          lastDocId = res.users[res.users.length - 1].id;
        }
      }
    }

    function renderTable(users) {
      const tbody = document.getElementById('usersTbody');
      tbody.innerHTML = users.length === 0 ?
        '<tr><td colspan="5" style="text-align: center; color: var(--text-secondary); padding: 40px;">لا توجد بيانات</td></tr>' :
        users.map(u => {
          const isBanned = u.status === 'banned';
          return `
            <tr style="${isBanned ? 'opacity: 0.5;' : ''}">
              <td>
                <div class="user-info">
                  <div class="avatar">${(u.name || 'A').charAt(0).toUpperCase()}</div>
                  <div>
                    <div class="user-detail">${u.name || 'مستخدم'}</div>
                    <div class="user-email">${u.email}</div>
                  </div>
                </div>
              </td>
              <td>
                <span style="color: var(--gold); font-weight: 900;">🪙 ${Number(u.points || 0).toLocaleString()}</span>
              </td>
              <td>
                <span class="status-badge ${isBanned ? 'status-banned' : 'status-active'}">
                  ${isBanned ? '❌ محظور' : '✅ نشط'}
                </span>
              </td>
              <td style="font-size: 0.8rem; color: var(--text-secondary);">${u.lastLoginText}</td>
              <td>
                <button onclick="editPoints('${u.id}', ${u.points})" class="action-btn" title="تعديل النقاط">🪙</button>
                <button onclick="toggleBan('${u.id}', '${u.status}')" class="action-btn btn-ban" title="${isBanned ? 'فك الحظر' : 'حظر المستخدم'}">
                  ${isBanned ? '🔓' : '🚫'}
                </button>
              </td>
            </tr>
          `;
        }).join('');
    }

    async function editPoints(uid, current) {
      const newPoints = prompt('🪙 أدخل عدد النقاط الجديد:', current);
      if (newPoints !== null && !isNaN(newPoints)) {
        const res = await apiRequest({ action: 'edit_points', uid, points: newPoints });
        if (res?.success) {
          showToast('✅ تم تحديث النقاط', 'success');
          loadData();
        }
      }
    }

    async function toggleBan(uid, currentStatus) {
      const nextStatus = currentStatus === 'banned' ? 'active' : 'banned';
      if (confirm(`هل تريد تغيير الحالة إلى ${nextStatus === 'banned' ? '🚫 محظور' : '✅ نشط'}؟`)) {
        const res = await apiRequest({ action: 'toggle_ban', uid, status: nextStatus });
        if (res?.success) {
          showToast(`✅ تم تغيير الحالة بنجاح`, 'success');
          loadData();
        }
      }
    }

    function toggleUI(isLoggedIn) {
      document.getElementById('loginBox').classList.toggle('hidden', isLoggedIn);
      document.getElementById('main-ui').classList.toggle('hidden', !isLoggedIn);
    }

    document.getElementById('loginBtn').onclick = async () => {
      const btn = document.getElementById('loginBtn');
      const pass = document.getElementById('adminPass').value;

      if (!pass) {
        showToast('⚠️ أدخل رمز الوصول', 'warning');
        return;
      }

      btn.disabled = true;
      btn.textContent = '⏳ جاري التحقق...';

      const res = await apiRequest({ action: 'admin_login', password: pass });
      if (res?.success) {
        toggleUI(true);
        loadData();
        showToast('✅ تم تسجيل الدخول بنجاح', 'success');
      } else {
        showToast('❌ رمز وصول غير صحيح', 'danger');
      }

      btn.disabled = false;
      btn.textContent = 'دخول النظام';
    };

    document.getElementById('logoutBtn').onclick = () => {
      document.cookie = 'adminToken=; max-age=0; path=/';
      location.reload();
    };

    document.getElementById('syncBtn').onclick = resetAndLoad;
    document.getElementById('nextBtn').onclick = () => loadData(true);
    document.getElementById('prevBtn').onclick = resetAndLoad;

    let searchTimer;
    document.getElementById('searchInput').oninput = () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(resetAndLoad, 800);
    };

    window.onload = () => {
      if (document.cookie.includes('adminToken')) {
        toggleUI(true);
        loadData();
      }
    };
  </script>
</body>
                             </html>
