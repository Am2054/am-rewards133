<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AM Rewards - منطقة الأرباح</title>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-firestore-compat.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #0b0e14; font-family: 'Cairo', sans-serif; color: white; overflow: hidden; }
        
        /* الهيدر العلوي */
        .header-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 65px;
            background: rgba(11, 14, 20, 0.95); backdrop-filter: blur(8px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; box-sizing: border-box; border-bottom: 2px solid #00f2ff; z-index: 9999;
        }

        .user-info { display: flex; align-items: center; gap: 10px; }
        .points-box {
            background: linear-gradient(135deg, #00c6ff, #00f2ff);
            color: #000; padding: 6px 15px; border-radius: 50px; font-weight: bold;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        /* حاوية حائط العروض */
        .offers-frame {
            position: absolute; top: 65px; left: 0; width: 100%; height: calc(100% - 65px);
            border: none;
        }

        #loading-screen {
            position: fixed; inset: 0; background: #0b0e14; 
            display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
    </style>
</head>
<body>

<div id="loading-screen">جاري تأمين الاتصال بالمجرة...</div>

<div class="header-bar">
    <div style="font-weight: bold; color: #00f2ff; letter-spacing: 1px;">AM REWARDS</div>
    <div class="user-info">
        <div class="points-box">رصيدك: <span id="user-points">0</span> 💰</div>
    </div>
</div>

<div id="offers-container" style="height: 100%;">
    </div>

<script>
    // --- بيانات مشروعك في Firebase (انقلها من الـ Console) ---
    const firebaseConfig = {
        apiKey: "AIzaSy...",
        authDomain: "am-rewards.firebaseapp.com",
        projectId: "am-rewards",
        storageBucket: "am-rewards.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };
    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.firestore();

    auth.onAuthStateChanged(user => {
        if (user) {
            // تحديث النقاط لايف
            db.collection("users").doc(user.uid).onSnapshot(doc => {
                if (doc.exists) {
                    document.getElementById("user-points").innerText = doc.data().referralPoints || 0;
                }
                document.getElementById("loading-screen").style.display = "none";
            });

            // تحميل الـ Locker وربطه بـ UID المستخدم
            loadLocker(user.uid);
        } else {
            // لو مش مسجل دخول يطرده برا
            window.location.href = "login.html";
        }
    });

    function loadLocker(uid) {
        const lockerUrl = `https://bestreward.eu/iframe/e41fe138-380c-11f1-9c7f-129a1c289511&s1=${uid}`;
        const container = document.getElementById("offers-container");
        
        container.innerHTML = `
            <iframe src="${lockerUrl}" 
                    class="offers-frame"
                    sandbox="allow-top-navigation allow-scripts allow-same-origin allow-popups allow-forms">
            </iframe>`;
    }
</script>

</body>
</html>
