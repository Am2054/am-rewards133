<!-- shortlinks.html - محسّن -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AM REWARDS | تحدي الروابط المختصرة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root {
      --bg: #020617;
      --card: rgba(15, 23, 42, 0.9);
      --gold: #f5c542;
      --accent: #00f2ff;
      --text: #f8fafc;
      --border: rgba(0, 242, 255, 0.1);
      --danger: #f87171;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      background-image: radial-gradient(circle at top, #1e1b4b, #020617);
      min-height: 100vh;
      direction: rtl;
    }

    .header-section {
      text-align: center;
      margin-bottom: 30px;
    }

    h2 {
      color: var(--gold);
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 15px;
    }

    #user-points {
      background: var(--card);
      border: 1px solid var(--gold);
      padding: 12px 30px;
      border-radius: 50px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      color: var(--gold);
    }

    .filter-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: #94a3b8;
      padding: 10px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      transition: 0.3s;
    }

    .filter-btn.active {
      background: var(--accent);
      color: #020617;
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
    }

    .filter-btn:hover:not(.active) {
      border-color: var(--accent);
      color: var(--accent);
    }

    #links-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .link-card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 30px 20px;
      border-radius: 28px;
      position: relative;
      text-align: center;
      transition: 0.4s;
      backdrop-filter: blur(12px);
      overflow: hidden;
    }

    .link-card:hover {
      transform: translateY(-10px);
      border-color: var(--accent);
    }

    .reward-badge {
      position: absolute;
      top: -12px;
      right: 25px;
      background: var(--gold);
      color: #000;
      padding: 4px 15px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 900;
      box-shadow: 0 4px 15px rgba(245, 197, 66, 0.3);
    }

    .diff-label {
      font-size: 0.75rem;
      font-weight: 700;
      margin-bottom: 10px;
      display: block;
    }

    .easy { color: #4ade80; }
    .medium { color: #facc15; }
    .hard { color: #f87171; animation: blink 1.5s infinite; }

    @keyframes blink { 50% { opacity: 0.6; } }

    .btn-action {
      width: 100%;
      padding: 14px;
      border-radius: 15px;
      border: none;
      font-weight: 900;
      cursor: pointer;
      background: var(--accent);
      color: #020617;
      font-size: 1.05rem;
      transition: 0.3s;
    }

    .btn-action:hover:not(:disabled) {
      box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
      transform: translateY(-2px);
    }

    .btn-action:disabled {
      background: #1e293b;
      color: #64748b;
      cursor: not-allowed;
    }

    .timer-lock {
      margin-top: 18px;
      font-size: 0.85rem;
      color: #94a3b8;
      font-weight: 600;
    }

    .back-nav {
      margin-top: 60px;
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    .btn-nav {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 25px;
      border-radius: 15px;
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-nav:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>
<body>

  <div class="header-section">
    <h2>مركز تحدي الروابط</h2>
    <div id="user-points">🪙 رصيد النقاط: <span id="points-val">0</span></div>
  </div>

  <div class="filter-container">
    <button class="filter-btn active" onclick="filterLinks('all', this)">الكل</button>
    <button class="filter-btn" onclick="filterLinks('easy', this)">سهل ✅</button>
    <button class="filter-btn" onclick="filterLinks('medium', this)">متوسط ⚡</button>
    <button class="filter-btn" onclick="filterLinks('hard', this)">صعب 🔥</button>
  </div>

  <div id="links-container"></div>

  <div class="back-nav">
    <a href="dashboard.html" class="btn-nav">🔙 العودة للرئيسية</a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0",
      authDomain: "am--rewards.firebaseapp.com",
      projectId: "am--rewards"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const LINK_COOLDOWN = 24 * 60 * 60 * 1000;
    let currentFilter = 'all';
    let lastLinks = {};
    let isProcessing = false;

    const shortlinks = [
      { id: 0, title: "رابط رقم 1", url: "https://swiftlnx.com/O9fy5YtU", difficulty: "متوسط", points: 2.5, class: "medium", type: "medium" },
      { id: 1, title: "رابط رقم 2", url: "https://exe.io/vxcI5", difficulty: "سهل", points: 1.5, class: "easy", type: "easy" },
      { id: 2, title: "رابط رقم 3", url: "https://uii.io/wyy7xt", difficulty: "سهل", points: 1.5, class: "easy", type: "easy" },
      { id: 3, title: "رابط رقم 4", url: "https://short-jambo.ink/fswqjuSL", difficulty: "متوسط", points: 2.5, class: "medium", type: "medium" },
      { id: 4, title: "رابط رقم 5", url: "https://tpi.li/1yhN", difficulty: "سهل", points: 1.5, class: "easy", type: "easy" },
      { id: 5, title: "رابط رقم 6", url: "https://shrinkme.click/iMlwz", difficulty: "سهل", points: 1.5, class: "easy", type: "easy" },
      { id: 6, title: "رابط رقم 7", url: "https://revlink.pro/KHBXnaU", difficulty: "صعب", points: 4, class: "hard", type: "hard" },
      { id: 7, title: "رابط رقم 8", url: "https://oii.la/fVqC9YyA", difficulty: "سهل", points: 1.5, class: "easy", type: "easy" },
      { id: 8, title: "رابط رقم 9", url: "https://gplinks.co/DXrOS", difficulty: "سهل", points: 1.5, class: "easy", type: "easy" },
      { id: 9, title: "رابط رقم 10", url: "https://nitro-link.com/PVVy", difficulty: "متوسط", points: 2.5, class: "medium", type: "medium" },
      { id: 10, title: "رابط رقم 11", url: "https://www.short-fly.com/T0I15Rv", difficulty: "سهل", points: 1.5, class: "easy", type: "easy" },
      { id: 11, title: "رابط رقم 12", url: "https://Shortig.com/lin/53bfd2", difficulty: "متوسط", points: 2.5, class: "medium", type: "medium" },
      { id: 12, title: "رابط رقم 13", url: "https://xpshort.com/hBC7", difficulty: "سهل", points: 1.5, class: "easy", type: "easy" },
      { id: 13, title: "رابط رقم 14", url: "http://easy4skip.com/1xGAnqI4", difficulty: "صعب", points: 4, class: "hard", type: "hard" },
      { id: 14, title: "رابط رقم 15", url: "https://linkjust.com/4KnViKd6rWvEctQ", difficulty: "متوسط", points: 2.5, class: "medium", type: "medium" },
      { id: 15, title: "رابط رقم 16", url: "https://seturl.in/9jjxXX", difficulty: "سهل", points: 1.5, class: "easy", type: "easy" }
    ];

    let currentUser = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }

      currentUser = user;

      if (new URLSearchParams(window.location.search).get('verify')) {
        handleVerification();
      }

      onSnapshot(doc(db, "users", user.uid), (snap) => {
        const data = snap.data() || {};
        document.getElementById("points-val").textContent = data.points || 0;

        // ✅ تحميل آخر الروابط من collection
        loadUserLinks(user.uid);
      });
    });

    async function loadUserLinks(uid) {
      try {
        const q = query(collection(db, "users", uid, "lastLinks"));
        const snap = await getDocs(q);

        lastLinks = {};
        snap.forEach(doc => {
          lastLinks[doc.id] = doc.data().timestamp?.toMillis?.() || doc.data().timestamp || 0;
        });

        renderUI();
      } catch (error) {
        console.error("Error loading links:", error);
        renderUI();
      }
    }

    window.filterLinks = (type, btn) => {
      currentFilter = type;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderUI();
    };

    function renderUI() {
      const container = document.getElementById("links-container");
      container.innerHTML = "";
      const now = Date.now();

      const filtered = shortlinks.filter(link => currentFilter === 'all' || link.type === currentFilter);

      filtered.forEach((item) => {
        const lastTime = lastLinks[item.id.toString()] || 0;
        const isLocked = lastTime && (now - lastTime < LINK_COOLDOWN);

        const card = document.createElement("div");
        card.className = "link-card";

        let timerHTML = "";
        if (isLocked) {
          const diff = LINK_COOLDOWN - (now - lastTime);
          const h = Math.floor(diff / 3600000);
          const m = Math.floor((diff % 3600000) / 60000);
          timerHTML = `<div class="timer-lock">⏳ يعود بعد ${h} س و ${m} د</div>`;
        }

        card.innerHTML = `
          <div class="reward-badge">+${item.points} ن</div>
          <span class="diff-label ${item.class}">${item.difficulty}</span>
          <p style="font-weight: 700; margin: 10px 0;">${item.title}</p>
          <button class="btn-action" ${isLocked ? "disabled" : ""} onclick="window.openLink(${item.id}, '${item.url}')">
            ${isLocked ? "تمت بنجاح" : "اضغط الآن"}
          </button>
          ${timerHTML}
        `;
        container.appendChild(card);
      });
    }

    async function handleVerification() {
      const linkIdx = localStorage.getItem('p_idx');
      if (!linkIdx || !currentUser) return;

      const sessionRef = doc(db, "linkSessions", currentUser.uid + "_" + linkIdx);
      const snap = await getDoc(sessionRef);

      if (!snap.exists()) {
        Swal.fire('خطأ', 'لم يتم العثور على جلسة صالحة!', 'error');
        return;
      }

      const correctCode = snap.data().code;
      const currentLink = shortlinks.find(l => l.id == linkIdx);
      const pointsToGive = currentLink ? currentLink.points : 1.5;

      let options = [
        correctCode.toString(),
        (Math.floor(10 + Math.random() * 89)).toString(),
        (Math.floor(10 + Math.random() * 89)).toString()
      ].sort(() => Math.random() - 0.5);

      let buttonsHtml = `<div style="display: flex; flex-direction: column; gap: 15px;">
        ${options.map(opt => `<button onclick="window.submitVerify('${opt}', ${pointsToGive}, ${linkIdx})" style="background: #1e293b; color: white; border: 1px solid #00f2ff; padding: 15px; border-radius: 12px; font-size: 1.5rem; font-weight: bold; cursor: pointer;">${opt}</button>`).join('')}
      </div>`;

      Swal.fire({
        title: 'تحقق من الرمز',
        html: `<p style="color: #cbd5e1;">اضغط على الرقم الذي رأيته:</p>${buttonsHtml}`,
        showConfirmButton: false,
        background: '#0f172a',
        color: '#fff',
        allowOutsideClick: false
      });
    }

    window.submitVerify = async (selectedCode, pts, idx) => {
      if (isProcessing) return;
      isProcessing = true;
      Swal.showLoading();

      try {
        const response = await fetch('/api/verify-link', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userId: currentUser.uid,
            linkIdx: idx,
            selectedCode: selectedCode,
            points: pts
          })
        });

        const data = await response.json();

        if (response.ok) {
          // ✅ تسجيل الرابط في collection
          const linkData = shortlinks.find(l => l.id == idx);

// 1️⃣ تسجيل global
await addDoc(collection(db, "lastLinks"), {
  userId: currentUser.uid,
  linkId: idx,
  title: linkData?.title || "",
  url: linkData?.url || "",
  difficulty: linkData?.difficulty || "",
  type: linkData?.type || "",
  points: pts,
  timestamp: new Date()
});

// 2️⃣ تسجيل آخر مرة (للكول داون)
await setDoc(
  doc(db, "users", currentUser.uid, "lastLinks", idx.toString()),
  { timestamp: new Date(), points: pts }
);

          Swal.fire({
            title: 'كفو!',
            text: `تم إضافة ${data.points} نقطة بنجاح ✅`,
            icon: 'success'
          });
        } else {
          Swal.fire('فشل!', data.error || 'حدث خطأ ما.', 'error');
        }
      } catch (e) {
        Swal.fire('خطأ', 'تعذر الاتصال بالخادم', 'error');
      } finally {
        isProcessing = false;
        localStorage.removeItem('p_idx');
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    };

    window.openLink = (i, url) => {
      localStorage.setItem("p_idx", i);
      window.location.href = url;
    };
  </script>
</body>
</html>
