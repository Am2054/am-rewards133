<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AM REWARDS | مركز المهام</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #030712; --card: rgba(17, 24, 39, 0.8); --gold: #f5c542; --accent: #00fa9a; --text: #eef2f7; }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; direction: rtl; background-image: radial-gradient(circle at top, #1e293b, #030712); min-height: 100vh; }
    .header-section { text-align: center; margin-bottom: 30px; }
    #user-points { background: var(--card); border: 1px solid var(--gold); padding: 10px 25px; border-radius: 50px; display: inline-flex; align-items: center; gap: 10px; font-weight: 900; color: var(--gold); box-shadow: 0 0 20px rgba(245, 197, 66, 0.1); }
    #links-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1100px; margin: 0 auto; }
    .link-card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); padding: 25px; border-radius: 24px; text-align: center; position: relative; transition: 0.3s; backdrop-filter: blur(10px); }
    .link-card.completed { opacity: 0.5; filter: grayscale(1); border-color: var(--accent); }
    .reward-badge { position: absolute; top: -10px; right: 20px; background: var(--gold); color: #000; padding: 2px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 900; }
    .btn-action { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; background: var(--accent); color: #030712; transition: 0.3s; }
    .btn-action:disabled { background: #1e293b; color: #64748b; cursor: not-allowed; }
  </style>
</head>
<body>

  <div class="header-section">
    <h2 style="color:var(--gold); font-weight:900;">مركز مهام الروابط 🕯️</h2>
    <div id="user-points">🪙 رصيد النقاط: <span id="points-val">0</span></div>
    <p id="status" style="color:var(--accent); font-size:0.9rem; margin-top:10px;">جاري المزامنة...</p>
  </div>

  <div id="links-container"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0",
  authDomain: "am--rewards.firebaseapp.com",
  databaseURL: "https://am--rewards-default-rtdb.firebaseio.com",
  projectId: "am--rewards"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// قائمة الـ 15 رابطاً بأسماء مبسطة
const shortlinks = [
  {id: "1", title:"رابط رقم 1", url:"https://swiftlnx.com/O9fy5YtU"},
  {id: "2", title:"رابط رقم 2", url:"https://exe.io/vxcI5"},
  {id: "3", title:"رابط رقم 3", url:"https://yshorten.com/VXYGS"},
  {id: "4", title:"رابط رقم 4", url:"https://short-jambo.ink/fswqjuSL"},
  {id: "5", title:"رابط رقم 5", url:"https://tpi.li/1yhN"},
  {id: "6", title:"رابط رقم 6", url:"https://shrinkme.click/iMlwz"},
  {id: "7", title:"رابط رقم 7", url:"https://revlink.pro/KHBXnaU"},
  {id: "8", title:"رابط رقم 8", url:"https://oii.la/fVqC9YyA"},
  {id: "9", title:"رابط رقم 9", url:"https://gplinks.co/DXrOS"},
  {id: "10", title:"رابط رقم 10", url:"https://go.link4earn.in/ixK6H"},
  {id: "11", title:"رابط رقم 11", url:"https://www.short-fly.com/T0I15Rv"},
  {id: "12", title:"رابط رقم 12", url:"https://lnbz.la/pD7BbjM6"},
  {id: "13", title:"رابط رقم 13", url:"https://droplink.co/gVfgtj"},
  {id: "14", title:"رابط رقم 14", url:"http://easy4skip.com/1xGAnqI4"},
  {id: "15", title:"رابط رقم 15", url:"https://linkjust.com/4KnViKd6rWvEctQ"}
];

onAuthStateChanged(auth, (user) => {
  if (!user) { window.location.href = "login.html"; return; }
  
  onValue(ref(db, `users/${user.uid}/points`), (snap) => {
    document.getElementById("points-val").textContent = snap.val() || 0;
  });

  onValue(ref(db, `users_tasks/${user.uid}`), (snap) => {
    renderUI(snap.val() || {});
    document.getElementById("status").textContent = "📡 النظام متصل";
  });
});

function renderUI(completedTasks) {
  const container = document.getElementById("links-container");
  container.innerHTML = "";

  shortlinks.forEach((item) => {
    const isDone = completedTasks[item.id] && completedTasks[item.id].status === "completed";
    
    const card = document.createElement("div");
    card.className = `link-card ${isDone ? 'completed' : ''}`;
    card.innerHTML = `
      <div class="reward-badge">+2 ن</div>
      <p>${item.title}</p>
      <button class="btn-action" ${isDone ? "disabled" : ""} 
        onclick="window.open('${item.url}', '_blank')">
        ${isDone ? "تم الإتمام ✅" : "تنفيذ المهمة"}
      </button>
    `;
    container.appendChild(card);
  });
}
</script>
</body>
</html>
