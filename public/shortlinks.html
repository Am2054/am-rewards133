<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AM REWARDS | مركز الروابط المختصرة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root { --bg: #020617; --card: rgba(15, 23, 42, 0.9); --gold: #f5c542; --accent: #00f2ff; --text: #f8fafc; --border: rgba(0, 242, 255, 0.1); }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; background-image: radial-gradient(circle at top, #1e1b4b, #020617); min-height: 100vh; direction: rtl; }
    .header-section { text-align: center; margin-bottom: 40px; }
    h2 { color: var(--gold); font-size: 2rem; font-weight: 900; margin-bottom: 15px; }
    #user-points { background: var(--card); border: 1px solid var(--gold); padding: 12px 30px; border-radius: 50px; display: inline-flex; align-items: center; gap: 10px; font-weight: 900; color: var(--gold); }
    #links-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; }
    .link-card { background: var(--card); border: 1px solid var(--border); padding: 30px 20px; border-radius: 28px; position: relative; text-align: center; transition: 0.4s; backdrop-filter: blur(12px); }
    .link-card:hover { transform: translateY(-10px); border-color: var(--accent); }
    .reward-badge { position: absolute; top: -12px; right: 25px; background: var(--gold); color: #000; padding: 4px 15px; border-radius: 10px; font-size: 0.8rem; font-weight: 900; }
    .btn-action { width: 100%; padding: 14px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; background: var(--accent); color: #020617; font-size: 1.05rem; }
    .btn-action:disabled { background: #1e293b; color: #64748b; cursor: not-allowed; }
    .timer-lock { margin-top: 18px; font-size: 0.85rem; color: #94a3b8; font-weight: 600; }
    .back-nav { margin-top: 60px; display: flex; justify-content: center; gap: 15px; }
    .btn-nav { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); padding: 12px 25px; border-radius: 15px; text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>

  <div class="header-section">
    <h2>مركز مهام الروابط المختصرة</h2>
    <div id="user-points">🪙 رصيد النقاط: <span id="points-val">0</span></div>
    <div id="status">📡 متصل بالنظام...</div>
  </div>

  <div id="links-container"></div>

  <div class="back-nav">
    <a href="dashboard.html" class="btn-nav">🔙 العودة للرئيسية</a>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = { apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", authDomain: "am--rewards.firebaseapp.com", projectId: "am--rewards" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const LINK_COOLDOWN = 24 * 60 * 60 * 1000;
const shortlinks = [
  {title:"رابط رقم 1", url:"https://swiftlnx.com/O9fy5YtU"},
  {title:"رابط رقم 2", url:"https://exe.io/vxcI5"},
  {title:"رابط رقم 3", url:"https://yshorten.com/VXYGS"},
  {title:"رابط رقم 4", url:"https://short-jambo.ink/fswqjuSL"},
  {title:"رابط رقم 5", url:"https://tpi.li/1yhN"},
  {title:"رابط رقم 6", url:"https://shrinkme.click/iMlwz"},
  {title:"رابط رقم 7", url:"https://revlink.pro/KHBXnaU"},
  {title:"رابط رقم 8", url:"https://oii.la/fVqC9YyA"},
  {title:"رابط رقم 9", url:"https://gplinks.co/DXrOS"},
  {title:"رابط رقم 10", url:"https://go.link4earn.in/ixK6H"},
  {title:"رابط رقم 11", url:"https://www.short-fly.com/T0I15Rv"},
  {title:"رابط رقم 12", url:"https://lnbz.la/pD7BbjM6"},
  {title:"رابط رقم 13", url:"https://droplink.co/gVfgtj"},
  {title:"رابط رقم 14", url:"http://easy4skip.com/1xGAnqI4"},
  {title:"رابط رقم 15", url:"https://linkjust.com/4KnViKd6rWvEctQ"}
];

let currentUserRef = null;
let serverTimeOffset = 0;

onAuthStateChanged(auth, async (user) => {
  if (!user) { location.href = "index.html"; return; }
  currentUserRef = doc(db, "users", user.uid);
  
  const nowRef = doc(db, "system", "time");
  await setDoc(nowRef, { time: serverTimestamp() });
  const nowSnap = await getDoc(nowRef);
  serverTimeOffset = (nowSnap.data()?.time?.toMillis() || Date.now()) - Date.now();

  // التحقق إذا كان عائداً من الصفحة السرية
  if (new URLSearchParams(window.location.search).get('verify')) {
      handleVerification();
  }

  onSnapshot(currentUserRef, (snap) => {
    const data = snap.data() || {};
    document.getElementById("points-val").textContent = data.points || 0;
    renderUI(data.lastLinks || {});
  });
});

async function handleVerification() {
    const correctCode = localStorage.getItem('gate_token');
    const linkIdx = localStorage.getItem('p_idx');
    if (!correctCode || !linkIdx) return;

    // توليد خيارات عشوائية
    const options = [correctCode, Math.floor(10+Math.random()*89), Math.floor(10+Math.random()*89)].sort();

    const { value: selectedCode } = await Swal.fire({
        title: 'تحقق من الهوية',
        text: 'ما هو الرقم الذي رأيته في الصفحة السابقة؟',
        input: 'radio',
        inputOptions: options.reduce((obj, val) => ({ ...obj, [val]: val }), {}),
        confirmButtonText: 'تأكيد الرمز',
        background: '#0f172a', color: '#fff',
        allowOutsideClick: false
    });

    if (selectedCode === correctCode) {
        try {
            await updateDoc(currentUserRef, {
                points: increment(2),
                [`lastLinks.${linkIdx}`]: serverTimestamp()
            });
            Swal.fire('نجاح!', 'تم إضافة 2 نقطة لحسابك', 'success');
        } catch (e) { console.error(e); }
    } else {
        Swal.fire('فشل', 'الرقم غير صحيح، لم يتم احتساب النقاط', 'error');
    }
    
    localStorage.removeItem('gate_token');
    localStorage.removeItem('p_idx');
    // تنظيف الرابط من الـ parameter
    window.history.replaceState({}, document.title, window.location.pathname);
}

function renderUI(lastLinks) {
  const container = document.getElementById("links-container");
  container.innerHTML = "";
  const now = Date.now() + serverTimeOffset;

  shortlinks.forEach((item, i) => {
    const lastTime = lastLinks[i]?.toMillis ? lastLinks[i].toMillis() : (lastLinks[i] || 0);
    const isLocked = lastTime && (now - lastTime < LINK_COOLDOWN);
    const card = document.createElement("div");
    card.className = "link-card";
    let timerHTML = "";
    if (isLocked) {
      const diff = LINK_COOLDOWN - (now - lastTime);
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      timerHTML = `<div class="timer-lock">⏳ متاح بعد ${h} س و ${m} د</div>`;
    }
    card.innerHTML = `
      <div class="reward-badge">+2 ن</div>
      <p>${item.title}</p>
      <button class="btn-action" ${isLocked ? "disabled" : ""} onclick="window.openLink(${i}, '${item.url}')">
        ${isLocked ? "مهمة مكتملة" : "ابدأ المهمة"}
      </button>
      ${timerHTML}
    `;
    container.appendChild(card);
  });
}

window.openLink = (i, url) => {
  localStorage.setItem("p_idx", i);
  window.location.href = url;
};
</script>
</body>
</html>
