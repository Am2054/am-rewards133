<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري تحضير المهمة...</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    
    <script>(function(s){s.dataset.zone='10857324',s.src='https://al5sm.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>

    <style>
        body { background: #020617; color: white; font-family: 'Cairo', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .gate-box { text-align: center; padding: 30px; border: 2px solid #00f2ff; border-radius: 25px; background: rgba(0, 242, 255, 0.05); width: 90%; max-width: 400px; box-shadow: 0 0 40px rgba(0, 242, 255, 0.1); }
        .code-display { font-size: 5rem; font-weight: 900; color: #f5c542; margin: 20px 0; display: none; text-shadow: 0 0 20px rgba(245, 197, 66, 0.4); }
        .loader { width: 60px; height: 60px; border: 5px solid #1e293b; border-top: 5px solid #00f2ff; border-radius: 50%; margin: 20px auto; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="gate-box">
        <h2 id="status">جاري فحص الإعلان..</h2>
        <div class="loader" id="loader"></div>
        <div class="code-display" id="randomCode">--</div>
        <p id="timer-text">سيظهر الكود بعد <span id="secs">20</span> ثانية</p>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", authDomain: "am--rewards.firebaseapp.com", projectId: "am--rewards" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const code = Math.floor(100 + Math.random() * 899);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            await setDoc(doc(db, "linkSessions", user.uid + "_video_task"), {
                code: code.toString(),
                used: false,
                createdAt: serverTimestamp()
            });
            startTimer();
        } else { window.location.href = "index.html"; }
    });

    function startTimer() {
        let timeLeft = 20;
        const countdown = setInterval(() => {
            timeLeft--;
            document.getElementById('secs').innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(countdown);
                document.getElementById('loader').style.display = "none";
                document.getElementById('status').innerText = "احفظ الكود السري:";
                document.getElementById('randomCode').innerText = code;
                document.getElementById('randomCode').style.display = "block";
                document.getElementById('timer-text').innerText = "جاري إعادتك للمكافأة خلال 5 ثوانٍ...";
                setTimeout(() => { window.location.href = "ads.html?verify=true"; }, 5000);
            }
        }, 1000);
    }
</script>
</body>
</html>
