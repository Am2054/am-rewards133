<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Router Guardian Ultra Pro | v7.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --accent: #7d33ff;
            --bg: #050811;
            --card: rgba(16, 22, 36, 0.9);
            --danger: #ff4757;
            --warning: #ffa502;
            --success: #2ed573;
        }

        body {
            font-family: 'Tajawal', sans-serif; margin: 0; color: white;
            background: var(--bg); overflow-x: hidden;
            background-image: radial-gradient(circle at 10% 20%, rgba(0, 242, 255, 0.05) 0%, transparent 40%);
        }

        /* بار النقاط العلوي */
        .points-bar {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(11, 15, 25, 0.8); backdrop-filter: blur(10px);
            padding: 10px 20px; border-bottom: 1px solid rgba(0, 242, 255, 0.2);
            display: flex; justify-content: space-between; align-items: center;
        }
        .points-display { background: rgba(0, 242, 255, 0.1); padding: 5px 15px; border-radius: 50px; border: 1px solid var(--primary); font-size: 14px; font-weight: 900; color: var(--primary); }

        .container { width: 92%; max-width: 450px; margin: 20px auto; padding-bottom: 50px; }

        .header { text-align: center; padding: 20px 0; }
        .header h1 { 
            font-size: 28px; font-weight: 900; margin: 0; 
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .card {
            background: var(--card); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .section-title { font-size: 14px; color: var(--primary); margin-bottom: 15px; font-weight: 900; display: flex; align-items: center; gap: 8px; }

        .input-group { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 12px; margin-bottom: 12px; }
        .input-group label { display: block; font-size: 10px; color: #94a3b8; margin-bottom: 5px; }
        select, input { width: 100%; background: transparent; border: none; color: white; font-family: 'Tajawal'; font-size: 15px; outline: none; }

        .device-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; background: rgba(255,255,255,0.03); padding: 10px 15px; border-radius: 18px; }
        .counter { display: flex; align-items: center; gap: 15px; }
        .counter button { width: 32px; height: 32px; border-radius: 10px; border: 1px solid var(--primary); background: transparent; color: var(--primary); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .counter span { font-weight: 900; font-size: 18px; min-width: 25px; text-align: center; color: var(--primary); }

        .btn-glow {
            width: 100%; padding: 20px; border-radius: 20px; border: none;
            background: linear-gradient(45deg, var(--accent), var(--primary));
            color: white; font-weight: 900; font-size: 17px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(125, 51, 255, 0.3);
        }

        #resultsPanel { display: none; margin-top: 25px; animation: slideUp 0.6s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .result-main { text-align: center; padding: 25px; border-radius: 30px; border: 2px solid transparent; }
        .days-circle { font-size: 48px; font-weight: 900; display: block; margin: 10px 0; color: #fff; }
        
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .stat-item { background: rgba(255,255,255,0.06); padding: 12px; border-radius: 15px; text-align: center; }
        .stat-item small { display: block; font-size: 10px; opacity: 0.7; margin-bottom: 5px; }
        .stat-item b { font-size: 16px; color: var(--primary); }

        .usage-mini-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 12px 0; overflow: hidden; }
        .usage-mini-fill { height: 100%; width: 0; transition: 1.5s ease-out; }
        
        .tip-text { font-size: 12px; line-height: 1.5; margin-top: 15px; padding: 10px; border-radius: 10px; background: rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="points-bar">
    <div style="font-size: 12px; font-weight: bold;">الخدمة: <span style="color:var(--success)">مجانية بالكامل 🔓</span></div>
    <div class="points-display">🪙 النقاط: <span id="userPoints">0</span></div>
</div>

<div class="container">
    <div class="header">
        <h1>ROUTER GUARDIAN 🛡️</h1>
        <p style="font-size: 11px; opacity: 0.7; letter-spacing: 1px;">نظام تحليل استهلاك المجرة</p>
    </div>

    <div class="card">
        <div class="section-title">📡 تفاصيل الاشتراك</div>
        <div class="input-group">
            <label>حجم الباقة الكلي</label>
            <select id="quota">
                <option value="140">140 GB</option>
                <option value="200" selected>200 GB</option>
                <option value="250">250 GB</option>
                <option value="400">400 GB</option>
                <option value="600">600 GB</option>
            </select>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="input-group">
                <label>الجيجا المتبقية</label>
                <input type="number" id="current_left" value="50">
            </div>
            <div class="input-group">
                <label>يوم التجديد</label>
                <input type="number" id="reset_day" value="1" min="1" max="31">
            </div>
        </div>
    </div>

    <div class="card">
        <div class="section-title">📊 نمط الاستخدام</div>
        <div class="device-row">
            <span>📱 موبايلات</span>
            <div class="counter">
                <button onclick="change('mobs', -1)">-</button>
                <span id="mobs">2</span>
                <button onclick="change('mobs', 1)">+</button>
            </div>
        </div>
        <div class="device-row">
            <span>📺 شاشات سمارت</span>
            <div class="counter">
                <button onclick="change('tvs', -1)">-</button>
                <span id="tvs">1</span>
                <button onclick="change('tvs', 1)">+</button>
            </div>
        </div>
        <div class="input-group">
            <label>جودة المشاهدة المعتادة</label>
            <select id="quality">
                <option value="0.35">توفير (360p)</option>
                <option value="0.8" selected>متوسطة (720p HD)</option>
                <option value="2.8">عالية (1080p FHD)</option>
            </select>
        </div>
    </div>

    <button class="btn-glow" id="mainBtn" onclick="processAnalysis()">ابدأ التحليل الفوري ⚡</button>

    <div id="resultsPanel">
        <div class="card result-main" id="statusCard">
            <span id="resIcon" style="font-size: 40px;">✅</span>
            <div class="days-circle" id="resDays">0 يوم</div>
            <div id="resMsg" style="font-weight: 900; font-size: 18px; margin-bottom: 15px;">وضع مستقر</div>
            
            <div class="usage-mini-bar">
                <div id="safeFill" class="usage-mini-fill"></div>
            </div>

            <div class="grid-stats">
                <div class="stat-item">
                    <small>ساعات يوتيوب</small>
                    <b id="videoHours">0</b>
                </div>
                <div class="stat-item">
                    <small>أيام للتجديد</small>
                    <b id="daysToReset">0</b>
                </div>
            </div>

            <div class="tip-text" id="resTip"></div>
        </div>
        <button class="btn-glow" style="background:transparent; border:1px solid var(--primary); margin-top:10px;" onclick="window.location.href='dashboard.html'">العودة للمجرة 🌌</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", 
        authDomain: "am--rewards.firebaseapp.com", 
        projectId: "am--rewards" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            const userRef = doc(db, "users", user.uid);
            onSnapshot(userRef, (snap) => {
                if (snap.exists()) {
                    document.getElementById('userPoints').innerText = snap.data().points || 0;
                }
            });
        }
    });

    // الوظيفة الآن تعمل محلياً بالكامل بدون طلبات Backend
    window.processAnalysis = function() {
        const left = parseFloat(document.getElementById('current_left').value) || 0;
        const quota = parseFloat(document.getElementById('quota').value);

        if (left > quota) {
            return Swal.fire("بيانات غير منطقية", "الجيجا المتبقية أكبر من الباقة!", "warning");
        }

        // إظهار لودينج وهمي سريع لإعطاء انطباع بالذكاء
        Swal.fire({
            title: 'جاري التحليل الرقمي...',
            timer: 800,
            timerProgressBar: true,
            didOpen: () => { Swal.showLoading(); }
        }).then(() => {
            analyze(); // تنفيذ الحسابات
        });
    }
</script>

<script>
    function change(id, val) {
        const el = document.getElementById(id);
        let curr = parseInt(el.innerText);
        if (curr + val >= 0) el.innerText = curr + val;
    }

    function analyze() {
        const left = parseFloat(document.getElementById('current_left').value) || 0;
        const resetDay = parseInt(document.getElementById('reset_day').value) || 1;
        const mobs = parseInt(document.getElementById('mobs').innerText);
        const tvs = parseInt(document.getElementById('tvs').innerText);
        const qual = parseFloat(document.getElementById('quality').value);

        const now = new Date();
        const today = now.getDate();
        const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        let daysToReset = resetDay > today ? resetDay - today : (lastDay - today) + resetDay;

        const daily = (mobs * 0.5) + (tvs * (3 * qual));
        let canLast = daily > 0 ? Math.floor(left / daily) : 30;
        canLast = Math.min(canLast, 60);

        let vHours = qual > 1 ? Math.floor(left / 2.5) : Math.floor(left / 0.8);

        document.getElementById('resultsPanel').style.display = 'block';
        document.getElementById('resDays').innerText = canLast + " يوم";
        document.getElementById('videoHours').innerText = vHours + " س";
        document.getElementById('daysToReset').innerText = daysToReset + " ي";

        const card = document.getElementById('statusCard');
        const icon = document.getElementById('resIcon');
        const msg = document.getElementById('resMsg');
        const tip = document.getElementById('resTip');
        const fill = document.getElementById('safeFill');

        let safetyScore = Math.min((canLast / daysToReset) * 100, 100);
        fill.style.width = safetyScore + "%";

        if (canLast >= daysToReset) {
            icon.innerText = "🛡️";
            msg.innerText = "أنت في منطقة الأمان";
            msg.style.color = "var(--success)";
            card.style.borderColor = "var(--success)";
            fill.style.background = "var(--success)";
            tip.innerText = "نصيحة: باقتك ستكفيك حتى التجديد وسيفيض معك رصيد جيجا إضافي.";
        } else if (canLast >= daysToReset / 2) {
            icon.innerText = "⚠️";
            msg.innerText = "تحذير: استهلاك مرتفع";
            msg.style.color = "var(--warning)";
            card.style.borderColor = "var(--warning)";
            fill.style.background = "var(--warning)";
            tip.innerText = `نصيحة: الباقة ستنتهي قبل موعدها بـ ${daysToReset - canLast} أيام. قلل جودة الفيديو فوراً.`;
        } else {
            icon.innerText = "🚨";
            msg.innerText = "خطر: الباقة ستنفد قريباً";
            msg.style.color = "var(--danger)";
            card.style.borderColor = "var(--danger)";
            fill.style.background = "var(--danger)";
            tip.innerText = "نصيحة: استهلاكك الحالي سيدمر الباقة خلال أيام. افصل الشاشات الذكية وتجنب التحميل.";
        }

        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>
</body>
</html>
