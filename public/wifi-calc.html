<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Router Guardian Ultra Pro | v7.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --accent: #7d33ff;
            --bg: #050811;
            --card: rgba(16, 22, 36, 0.9);
            --danger: #ff4757;
            --warning: #ffa502;
            --success: #2ed573;
        }

        body {
            font-family: 'Tajawal', sans-serif; margin: 0; color: white;
            background: var(--bg); overflow-x: hidden;
            background-image: radial-gradient(circle at 10% 20%, rgba(0, 242, 255, 0.05) 0%, transparent 40%);
        }

        .container { width: 92%; max-width: 450px; margin: 20px auto; padding-bottom: 50px; }

        .header { text-align: center; padding: 20px 0; }
        .header h1 { 
            font-size: 28px; font-weight: 900; margin: 0; 
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .card {
            background: var(--card); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .section-title { font-size: 14px; color: var(--primary); margin-bottom: 15px; font-weight: 900; display: flex; align-items: center; gap: 8px; }

        .input-group { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 12px; margin-bottom: 12px; }
        .input-group label { display: block; font-size: 10px; color: #94a3b8; margin-bottom: 5px; }
        select, input { width: 100%; background: transparent; border: none; color: white; font-family: 'Tajawal'; font-size: 15px; outline: none; }

        .device-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; background: rgba(255,255,255,0.03); padding: 10px 15px; border-radius: 18px; }
        .counter { display: flex; align-items: center; gap: 15px; }
        .counter button { width: 32px; height: 32px; border-radius: 10px; border: 1px solid var(--primary); background: transparent; color: var(--primary); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .counter button:active { background: var(--primary); color: #000; }
        .counter span { font-weight: 900; font-size: 18px; min-width: 25px; text-align: center; color: var(--primary); }

        .btn-glow {
            width: 100%; padding: 20px; border-radius: 20px; border: none;
            background: linear-gradient(45deg, var(--accent), var(--primary));
            color: white; font-weight: 900; font-size: 17px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(125, 51, 255, 0.3); margin-top: 10px;
        }

        /* لوحة النتائج الجديدة */
        #resultsPanel { display: none; margin-top: 25px; animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

        .result-main { text-align: center; padding: 25px; border-radius: 30px; position: relative; overflow: hidden; }
        .res-status-icon { font-size: 50px; margin-bottom: 10px; display: block; }
        .days-circle { font-size: 45px; font-weight: 900; display: block; line-height: 1; margin: 10px 0; }
        
        .tip-box { background: rgba(255,255,255,0.07); padding: 15px; border-radius: 15px; margin-top: 20px; font-size: 13px; border-right: 4px solid var(--primary); line-height: 1.6; }

        .usage-mini-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .usage-mini-fill { height: 100%; width: 0; transition: 1.5s ease-out; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>ROUTER GUARDIAN 🛡️</h1>
        <p style="font-size: 11px; opacity: 0.7; letter-spacing: 1px;">نظام تحليل استهلاك المجرة</p>
    </div>

    <div class="card">
        <div class="section-title">📡 تفاصيل الاشتراك</div>
        <div class="input-group">
            <label>حجم الباقة الكلي</label>
            <select id="quota">
                <option value="140">140 GB</option>
                <option value="200">200 GB</option>
                <option value="250">250 GB</option>
                <option value="400">400 GB</option>
                <option value="600">600 GB</option>
            </select>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="input-group">
                <label>الجيجا المتبقية</label>
                <input type="number" id="current_left" value="50">
            </div>
            <div class="input-group">
                <label>يوم التجديد</label>
                <input type="number" id="reset_day" value="1" min="1" max="31">
            </div>
        </div>
    </div>

    <div class="card">
        <div class="section-title">📊 الاستهلاك اليومي المعتاد</div>
        <div class="device-row">
            <span>📱 موبايلات (تصفح/سوشيال)</span>
            <div class="counter">
                <button onclick="change('mobs', -1)">-</button>
                <span id="mobs">2</span>
                <button onclick="change('mobs', 1)">+</button>
            </div>
        </div>
        <div class="device-row">
            <span>📺 شاشات (يوتيوب/نتفلكس)</span>
            <div class="counter">
                <button onclick="change('tvs', -1)">-</button>
                <span id="tvs">1</span>
                <button onclick="change('tvs', 1)">+</button>
            </div>
        </div>
        
        <div class="input-group">
            <label>جودة الفيديو (عامل الحسم)</label>
            <select id="quality">
                <option value="0.3">توفير (144p - 360p)</option>
                <option value="0.7" selected>متوازن (480p - 720p)</option>
                <option value="2.5">عالي الجودة (1080p+)</option>
            </select>
        </div>

        <div class="input-group">
            <label>تحميلات كبيرة / بلايستيشن</label>
            <select id="heavy">
                <option value="0">لا يوجد</option>
                <option value="2">خفيف (تحديثات بسيطة)</option>
                <option value="8">ثقيل (ألعاب / تورنت)</option>
            </select>
        </div>
    </div>

    <button class="btn-glow" onclick="analyze()">ابدأ الفحص الشامل ⚡</button>

    <div id="resultsPanel">
        <div class="card result-main" id="statusCard">
            <span class="res-status-icon" id="resIcon">✅</span>
            <span style="font-size: 14px; opacity: 0.8;">بناءً على استهلاكك، الباقة ستكفيك لمدة:</span>
            <span class="days-circle" id="resDays">0</span>
            <span id="resMsg" style="font-weight: 900; font-size: 16px;">وضع مستقر</span>
            
            <div class="tip-box" id="resTip">
                جاري تحليل البيانات...
            </div>

            <div style="margin-top: 25px; text-align: right;">
                <div style="display:flex; justify-content:space-between; font-size:11px;">
                    <span>نسبة الأمان حتى موعد التجديد</span>
                    <span id="safePercent">0%</span>
                </div>
                <div class="usage-mini-bar">
                    <div id="safeFill" class="usage-mini-fill"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function change(id, val) {
        const el = document.getElementById(id);
        let curr = parseInt(el.innerText);
        if (curr + val >= 0) el.innerText = curr + val;
    }

    function analyze() {
        // سحب البيانات
        const left = parseFloat(document.getElementById('current_left').value);
        const resetDay = parseInt(document.getElementById('reset_day').value);
        const mobs = parseInt(document.getElementById('mobs').innerText);
        const tvs = parseInt(document.getElementById('tvs').innerText);
        const qual = parseFloat(document.getElementById('quality').value);
        const heavy = parseFloat(document.getElementById('heavy').value);

        // حساب الأيام المتبقية للتجديد
        const now = new Date();
        const today = now.getDate();
        const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        let daysToReset = resetDay > today ? resetDay - today : (lastDay - today) + resetDay;

        // حساب الاستهلاك اليومي التقديري (معادلة مطورة)
        // الموبايل المتوسط يستهلك 0.5 جيجا، الشاشة على حسب الجودة
        const dailyUsage = (mobs * 0.6) + (tvs * (3 * qual)) + heavy;
        
        // كم يوم ستصمد الباقة؟
        let canLast = dailyUsage > 0 ? Math.floor(left / dailyUsage) : 30;

        // إظهار اللوحة
        const panel = document.getElementById('resultsPanel');
        panel.style.display = 'block';
        
        const card = document.getElementById('statusCard');
        const icon = document.getElementById('resIcon');
        const daysLabel = document.getElementById('resDays');
        const msg = document.getElementById('resMsg');
        const tip = document.getElementById('resTip');
        const fill = document.getElementById('safeFill');

        // منطق النتيجة
        daysLabel.innerText = canLast + " يوم";
        
        let safeRatio = Math.min((canLast / daysToReset) * 100, 100);
        document.getElementById('safePercent').innerText = safeRatio.toFixed(0) + "%";
        fill.style.width = safeRatio + "%";

        if (canLast >= daysToReset) {
            card.style.borderColor = "var(--success)";
            icon.innerText = "🛡️";
            msg.innerText = "أنت في منطقة الأمان";
            msg.style.color = "var(--success)";
            fill.style.background = "var(--success)";
            tip.innerHTML = `💡 <b>نصيحة:</b> باقتك ممتازة، سيفيض معك حوالي ${Math.floor(left - (dailyUsage * daysToReset))} جيجا عند التجديد. يمكنك رفع الجودة قليلاً!`;
        } else if (canLast >= daysToReset / 2) {
            card.style.borderColor = "var(--warning)";
            icon.innerText = "⚠️";
            msg.innerText = "تحتاج لترشيد الاستهلاك";
            msg.style.color = "var(--warning)";
            fill.style.background = "var(--warning)";
            tip.innerHTML = `💡 <b>نصيحة:</b> الباقة ستنتهي قبل موعدها بـ ${daysToReset - canLast} أيام. يفضل تقليل جودة اليوتيوب لـ 480p وتجنب التحميلات الكبيرة.`;
        } else {
            card.style.borderColor = "var(--danger)";
            icon.innerText = "🚨";
            msg.innerText = "خطر: الباقة ستنفد فوراً";
            msg.style.color = "var(--danger)";
            fill.style.background = "var(--danger)";
            tip.innerHTML = `💡 <b>نصيحة:</b> استهلاكك عالي جداً! الباقة ستكفيك فقط ${canLast} أيام بينما التجديد بعد ${daysToReset} يوم. افصل الشاشات الذكية أو اشحن باقة إضافية الآن.`;
        }

        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>
</body>
</html>
