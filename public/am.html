<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة رفع الأسئلة</title>
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #0b0e14;">

    <button id="uploadBtn" style="padding: 20px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer;">
        اضغط لرفع كامل أسئلة مترجم (Translator)
    </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", 
            authDomain: "am--rewards.firebaseapp.com", 
            projectId: "am--rewards" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function uploadTranslatorData() {
            const data = {
                title: "مترجم",
                category: "Languages",
                levels: {
                    easy: [
                        { q: "ما هي المهمة الأساسية للمترجم؟", options: ["نقل المعنى من لغة إلى أخرى بدقة", "تصميم الصور", "البرمجة"], answer: 0, tip: "الترجمة ليست نقل كلمات، بل نقل معنى." },
                        { q: "ماذا تعني 'الترجمة الحرفية'؟", options: ["ترجمة كلمة بكلمة دون مراعاة السياق", "ترجمة إبداعية", "لا يوجد"], answer: 0, tip: "غالبًا ما تكون غير دقيقة وتفقد المعنى." },
                        { q: "ما هو الـ 'Target Language'؟", options: ["اللغة الهدف (التي نترجم إليها)", "اللغة المصدر", "لا شيء"], answer: 0, tip: "هي اللغة التي سيقرأ بها الجمهور النص." },
                        { q: "لماذا يعد 'السياق' (Context) مهماً في الترجمة؟", options: ["لأن المعنى يتغير بناءً عليه", "ليس مهماً", "لإطالة النص"], answer: 0, tip: "كلمة واحدة قد تعني أشياء مختلفة في مواقف مختلفة." },
                        { q: "ما هو الـ 'Source Language'؟", options: ["اللغة الأصلية للنص", "اللغة الهدف", "لا شيء"], answer: 0, tip: "هي اللغة التي كُتب بها النص الأصلي." },
                        { q: "كيف تتعامل مع المصطلحات العلمية؟", options: ["بالبحث عن المصطلح المقابل الدقيق", "بالتخمين", "بحذفها"], answer: 0, tip: "الدقة العلمية لا تقبل التخمين." },
                        { q: "ماذا تعني 'التعريب'؟", options: ["نقل النص إلى اللغة العربية بأسلوب طبيعي", "حذف النص", "نسخ النص"], answer: 0, tip: "التعريب الجيد يجعل النص كأنه كتب بالعربية أصلاً." },
                        { q: "ما هو دور القاموس في عمل المترجم؟", options: ["مرجع للتأكد من معاني المفردات", "لكتابة القصص", "لا دور له"], answer: 0, tip: "القاموس هو صديق المترجم الدائم." },
                        { q: "لماذا يجب مراجعة النص المترجم؟", options: ["لضمان سلامته اللغوية وانسيابية المعنى", "لزيادة الكلمات", "لا داعي"], answer: 0, tip: "المسودة الأولى دائماً تحتاج تحسيناً." },
                        { q: "ماذا تعني 'Localization'؟", options: ["تكييف النص ليناسب ثقافة الجمهور المستهدف", "ترجمة حرفية", "لا شيء"], answer: 0, tip: "أكثر من مجرد ترجمة، إنها مواءمة ثقافية." }
                    ],
                    medium: [
                        { q: "كيف تتعامل مع الأمثال الشعبية عند الترجمة؟", options: ["البحث عن مثل مكافئ في اللغة الهدف", "ترجمتها حرفياً", "حذفها"], answer: 0, tip: "المثل يترجم بالمعنى لا باللفظ." },
                        { q: "ماذا يعني الـ 'CAT Tools'؟", options: ["أدوات الترجمة بمساعدة الحاسوب", "قطط", "لا شيء"], answer: 0, tip: "تزيد من سرعة واتساق الترجمة." },
                        { q: "ما هو الفرق بين الترجمة التحريرية والشفهية؟", options: ["التحريرية للنصوص، والشفهية للحديث المباشر", "كلاهما واحد", "الشفهية للنصوص"], answer: 0, tip: "مهارات كل منهما مختلفة تماماً." },
                        { q: "ماذا يعني 'Translation Memory' (ذاكرة الترجمة)؟", options: ["قاعدة بيانات للجمل التي تُرجمت سابقاً", "الذاكرة الشخصية", "لا شيء"], answer: 0, tip: "تمنعك من ترجمة نفس الجملة مرتين." },
                        { q: "كيف تترجم نبرة الصوت (Tone)؟", options: ["باختيار مفردات تناسب نبرة النص الأصلي", "باستخدام كلمات عشوائية", "لا يمكن"], answer: 0, tip: "النص الهزلي يجب أن يترجم بهزلية." },
                        { q: "ماذا تفعل إذا كان النص المصدر غامضاً؟", options: ["طلب توضيح من صاحب النص", "تأليف معنى", "تجاهل الفقرة"], answer: 0, tip: "الغموض في الأصل يجب أن يحل قبل الترجمة." },
                        { q: "ما أهمية فهم ثقافة اللغة الهدف؟", options: ["لتجنب الإساءة أو سوء الفهم", "لا تهم", "للإطالة"], answer: 0, tip: "المترجم هو جسر بين ثقافتين." },
                        { q: "ماذا تعني 'Terminology Management'؟", options: ["توحيد استخدام المصطلحات في كامل المشروع", "تغيير المصطلحات", "لا شيء"], answer: 0, tip: "تضمن أن يكون النص مترابطاً واحترافياً." },
                        { q: "كيف تترجم التلاعب بالألفاظ (Puns)؟", options: ["بإعادة صياغة الفكرة لتناسب اللغة الهدف", "بترجمتها حرفياً", "بحذفها"], answer: 0, tip: "هذا أصعب تحدي للمترجم." },
                        { q: "ما أهمية الـ 'Style Guide' في الترجمة؟", options: ["دليل يحدد القواعد الأسلوبية للمشروع", "كتاب عادي", "لا شيء"], answer: 0, tip: "يضمن تناسق العمل إذا كان هناك عدة مترجمين." }
                    ],
                    hard: [
                        { q: "ما هي أخلاقيات المهنة للمترجم؟", options: ["الأمانة، السرية، والحياد", "السرعة، التخمين، والربح", "الخداع"], answer: 0, tip: "الأمانة في نقل المعنى هي الأساس." },
                        { q: "كيف تترجم نصوصاً قانونية؟", options: ["بالدقة المتناهية والالتزام بالمصطلحات القانونية", "بإعادة صياغة إبداعية", "بتبسيط مخل"], answer: 0, tip: "كلمة واحدة خاطئة قد تسبب مشاكل قانونية." },
                        { q: "ماذا يعني الـ 'Transcreation'؟", options: ["إعادة الإبداع (ترجمة إعلانية إبداعية)", "ترجمة حرفية", "لا شيء"], answer: 0, tip: "ترجمة الرسالة التسويقية وليس الكلمات." },
                        { q: "كيف تتعامل مع المصطلحات الجديدة (Neologisms)؟", options: ["بالبحث عن مقابل أو استعارة أو تعريب", "بتركها كما هي", "بحذفها"], answer: 0, tip: "المترجم يواكب تطور اللغة دائماً." },
                        { q: "ما هو الفرق بين الـ 'Post-editing' والترجمة من الصفر؟", options: ["الـ Post-editing هو تحرير ترجمة آلية", "كلاهما واحد", "الفرق بسيط"], answer: 0, tip: "مهارة الـ Post-editing أصبحت ضرورية." }
                    ],
                    expert: [
                        { q: "ما هو الـ 'Machine Translation' (MT)؟", options: ["الترجمة الآلية عبر الذكاء الاصطناعي", "ترجمة البشر", "لا شيء"], answer: 0, tip: "أداة قوية لكنها تحتاج لمراجعة بشرية." },
                        { q: "ما هي العلاقة بين الترجمة والأنثروبولوجيا؟", options: ["فهم القيم الثقافية خلف اللغة", "لا علاقة", "لا شيء"], answer: 0, tip: "الترجمة أعمق بكثير من مجرد لغويات." },
                        { q: "كيف تترجم النصوص الأدبية المعقدة؟", options: ["بمحاكاة الأسلوب والبناء الفني للكاتب", "بترجمة المعنى فقط", "بتبسيط النص"], answer: 0, tip: "ترجمة الأدب هي فن يضاهي الكتابة." },
                        { q: "ما هو الـ 'Comparative Linguistics' للمترجم؟", options: ["دراسة الفروق اللغوية بين اللغات", "قراءة الكتب", "لا شيء"], answer: 0, tip: "تساعد في فهم لماذا تعمل اللغات بطرق مختلفة." },
                        { q: "كيف تبني 'صوتك الخاص' كمترجم؟", options: ["من خلال سنوات الخبرة وتطوير أسلوب دقيق", "بنسخ الآخرين", "لا يوجد صوت"], answer: 0, tip: "المترجم المتميز له بصمة بأسلوبه." }
                    ]
                }
            };

            try {
                await setDoc(doc(db, "jobs", "Translator"), data);
                alert("تم رفع الـ 30 سؤال لوظيفة مترجم بنجاح! 🚀");
            } catch (e) {
                alert("خطأ: " + e.message);
                console.error(e);
            }
        }

        document.getElementById('uploadBtn').addEventListener('click', uploadTranslatorData);
    </script>
</body>
</html>
