<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة رفع الأسئلة</title>
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #0b0e14;">

    <button id="uploadBtn" style="padding: 20px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer;">
        اضغط لرفع كامل أسئلة Graphic Designer
    </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", 
            authDomain: "am--rewards.firebaseapp.com", 
            projectId: "am--rewards" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function uploadDesignerData() {
            const data = {
                title: "Graphic Designer",
                category: "Design",
                levels: {
                    easy: [
                        { q: "ما هو الفرق الأساسي بين Raster و Vector؟", options: ["الـ Vector لا يفقد جودته عند التكبير", "كلاهما واحد", "الـ Raster أفضل"], answer: 0, tip: "الـ Vector يعتمد على معادلات رياضية." },
                        { q: "ما هو البرنامج الأفضل لتعديل الصور النقطية (Raster)؟", options: ["Adobe Photoshop", "Adobe Illustrator", "Notepad"], answer: 0, tip: "فوتوشوب هو ملك التعديل النقطي." },
                        { q: "ماذا تعني كلمة CMYK؟", options: ["نظام ألوان للطباعة", "نظام ألوان للشاشات", "نوع خط"], answer: 0, tip: "تستخدم للمطبوعات لضمان دقة الألوان." },
                        { q: "ما هو الـ RGB؟", options: ["نظام ألوان للشاشات الرقمية", "نظام طباعة", "برنامج تصميم"], answer: 0, tip: "Red, Green, Blue هو الأساس الرقمي." },
                        { q: "ما هو الـ Logo؟", options: ["شعار العلامة التجارية", "نوع الخط", "صورة فوتوغرافية"], answer: 0, tip: "الشعار هو هوية الشركة البصرية." },
                        { q: "ما هي القاعدة الذهبية في التصميم (Golden Ratio)؟", options: ["نسبة رياضية للتوازن البصري", "قاعدة ألوان", "نوع ملف"], answer: 0, tip: "تستخدم لإنشاء تصميمات مريحة للعين." },
                        { q: "أي برنامج يستخدم للرسوم المتجهة (Vector)؟", options: ["Adobe Illustrator", "Photoshop", "Excel"], answer: 0, tip: "إليستريتور هو الأداة الأساسية للـ Vector." },
                        { q: "ماذا يعني الـ Typography؟", options: ["فن وتنسيق الخطوط", "نوع من الألوان", "تصوير"], answer: 0, tip: "اختيار الخطوط يغير انطباع التصميم بالكامل." },
                        { q: "ما هو الـ Resolution؟", options: ["كثافة البكسل في الصورة", "حجم الملف", "لون التصميم"], answer: 0, tip: "الـ Resolution العالي يعني جودة أوضح." },
                        { q: "ما فائدة الـ Layers؟", options: ["تنظيم عناصر التصميم في طبقات", "حذف الصور", "تلوين الخلفية"], answer: 0, tip: "الطبقات تمنحك تحكماً كاملاً في كل جزء." }
                    ],
                    medium: [
                        { q: "ماذا يعني الـ Branding؟", options: ["بناء الهوية البصرية للشركة", "تصميم لوجو فقط", "رسم صورة"], answer: 0, tip: "البراندينج أوسع من مجرد لوجو." },
                        { q: "ما الفرق بين الـ Opacity والـ Fill؟", options: ["الـ Opacity تؤثر على كل شيء، الـ Fill على البكسل فقط", "لا يوجد فرق", "العكس"], answer: 0, tip: "فرق دقيق يؤثر على تأثيرات الطبقات." },
                        { q: "ماذا يعني الـ 'White Space' في التصميم؟", options: ["المساحة الفارغة المريحة للعين", "خلفية بيضاء", "نقص في التصميم"], answer: 0, tip: "المساحات البيضاء تعطي فخامة ووضوحاً." },
                        { q: "ما هو الـ Mockup؟", options: ["نموذج تجريبي لعرض التصميم في الواقع", "صورة نهائية", "ملف عمل"], answer: 0, tip: "يساعد العميل على تخيل التصميم على المنتج." },
                        { q: "ما هو الـ Bleed في الطباعة؟", options: ["هامش إضافي لقص الورق دون خطأ", "لون الخلفية", "نوع الخط"], answer: 0, tip: "يحمي تصميمك من القصاصات البيضاء." },
                        { q: "ماذا يعني الـ Kerning؟", options: ["تعديل المسافة بين حرفين", "حجم الخط", "لون الحرف"], answer: 0, tip: "دقة Kerning تظهر احترافية المصمم." },
                        { q: "ما هو الـ Pen Tool؟", options: ["أداة لرسم المسارات المعقدة", "أداة تلوين", "فرشاة"], answer: 0, tip: "أهم أداة للتحكم في الأشكال في إليستريتور." },
                        { q: "ماذا يعني 'Visual Hierarchy'؟", options: ["ترتيب العناصر حسب الأهمية", "لون التصميم", "عدد الصور"], answer: 0, tip: "تجعل عين المشاهد تتحرك كما تريد." },
                        { q: "ما هو الـ Smart Object في فوتوشوب؟", options: ["طبقة تحافظ على خصائصها عند التصغير/التكبير", "صورة عادية", "نوع فلتر"], answer: 0, tip: "ميزة أساسية للحفاظ على الجودة." },
                        { q: "ماذا يعني 'Aspect Ratio'؟", options: ["نسبة عرض الصورة لارتفاعها", "حجم الملف", "عدد البكسل"], answer: 0, tip: "الحفاظ عليها يمنع تشوه الصورة." }
                    ],
                    hard: [
                        { q: "ما هو الـ Color Theory؟", options: ["علم نفس وتناغم الألوان", "قائمة ألوان", "تصميم"], answer: 0, tip: "فهم التأثير النفسي للألوان ضروري." },
                        { q: "كيف تصمم 'User Interface' (UI) ناجحة؟", options: ["بالتركيز على سهولة الاستخدام والوضوح", "بكثرة الألوان", "بالتعقيد"], answer: 0, tip: "البساطة هي مفتاح الـ UI." },
                        { q: "ماذا يعني الـ 'Negative Space'؟", options: ["استخدام الفراغ لخلق شكل ذكي", "مساحة غير مستخدمة", "خلفية سوداء"], answer: 0, tip: "أشهر مثال هو شعار FedEx." },
                        { q: "ما هو الـ 'Pixel Art'؟", options: ["فن الرسم بكسل بكسل", "تصميم حديث", "رسم ثلاثي الأبعاد"], answer: 0, tip: "نمط كلاسيكي له جمهوره الخاص." },
                        { q: "ماذا تعني 'Color Gamut'؟", options: ["نطاق الألوان التي يمكن للجهاز عرضها", "اسم اللون", "درجة الإضاءة"], answer: 0, tip: "فهم الـ Gamut يضمن دقة ألوان تصميمك." }
                    ],
                    expert: [
                        { q: "ما هو الـ 'Motion Graphics'؟", options: ["تحريك الرسوم والتصاميم", "تصميم ثابت", "طباعة"], answer: 0, tip: "يضيف حيوية ومعنى للتصميم." },
                        { q: "ماذا يعني مفهوم 'Flat Design'؟", options: ["تصميم بسيط ومسطح بدون تأثيرات 3D", "تصميم واقعي", "تصميم معقد"], answer: 0, tip: "مدرسة تصميم عصرية تركز على البساطة." },
                        { q: "كيف يتم التحضير للطباعة (Pre-press)؟", options: ["ضبط الألوان، النزيف، والصيغ المناسبة", "الحفظ مباشرة", "إرسال ملف العمل"], answer: 0, tip: "التحضير الخاطئ يعني خسارة في الطباعة." },
                        { q: "ما هو الـ 'Brand Guidelines'؟", options: ["دليل استخدام هوية العلامة التجارية", "قائمة أسعار", "نوع خط"], answer: 0, tip: "يضمن ثبات شكل البراند في كل مكان." },
                        { q: "ما هو 'Grids System' في التصميم؟", options: ["هيكل منظم لتوزيع العناصر", "شكل جمالي", "نوع خط"], answer: 0, tip: "يعطي توازناً واحترافية فائقة للتصاميم." }
                    ]
                }
            };

            try {
                await setDoc(doc(db, "jobs", "Graphic_Designer"), data);
                alert("تم رفع الـ 30 سؤال لوظيفة Graphic Designer بنجاح! 🚀");
            } catch (e) {
                alert("خطأ: " + e.message);
                console.error(e);
            }
        }

        document.getElementById('uploadBtn').addEventListener('click', uploadDesignerData);
    </script>
</body>
</html>
