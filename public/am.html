<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة رفع الأسئلة</title>
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #0b0e14;">

    <button id="uploadBtn" style="padding: 20px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer;">
        اضغط لرفع كامل أسئلة مدخل بيانات (Data Entry)
    </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", 
            authDomain: "am--rewards.firebaseapp.com", 
            projectId: "am--rewards" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function uploadDataEntryData() {
            const data = {
                title: "مدخل بيانات",
                category: "Admin",
                levels: {
                    easy: [
                        { q: "ما هي أهم صفة لمدخل البيانات؟", options: ["الدقة والسرعة", "السرعة فقط", "الكتابة الكثير"], answer: 0, tip: "الدقة تمنع الأخطاء المكلفة لاحقاً." },
                        { q: "ما هو الاختصار المستخدم للنسخ (Copy)؟", options: ["Ctrl + C", "Ctrl + V", "Ctrl + X"], answer: 0, tip: "اختصارات لوحة المفاتيح ترفع الإنتاجية." },
                        { q: "ما البرنامج الأكثر استخداماً للجداول؟", options: ["Excel", "Word", "Paint"], answer: 0, tip: "إكسل هو الأداة القياسية لإدارة البيانات." },
                        { q: "ماذا يعني الـ Backup؟", options: ["عمل نسخة احتياطية للبيانات", "حذف البيانات", "نقل البيانات"], answer: 0, tip: "الأمان هو حماية مجهودك من الضياع." },
                        { q: "كيف تسمى عملية إدخال البيانات في النظام؟", options: ["Data Entry", "Data Deletion", "Data Analysis"], answer: 0, tip: "هي عملية تحويل المعلومات الورقية أو الرقمية لقاعدة بيانات." },
                        { q: "ما فائدة التحقق من البيانات (Verification)؟", options: ["للتأكد من صحتها", "لإضاعة الوقت", "لا يوجد"], answer: 0, tip: "المراجعة هي خط الدفاع الأخير ضد الأخطاء." },
                        { q: "ماذا يعني الـ PDF؟", options: ["تنسيق وثيقة محمول", "برنامج تصميم", "لغة برمجة"], answer: 0, tip: "يستخدم لحفظ الملفات بتنسيق ثابت لا يتغير." },
                        { q: "أي مفتاح يستخدم للانتقال للخلية التالية في Excel؟", options: ["Tab", "Esc", "Space"], answer: 0, tip: "زر Tab هو الأسرع للتنقل الأفقي." },
                        { q: "ماذا نفعل عند حدوث خطأ إملائي في قاعدة بيانات؟", options: ["تصحيحه فوراً", "تجاهله", "حذف الصف"], answer: 0, tip: "التصحيح الفوري يضمن سلامة البيانات." },
                        { q: "ما هي السرعة المقبولة للكتابة (WPM)؟", options: ["40-60 كلمة في الدقيقة", "5 كلمات", "لا تهم"], answer: 0, tip: "زيادة السرعة تزيد من حجم الإنجاز اليومي." }
                    ],
                    medium: [
                        { q: "ماذا تعني الصيغة '=SUM(A1:A10)' في Excel؟", options: ["جمع القيم من A1 إلى A10", "ضرب القيم", "حذف القيم"], answer: 0, tip: "الدوال الرياضية توفر ساعات من العمل اليدوي." },
                        { q: "ما الفرق بين Save و Save As؟", options: ["Save As لحفظ نسخة باسم جديد", "كلاهما واحد", "لا فرق"], answer: 0, tip: "استخدم Save As لتجنب الكتابة فوق الملف الأصلي." },
                        { q: "ماذا يعني الـ Database؟", options: ["مجموعة بيانات منظمة", "مستند Word", "صورة"], answer: 0, tip: "قاعدة البيانات هي مخزن منظم للمعلومات." },
                        { q: "كيف تحمي ملف Excel بكلمة سر؟", options: ["من خيارات الحماية (Protect Workbook)", "لا يمكن", "بالتشفير فقط"], answer: 0, tip: "حماية الملفات ضرورية للخصوصية." },
                        { q: "ماذا يعني الـ Filter في إكسل؟", options: ["تصفية البيانات لعرض جزء منها", "حذفها", "تلوينها"], answer: 0, tip: "الفلترة تساعدك في العثور على بيانات محددة." },
                        { q: "ما هو الـ Autofill في إكسل؟", options: ["تعبئة تلقائية للسلاسل", "حذف", "تلوين"], answer: 0, tip: "يوفر وقتك عند كتابة تواريخ أو تسلسلات رقمية." },
                        { q: "ماذا يعني 'Data Integrity'؟", options: ["سلامة ودقة البيانات", "حجم البيانات", "نوع الخط"], answer: 0, tip: "البيانات الخاطئة تعطي نتائج كارثية." },
                        { q: "كيف تتعامل مع البيانات الضخمة (Large Data Sets)؟", options: ["بالتقسيم واستخدام الجداول المحورية", "بالعشوائية", "بالإهمال"], answer: 0, tip: "الجداول المحورية (Pivot Tables) هي الحل الأذكى." },
                        { q: "ماذا يعني تنسيق الملف .csv؟", options: ["قيم مفصولة بفواصل", "صورة", "فيديو"], answer: 0, tip: "هو التنسيق الأكثر شيوعاً لتبادل البيانات." },
                        { q: "ما هي وظيفة الـ Spell Check؟", options: ["التصحيح اللغوي", "الترجمة", "الحذف"], answer: 0, tip: "استخدمه دائماً قبل تسليم أي ملف." }
                    ],
                    hard: [
                        { q: "ما هي الـ Pivot Table؟", options: ["أداة لتحليل وتلخيص البيانات", "نوع من الرسوم", "مفتاح"], answer: 0, tip: "الـ Pivot Table هو سلاح المحترف في إكسل." },
                        { q: "كيف تتجنب التكرار في البيانات؟", options: ["باستخدام خاصية 'Remove Duplicates'", "بالتخمين", "لا يوجد حل"], answer: 0, tip: "التكرار يفسد إحصائياتك." },
                        { q: "ماذا يعني الـ Data Mining؟", options: ["استخراج أنماط من بيانات ضخمة", "إدخال بيانات", "حذف بيانات"], answer: 0, tip: "يستخدم في التحليلات المتقدمة." },
                        { q: "ما أهمية التنسيق الشرطي (Conditional Formatting)؟", options: ["تلوين الخلايا بناءً على قواعد", "إخفاء الخلايا", "حذفها"], answer: 0, tip: "يساعدك في ملاحظة الأرقام الشاذة بسرعة." },
                        { q: "ماذا تفعل عند حدوث عطل أثناء الإدخال؟", options: ["مراجعة آخر حفظ وإبلاغ الإدارة", "ترك الجهاز", "الاستمرار"], answer: 0, tip: "الإبلاغ الفوري يمنع ضياع البيانات." }
                    ],
                    expert: [
                        { q: "ما هو الـ VLOOKUP؟", options: ["دالة للبحث عن قيم في جداول", "نوع طابعة", "تنسيق"], answer: 0, tip: "أقوى دالة لربط البيانات من جداول مختلفة." },
                        { q: "ماذا يعني الـ Macros؟", options: ["أتمتة المهام المتكررة", "نوع معالج", "تصميم"], answer: 0, tip: "الماكرو يحول عمل ساعة كاملة لضغطة زر." },
                        { q: "ما هو الـ SQL؟", options: ["لغة استعلام قواعد البيانات", "برنامج إكسل", "اختصار"], answer: 0, tip: "معرفة SQL ترفع كفاءتك بشكل هائل." },
                        { q: "كيف تضمن أمن البيانات الحساسة؟", options: ["بالتشفير والتحكم في صلاحيات الوصول", "بتركها للجميع", "بنسخها"], answer: 0, tip: "صلاحيات الوصول (Access Rights) هي أساس الأمان." },
                        { q: "ما الفرق بين البيانات الكمية والنوعية؟", options: ["الكمية أرقام والنوعية وصف", "كلاهما واحد", "لا فرق"], answer: 0, tip: "فهم الفرق يغير طريقة تحليل بياناتك." }
                    ]
                }
            };

            try {
                await setDoc(doc(db, "jobs", "Data_Entry"), data);
                alert("تم رفع الـ 30 سؤال لوظيفة مدخل بيانات بنجاح! 🚀");
            } catch (e) {
                alert("خطأ: " + e.message);
                console.error(e);
            }
        }

        document.getElementById('uploadBtn').addEventListener('click', uploadDataEntryData);
    </script>
</body>
</html>
