<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة رفع الأسئلة</title>
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #0b0e14;">

    <button id="uploadBtn" style="padding: 20px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer;">
        اضغط لرفع كامل أسئلة فني/مهندس إلكترونيات
    </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", 
            authDomain: "am--rewards.firebaseapp.com", 
            projectId: "am--rewards" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function uploadElectronicsData() {
            const data = {
                title: "فني/مهندس إلكترونيات",
                category: "Technical",
                levels: {
                    easy: [
                        { q: "ما هي وحدة قياس المقاومة الكهربائية؟", options: ["أوم (Ohm)", "فولت", "أمبير"], answer: 0, tip: "المقاومة تعيق سريان التيار." },
                        { q: "ما فائدة الـ Multimeter؟", options: ["قياس الجهد والتيار والمقاومة", "لحام المكونات", "التبريد"], answer: 0, tip: "هو الأداة الأساسية لأي مهندس إلكترونيات." },
                        { q: "ما هو الـ Diode؟", options: ["عنصر يسمح بمرور التيار في اتجاه واحد", "مقاومة", "مكثف"], answer: 0, tip: "يستخدم بشكل أساسي في توحيد التيار (Rectification)." },
                        { q: "ماذا يعني الـ PCB؟", options: ["لوحة الدائرة المطبوعة", "نوع من الأسلاك", "بطارية"], answer: 0, tip: "هنا يتم تثبيت وتوصيل المكونات الإلكترونية." },
                        { q: "ما هي وظيفة المكثف (Capacitor)؟", options: ["تخزين الطاقة الكهربائية في مجال", "تقليل التيار", "تحويل الحرارة"], answer: 0, tip: "يستخدم كثيراً في تنعيم جهد المصدر." },
                        { q: "ماذا يعني الـ Short Circuit؟", options: ["قصر الدائرة (تماس مباشر)", "انقطاع التيار", "عملية عادية"], answer: 0, tip: "خطر جداً ويسبب تلف المكونات." },
                        { q: "ما هو الـ Transistor؟", options: ["مفتاح أو مكبر للإشارات الكهربائية", "مقاومة", "سلك"], answer: 0, tip: "حجر الأساس في الإلكترونيات الرقمية." },
                        { q: "ما لون السلك الأرضي (Ground) عادة؟", options: ["أسود أو أخضر", "أحمر", "أصفر"], answer: 0, tip: "تختلف المعايير لكن الأسود والأخضر هما الشائع." },
                        { q: "ماذا يقيس الـ Oscilloscope؟", options: ["تغير الجهد مع الزمن (إشارة)", "المقاومة فقط", "التيار الثابت"], answer: 0, tip: "أداة لا غنى عنها لرؤية الإشارات." },
                        { q: "ما هو الـ LED؟", options: ["ثنائي باعث للضوء", "مقاومة حرارية", "مكثف"], answer: 0, tip: "يستخدم في الإضاءة والمؤشرات." }
                    ],
                    medium: [
                        { q: "كيف تفرق بين الـ Series و Parallel في الدوائر؟", options: ["التوالي مسار واحد، التوازي مسارات متعددة", "لا فرق", "التوالي هو التوازي"], answer: 0, tip: "طريقة التوصيل تحدد الجهد والتيار." },
                        { q: "ماذا يعني قانون أوم ($V = I \\times R$)؟", options: ["العلاقة بين الجهد والتيار والمقاومة", "قانون الحرارة", "لا شيء"], answer: 0, tip: "الأساس الذي تبنى عليه كل الدوائر." },
                        { q: "ما هو دور الـ IC (Integrated Circuit)؟", options: ["دمج آلاف المكونات في شريحة واحدة", "تخزين الطاقة", "توصيل التيار"], answer: 0, tip: "هي العقل المدبر لمعظم الأجهزة." },
                        { q: "ماذا يعني الـ Voltage Drop؟", options: ["هبوط الجهد عبر مكون معين", "ارتفاع التيار", "عطل"], answer: 0, tip: "مهم جداً عند تصميم دوائر التغذية." },
                        { q: "ما هي وظيفة الـ Relay؟", options: ["مفتاح كهرومغناطيسي للتحكم في الأحمال", "تخزين طاقة", "مقاومة"], answer: 0, tip: "يسمح بالتحكم في أحمال كبيرة بإشارة ضعيفة." },
                        { q: "ما الفرق بين AC و DC؟", options: ["AC متغير، DC ثابت", "كلاهما واحد", "DC متغير"], answer: 0, tip: "الإلكترونيات تعمل بالـ DC غالباً." },
                        { q: "ماذا يعني الـ Soldering؟", options: ["عملية لحام المكونات بالقصدير", "تنظيف اللوحة", "قياس"], answer: 0, tip: "مهارة أساسية للتثبيت الدائم." },
                        { q: "ماذا يعني الـ Logic Gate؟", options: ["بوابة منطقية (AND, OR, NOT)", "باب المكتب", "نوع مكثف"], answer: 0, tip: "الأساس للعمليات الحسابية في المعالجات." },
                        { q: "ما هو الـ Fuse؟", options: ["عنصر حماية من زيادة التيار", "مفتاح", "بطارية"], answer: 0, tip: "يحمي الدائرة من الاحتراق." },
                        { q: "ماذا يعني الـ Frequency؟", options: ["عدد الدورات في الثانية (Hz)", "الجهد", "المقاومة"], answer: 0, tip: "مهم جداً في دوائر الاتصالات." }
                    ],
                    hard: [
                        { q: "كيف تعمل الدوائر المتكاملة (Op-Amp)؟", options: ["كمكبر للفرق بين جهدين دخل", "كمقاومة", "كبطارية"], answer: 0, tip: "من أكثر المكونات مرونة في التصميم." },
                        { q: "ماذا يعني الـ Power Factor؟", options: ["كفاءة استهلاك القدرة (الحقيقي/الظاهري)", "الجهد", "المقاومة"], answer: 0, tip: "مهم جداً في دوائر الطاقة والكهرباء." },
                        { q: "ما هي دوائر الـ Buck/Boost Converter؟", options: ["دوائر تحويل وتنظيم جهد الـ DC", "دوائر حماية", "دوائر صوت"], answer: 0, tip: "تستخدم بكثرة في شواحن الهاتف والكمبيوتر." },
                        { q: "ما هو الـ ESD وكيف تحمي منه؟", options: ["التفريغ الكهروستاتيكي (استخدام سوار تأريض)", "إطفاء الجهاز", "لا شيء"], answer: 0, tip: "كهرباء جسمك يمكن أن تدمر الـ ICs." },
                        { q: "ما هو الـ Microcontroller؟", options: ["حاسوب مصغر للتحكم في الأنظمة", "محول تيار", "مكثف"], answer: 0, tip: "يبرمج ليقوم بمهام ذكية." }
                    ],
                    expert: [
                        { q: "ما الفرق بين الـ BJT والـ MOSFET؟", options: ["BJT تيار، MOSFET جهد", "كلاهما واحد", "لا فرق"], answer: 0, tip: "كلاهما أنواع ترانزستورات لكن بطرق تحكم مختلفة." },
                        { q: "ما هو الـ Signal Integrity؟", options: ["جودة الإشارة ومنع التشويش", "ارتفاع الجهد", "لا شيء"], answer: 0, tip: "حاسم في سرعات نقل البيانات العالية." },
                        { q: "ما هي دوائر الـ Feedback؟", options: ["دائرة تأخذ جزء من الخرج وتغذي به الدخل", "دائرة إضاءة", "دائرة حماية"], answer: 0, tip: "سر استقرار أداء الدوائر الإلكترونية." },
                        { q: "ماذا تعني الـ Impedance Matching؟", options: ["تطابق المعاوقة لنقل أقصى قدرة", "تساوي الجهد", "تساوي المقاومة"], answer: 0, tip: "ضروري في دوائر التردد العالي والاتصالات." },
                        { q: "ما هي فائدة الـ Optocoupler؟", options: ["عزل الدوائر كهربائياً باستخدام الضوء", "توصيل تيار", "حماية"], answer: 0, tip: "يحمي الدوائر الحساسة من دوائر الضغط العالي." }
                    ]
                }
            };

            try {
                await setDoc(doc(db, "jobs", "Electronics_Tech"), data);
                alert("تم رفع الـ 30 سؤال لوظيفة فني إلكترونيات بنجاح! 🚀");
            } catch (e) {
                alert("خطأ: " + e.message);
                console.error(e);
            }
        }

        document.getElementById('uploadBtn').addEventListener('click', uploadElectronicsData);
    </script>
</body>
</html>
