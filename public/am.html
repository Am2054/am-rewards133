<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة رفع الأسئلة</title>
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #0b0e14;">

    <button id="uploadBtn" style="padding: 20px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer;">
        اضغط لرفع كامل أسئلة دعم فني (Technical Support)
    </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", 
            authDomain: "am--rewards.firebaseapp.com", 
            projectId: "am--rewards" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function uploadTechSupportData() {
            const data = {
                title: "دعم فني",
                category: "Tech",
                levels: {
                    easy: [
                        { q: "ما هو الإجراء الأول عند تعطل برنامج؟", options: ["إعادة تشغيل الجهاز", "حذف الويندوز", "شراء جهاز جديد"], answer: 0, tip: "إعادة التشغيل تحل الكثير من المشاكل البرمجية البسيطة." },
                        { q: "ما هو الـ IP Address؟", options: ["عنوان الجهاز في الشبكة", "اسم المستخدم", "نوع المعالج"], answer: 0, tip: "هو المعرف الرقمي للجهاز داخل أي شبكة." },
                        { q: "كيف نتأكد من اتصال الإنترنت؟", options: ["بفتح المتصفح وتجربة موقع", "بالنظر للكابل فقط", "بإطفاء الكهرباء"], answer: 0, tip: "التجربة العملية هي أسرع وسيلة للتأكد." },
                        { q: "ماذا يعني الـ BIOS؟", options: ["نظام الإدخال والإخراج الأساسي", "برنامج تصاميم", "متصفح إنترنت"], answer: 0, tip: "هو أول نظام يعمل عند تشغيل الكمبيوتر." },
                        { q: "كيف تسمى عملية حذف البيانات نهائياً؟", options: ["Format", "Copy", "Paste"], answer: 0, tip: "الفورمات يمسح كل البيانات من القرص." },
                        { q: "ما فائدة الـ Antivirus؟", options: ["حماية الجهاز من الفيروسات", "تسريع الألعاب", "تحسين الشاشة"], answer: 0, tip: "الحماية من البرمجيات الخبيثة أساسية." },
                        { q: "ماذا يعني الـ RAM؟", options: ["ذاكرة الوصول العشوائي", "القرص الصلب", "الشاشة"], answer: 0, tip: "الرام مسؤولة عن سرعة معالجة البيانات الحالية." },
                        { q: "كيف تفتح مدير المهام (Task Manager)؟", options: ["Ctrl + Alt + Delete", "Alt + F4", "Power Button"], answer: 0, tip: "الاختصار يساعدك في إغلاق البرامج المعلقة." },
                        { q: "ما هو الـ Browser؟", options: ["متصفح للإنترنت", "طابعة", "لوحة مفاتيح"], answer: 0, tip: "مثل كروم أو فايرفوكس." },
                        { q: "ما هو الـ Printer؟", options: ["طابعة", "ماسح ضوئي", "سماعة"], answer: 0, tip: "تستخدم لتحويل المستندات الرقمية لورقية." }
                    ],
                    medium: [
                        { q: "كيف تعالج بطء الجهاز؟", options: ["مسح الملفات المؤقتة وزيادة الرام", "ترك الجهاز كما هو", "تغيير الكيبورد"], answer: 0, tip: "تنظيف الجهاز يحسن الأداء بشكل ملحوظ." },
                        { q: "ماذا تعني 'النسخ الاحتياطي' (Backup)؟", options: ["حفظ نسخة من البيانات", "حذف البيانات", "نقل البيانات لمكان بعيد"], answer: 0, tip: "النسخ الاحتياطي ينقذ البيانات عند حدوث عطل." },
                        { q: "ما هو الـ DNS؟", options: ["ترجمة أسماء المواقع لعناوين IP", "اسم الشاشة", "نوع الكابل"], answer: 0, tip: "بدونه لن تستطيع فتح المواقع بأسمائها." },
                        { q: "كيف تتعامل مع عميل لا يفهم المصطلحات التقنية؟", options: ["استخدام لغة بسيطة وأمثلة", "التحدث بلغة معقدة", "تجاهله"], answer: 0, tip: "التبسيط هو جوهر الدعم الفني الناجح." },
                        { q: "ماذا يعني الـ Cache؟", options: ["ذاكرة مؤقتة لزيادة سرعة التصفح", "نوع من الفيروسات", "اسم معالج"], answer: 0, tip: "تخزين البيانات محلياً يقلل وقت التحميل." },
                        { q: "ماذا تفعل إذا لم تكن هناك إشارة (No Signal) للشاشة؟", options: ["فحص كابل الشاشة والتوصيلات", "تغيير سماعات الصوت", "إعادة تشغيل النت"], answer: 0, tip: "غالباً المشكلة في كابل التوصيل." },
                        { q: "ما هو الـ Firewall؟", options: ["جدار حماية للشبكة", "نظام تبريد", "نوع من أنواع الهارد"], answer: 0, tip: "يمنع الاتصالات غير المصرح بها." },
                        { q: "كيف تفحص اتصال الشبكة باستخدام الـ CMD؟", options: ["بأمر ping", "بأمر exit", "بأمر copy"], answer: 0, tip: "أمر Ping يختبر سرعة واستجابة الاتصال." },
                        { q: "ماذا يعني الـ Driver؟", options: ["برنامج تشغيل القطع", "سائق سيارة", "نوع من الكابلات"], answer: 0, tip: "بدون الدرايفر لن تعمل القطع (كروت الشاشة، الصوت)." },
                        { q: "كيف تحمي حسابك من الاختراق؟", options: ["باستخدام كلمة مرور قوية وتوثيق ثنائي", "استخدام نفس الباسورد", "إعطاؤها للجميع"], answer: 0, tip: "الأمان يبدأ بكلمة سر قوية وخطوة تحقق ثانية." }
                    ],
                    hard: [
                        { q: "ما هو الفرق بين الـ SSD والـ HDD؟", options: ["الـ SSD أسرع بكثير من الـ HDD", "الـ HDD أسرع", "لا فرق"], answer: 0, tip: "الـ SSD تقنية حديثة تعتمد على الرقائق عكس الهارد القديم." },
                        { q: "كيف تتعامل مع 'Blue Screen of Death'؟", options: ["تحليل كود الخطأ وإعادة فحص الهارد والرام", "تجاهلها", "إطفاء الشاشة"], answer: 0, tip: "الشاشة الزرقاء تعني خطأ في النظام أو العتاد." },
                        { q: "ماذا يعني الـ Remote Desktop؟", options: ["التحكم في جهاز عن بعد", "فتح الشاشة", "تغيير إعدادات الصوت"], answer: 0, tip: "يستخدم الدعم الفني للتحكم بأجهزة العملاء." },
                        { q: "كيف تكتشف وجود فيروس بالجهاز؟", options: ["بفحص العمليات غير المعتادة والأداء", "بالتخمين", "لا يمكن"], answer: 0, tip: "البطء المفاجئ والرسائل الغريبة مؤشرات قوية." },
                        { q: "ما هو الـ Packet Loss؟", options: ["ضياع بيانات أثناء النقل", "نوع من الشاشات", "سرعة الإنترنت"], answer: 0, tip: "تسبب تقطيعاً في الصوت والفيديو أثناء المكالمات." }
                    ],
                    expert: [
                        { q: "ماذا يعني Virtualization؟", options: ["إنشاء بيئة وهمية للجهاز", "شراء جهاز جديد", "إطالة عمر الشاشة"], answer: 0, tip: "يسمح بتشغيل أكثر من نظام على جهاز واحد." },
                        { q: "ما هو الـ VLAN؟", options: ["تقسيم الشبكة لمنطقياً", "نوع من كابلات النت", "سرعة المعالج"], answer: 0, tip: "تزيد من أمن وسرعة الشبكات الكبيرة." },
                        { q: "كيف تتعامل مع تسريب بيانات أمني؟", options: ["عزل الأنظمة المتضررة فوراً", "تغيير الخلفية", "ترك الأمر"], answer: 0, tip: "العزل السريع يمنع انتشار الاختراق." },
                        { q: "ما هو الـ OS Kernel؟", options: ["نواة نظام التشغيل", "لوحة التحكم", "نوع كيبورد"], answer: 0, tip: "هي الجزء المسؤول عن التعامل مع العتاد مباشرة." },
                        { q: "كيف تحسن أداء قاعدة البيانات؟", options: ["بعمل Indexing وتحسين الاستعلامات", "بحذف البيانات", "بإعادة التشغيل"], answer: 0, tip: "الـ Indexing يسرع البحث بشكل كبير." }
                    ]
                }
            };

            try {
                await setDoc(doc(db, "jobs", "Technical_Support"), data);
                alert("تم رفع الـ 30 سؤال لوظيفة دعم فني بنجاح! 🚀");
            } catch (e) {
                alert("خطأ: " + e.message);
                console.error(e);
            }
        }

        document.getElementById('uploadBtn').addEventListener('click', uploadTechSupportData);
    </script>
</body>
</html>
