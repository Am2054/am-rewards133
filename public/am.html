<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة AM Rewards للاختبارات</title>
    <style>
        body { font-family: sans-serif; background: #0b0e14; color: white; padding: 20px; }
        .main-title { text-align: center; margin-bottom: 30px; }
        .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 40px; }
        .category-card { background: #1c222d; padding: 30px; border-radius: 20px; text-align: center; cursor: pointer; border: 2px solid #007bff; transition: 0.3s; }
        .category-card:hover { background: #007bff; }
        .job-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .job-card { background: #252d3d; padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; border: 1px solid #444; }
    </style>
</head>
<body>

    <h1 class="main-title">AM Rewards</h1>

    <div class="category-grid">
        <div class="category-card" onclick="fetchData('jobs')"><h3>الوظائف التقنية</h3></div>
        <div class="category-card" onclick="fetchData('interview_general')"><h3>أسئلة الإنترفيو</h3></div>
    </div>

    <div id="displayArea" class="job-grid"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { /* بياناتك هنا */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.fetchData = async (collectionName) => {
            const displayArea = document.getElementById('displayArea');
            displayArea.innerHTML = "جاري التحميل...";
            
            const querySnapshot = await getDocs(collection(db, collectionName));
            displayArea.innerHTML = ""; // مسح القديم
            
            querySnapshot.forEach((doc) => {
                const item = doc.data();
                const card = document.createElement('div');
                card.className = 'job-card';
                card.innerHTML = `<h3>${item.title}</h3>`;
                card.onclick = () => startQuiz(item);
                displayArea.appendChild(card);
            });
        };

        function startQuiz(item) {
            console.log("بدء اختبار: ", item.title);
            // هنا سينتقل الكود لشاشة الأسئلة
        }
    </script>
</body>
</html>
