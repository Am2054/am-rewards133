<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>رفع أسئلة الإنترفيو العامة</title>
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #0b0e14;">

    <button id="uploadBtn" style="padding: 20px; font-size: 18px; background: #ff9800; color: white; border: none; border-radius: 10px; cursor: pointer;">
        اضغط لرفع أسئلة الإنترفيو العامة داخل jobs
    </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", 
            authDomain: "am--rewards.firebaseapp.com", 
            projectId: "am--rewards" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function uploadInterviewData() {
            const data = {
                title: "أسئلة إنترفيو عامة",
                category: "Interview",
                questions: [
                    { q: "حدثني عن نفسك؟", tip: "ركز على خبراتك وإنجازاتك." },
                    { q: "لماذا تريد العمل معنا؟", tip: "أظهر معرفتك بالشركة وشغفك." },
                    { q: "ما هي أكبر نقاط قوتك؟", tip: "اختر مهارات تخدم الوظيفة." },
                    { q: "ما هي أكبر نقاط ضعفك؟", tip: "اذكر كيف تعمل على تحسينها." },
                    { q: "كيف تتعامل مع ضغوط العمل؟", tip: "نظم وقتك وأولوياتك." },
                    { q: "أين ترى نفسك بعد 5 سنوات؟", tip: "أظهر طموحاً يخدم الشركة." },
                    { q: "لماذا يجب أن نوظفك أنت تحديداً؟", tip: "وضح القيمة المضافة لك." },
                    { q: "كيف تتعامل مع زميل عمل صعب الطباع؟", tip: "كن مهنياً ومرناً." },
                    { q: "ما هو أكبر إنجاز حققته في عملك السابق؟", tip: "استخدم لغة الأرقام والنتائج." },
                    { q: "ماذا تفعل إذا أخطأت في عملك؟", tip: "اعترف بالخطأ وتعلم منه." },
                    { q: "كيف تصف أسلوبك في العمل؟", tip: "هل أنت منظم أم مبادر؟" },
                    { q: "ما هو دافعك الأساسي للعمل؟", tip: "الإنجاز والتعلم المستمر." },
                    { q: "ماذا تعرف عن شركتنا؟", tip: "البحث المسبق ضروري." },
                    { q: "كيف تتعامل مع النقد البناء؟", tip: "تقبل النقد كفرصة للتحسين." },
                    { q: "ما هو أهم شيء تبحث عنه في وظيفتك الجديدة؟", tip: "النمو المهني وبيئة العمل." },
                    { q: "كيف تتصرف إذا لم توافق على قرار مديرك؟", tip: "عرض وجهة نظرك بلباقة." },
                    { q: "هل تفضل العمل الجماعي أم الفردي؟", tip: "أظهر قدرتك على التكيف." },
                    { q: "ماذا تفعل إذا كان لديك موعد تسليم نهائي ضيق؟", tip: "العمل بذكاء وترتيب الأولويات." },
                    { q: "ما هو الراتب المتوقع؟", tip: "كن واقعياً بناءً على خبرتك." },
                    { q: "كيف تتعلم مهارات جديدة؟", tip: "أظهر شغفك بالتعلم الذاتي." },
                    { q: "هل لديك أي أسئلة لنا؟", tip: "دائماً اطرح سؤالاً ذكياً." },
                    { q: "كيف تتعامل مع الفشل؟", tip: "المرونة والتعلم." },
                    { q: "ما الذي يحفزك للعمل يومياً؟", tip: "التحدي والإنجاز." },
                    { q: "كيف تقيم نجاحك؟", tip: "بتحقيق الأهداف." },
                    { q: "لماذا تركت وظيفتك السابقة؟", tip: "حافظ على إيجابيتك." }
                ]
            };

            try {
                // تم تغيير المسار ليكون داخل jobs وباسم وثيقة General_Interview
                await setDoc(doc(db, "jobs", "General_Interview"), data);
                alert("تم رفع أسئلة الإنترفيو ضمن الـ jobs بنجاح! 🚀");
            } catch (e) {
                alert("خطأ: " + e.message);
                console.error(e);
            }
        }

        document.getElementById('uploadBtn').addEventListener('click', uploadInterviewData);
    </script>
</body>
</html>
