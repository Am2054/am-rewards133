<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AM Rewards | حضر نفسك</title>
    <style>
        :root { --primary: #007bff; --bg: #0b0e14; }
        * { will-change: transform; }
        /* إضافة خاصية السلاسة في الحركة وزخم اللمس */
        html { scroll-behavior: smooth; }
        body { font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle at 50% 50%, #1a1f2e, #0b0e14); min-height: 100vh; color: white; padding: 15px; margin: 0; -webkit-overflow-scrolling: touch; overflow-y: auto; overscroll-behavior: contain; }
        
        /* إضافة حركة دخول سلسة */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .header { text-align: center; margin: 20px 0; font-size: 22px; color: var(--primary); text-shadow: 0 0 10px rgba(0,123,255,0.5); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; animation: fadeIn 0.6s ease; contain: content; }
        
        /* كروت احترافية محسنة للأداء */
        .card { background: rgba(255, 255, 255, 0.04); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(0, 123, 255, 0.2); cursor: pointer; transition: 0.2s; position: relative; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .card:hover { border-color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.2); transform: scale(1.02); }
        .card::before { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(0,123,255,0.1), transparent); transition: 0.5s; }
        
        .hidden { display: none; }
        
        /* تصميم الـ Selector الأفقي احترافي */
        .levels-container { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; justify-content: center; animation: fadeIn 0.6s ease; -webkit-overflow-scrolling: touch; scroll-snap-type: x mandatory; }
        .level-btn { min-width: 80px; padding: 15px; background: rgba(40, 167, 69, 0.2); border: 1px solid #28a745; border-radius: 15px; color: white; font-size: 14px; cursor: pointer; transition: 0.4s; scroll-snap-align: center; }
        .level-btn:hover { background: #28a745; transform: translateY(-5px); box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3); }
        
        .back-btn { display: block; width: 100%; padding: 15px; margin-top: 20px; background: rgba(255,255,255,0.1); border: 1px solid #6c757d; border-radius: 10px; color: white; cursor: pointer; transition: 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div id="homeScreen">
        <h2 class="header">استعد لاقتناص فرصتك المهنية الآن</h2>
        <div id="jobGrid" class="grid"></div>
    </div>

    <div id="levelScreen" class="hidden">
        <h2 id="selectedJobTitle" class="header"></h2>
        <div id="levelsBox" class="levels-container">
            <button class="level-btn" onclick="startQuiz('easy')">سهل</button>
            <button class="level-btn" onclick="startQuiz('medium')">متوسط</button>
            <button class="level-btn" onclick="startQuiz('hard')">صعب</button>
            <button class="level-btn" onclick="startQuiz('expert')">محترف</button>
        </div>
        <button class="back-btn" onclick="goBack()">عودة</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", 
            authDomain: "am--rewards.firebaseapp.com", 
            projectId: "am--rewards" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentJob = null;

        async function loadJobs() {
            const querySnapshot = await getDocs(collection(db, "jobs"));
            const grid = document.getElementById('jobGrid');
            querySnapshot.forEach((doc) => {
                const job = doc.data();
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div>${job.title}</div>`;
                card.onclick = () => showLevels(job);
                grid.appendChild(card);
            });
        }

        window.showLevels = (job) => {
            currentJob = job;
            // التحقق إذا كانت الوظيفة هي أسئلة عامة (بدون مستويات)
            if (job.title === "أسئلة عامة") {
                startQuiz('general');
            } else {
                document.getElementById('homeScreen').classList.add('hidden');
                document.getElementById('levelScreen').classList.remove('hidden');
                document.getElementById('selectedJobTitle').innerText = job.title;
                document.getElementById('levelsBox').style.display = 'flex';
            }
        };

        window.goBack = () => {
            document.getElementById('homeScreen').classList.remove('hidden');
            document.getElementById('levelScreen').classList.add('hidden');
        };

        window.startQuiz = (level) => {
            alert("بدء اختبار المستوى: " + level + " لوظيفة " + currentJob.title);
        };

        loadJobs();
    </script>
</body>
</html>
