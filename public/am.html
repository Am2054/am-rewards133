<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة رفع الأسئلة</title>
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #0b0e14;">

    <button id="uploadBtn" style="padding: 20px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer;">
        اضغط لرفع كامل أسئلة Warehouse / Store Keeper
    </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", 
            authDomain: "am--rewards.firebaseapp.com", 
            projectId: "am--rewards" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function uploadStoreKeeperData() {
            const data = {
                title: "Warehouse / Store Keeper",
                category: "Operations",
                levels: {
                    easy: [
                        { q: "ما هي المهمة الأساسية لأمين المخزن؟", options: ["استلام وتخزين وصرف البضائع", "بيع المنتجات", "البرمجة"], answer: 0, tip: "الحفاظ على سلامة المخزون وتنظيمه هو جوهر عملك." },
                        { q: "ماذا يعني 'الجرد'؟", options: ["عد وفحص البضائع الموجودة فعلياً", "إتلاف البضائع", "شراء بضاعة"], answer: 0, tip: "الجرد يضمن مطابقة الواقع للسجلات." },
                        { q: "ما هو الـ FIFO؟", options: ["ما يدخل أولاً يصرف أولاً", "ما يدخل أخيراً يصرف أولاً", "لا يوجد نظام"], answer: 0, tip: "First In, First Out لمنع انتهاء صلاحية الأصناف." },
                        { q: "ما فائدة بطاقة الصنف (Stock Card)؟", options: ["متابعة حركة كل صنف بدقة", "تجميل الرفوف", "لا فائدة منها"], answer: 0, tip: "هي سجل حياه كل قطعة في مخزنك." },
                        { q: "ماذا تعني 'نقطة إعادة الطلب'؟", options: ["الحد الأدنى الذي يوجب طلب بضاعة جديدة", "سعر المنتج", "اسم المورد"], answer: 0, tip: "تضمن عدم نفاد البضاعة من المخزن." },
                        { q: "ما هو الـ Barcode؟", options: ["رمز رقمي لتعريف الصنف", "نوع من الأرفف", "أداة تنظيف"], answer: 0, tip: "يستخدم لتسريع عمليات الجرد والصرف." },
                        { q: "ماذا يعني 'تلف' الصنف؟", options: ["الصنف أصبح غير صالح للاستخدام", "الصنف جديد", "صنف مباع"], answer: 0, tip: "يجب عزله فوراً وتوثيق الحالة." },
                        { q: "كيف يجب ترتيب الأصناف في المخزن؟", options: ["بما يسهل الوصول إليها", "عشوائياً", "حسب اللون فقط"], answer: 0, tip: "التنظيم المنطقي يوفر الوقت والجهد." },
                        { q: "ماذا يعني الـ 'Out of Stock'؟", options: ["نفاد المخزون", "بضاعة متوفرة", "بضاعة في الطريق"], answer: 0, tip: "موقف يجب تجنبه دائماً بالتخطيط." },
                        { q: "ما هي أهمية النظافة في المخزن؟", options: ["حماية البضائع وتسهيل العمل", "للمظهر فقط", "لا تهم"], answer: 0, tip: "النظافة تحمي من الآفات والحوادث." }
                    ],
                    medium: [
                        { q: "ما الفرق بين الـ FIFO والـ LIFO؟", options: ["FIFO للأقدم، LIFO للأحدث", "كلاهما واحد", "لا فرق"], answer: 0, tip: "FIFO هو الأكثر شيوعاً للبضائع القابلة للتلف." },
                        { q: "ماذا يعني الـ 'Stock Discrepancy'؟", options: ["وجود فرق بين الرصيد الدفتري والفعلي", "تطابق الأرصدة", "صنف جديد"], answer: 0, tip: "يجب التحقيق في أي فرق فوراً." },
                        { q: "ما هو الـ Safety Stock؟", options: ["مخزون الأمان للطوارئ", "بضاعة تالفة", "بضاعة مباعة"], answer: 0, tip: "يحميك من تقلبات الطلب المفاجئة." },
                        { q: "ما أهمية 'إذن الصرف'؟", options: ["توثيق خروج البضاعة رسمياً", "للزينة", "حرق الوقت"], answer: 0, tip: "بدون توثيق، تضيع مسؤولية البضاعة." },
                        { q: "ما هي الـ 'Packing List'؟", options: ["قائمة محتويات الشحنة", "قائمة أسعار", "نوع بضاعة"], answer: 0, tip: "تساعد في مطابقة ما استلمته بما تم شحنه." },
                        { q: "ماذا يعني الـ 'Hazardous Material'؟", options: ["مواد خطرة", "مواد نظافة", "بضاعة ثمينة"], answer: 0, tip: "تحتاج تخزيناً وتعاملاً خاصاً ومعايير سلامة." },
                        { q: "كيف تتعامل مع 'البضاعة الراكدة' (Dead Stock)؟", options: ["إبلاغ الإدارة لاتخاذ قرار (تخفيض/تصريف)", "تركها للأبد", "رميها"], answer: 0, tip: "البضاعة الراكدة هي أموال مجمدة." },
                        { q: "ما هو الـ 'Bin Location'؟", options: ["موقع محدد للصنف داخل المخزن", "اسم المخزن", "سعر الصنف"], answer: 0, tip: "نظام التموضع يسرع البحث جداً." },
                        { q: "ماذا يعني الـ 'Consignment'؟", options: ["بضاعة أمانة (تملكها جهة أخرى)", "بضاعة مباعة", "بضاعة تالفة"], answer: 0, tip: "تحتاج متابعة دقيقة لأنك لست مالكها." },
                        { q: "ما هي إجراءات السلامة (PPE) في المخزن؟", options: ["استخدام ملابس ومعدات الوقاية الشخصية", "عدم استخدام شيء", "ارتداء ملابس عادية"], answer: 0, tip: "سلامتك هي الأولوية الأولى." }
                    ],
                    hard: [
                        { q: "ماذا تعني 'دورة المخزون' (Inventory Turnover)؟", options: ["عدد مرات بيع وتجديد المخزون في فترة", "عدد الموظفين", "سعر البضاعة"], answer: 0, tip: "معدل مرتفع يعني كفاءة عالية." },
                        { q: "ما هو الـ 'Cycle Counting'؟", options: ["جرد دوري ومستمر لأصناف معينة", "جرد شامل سنوي", "لا يوجد"], answer: 0, tip: "أفضل من الجرد الشامل لأنه يكتشف الأخطاء سريعاً." },
                        { q: "ما هي أهمية 'مراقبة الرطوبة والحرارة'؟", options: ["حماية البضائع الحساسة من التلف", "للتسلية", "لا أهمية لها"], answer: 0, tip: "بضائع كثيرة تتلف فوراً إذا اختلت الظروف." },
                        { q: "كيف تمنع السرقة أو الفقد في المخزن؟", options: ["بالرقابة الدقيقة وسجلات الدخول والخروج", "بالثقة المطلقة", "لا يمكن"], answer: 0, tip: "الإجراءات الصارمة هي خير وسيلة للوقاية." },
                        { q: "ماذا يعني الـ 'Lead Time'؟", options: ["الفترة بين طلب البضاعة ووصولها", "سعر البضاعة", "وقت العمل"], answer: 0, tip: "فهم الـ Lead Time يجعلك تطلب في الوقت الصحيح." }
                    ],
                    expert: [
                        { q: "ما هو الـ 'ABC Analysis'؟", options: ["تصنيف المخزون حسب القيمة والأهمية", "طريقة ترتيب باللون", "نوع بضاعة"], answer: 0, tip: "التركيز على الأصناف 'A' يقلل التكاليف." },
                        { q: "ما هو الـ 'Warehouse Management System' (WMS)؟", options: ["نظام رقمي متكامل لإدارة المخازن", "سجل ورقي", "برنامج محاسبة"], answer: 0, tip: "الأنظمة الحديثة هي قلب المخازن الذكية." },
                        { q: "ماذا يعني الـ 'Cross-docking'؟", options: ["شحن البضاعة مباشرة من الاستلام للتوزيع", "تخزين طويل الأجل", "بيع مباشر"], answer: 0, tip: "يقلل تكاليف التخزين والمناولة بشكل كبير." },
                        { q: "كيف تتعامل مع 'مرتجع المبيعات'؟", options: ["الفحص، التوثيق، ثم التقييم (سليم/تالف)", "إعادته للمخزن فوراً", "حذفه"], answer: 0, tip: "المرتجع يحتاج دقة أكبر من البيع." },
                        { q: "ما هي استراتيجية 'JIT' (Just In Time)؟", options: ["توفير البضاعة في اللحظة المطلوبة للطلب", "تخزين كميات ضخمة", "الانتظار"], answer: 0, tip: "تقلل تكاليف المخزون لأقصى حد." }
                    ]
                }
            };

            try {
                await setDoc(doc(db, "jobs", "Warehouse_Keeper"), data);
                alert("تم رفع الـ 30 سؤال لوظيفة Warehouse Keeper بنجاح! 🚀");
            } catch (e) {
                alert("خطأ: " + e.message);
                console.error(e);
            }
        }

        document.getElementById('uploadBtn').addEventListener('click', uploadStoreKeeperData);
    </script>
</body>
</html>
