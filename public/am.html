<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --primary: #00f2ff; --bg: #0b0e14; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 20px; }
        .header { text-align: center; font-size: 24px; margin-bottom: 30px; background: linear-gradient(to right, var(--primary), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.4s; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,242,255,0.2); }

        .level-container { display: flex; overflow-x: auto; gap: 10px; padding: 10px; }
        .level-card { min-width: 80px; padding: 15px; background: #1c222d; border-radius: 15px; text-align: center; border: 1px solid #444; cursor: pointer; }
        .level-card:active { background: var(--primary); color: #000; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="homeScreen">
        <h2 class="header">استعد لاقتناص فرصتك المهنية الآن</h2>
        <div id="jobGrid" class="grid"></div>
    </div>

    <div id="levelScreen" class="hidden">
        <h2 id="jobTitle" class="header"></h2>
        <div id="levels" class="level-container">
            <div class="level-card" onclick="startQuiz('easy')">سهل</div>
            <div class="level-card" onclick="startQuiz('medium')">متوسط</div>
            <div class="level-card" onclick="startQuiz('hard')">صعب</div>
            <div class="level-card" onclick="startQuiz('expert')">محترف</div>
        </div>
        <button onclick="goBack()" style="margin-top:20px; background:none; border:1px solid #555; color:white; padding:10px 20px; border-radius:10px;">رجوع</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        
        const db = getFirestore(initializeApp({ /* بياناتك */ }));
        let currentJob = null;

        async function loadJobs() {
            const querySnapshot = await getDocs(collection(db, "jobs"));
            const grid = document.getElementById('jobGrid');
            querySnapshot.forEach((doc) => {
                const job = doc.data();
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div>${job.title}</div>`;
                card.onclick = () => {
                    if (job.title === "أسئلة عامة") { // افتراض أن هذا هو الاسم في Firebase
                        startQuiz('general');
                    } else {
                        showLevels(job);
                    }
                };
                grid.appendChild(card);
            });
        }

        function showLevels(job) {
            currentJob = job;
            document.getElementById('homeScreen').classList.add('hidden');
            document.getElementById('levelScreen').classList.remove('hidden');
            document.getElementById('jobTitle').innerText = job.title;
        }

        window.goBack = () => {
            document.getElementById('homeScreen').classList.remove('hidden');
            document.getElementById('levelScreen').classList.add('hidden');
        };

        window.startQuiz = (level) => {
            alert("بدء: " + level + " - " + (currentJob ? currentJob.title : "أسئلة عامة"));
        };

        loadJobs();
    </script>
</body>
</html>
