<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة رفع الأسئلة</title>
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #0b0e14;">

    <button id="uploadBtn" style="padding: 20px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer;">
        اضغط لرفع كامل أسئلة كول سنتر (Call Center)
    </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", 
            authDomain: "am--rewards.firebaseapp.com", 
            projectId: "am--rewards" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function uploadCallCenterData() {
            const data = {
                title: "كول سنتر",
                category: "Service",
                levels: {
                    easy: [
                        { q: "ما هو الـ AHT في الكول سنتر؟", options: ["متوسط زمن المكالمة", "اسم الموظف", "نوع الجهاز"], answer: 0, tip: "Average Handling Time هو مقياس لسرعة الموظف." },
                        { q: "ماذا يعني الـ Script؟", options: ["نص المكالمة", "جهاز كمبيوتر", "رقم العميل"], answer: 0, tip: "السكربت هو النص المجهز للموظف ليلتزم به." },
                        { q: "كيف ترد على مكالمة واردة؟", options: ["باسم الشركة والترحيب", "ألو مين معايا؟", "صمت"], answer: 0, tip: "الترحيب المهني هو واجهة الشركة." },
                        { q: "ماذا تفعل عند حدوث ضوضاء في الخلفية؟", options: ["الاستمرار في الحديث", "استخدام خاصية Mute", "رفع الصوت"], answer: 1, tip: "استخدام زر الـ Mute يحافظ على احترافية المكالمة." },
                        { q: "كيف تتعامل مع عميل يتحدث بسرعة كبيرة؟", options: ["طلب التحدث ببطء بلطف", "إغلاق الخط", "الموافقة على كل شيء"], answer: 0, tip: "التواصل الفعال يحتاج لفهم واضح للبيانات." },
                        { q: "ما هو الـ CRM؟", options: ["نظام إدارة علاقات العملاء", "نوع من الكابلات", "جهاز هاتف"], answer: 0, tip: "نظام الـ CRM يسجل كل بيانات وتاريخ العميل." },
                        { q: "ماذا تفعل إذا انقطع الاتصال؟", options: ["الاتصال بالعميل فوراً (لو متاح)", "انتظار العميل", "نسيان الأمر"], answer: 0, tip: "المبادرة بالاتصال تظهر اهتمامك بالخدمة." },
                        { q: "كيف تظهر الابتسامة في صوتك؟", options: ["بالابتسام أثناء التحدث", "بالصراخ", "بالغناء"], answer: 0, tip: "ابتسامتك تنعكس على نبرة صوتك وتريح العميل." },
                        { q: "ماذا تعني كلمة Outbound؟", options: ["مكالمات صادرة", "مكالمات واردة", "استراحة"], answer: 0, tip: "المكالمات الصادرة هي التي يبدأها الموظف." },
                        { q: "ما هو الـ CSAT؟", options: ["مقياس رضا العميل", "نوع السيرفر", "سعر المنتج"], answer: 0, tip: "Customer Satisfaction يحدد مدى رضا العميل عن خدمتك." }
                    ],
                    medium: [
                        { q: "كيف تتعامل مع عميل يرفض سماع حلولك؟", options: ["تركه حتى يهدأ", "المقاطعة", "الاعتذار وتغيير أسلوب العرض"], answer: 2, tip: "أحياناً تغيير أسلوبك يفتح باباً للحوار." },
                        { q: "ماذا يعني الـ FCR؟", options: ["حل المشكلة من أول مرة", "اسم المشرف", "نوع الشكوى"], answer: 0, tip: "First Call Resolution هو هدف ذهبي لأي كول سنتر." },
                        { q: "كيف تدير وقتك بين المكالمات (Wrap-up time)؟", options: ["بتسجيل البيانات بسرعة ودقة", "بالدردشة مع الزملاء", "بالتصفح"], answer: 0, tip: "الدقة في التسجيل تقلل الأخطاء مستقبلاً." },
                        { q: "ماذا تفعل عند وجود عطل تقني في النظام؟", options: ["إبلاغ المشرف فوراً", "محاولة إصلاحه بنفسك", "الخروج من العمل"], answer: 0, tip: "الإبلاغ الفوري يمنع تفاقم الأزمة." },
                        { q: "ما هو أثر النبرة الصوتية (Tone)؟", options: ["تؤثر جداً في فهم العميل", "لا تأثير لها", "تجعل الصوت عالياً"], answer: 0, tip: "النبرة توصل المشاعر أكثر من الكلمات." },
                        { q: "كيف تتعامل مع مكالمة تحويل (Transfer)؟", options: ["شرح الحالة للطرف الآخر", "رمي المكالمة للزميل", "الاعتذار وإغلاق الخط"], answer: 0, tip: "التحويل الذكي يجنب العميل التكرار." },
                        { q: "ماذا يعني الـ Hold؟", options: ["انتظار العميل", "إلغاء المكالمة", "إنهاء الخدمة"], answer: 0, tip: "الانتظار يجب أن يكون لأضيق الحدود." },
                        { q: "كيف تتجنب أخطاء إدخال البيانات؟", options: ["بالمراجعة قبل الحفظ", "بسرعة الكتابة فقط", "بعدم المراجعة"], answer: 0, tip: "المراجعة السريعة توفر الكثير من وقت التصحيح." },
                        { q: "ما هي أهمية الالتزام بالـ Script؟", options: ["توحيد مستوى الخدمة", "لأنه ممل", "لإضاعة الوقت"], answer: 0, tip: "السكربت يضمن أن كل عميل يحصل على المعلومة الصحيحة." },
                        { q: "كيف تتعامل مع ضغوط العمل؟", options: ["بالتنفس العميق والتنظيم", "بالاستسلام", "بالعصبية"], answer: 0, tip: "التنظيم هو السلاح الأول ضد الضغط." }
                    ],
                    hard: [
                        { q: "ماذا يعني الـ Quality Assurance (QA)؟", options: ["مراقبة جودة المكالمات", "نظافة المكتب", "عدد المبيعات"], answer: 0, tip: "الـ QA يضمن التزامك بمعايير الجودة." },
                        { q: "كيف تحلل أسباب شكاوى العملاء المتكررة؟", options: ["بتتبع الأنماط في الـ CRM", "بالصدفة", "بعدم الاهتمام"], answer: 0, tip: "التحليل يوصلك لجذر المشكلة (Root Cause)." },
                        { q: "ماذا تفعل إذا كان العميل على حق والسياسة ضدك؟", options: ["التفاوض مع الإدارة للحل", "إغلاق الخط في وجهه", "قول أنا لا أهتم"], answer: 0, tip: "أحياناً نحتاج استثناءات لحفظ العميل." },
                        { q: "ما هي مخاطر عدم تحديث بيانات العميل؟", options: ["ضياع العميل والخدمة", "لا توجد مخاطر", "زيادة السرعة"], answer: 0, tip: "البيانات القديمة تؤدي لقرارات خاطئة." },
                        { q: "كيف تتعامل مع مكالمات الـ Escalation؟", options: ["بتحمل المسؤولية كاملة", "بنقلها فوراً للمشرف", "بإهانه العميل"], answer: 0, tip: "التصعيد يحتاج هدوءاً وثباتاً انفعالياً." }
                    ],
                    expert: [
                        { q: "ما هو الـ IVR؟", options: ["الرد الآلي التفاعلي", "نوع من أنواع الهواتف", "مدير الكول سنتر"], answer: 0, tip: "الرد الآلي ينظم المكالمات قبل وصولها للموظف." },
                        { q: "ماذا تعني الـ Workforce Management؟", options: ["توزيع الموظفين حسب الضغط", "شرب الشاي", "تنظيف المكتب"], answer: 0, tip: "التخطيط الجيد للعمالة يضمن عدم انتظار العملاء." },
                        { q: "كيف تقيس الـ Net Promoter Score (NPS)؟", options: ["احتمالية توصية العميل بالخدمة", "عدد المكالمات", "سرعة الإنترنت"], answer: 0, tip: "الـ NPS يقيس ولاء العميل الحقيقي." },
                        { q: "ما هي استراتيجية الـ Omnichannel؟", options: ["التواصل مع العميل عبر كل القنوات", "تغيير اسم الشركة", "العمل ليلاً فقط"], answer: 0, tip: "العميل يتوقع نفس التجربة عبر كل القنوات." },
                        { q: "كيف تقلل الـ Call Abandonment Rate؟", options: ["بالتنبؤ بحجم المكالمات", "بالتحدث أبطأ", "بإطالة وقت الانتظار"], answer: 0, tip: "التنبؤ يقلل وقت الانتظار وبالتالى يقلل الـ Abandonment." }
                    ]
                }
            };

            try {
                await setDoc(doc(db, "jobs", "Call_Center"), data);
                alert("تم رفع الـ 30 سؤال لوظيفة كول سنتر بنجاح! 🚀");
            } catch (e) {
                alert("خطأ: " + e.message);
                console.error(e);
            }
        }

        document.getElementById('uploadBtn').addEventListener('click', uploadCallCenterData);
    </script>
</body>
</html>
