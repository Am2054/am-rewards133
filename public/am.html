<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة رفع الأسئلة</title>
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #0b0e14;">

    <button id="uploadBtn" style="padding: 20px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer;">
        اضغط لرفع كامل أسئلة تعبئة وتغليف
    </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", 
            authDomain: "am--rewards.firebaseapp.com", 
            projectId: "am--rewards" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function uploadPackagingData() {
            const data = {
                title: "تعبئة وتغليف",
                category: "Operations",
                levels: {
                    easy: [
                        { q: "ما هي المهمة الأساسية لعامل التعبئة؟", options: ["تجهيز المنتجات وتغليفها للشحن", "بيع المنتجات", "البرمجة"], answer: 0, tip: "حماية المنتج وتقديمه بشكل سليم هو هدفك." },
                        { q: "لماذا نستخدم مواد التغليف المناسبة؟", options: ["لحماية المنتج من التلف والكسر", "لتجميل الشكل فقط", "لا يوجد فرق"], answer: 0, tip: "التغليف السيئ يعني خسارة مالية للشركة." },
                        { q: "ماذا تفعل عند اكتشاف منتج تالف قبل التغليف؟", options: ["استبعاده فوراً وإبلاغ المشرف", "تغليفه وإرساله", "إصلاحه بنفسك"], answer: 0, tip: "الجودة تبدأ من فحص المادة الخام." },
                        { q: "ما أهمية وزن العبوة؟", options: ["مطابقة الوزن للمواصفات المطلوبة", "لزيادة الوزن", "لا تهم"], answer: 0, tip: "الوزن غير المطابق يسبب مشاكل قانونية مع العميل." },
                        { q: "ما هو 'تاريخ الصلاحية'؟", options: ["الفترة التي يكون فيها المنتج صالحاً للاستخدام", "تاريخ اليوم", "لا شيء"], answer: 0, tip: "التأكد من طباعته بوضوح أمر حيوي." },
                        { q: "كيف تتعامل مع آلات التغليف؟", options: ["اتباع تعليمات التشغيل والسلامة بدقة", "تجربة تشغيلها عشوائياً", "عدم لمسها"], answer: 0, tip: "السلامة المهنية أولاً دائماً." },
                        { q: "ماذا يعني 'Labeling'؟", options: ["وضع الملصقات التعريفية على العبوات", "حذف العبوات", "تلوين العبوات"], answer: 0, tip: "الملصق هو هوية المنتج للمستهلك." },
                        { q: "لماذا نغلق العبوات بإحكام؟", options: ["لمنع التسرب والتلوث", "لتصعيب فتحها", "لا سبب"], answer: 0, tip: "الإحكام يعني حماية الجودة." },
                        { q: "ماذا تعني رموز التحذير على الكرتون (مثل 'قابل للكسر')؟", options: ["تنبيه للتعامل بحذر مع الشحنة", "للزينة", "لا يوجد"], answer: 0, tip: "اتباع الرموز يحمي بضاعتك من الكسر." },

                    medium: [

                        { q: "ما هو الـ 'Shrink Wrap'؟", options: ["تغليف حراري ينكمش حول المنتج", "صندوق كرتون", "لا شيء"], answer: 0, tip: "يحمي المنتج من الغبار والرطوبة." },
                        { q: "كيف تتعامل مع المنتجات الحساسة للحرارة؟", options: ["تخزينها وتغليفها في ظروف محكمة", "تجاهل الحرارة", "وضعها في الشمس"], answer: 0, tip: "التغليف المتخصص يحمي الأدوية والأغذية." },

                        { q: "ما أهمية تسجيل الكميات المغلفة؟", options: ["مطابقة الإنتاج مع خطة العمل", "التسلية", "لا شيء"], answer: 0, tip: "السجلات هي دليلك على الإنجاز اليومي." },

                        { q: "ماذا يعني 'Packaging Optimization'؟", options: ["تحسين حجم ووزن التغليف لتقليل التكاليف", "زيادة المواد", "لا شيء"], answer: 0, tip: "توفير المساحة يعني توفير تكاليف الشحن." },
                        { q: "ما هي مخاطر التعبئة الخاطئة؟", options: ["تلف المنتج، ضياع العميل، ومسائل قانونية", "لا مخاطر", "لا شيء"], answer: 0, tip: "الخطأ في التغليف مكلف جداً." },

                    ],
                    expert: [
                        { q: "ماذا يعني مفهوم 'Sustainable Packaging'؟", options: ["تغليف صديق للبيئة وقابل لإعادة التدوير", "تغليف بلاستيكي كثير", "لا شيء"], answer: 0, tip: "توجه عالمي لتقليل البصمة الكربونية." },
                        { q: "ما هي العلاقة بين التغليف والخدمات اللوجستية؟", options: ["التغليف يحدد سهولة وتكلفة التخزين والشحن", "لا علاقة", "لا شيء"], answer: 0, tip: "التغليف الجيد يسهل عمل المخازن والشحن." },
                        { q: "ما هو التغليف الذكي (Smart Packaging)؟", options: ["تغليف يتفاعل مع المنتج ليعطي مؤشرات", "تغليف جميل", "لا شيء"], answer: 0, tip: "مثل مؤشرات نضارة الأغذية." },
                        { q: "كيف تساهم في 'منع العيوب' (Zero Defects)؟", options: ["بالفحص المستمر والالتزام الصارم بالإجراءات", "بالإهمال", "لا يمكن"], answer: 0, tip: "هدف الشركات الكبرى دائماً هو صفر أخطاء." },
                        { q: "ما هو الـ 'Packaging Engineering'؟", options: ["علم تصميم وتطوير عبوات فعالة", "تصميم اللوجو", "لا شيء"], answer: 0, tip: "التغليف علم يحتاج لدراسة هندسية." }
                    ]
                }
            };

            try {
                await setDoc(doc(db, "jobs", "Packaging_Worker"), data);
                alert("تم رفع الـ 30 سؤال لوظيفة تعبئة وتغليف بنجاح! 🚀");
            } catch (e) {
                alert("خطأ: " + e.message);
                console.error(e);
            }
        }

        document.getElementById('uploadBtn').addEventListener('click', uploadPackagingData);
    </script>
</body>
</html>
