<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>رفع أسئلة الإنترفيو العامة</title>
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #0b0e14;">

    <button id="uploadBtn" style="padding: 20px; font-size: 18px; background: #ff9800; color: white; border: none; border-radius: 10px; cursor: pointer;">
        اضغط لرفع الـ 25 سؤالاً عاماً للإنترفيو
    </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", 
            authDomain: "am--rewards.firebaseapp.com", 
            projectId: "am--rewards" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function uploadInterviewData() {
            const data = {
                title: "أسئلة إنترفيو عامة",
                category: "Interview",
                questions: [
                    { q: "حدثني عن نفسك؟", tip: "ركز على خبراتك وإنجازاتك ذات الصلة بالوظيفة." },
                    { q: "لماذا تريد العمل معنا؟", tip: "أظهر معرفتك بالشركة وشغفك بمجالهم." },
                    { q: "ما هي أكبر نقاط قوتك؟", tip: "اختر مهارات يحتاجها الدور الوظيفي فعلاً." },
                    { q: "ما هي أكبر نقاط ضعفك؟", tip: "اذكر نقطة حقيقية وكيف تعمل على تحسينها." },
                    { q: "كيف تتعامل مع ضغوط العمل؟", tip: "اذكر مثالاً واقعياً لتنظيمك للوقت." },
                    { q: "أين ترى نفسك بعد 5 سنوات؟", tip: "أظهر طموحاً يتماشى مع نمو الشركة." },
                    { q: "لماذا يجب أن نوظفك أنت تحديداً؟", tip: "ركز على القيمة المضافة التي ستقدمها." },
                    { q: "كيف تتعامل مع زميل عمل صعب الطباع؟", tip: "أظهر مهارتك في التواصل والاحترافية." },
                    { q: "ما هو أكبر إنجاز حققته في عملك السابق؟", tip: "استخدم لغة الأرقام والنتائج الملموسة." },
                    { q: "ماذا تفعل إذا أخطأت في عملك؟", tip: "أظهر الصدق والقدرة على التعلم من الخطأ." },
                    { q: "كيف تصف أسلوبك في العمل؟", tip: "هل أنت منظم؟ متعاون؟ مبادر؟" },
                    { q: "ما هو دافعك الأساسي للعمل؟", tip: "الإنجاز، التعلم، أو بناء المسيرة المهنية." },
                    { q: "ماذا تعرف عن شركتنا؟", tip: "يجب أن تكون قد بحثت عن الشركة جيداً." },
                    { q: "كيف تتعامل مع النقد البناء؟", tip: "أظهر تقبلك للتطور والنمو." },
                    { q: "ما هو أهم شيء تبحث عنه في وظيفتك الجديدة؟", tip: "التطور المهني وبيئة العمل." },
                    { q: "كيف تتصرف إذا لم توافق على قرار مديرك؟", tip: "اللباقة والمهنية في عرض وجهة نظرك." },
                    { q: "هل تفضل العمل الجماعي أم الفردي؟", tip: "أظهر القدرة على التكيف مع الاثنين." },
                    { q: "ماذا تفعل إذا كان لديك موعد تسليم نهائي ضيق؟", tip: "التركيز، ترتيب الأولويات، والعمل بذكاء." },
                    { q: "ما هو الراتب المتوقع؟", tip: "كن واقعياً وابنِ توقعك على خبراتك." },
                    { q: "كيف تتعلم مهارات جديدة؟", tip: "أظهر شغفك بالتعلم الذاتي والمستمر." },
                    { q: "هل لديك أي أسئلة لنا؟", tip: "دائماً اسأل سؤالاً ذكياً عن الشركة." },
                    { q: "كيف تتعامل مع الفشل؟", tip: "أظهر المرونة والقدرة على النهوض مجدداً." },
                    { q: "ما الذي يحفزك للعمل يومياً؟", tip: "التحديات الجديدة والإنجاز." },
                    { q: "كيف تقيم نجاحك؟", tip: "بمدى تحقيق الأهداف والتعلم." },
                    { q: "لماذا تركت وظيفتك السابقة؟", tip: "حافظ على إيجابيتك ولا تذم أحداً." }
                ]
            };

            try {
                await setDoc(doc(db, "interview_general", "all_questions"), data);
                alert("تم رفع الـ 25 سؤالاً عاماً للإنترفيو بنجاح! 🚀");
            } catch (e) {
                alert("خطأ: " + e.message);
                console.error(e);
            }
        }

        document.getElementById('uploadBtn').addEventListener('click', uploadInterviewData);
    </script>
</body>
</html>
