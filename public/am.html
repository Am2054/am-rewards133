<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة رفع الأسئلة</title>
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #0b0e14;">

    <button id="uploadBtn" style="padding: 20px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer;">
        اضغط لرفع كامل أسئلة مساعد إداري (Assistant)
    </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", 
            authDomain: "am--rewards.firebaseapp.com", 
            projectId: "am--rewards" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function uploadAssistantData() {
            const data = {
                title: "مساعد إداري",
                category: "Admin",
                levels: {
                    easy: [
                        { q: "ما هي المهمة الأساسية للمساعد الإداري؟", options: ["تنظيم الأعمال ودعم الإدارة", "بيع المنتجات", "البرمجة"], answer: 0, tip: "المساعد هو العمود الفقري لتنظيم المكتب." },
                        { q: "كيف تنظم مواعيد المدير؟", options: ["باستخدام تقويم منظم (Calendar)", "بالتخمين", "بالورقة"], answer: 0, tip: "التنظيم الرقمي يمنع تضارب المواعيد." },
                        { q: "ماذا تفعل عند تلقي مكالمة هامة للمدير؟", options: ["تدوين الملاحظات وتحويلها فوراً", "تجاهلها", "نسيانها"], answer: 0, tip: "الدقة في نقل الرسائل تعكس احترافيتك." },
                        { q: "كيف تتعامل مع رسائل البريد الإلكتروني؟", options: ["فرزها والرد على ما يخصك", "تركها تتراكم", "حذفها"], answer: 0, tip: "التنظيم اليومي يمنع ضياع المراسلات." },
                        { q: "ما هي مهارة 'أرشفة الملفات'؟", options: ["حفظ الوثائق بطريقة يسهل استرجاعها", "إتلافها", "تلوينها"], answer: 0, tip: "سهولة الاسترجاع هي هدف الأرشفة." },
                        { q: "كيف تتعامل مع زوار المكتب؟", options: ["استقبالهم بمهنية وتقديم الضيافة", "طردهم", "تجاهلهم"], answer: 0, tip: "حسن الاستقبال جزء من صورة الشركة." },
                        { q: "ماذا تعني السرية في العمل الإداري؟", options: ["عدم إفشاء معلومات الشركة", "نشر المعلومات", "التحدث بها"], answer: 0, tip: "الثقة هي أساس علاقتك بالمدير." },
                        { q: "ما فائدة كتابة محضر الاجتماع؟", options: ["توثيق القرارات والمناقشات", "للتسلية", "لا فائدة منها"], answer: 0, tip: "المحضر يضمن التزام الجميع بما تم الاتفاق عليه." },
                        { q: "ما هي الأداة الأهم لتنظيم المهام اليومية؟", options: ["قائمة المهام (To-Do List)", "التقويم", "الهاتف"], answer: 0, tip: "ترتيب الأولويات يجعلك أكثر إنتاجية." },
                        { q: "كيف تحافظ على هدوء المكتب؟", options: ["بالتنظيم وتقليل الضجيج", "بالصراخ", "بالتحدث كثيراً"], answer: 0, tip: "الهدوء يساعد في التركيز والعمل." }
                    ],
                    medium: [
                        { q: "كيف تتعامل مع تضارب المواعيد؟", options: ["تحديد الأولوية وإعادة الجدولة", "إلغاء كل شيء", "الارتباك"], answer: 0, tip: "مهارة التفاوض مع الأطراف ضرورية." },
                        { q: "ماذا يعني الـ 'Minute of Meeting'؟", options: ["محضر الاجتماع", "ساعة الاجتماع", "جدول الأعمال"], answer: 0, tip: "توثيق رسمي لكل ما دار في الاجتماع." },
                        { q: "كيف تجهز لاجتماع رسمي؟", options: ["تجهيز القاعة والأوراق والتقديم", "لا شيء", "التأخر"], answer: 0, tip: "التحضير الجيد يمنع المشاكل أثناء الاجتماع." },
                        { q: "ما هو الـ 'Travel Arrangement'؟", options: ["ترتيب سفر المدير (حجوزات/تأشيرات)", "السفر بنفسك", "لا شيء"], answer: 0, tip: "يجب أن تكون منظماً جداً في الحجوزات." },
                        { q: "كيف تتعامل مع مهام متعددة في وقت واحد؟", options: ["تحديد الأولويات (Prioritization)", "العمل عشوائياً", "الرفض"], answer: 0, tip: "القدرة على تعدد المهام (Multitasking) أساسية." },
                        { q: "ماذا يعني 'Data Confidentiality'؟", options: ["سرية البيانات", "نشر البيانات", "تعديل البيانات"], answer: 0, tip: "حماية معلومات الشركة مسؤولية كبيرة." },
                        { q: "كيف تنظم ملفاتك على الكمبيوتر؟", options: ["بمجلدات منظمة ومسمية بوضوح", "بوضعها كلها في سطح المكتب", "لا تنظيم"], answer: 0, tip: "التسمية الواضحة توفر وقت البحث." },
                        { q: "ما أهمية التقرير الدوري للمدير؟", options: ["إطلاعه على سير العمل", "إزعاجه", "لا أهمية لها"], answer: 0, tip: "الشفافية تساعد الإدارة في اتخاذ القرار." },
                        { q: "كيف تتعامل مع طلبات الموظفين الآخرين؟", options: ["المساعدة بما لا يعطل مهامك", "الرفض القاطع", "الموافقة دائماً"], answer: 0, tip: "التوازن هو مفتاح النجاح الإداري." },
                        { q: "ماذا يعني الـ 'Follow-up'؟", options: ["المتابعة بعد انتهاء المهمة", "الانتظار", "الإهمال"], answer: 0, tip: "المتابعة تضمن إنجاز المهام للنهاية." }
                    ],
                    hard: [
                        { q: "كيف تساهم في تنظيم المكتب؟", options: ["تطوير إجراءات العمل (SOPs)", "تغيير الأثاث", "لا شيء"], answer: 0, tip: "وضع إجراءات ثابتة (SOPs) يقلل الأخطاء." },
                        { q: "ماذا تفعل عند وقوع خطأ إداري؟", options: ["الاعتراف به والعمل على إصلاحه فوراً", "إخفاؤه", "لوم الآخرين"], answer: 0, tip: "الصدق يبني الثقة المهنية." },
                        { q: "ما هي استراتيجية إدارة وقت فعالة؟", options: ["مصفوفة أيزنهاور (Eisenhower Matrix)", "العمل طوال الوقت", "التخمين"], answer: 0, tip: "تساعد في التمييز بين المهم والعاجل." },
                        { q: "كيف تدير ميزانية مكتب صغيرة؟", options: ["بتسجيل المصاريف والفواتير بدقة", "بالصرف العشوائي", "لا يوجد ميزانية"], answer: 0, tip: "الدقة المالية أساس الثقة." },
                        { q: "ماذا يعني مفهوم 'Stakeholder Management'؟", options: ["إدارة التعامل مع الأطراف المعنية", "شرب القهوة", "تنظيف المكتب"], answer: 0, tip: "التعامل بذكاء مع أطراف العمل المختلفين." }
                    ],
                    expert: [
                        { q: "ما هو دور المساعد في إدارة التغيير؟", options: ["تسهيل التواصل والعمليات الجديدة", "المقاومة", "لا دور له"], answer: 0, tip: "المساعد الإداري هو محرك التغيير الهادئ." },
                        { q: "كيف تطور كفاءة الإدارة باستخدام التقنية؟", options: ["بأتمتة المهام واستخدام أدوات الإدارة", "بالعمل اليدوي", "بالتجاهل"], answer: 0, tip: "التقنية هي صديقك الأفضل لزيادة الإنتاجية." },
                        { q: "ما هو مفهوم الـ 'Proactive' في المساعدة؟", options: ["التنبؤ بالاحتياجات قبل طلبها", "الانتظار للطلب", "العمل ببطء"], answer: 0, tip: "المساعد العبقري لا ينتظر الأوامر." },
                        { q: "كيف تتعامل مع الأزمات في المكتب؟", options: ["بالهدوء، التخطيط، والتنفيذ السريع", "بالذعر", "بالهرب"], answer: 0, tip: "الهدوء تحت الضغط هو علامة الاحترافية." },
                        { q: "ما هي العلاقة بين السكرتارية ونجاح المنظمة؟", options: ["السكرتارية جزء حيوي من التنظيم والنجاح", "لا علاقة", "علاقة ضعيفة"], answer: 0, tip: "المنظمة الناجحة تعتمد على مساعد إداري متمكن." }
                    ]
                }
            };

            try {
                await setDoc(doc(db, "jobs", "Assistant"), data);
                alert("تم رفع الـ 30 سؤال لوظيفة مساعد إداري بنجاح! 🚀");
            } catch (e) {
                alert("خطأ: " + e.message);
                console.error(e);
            }
        }

        document.getElementById('uploadBtn').addEventListener('click', uploadAssistantData);
    </script>
</body>
</html>
