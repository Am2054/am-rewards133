<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة رفع الأسئلة</title>
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #0b0e14;">

    <button id="uploadBtn" style="padding: 20px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer;">
        اضغط لرفع كامل أسئلة HR (موارد بشرية)
    </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", 
            authDomain: "am--rewards.firebaseapp.com", 
            projectId: "am--rewards" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function uploadHRData() {
            const data = {
                title: "HR",
                category: "HR",
                levels: {
                    easy: [
                        { q: "ما هي الوظيفة الأساسية لإدارة الموارد البشرية؟", options: ["إدارة شؤون الموظفين", "المبيعات", "البرمجة"], answer: 0, tip: "الـ HR هو الرابط بين الشركة وموظفيها." },
                        { q: "ما هو الـ Job Description؟", options: ["الوصف الوظيفي", "سيرة ذاتية", "عرض عمل"], answer: 0, tip: "يحدد المهام المطلوبة لكل وظيفة." },
                        { q: "ماذا تعني عملية الـ Recruitment؟", options: ["التوظيف واستقطاب الكفاءات", "التدريب", "الاستقالة"], answer: 0, tip: "هي عملية العثور على الموظف المناسب." },
                        { q: "ما هو الـ Onboarding؟", options: ["عملية تهيئة الموظف الجديد", "مقابلة عمل", "إنهاء الخدمة"], answer: 0, tip: "تساعد الموظف الجديد على الاندماج في بيئة العمل." },
                        { q: "ما هو الـ Payroll؟", options: ["نظام الرواتب والأجور", "التأمين الصحي", "التدريب"], answer: 0, tip: "إدارة دقيقة للرواتب والمستحقات." },
                        { q: "كيف يقاس أداء الموظف؟", options: ["عن طريق التقييم الدوري (Appraisal)", "بالحظ", "بعدد سنوات الخدمة"], answer: 0, tip: "التقييم يحدد نقاط القوة والضعف." },
                        { q: "ما هو الـ CV؟", options: ["السيرة الذاتية", "قاعدة بيانات", "وصف وظيفي"], answer: 0, tip: "الوثيقة الأولى التي تعرفك بالمرشح." },
                        { q: "ماذا تعني بيئة العمل (Work Culture)؟", options: ["القيم والسلوكيات السائدة في الشركة", "لون المكتب", "عدد المكاتب"], answer: 0, tip: "الثقافة هي ما يجعل الموظف ينتمي للمكان." },
                        { q: "لماذا يحتاج الموظف للتدريب؟", options: ["لتطوير مهاراته وزيادة إنتاجيته", "لإضاعة الوقت", "لا حاجة له"], answer: 0, tip: "التطوير المستمر يرفع كفاءة المؤسسة." },
                        { q: "ما هو الـ Soft Skills؟", options: ["المهارات الشخصية والتعامل", "المهارات التقنية", "الشهادات"], answer: 0, tip: "مثل التواصل، العمل الجماعي، والقيادة." }
                    ],
                    medium: [
                        { q: "ما هو الـ Turnover Rate؟", options: ["معدل دوران الموظفين (الاستقالات)", "عدد الموظفين", "الراتب"], answer: 0, tip: "ارتفاعه يشير لمشاكل في بيئة العمل." },
                        { q: "ماذا يعني الـ Conflict Resolution؟", options: ["فض النزاعات بين الموظفين", "زيادة الرواتب", "التوظيف"], answer: 0, tip: "الحفاظ على بيئة عمل إيجابية هو دور الـ HR." },
                        { q: "ما هو الـ Performance Management؟", options: ["إدارة أداء الموظفين وتحسينه", "حساب الرواتب", "التوظيف"], answer: 0, tip: "ربط أهداف الموظف بأهداف الشركة." },
                        { q: "ماذا يعني الـ Employment Contract؟", options: ["عقد العمل", "طلب إجازة", "تقرير أداء"], answer: 0, tip: "الوثيقة القانونية الحافظة لحقوق الطرفين." },
                        { q: "ما هو الـ Talent Acquisition؟", options: ["جذب المواهب المتميزة", "التدريب", "الرواتب"], answer: 0, tip: "عملية استراتيجية للبحث عن الكفاءات." },
                        { q: "ماذا تفعل عند استقالة موظف؟", options: ["إجراء مقابلة الخروج (Exit Interview)", "تجاهله", "طرده"], answer: 0, tip: "فهم سبب الاستقالة يطور الشركة." },
                        { q: "ما هو الـ Benefits؟", options: ["المميزات الوظيفية (تأمين، بونص)", "الراتب الأساسي", "ساعات العمل"], answer: 0, tip: "تزيد من جاذبية الشركة للموظفين." },
                        { q: "ما هو الـ Succession Planning؟", options: ["تخطيط الصف الثاني (الخلفاء)", "التدريب", "الرواتب"], answer: 0, tip: "ضمان استمرارية العمل في حال ترك أحد القياديين." },
                        { q: "كيف تتعامل مع موظف ضعيف الأداء؟", options: ["وضع خطة تحسين أداء (PIP)", "الطرد فوراً", "التجاهل"], answer: 0, tip: "إعطاء الفرصة للتحسن هو الأسلوب المهني." },
                        { q: "ماذا يعني الـ Compliance في الـ HR؟", options: ["الالتزام بقوانين العمل واللوائح", "زيادة الرواتب", "التعيين"], answer: 0, tip: "الالتزام يحمي الشركة من المسائل القانونية." }
                    ],
                    hard: [
                        { q: "ما هو الـ Employer Branding؟", options: ["بناء سمعة الشركة كجهة عمل جذابة", "شعار الشركة", "إعلان منتج"], answer: 0, tip: "يجعل الكفاءات تسعى للعمل لديك." },
                        { q: "ماذا يعني الـ Job Analysis؟", options: ["تحليل الوظيفة ومسؤولياتها", "التوظيف", "الرواتب"], answer: 0, tip: "خطوة أساسية قبل التوظيف." },
                        { q: "ما هو الـ 360 Feedback؟", options: ["تقييم شامل من جميع الاتجاهات (زملاء/مديرين)", "تقييم المدير فقط", "لا يوجد"], answer: 0, tip: "يعطي صورة كاملة عن أداء الموظف." },
                        { q: "ما هو الـ HR Analytics؟", options: ["استخدام البيانات لتحسين قرارات الـ HR", "حساب الرواتب", "التوظيف"], answer: 0, tip: "القرارات المبنية على بيانات هي الأقوى." },
                        { q: "ماذا يعني مفهوم 'Employee Engagement'؟", options: ["مستوى ولاء الموظف وحماسه للعمل", "عدد الموظفين", "ساعات العمل"], answer: 0, tip: "الموظف المندمج هو الأكثر إنتاجية." }
                    ],
                    expert: [
                        { q: "ما هي استراتيجية الـ Strategic HRM؟", options: ["مواءمة ممارسات الـ HR مع استراتيجية العمل", "حساب الرواتب فقط", "التوظيف"], answer: 0, tip: "الـ HR كشريك استراتيجي في نجاح الشركة." },
                        { q: "ما هو مفهوم الـ 'Change Management'؟", options: ["إدارة التغيير داخل المنظمة", "التوظيف", "التدريب"], answer: 0, tip: "تسهيل انتقال الشركة لمرحلة جديدة." },
                        { q: "ماذا يعني الـ 'Competency Mapping'؟", options: ["خريطة الكفاءات المطلوبة لكل دور", "قائمة الرواتب", "عدد الموظفين"], answer: 0, tip: "تساعد في التوظيف والتطوير الدقيق." },
                        { q: "ما هو الفرق بين الـ Culture والـ Climate؟", options: ["الثقافة دائمة والمناخ متغير", "كلاهما واحد", "العكس"], answer: 0, tip: "المناخ يعبر عن شعور الموظفين الحالي." },
                        { q: "ما هو الـ 'Psychological Contract'؟", options: ["التوقعات غير المكتوبة بين الموظف والشركة", "عقد العمل", "قانون العمل"], answer: 0, tip: "الوفاء بهذا العقد يضمن ولاء الموظفين." }
                    ]
                }
            };

            try {
                await setDoc(doc(db, "jobs", "HR"), data);
                alert("تم رفع الـ 30 سؤال لوظيفة HR بنجاح! 🚀");
            } catch (e) {
                alert("خطأ: " + e.message);
                console.error(e);
            }
        }

        document.getElementById('uploadBtn').addEventListener('click', uploadHRData);
    </script>
</body>
</html>
