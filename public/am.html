<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AM Rewards | حضر نفسك</title>
    <style>
        :root { --primary: #007bff; --bg: #0b0e14; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle at 50% 50%, #1a1f2e, #0b0e14); min-height: 100vh; color: white; padding: 15px; margin: 0; -webkit-overflow-scrolling: touch; overflow-y: auto; overscroll-behavior: contain; }
        
        .info-bar { display: flex; justify-content: center; margin-bottom: 20px; }
        .points-card { background: rgba(0, 123, 255, 0.15); padding: 8px 20px; border-radius: 50px; border: 1px solid var(--primary); color: #00d2ff; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .header { text-align: center; margin: 20px 0; font-size: 22px; color: var(--primary); text-shadow: 0 0 10px rgba(0,123,255,0.5); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 10px; margin-bottom: 50px; animation: fadeIn 0.6s ease; }
        
        .card { background: rgba(255, 255, 255, 0.04); padding: 15px 10px; border-radius: 15px; text-align: center; border: 1px solid rgba(0, 123, 255, 0.2); cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; min-height: 50px; font-size: 0.95rem; }
        .card:hover { border-color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.2); transform: scale(1.02); }
        
        .hidden { display: none; }
        
        .levels-container { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; justify-content: center; animation: fadeIn 0.6s ease; }
        .level-btn { min-width: 80px; padding: 15px; background: rgba(40, 167, 69, 0.2); border: 1px solid #28a745; border-radius: 15px; color: white; font-size: 14px; cursor: pointer; transition: 0.4s; }
        .level-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .back-btn { display: block; width: 100%; padding: 15px; margin-top: 20px; background: rgba(255,255,255,0.1); border: 1px solid #6c757d; border-radius: 10px; color: white; cursor: pointer; }
        
        .quiz-container { animation: fadeIn 0.6s ease; padding: 10px; }
        .question-box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid var(--primary); }
        .option-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #1c222d; border: 1px solid #444; border-radius: 12px; color: white; cursor: pointer; transition: 0.3s; }
        
        .bar { height: 6px; background: #222; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        #barFill { height: 100%; background: #007bff; width: 0%; transition: 0.3s; }
        .tip-box { background: rgba(0,123,255,0.1); padding: 15px; border-radius: 15px; margin-top: 20px; border-right: 4px solid var(--primary); font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="info-bar">
        <div class="points-card">🪙 النقاط: <span id="userPoints">0</span></div>
    </div>

    <div id="homeScreen">
        <h2 class="header">استعد لاقتناص فرصتك المهنية الآن</h2>
        <div id="jobGrid" class="grid"></div>
    </div>

    <div id="levelScreen" class="hidden">
        <h2 id="selectedJobTitle" class="header"></h2>
        <div id="levelsBox" class="levels-container">
            <button class="level-btn" onclick="startQuiz('easy', this)">سهل</button>
            <button class="level-btn" onclick="startQuiz('medium', this)">متوسط</button>
            <button class="level-btn" onclick="startQuiz('hard', this)">صعب</button>
            <button class="level-btn" onclick="startQuiz('expert', this)">محترف</button>
        </div>
        <button class="back-btn" onclick="goBack()">عودة</button>
    </div>

    <div id="quizScreen" class="hidden">
        <div class="bar"><div id="barFill"></div></div>
        <div class="quiz-container">
            <div id="questionBox" class="question-box"></div>
            <div id="optionsBox"></div>
        </div>
        <button class="back-btn" onclick="goBack()">إلغاء الاختبار</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, onSnapshot, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", authDomain: "am--rewards.firebaseapp.com", projectId: "am--rewards" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let currentUser = null, isProcessing = false, unlockedLevels = [];
        const jobTranslations = { "Accountant": "محاسب", "Assistant": "مساعد", "Biomedical_Tech": "فني أجهزة طبية", "Call_Center": "كول سنتر ", "Content_Writer": "كتابة محتوى", "Customer_Service": "خدمة عملاء", "Data_Entry": "إدخال بيانات", "Digital_Marketing": "تسويق رقمي", "Electronics_Tech": "فني إلكترونيات", "Frontend_Developer": "مطور واجهات", "Graphic_Designer": "مصمم جرافيك", "HR": "موارد بشرية", "Order_Picker": "تجهيز طلبات", "Packaging_Worker": "عمال تغليف", "Receptionist": "استقبال", "Sales_Representative": "مندوب مبيعات", "Social_Media_Moderator": "مشرف وسائل التواصل", "Translator": "مترجم", "Warehouse_Keeper": "أمين مخزن", "Technical_Support": "دعم فني" };

        let currentJob = null, currentLevel = "", questions = [], currentIndex = 0, score = 0, wrongQuestions = [], answered = false, timer = null;
        const TIME_LIMIT = 10;
        const levelNames = { 'easy': 'سهل', 'medium': 'متوسط', 'hard': 'صعب', 'expert': 'محترف' };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    if (snap.exists()) {
                        const userData = snap.data();
                        document.getElementById('userPoints').innerText = userData.points || 0;
                        unlockedLevels = userData.unlockedLevels || [];
                    }
                });
                loadJobs();
            } else { window.location.href = "login.html"; }
        });

        async function loadJobs() {
            const grid = document.getElementById('jobGrid');
            const jobSnapshot = await getDocs(collection(db, "jobs"));
            grid.innerHTML = "";
            jobSnapshot.forEach((doc) => {
                if (doc.id !== "General_Interview") {
                    const jobData = doc.data();
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<div>${jobTranslations[doc.id] || doc.id}</div>`;
                    card.onclick = () => { currentJob = jobData; document.getElementById('homeScreen').classList.add('hidden'); document.getElementById('levelScreen').classList.remove('hidden'); document.getElementById('selectedJobTitle').innerText = jobTranslations[doc.id] || doc.id; };
                    grid.appendChild(card);
                }
            });
        }

        window.startQuiz = async (level, btn) => {
            if (isProcessing) return;
            
            const isUnlocked = unlockedLevels.includes(level);
            const costs = { "easy": 0, "medium": 2, "hard": 3, "expert": 5 };
            const cost = isUnlocked ? 0 : costs[level];
            
            if (cost > 0) {
                const confirmed = confirm(`بدء هذا المستوى سيكلفك ${cost} نقطة. هل أنت موافق؟`);
                if (!confirmed) return;
            }

            isProcessing = true;
            const originalText = btn.innerText;
            btn.innerText = "جاري التحميل...";
            btn.disabled = true;

            try {
                if (!isUnlocked && cost > 0) {
                    const res = await fetch('/api/quiz-cost', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: currentUser.uid, level: level })
                    });
                    if (!res.ok) { alert("حدث خطأ في الدفع"); resetAllBtns(); return; }
                    
                    // تسجيل المستوى كمفتوح في قاعدة البيانات
                    await updateDoc(doc(db, "users", currentUser.uid), {
                        unlockedLevels: arrayUnion(level)
                    });
                }
                
                currentLevel = level;
                questions = currentJob.levels ? currentJob.levels[level] : [];
                if (questions.length === 0) { alert("لا توجد أسئلة"); resetAllBtns(); return; }
                initQuiz();
            } catch (e) { alert("حدث خطأ، حاول مرة أخرى"); resetAllBtns(); }
        };

        function resetAllBtns() {
            isProcessing = false;
            document.querySelectorAll('.level-btn').forEach((b, idx) => {
                const keys = ['easy', 'medium', 'hard', 'expert'];
                b.innerText = levelNames[keys[idx]];
                b.disabled = false;
            });
        }

        function initQuiz() {
            resetAllBtns();
            currentIndex = 0; score = 0; wrongQuestions = [];
            document.getElementById('homeScreen').classList.add('hidden');
            document.getElementById('levelScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('hidden');
            showQuestion();
        }

        // باقي الدوال (showQuestion, handleAnswer, showResult, goBack) تبقى كما هي...
        function showQuestion() {
            answered = false;
            let timeLeft = TIME_LIMIT;
            const optionsBox = document.getElementById('optionsBox');
            optionsBox.style.pointerEvents = 'auto';
            document.getElementById("barFill").style.width = "100%";
            clearInterval(timer);
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById("barFill").style.width = (timeLeft / TIME_LIMIT * 100) + "%";
                if (timeLeft <= 0) { clearInterval(timer); handleAnswer(-1, questions[currentIndex], null); }
            }, 1000);

            const q = questions[currentIndex];
            document.getElementById('questionBox').innerText = q.q;
            optionsBox.innerHTML = "";
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(index, q, btn);
                optionsBox.appendChild(btn);
            });
        }

        function handleAnswer(selectedIndex, q, btn) {
            if (answered) return;
            answered = true;
            clearInterval(timer);
            const optionsBox = document.getElementById('optionsBox');
            optionsBox.style.pointerEvents = 'none';
            if (selectedIndex === q.answer) { if(btn) btn.style.background = "green"; score++; } 
            else { if(btn) btn.style.background = "red"; optionsBox.children[q.answer].style.background = "green"; wrongQuestions.push(q); }
            setTimeout(() => { currentIndex++; if (currentIndex < questions.length) showQuestion(); else showResult(); }, 800);
        }

        window.showResult = () => {
            document.getElementById("barFill").style.width = "100%";
            let feedback = "";
            const percentage = (score / questions.length) * 100;
            if (currentLevel === 'easy') feedback = "مبروك! أنت جاهز في الأساسيات.";
            else if (currentLevel === 'medium') feedback = percentage >= 50 ? "أنت جاهز بنسبة 50% تقريباً، استمر!" : "تحتاج لمزيد من المراجعة في المستوى المتوسط.";
            else if (currentLevel === 'hard') feedback = "مستوى متقدم! أنت في الطريق الصحيح للاحتراف.";
            else if (currentLevel === 'expert') feedback = "أنت محترف حقيقي! جاهز تماماً للمقابلات الكبرى.";
            let html = `<h3>نتيجتك: ${score} من ${questions.length}</h3><p>${feedback}</p>`;
            html += `<div class="tip-box"><b>نصائح ذهبية للمقابلة:</b><br>1. <b>احكي عن نفسك:</b> ركّز على المهارات لا الحياة الشخصية.<br>2. <b>نقاط الضعف:</b> اذكر ضعفاً حقيقياً وتحدث عن خطواتك لتطويره.<br>3. <b>الأسئلة:</b> اسأل عن طبيعة يوم العمل، هذا يُظهر اهتمامك الجاد.<br>4. <b>الثقة:</b> لا تقل "مش عارف"، قل "هذا مجال جديد عليّ لكن أستطيع تعلمه بسرعة".</div>`;
            if (wrongQuestions.length > 0) {
                const retryBtn = document.createElement('button');
                retryBtn.className = 'option-btn';
                retryBtn.innerText = "راجع أخطائك (إعادة الاختبار)";
                retryBtn.onclick = () => { questions = wrongQuestions; initQuiz(); };
                document.getElementById('questionBox').innerHTML = html;
                document.getElementById('optionsBox').innerHTML = "";
                document.getElementById('optionsBox').appendChild(retryBtn);
            } else {
                document.getElementById('questionBox').innerHTML = html;
                document.getElementById('optionsBox').innerHTML = `<button class="option-btn" onclick="goBack()">العودة للرئيسية</button>`;
            }
        };

        window.goBack = () => {
            clearInterval(timer);
            document.getElementById('homeScreen').classList.remove('hidden');
            document.getElementById('levelScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.add('hidden');
        };
    </script>
</body>
</html>
