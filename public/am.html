<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة رفع الأسئلة</title>
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #0b0e14;">

    <button id="uploadBtn" style="padding: 20px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer;">
        اضغط لرفع كامل أسئلة مبيعات (Sales Representative)
    </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", 
            authDomain: "am--rewards.firebaseapp.com", 
            projectId: "am--rewards" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function uploadSalesData() {
            const data = {
                title: "مبيعات",
                category: "Sales",
                levels: {
                    easy: [
                        { q: "ما هو الهدف الأساسي لرجل المبيعات؟", options: ["إغلاق الصفقة", "الحديث الكثير", "الخصومات"], answer: 0, tip: "الهدف هو تحويل العميل المحتمل إلى عميل فعلي." },
                        { q: "ماذا تعني كلمة Prospect؟", options: ["عميل محتمل", "منتج", "سعر"], answer: 0, tip: "الـ Prospect هو شخص لديه احتمالية شراء المنتج." },
                        { q: "كيف تبدأ حديثك مع عميل جديد؟", options: ["بالتعريف بنفسك والمنتج", "بالضغط عليه", "بالصمت"], answer: 0, tip: "التعريف الواضح يبني الثقة الأولى." },
                        { q: "ما هي مهارة الاستماع في المبيعات؟", options: ["فهم احتياج العميل", "الانتظار لكي تتحدث", "عدم الاهتمام"], answer: 0, tip: "الاستماع الجيد يكشف لك نقاط ألم العميل." },
                        { q: "ماذا تفعل إذا قال العميل 'السعر مرتفع'؟", options: ["إظهار القيمة المضافة", "الخسارة فوراً", "الإهانة"], answer: 0, tip: "السعر يبرره دائماً القيمة والمنفعة." },
                        { q: "ما هو الـ Cold Call؟", options: ["اتصال بعميل لا يعرفك", "اتصال بصديق", "اتصال بمدير"], answer: 0, tip: "الـ Cold Call تحدٍ كبير يتطلب مهارة إقناع سريعة." },
                        { q: "ماذا تعني كلمة Upselling؟", options: ["بيع منتج أغلى أو إضافي", "الهروب", "الخصم"], answer: 0, tip: "إقناع العميل بمنتج أفضل لزيادة القيمة." },
                        { q: "كيف تظهر الثقة أمام العميل؟", options: ["بمعرفة تفاصيل منتجك", "بالصراخ", "بالتشتت"], answer: 0, tip: "المعرفة هي مصدر الثقة الحقيقي." },
                        { q: "ماذا تفعل بعد إغلاق الصفقة؟", options: ["المتابعة وخدمة ما بعد البيع", "تجاهل العميل", "حذف رقمه"], answer: 0, tip: "العلاقة تبدأ بعد البيع وليس قبله." },
                        { q: "ما هي أداة المبيعات الأهم؟", options: ["الأسئلة الذكية", "الخصم العشوائي", "الضغط"], answer: 0, tip: "الأسئلة الذكية تكشف لك ما يريده العميل فعلاً." }
                    ],
                    medium: [
                        { q: "كيف تتعامل مع اعتراضات العميل (Objections)؟", options: ["بالإنصات ومعالجتها بذكاء", "بالجدال", "بالهروب"], answer: 0, tip: "الاعتراضات غالباً ما تكون أسئلة مقنعة تحتاج إجابة." },
                        { q: "ما هو الـ B2B؟", options: ["بيع شركة لشركة", "بيع لشخص", "لا يوجد"], answer: 0, tip: "Business to Business هو بيع الشركات للشركات." },
                        { q: "كيف تصمم عرضاً تقديمياً مقنعاً؟", options: ["التركيز على حل مشكلات العميل", "التركيز على ميزات المنتج فقط", "وضع الكثير من النصوص"], answer: 0, tip: "العميل يشتري حلاً لمشكلته وليس ميزات تقنية." },
                        { q: "ما هو الـ Sales Funnel؟", options: ["مراحل رحلة العميل للشراء", "نوع من التغليف", "آلة حاسبة"], answer: 0, tip: "الـ Funnel يوضح كيف يتحول الغريب لعميل." },
                        { q: "كيف تبني علاقة طويلة الأمد مع العميل؟", options: ["بالصدق والاهتمام بمصلحته", "بالتلاعب", "ببيع أي شيء"], answer: 0, tip: "الصدق يبني علاقة تدوم سنوات." },
                        { q: "ماذا تفعل إذا لم يقتنع العميل في البداية؟", options: ["المتابعة بذكاء في وقت آخر", "ترك العميل للأبد", "الإلحاح المزعج"], answer: 0, tip: "العديد من الصفقات تتم بعد المتابعة (Follow-up)." },
                        { q: "ما هو الفرق بين الميزة (Feature) والمنفعة (Benefit)؟", options: ["المنفعة هي ما يكسبه العميل", "لا فرق", "الميزة هي السعر"], answer: 0, tip: "الميزة هي مواصفة، المنفعة هي الفائدة التي تعود عليه." },
                        { q: "كيف تستخدم الندرة (Scarcity) في المبيعات؟", options: ["توضيح أن العرض محدود", "بالكذب", "بالضغط"], answer: 0, tip: "الندرة تحفز القرار السريع عند العميل." },
                        { q: "ما هي أهمية التحضير قبل الاجتماع؟", options: ["معرفة احتياجات العميل مسبقاً", "تضييع الوقت", "لا أهمية لها"], answer: 0, tip: "التحضير يجعلك تبدو محترفاً جداً." },
                        { q: "كيف تتفاوض على السعر؟", options: ["التركيز على القيمة قبل السعر", "خفض السعر فوراً", "الجدال"], answer: 0, tip: "إذا أظهرت القيمة، سيصبح السعر ثانوياً." }
                    ],
                    hard: [
                        { q: "ماذا يعني الـ Closing في المبيعات؟", options: ["إتمام عملية البيع", "فتح باب النقاش", "إغلاق المكتب"], answer: 0, tip: "الـ Closing هو اللحظة الحاسمة للاتفاق." },
                        { q: "كيف تستخدم القصص (Storytelling) في الإقناع؟", options: ["بذكر نجاح عملاء آخرين", "بالتأليف", "بالحديث عن نفسك"], answer: 0, tip: "العملاء يتأثرون بنجاح الآخرين المشابهين لهم." },
                        { q: "ما هي استراتيجية الـ SPIN Selling؟", options: ["أسئلة الموقف، المشكلة، التأثير، الحاجة", "نوع من الخصم", "أسلوب ضغط"], answer: 0, tip: "تقنية SPIN هي أشهر تقنيات البيع الاستشاري." },
                        { q: "ماذا تفعل إذا كان لدى العميل بديل منافس؟", options: ["التركيز على نقاط قوتك الفريدة", "شتم المنافس", "الاستسلام"], answer: 0, tip: "كن محترفاً وركز على قيمتك الخاصة." },
                        { q: "كيف تقرأ لغة جسد العميل؟", options: ["بمراقبة علامات الاهتمام أو الرفض", "بالتخمين", "لا يوجد"], answer: 0, tip: "الجسد يتحدث بصدق أكثر من الكلام." }
                    ],
                    expert: [
                        { q: "ماذا يعني مفهوم 'Social Selling'؟", options: ["البيع عبر وسائل التواصل", "حفلة عشاء", "الاتصال المباشر"], answer: 0, tip: "بناء علاقات عبر السوشيال ميديا للبيع." },
                        { q: "ما هو الـ Customer Lifetime Value (CLV)؟", options: ["القيمة المادية للعميل عبر الزمن", "سعر المنتج", "عدد الأصدقاء"], answer: 0, tip: "الـ CLV يخبرك بمدى أهمية الحفاظ على العميل." },
                        { q: "كيف تتعامل مع 'Gatekeepers'؟", options: ["بالذكاء والاحترام للوصول لصاحب القرار", "بالتجاهل", "بالغضب"], answer: 0, tip: "السكرتارية أو المساعدون هم جسر الوصول للقرار." },
                        { q: "ما هو الـ Negotiation Win-Win؟", options: ["اتفاق يرضي الطرفين", "الانتصار على العميل", "الخسارة"], answer: 0, tip: "المبيعات الاحترافية تبحث عن اتفاق مرضي للكل." },
                        { q: "ما هو الـ Consultative Selling؟", options: ["البيع كاستشاري لتقديم حلول", "بيع مباشر", "لا يوجد"], answer: 0, tip: "البيع كاستشاري هو أرقى أنواع البيع اليوم." }
                    ]
                }
            };

            try {
                await setDoc(doc(db, "jobs", "Sales_Representative"), data);
                alert("تم رفع الـ 30 سؤال لوظيفة مبيعات بنجاح! 🚀");
            } catch (e) {
                alert("خطأ: " + e.message);
                console.error(e);
            }
        }

        document.getElementById('uploadBtn').addEventListener('click', uploadSalesData);
    </script>
</body>
</html>
