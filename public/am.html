<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة رفع الأسئلة</title>
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #0b0e14;">

    <button id="uploadBtn" style="padding: 20px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer;">
        اضغط لرفع كامل أسئلة استقبال (Receptionist)
    </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", 
            authDomain: "am--rewards.firebaseapp.com", 
            projectId: "am--rewards" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function uploadReceptionistData() {
            const data = {
                title: "استقبال",
                category: "Admin",
                levels: {
                    easy: [
                        { q: "ما هي المهمة الأولى لموظف الاستقبال؟", options: ["الترحيب بالزوار", "تناول القهوة", "استخدام الهاتف"], answer: 0, tip: "الترحيب المهني هو الانطباع الأول للشركة." },
                        { q: "كيف تتعامل مع زائر بدون موعد؟", options: ["الاستماع لطلبه بلطف وتوجيهه", "طرده", "تجاهله"], answer: 0, tip: "التعامل بلطف يعكس ثقافة المكان." },
                        { q: "ماذا تفعل عند رنين الهاتف؟", options: ["الرد في أسرع وقت بترحيب", "ترك الهاتف يرن", "إغلاقه"], answer: 0, tip: "الرد السريع يوفر وقت المتصل." },
                        { q: "كيف تحافظ على مكتب الاستقبال؟", options: ["مرتب ونظيف دائماً", "ترك الأوراق عشوائية", "وضع أغراض شخصية"], answer: 0, tip: "النظام والنظافة جزء من احترافيتك." },
                        { q: "ما هي أهم صفة لموظف الاستقبال؟", options: ["البشاشة والصبر", "العصبية", "السرعة فقط"], answer: 0, tip: "البشاشة تريح الزوار فور دخولهم." },
                        { q: "إذا دخل زائر غاضب، ماذا تفعل؟", options: ["الاستماع بهدوء", "الصراخ", "الاتصال بالأمن فوراً"], answer: 0, tip: "الهدوء هو أقوى أداة لاحتواء الغضب." },
                        { q: "لماذا نسجل بيانات الزوار؟", options: ["للأمان والتنظيم", "لإضاعة الوقت", "لا حاجة لها"], answer: 0, tip: "التسجيل إجراء أمني ضروري." },
                        { q: "ماذا تقول عند توجيه زائر لمكتب المسؤول؟", options: ["تفضل من هنا، سأبلغهم بقدومك", "أذهب هناك", "لا أعلم"], answer: 0, tip: "التوجيه المهني يسهل الأمر على الزائر." },
                        { q: "كيف تتعامل مع مكالمات تحويل؟", options: ["أخذ رقم المتصل وتحويله بلطف", "إغلاق الخط", "تجاهل التحويل"], answer: 0, tip: "المهنية في التحويل توفر وقت الجميع." },
                        { q: "ما هو الانطباع الأول؟", options: ["يتم تكوينه في ثوانٍ معدودة", "يستغرق أياماً", "غير مهم"], answer: 0, tip: "دائماً كن مستعداً لاستقبال أي شخص." }
                    ],
                    medium: [
                        { q: "كيف تتعامل مع ضغط الزوار والمكالمات في نفس الوقت؟", options: ["بالترتيب وتحديد الأولويات", "بالارتباك", "بالخروج"], answer: 0, tip: "تحديد الأولويات سر النجاح في العمل." },
                        { q: "ما هي مهارة 'اللباقة'؟", options: ["الرد الذكي والمؤدب", "المجاملة الكاذبة", "الصمت"], answer: 0, tip: "اللباقة تحل الكثير من المشاكل الإدارية." },
                        { q: "ماذا تفعل إذا لم يوجد موعد مسبق للزائر؟", options: ["الاتصال بالقسم المسؤول للاستئذان", "رفضه فوراً", "إدخاله دون استئذان"], answer: 0, tip: "الاستئذان يحفظ خصوصية الموظفين." },
                        { q: "ما هي أهمية معرفة أقسام الشركة؟", options: ["لتوجيه الزوار بدقة", "لا تهم", "للتفاخر"], answer: 0, tip: "المعرفة الشاملة تسهل سير العمل." },
                        { q: "كيف تتعامل مع زائر يرفض إعطاء بياناته؟", options: ["شرح أهمية الإجراءات الأمنية بلطف", "إجباره", "تجاهله"], answer: 0, tip: "شرح السبب يحول الرفض لتفهم." },
                        { q: "ماذا يعني الـ 'Corporate Image'؟", options: ["صورة الشركة في ذهن الناس", "شعار الشركة", "مكتب المدير"], answer: 0, tip: "موظف الاستقبال هو واجهة الصورة الذهنية." },
                        { q: "كيف تنظم مواعيد الزوار؟", options: ["باستخدام سجل مواعيد منظم", "بالتخمين", "لا يوجد تنظيم"], answer: 0, tip: "التنظيم يمنع التضارب في المواعيد." },
                        { q: "ماذا تفعل عند فقدان زائر لغرض ما؟", options: ["المساعدة في البحث فوراً", "قول 'لا أعلم'", "تجاهله"], answer: 0, tip: "المساعدة في الأزمات الصغيرة تبني ولاءً كبيراً." },
                        { q: "كيف تتعامل مع زميل يطلب منك مهام إضافية؟", options: ["المساعدة في حدود الوقت المتاح", "الرفض القاطع", "الموافقة على كل شيء"], answer: 0, tip: "التعاون ينجح العمل." },
                        { q: "ما هي أهمية المظهر العام؟", options: ["يعكس احترافية الشركة", "غير مهم", "للتصوير"], answer: 0, tip: "المظهر جزء من رسالة الشركة للزوار." }
                    ],
                    hard: [
                        { q: "ما هي إجراءات التعامل مع الحالات الطارئة (إصابة/حريق)؟", options: ["اتباع خطة الإخلاء فوراً", "الانتظار", "الاتصال بصديق"], answer: 0, tip: "المعرفة بخطط الطوارئ واجب وظيفي." },
                        { q: "كيف تتعامل مع كبار الشخصيات (VIP)؟", options: ["بخصوصية واهتمام خاص", "بإهمال", "بإزعاج"], answer: 0, tip: "الـ VIP يحتاجون دقة وخصوصية وسرعة." },
                        { q: "ما هي أداة الـ 'Check-in' للزوار؟", options: ["نظام تسجيل الدخول والخروج", "قلم ورقة", "لا يوجد"], answer: 0, tip: "الأنظمة الرقمية تضمن سرعة وفاعلية." },
                        { q: "كيف تساهم في أمن الشركة؟", options: ["بالتأكد من هوية كل زائر", "بالجلوس فقط", "بترك الباب مفتوحاً"], answer: 0, tip: "الاستقبال هو خط الدفاع الأول." },
                        { q: "ماذا تفعل إذا لم يستطع المسؤول مقابلة الزائر؟", options: ["الاعتذار بمهنية وتحديد موعد بديل", "قول 'لا يريد مقابلتك'", "طرد الزائر"], answer: 0, tip: "الاعتذار المهني يحفظ كرامة الطرفين." }
                    ],
                    expert: [
                        { q: "ما هو مفهوم 'Customer Experience' في الاستقبال؟", options: ["تجربة الزائر منذ دخوله حتى خروجه", "طعم القهوة", "سرعة الإنترنت"], answer: 0, tip: "الرحلة الكاملة للزائر مسؤليتك." },
                        { q: "كيف تقيس جودة خدمة الاستقبال؟", options: ["بمعدل رضا الزوار والوقت المستغرق", "بعدد الساعات", "بالحكم الشخصي"], answer: 0, tip: "الأرقام والقياس هما أساس التحسين." },
                        { q: "ماذا يعني بروتوكول التعامل مع المكالمات الدولية؟", options: ["الالتزام بالتوقيت واللغة", "الإغلاق", "التحدث بأي طريقة"], answer: 0, tip: "التعامل الدولي يتطلب حساسية للوقت والثقافة." },
                        { q: "كيف تطور بيئة الاستقبال لتكون أكثر فاعلية؟", options: ["بإدخال التقنية وتنظيم سير العمل", "بإهمال المكان", "بتغيير الأثاث فقط"], answer: 0, tip: "التقنية ترفع كفاءة العمل." },
                        { q: "ما هي المسؤولية القانونية لموظف الاستقبال؟", options: ["حماية خصوصية المعلومات", "لا يوجد", "شرب القهوة"], answer: 0, tip: "معلومات الزوار والشركة أمانة قانونية." }
                    ]
                }
            };

            try {
                await setDoc(doc(db, "jobs", "Receptionist"), data);
                alert("تم رفع الـ 30 سؤال لوظيفة استقبال بنجاح! 🚀");
            } catch (e) {
                alert("خطأ: " + e.message);
                console.error(e);
            }
        }

        document.getElementById('uploadBtn').addEventListener('click', uploadReceptionistData);
    </script>
</body>
</html>
