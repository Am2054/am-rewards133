<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة رفع الأسئلة</title>
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #0b0e14;">

    <button id="uploadBtn" style="padding: 20px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer;">
        اضغط لرفع كامل أسئلة محاسب (Accountant)
    </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", 
            authDomain: "am--rewards.firebaseapp.com", 
            projectId: "am--rewards" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function uploadAccountantData() {
            const data = {
                title: "محاسب",
                category: "Finance",
                levels: {
                    easy: [
                        { q: "ما هي المعادلة المحاسبية الأساسية؟", options: ["الأصول = الالتزامات + حقوق الملكية", "الأصول = الالتزامات - حقوق الملكية", "الأصول = حقوق الملكية فقط"], answer: 0, tip: "هذه هي القاعدة الذهبية للمحاسبة." },
                        { q: "ماذا يعني 'المدين' في المحاسبة؟", options: ["الطرف الذي يأخذ أو يتلقى القيمة", "الطرف الذي يعطي", "لا شيء"], answer: 0, tip: "المدين عادة ما يرتبط بزيادة الأصول أو المصروفات." },
                        { q: "ما هي قائمة الدخل؟", options: ["توضح أرباح وخسائر الشركة", "توضح أصول الشركة", "توضح ديون الشركة"], answer: 0, tip: "تقيس أداء الشركة خلال فترة زمنية." },
                        { q: "ما هو الحساب الذي تزيد فيه الأصول؟", options: ["المدين", "الدائن", "لا يتأثر"], answer: 0, tip: "الأصول بطبيعتها مدينة." },
                        { q: "ماذا يعني الـ 'Cash Flow'؟", options: ["التدفق النقدي", "الربح", "الخسارة"], answer: 0, tip: "حركة الأموال الداخلة والخارجة من الشركة." },
                        { q: "ما هي المصروفات؟", options: ["التكاليف التي تتحملها الشركة للحصول على إيراد", "أصول", "ديون"], answer: 0, tip: "المصروفات تقلل صافي الربح." },
                        { q: "ما هي الإيرادات؟", options: ["المبالغ الناتجة عن بيع خدمات أو منتجات", "ديون", "خسارة"], answer: 0, tip: "الإيرادات تزيد من حقوق الملكية." },
                        { q: "ما هو 'الميزانية العمومية'؟", options: ["قائمة توضح المركز المالي في لحظة معينة", "تقرير يومي", "فاتورة"], answer: 0, tip: "تعرض ما تملكه الشركة وما عليها." },
                        { q: "ماذا يعني مصطلح 'رصيد'؟", options: ["الفرق بين مجموع الجانب المدين والدائن", "الربح", "الخسارة"], answer: 0, tip: "الرصيد يحدد صافي قيمة الحساب." },
                        { q: "ما هي الأصول الثابتة؟", options: ["ممتلكات طويلة الأجل مثل السيارات والمباني", "نقدية", "مخزون"], answer: 0, tip: "لا تهدف للبيع بل للاستخدام في العمل." }
                    ],
                    medium: [
                        { q: "ما هو القيد المحاسبي؟", options: ["تسجيل عملية مالية في الدفاتر", "فاتورة", "تقرير"], answer: 0, tip: "يتكون من طرفين مدين ودائن." },
                        { q: "ماذا يعني 'الإهلاك'؟", options: ["توزيع تكلفة الأصل الثابت على عمره الإنتاجي", "حذف الأصل", "بيع الأصل"], answer: 0, tip: "توزيع التكلفة يعكس استهلاك الأصل." },
                        { q: "ما هو حساب 'الموردين'؟", options: ["التزام على الشركة مقابل مشتريات آجلة", "أصل", "إيراد"], answer: 0, tip: "الموردون هم من نشتري منهم بالآجل." },
                        { q: "ما الفرق بين المحاسبة المالية والمحاسبة الإدارية؟", options: ["المالية للجهات الخارجية والإدارية للداخلية", "كلاهما للداخل", "كلاهما للخارج"], answer: 0, tip: "الإدارية تساعد الإدارة في اتخاذ القرارات." },
                        { q: "ماذا يعني 'جرد المخزون'؟", options: ["مطابقة الرصيد الدفتري بالفعلي", "بيع المخزون", "شراء مخزون"], answer: 0, tip: "الجرد يضمن دقة البيانات المالية." },
                        { q: "ما هو 'الالتزام'؟", options: ["ديون أو تعهدات على الشركة", "ممتلكات", "إيرادات"], answer: 0, tip: "الالتزامات يجب سدادها مستقبلاً." },
                        { q: "ما هو الـ 'Trial Balance'؟", options: ["ميزان المراجعة", "قائمة الدخل", "الميزانية"], answer: 0, tip: "يتأكد من توازن الأرصدة المدينة والدائنة." },
                        { q: "ماذا يعني الـ 'Accrual Basis'؟", options: ["أساس الاستحقاق المحاسبي", "الأساس النقدي", "لا يوجد"], answer: 0, tip: "تسجيل العمليات وقت حدوثها وليس وقت دفع النقد." },
                        { q: "ما هي 'حقوق الملكية'؟", options: ["حق أصحاب الشركة في الأصول بعد سداد الالتزامات", "ديون الشركة", "أصول الشركة"], answer: 0, tip: "هي صافي قيمة الشركة للملاك." },
                        { q: "ما هو الـ 'General Ledger'؟", options: ["دفتر الأستاذ العام", "يومية", "فاتورة"], answer: 0, tip: "يحتوي على جميع حسابات الشركة." }
                    ],
                    hard: [
                        { q: "كيف يتم التعامل مع 'الديون المعدومة'؟", options: ["تُسجل كمصروف معدوم وتخصم من الأرباح", "لا تُسجل", "تُعتبر أصل"], answer: 0, tip: "هي ديون يستحيل تحصيلها." },
                        { q: "ما هي التسويات الجردية؟", options: ["تعديلات لنهاية الفترة لضمان دقة الحسابات", "شراء أصول", "بيع مخزون"], answer: 0, tip: "ضرورية لضبط فترات الإيرادات والمصروفات." },
                        { q: "ماذا يعني الـ 'Liquidity'؟", options: ["السيولة، قدرة الشركة على سداد التزاماتها", "الربح", "حجم الشركة"], answer: 0, tip: "السيولة هي نبض الشركة المالي." },
                        { q: "ما هي وظيفة المراجعة الداخلية؟", options: ["التحقق من صحة الإجراءات والرقابة", "التلاعب", "التسويق"], answer: 0, tip: "تحمي أصول الشركة من الخطأ أو الاحتيال." },
                        { q: "كيف يؤثر 'الخصم المكتسب' على الحسابات؟", options: ["يُسجل كإيراد أو تخفيض تكلفة", "يُسجل كمصروف", "لا يُسجل"], answer: 0, tip: "ينتج عن السداد المبكر للموردين." }
                    ],
                    expert: [
                        { q: "ما هو معيار الـ IFRS؟", options: ["معايير التقارير المالية الدولية", "قانون محلي", "نوع ضريبة"], answer: 0, tip: "توحد طريقة عرض القوائم عالمياً." },
                        { q: "ماذا يعني 'Cost of Goods Sold' (COGS)؟", options: ["تكلفة البضاعة المباعة", "سعر البيع", "أرباح"], answer: 0, tip: "أساسي لتحديد مجمل الربح." },
                        { q: "ما هو 'Break-even Point'؟", options: ["نقطة التعادل", "أعلى ربح", "أكبر خسارة"], answer: 0, tip: "النقطة التي تتساوى فيها الإيرادات مع التكاليف." },
                        { q: "ما هي الضريبة المؤجلة؟", options: ["التزام أو أصل ضريبي ناتج عن فروق زمنية", "ضريبة لا تدفع", "ربح"], answer: 0, tip: "تنشأ من اختلاف المعالجة الضريبية والمحاسبية." },
                        { q: "ماذا يعني الـ 'Leverage' المالي؟", options: ["الرافعة المالية (الاعتماد على الديون)", "حجم المبيعات", "عدد الموظفين"], answer: 0, tip: "استخدام الديون لتمويل الأصول وتضخيم العائد." }
                    ]
                }
            };

            try {
                await setDoc(doc(db, "jobs", "Accountant"), data);
                alert("تم رفع الـ 30 سؤال لوظيفة محاسب بنجاح! 🚀");
            } catch (e) {
                alert("خطأ: " + e.message);
                console.error(e);
            }
        }

        document.getElementById('uploadBtn').addEventListener('click', uploadAccountantData);
    </script>
</body>
</html>
