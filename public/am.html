<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة رفع الأسئلة</title>
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #0b0e14;">

    <button id="uploadBtn" style="padding: 20px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer;">
        اضغط لرفع كامل أسئلة تحضير الأوردرات
    </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", 
            authDomain: "am--rewards.firebaseapp.com", 
            projectId: "am--rewards" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function uploadOrderPickerData() {
            const data = {
                title: "تحضير أوردرات",
                category: "Operations",
                levels: {
                    easy: [
                        { q: "ما هي المهمة الأساسية لمحضر الأوردرات؟", options: ["تجميع المنتجات المطلوبة بدقة وسرعة", "بيع المنتجات", "البرمجة"], answer: 0, tip: "دقة التحضير تضمن رضا العميل." },
                        { q: "لماذا يجب التأكد من رقم الصنف (SKU) قبل التجميع؟", options: ["لتجنب خطأ إرسال منتج غير صحيح", "لتضييع الوقت", "لا يهم"], answer: 0, tip: "منتج واحد خاطئ يفسد تجربة العميل." },
                        { q: "ماذا يعني الـ 'Pick List'؟", options: ["قائمة الأصناف المطلوبة في الأوردر", "قائمة أسعار", "لا شيء"], answer: 0, tip: "هي خريطتك لإنجاز العمل." },
                        { q: "ماذا تفعل عند وجود نقص في كمية صنف مطلوب؟", options: ["إبلاغ المشرف فوراً لتعديل الطلب", "إرسال صنف بديل من نفسك", "تجاهل النقص"], answer: 0, tip: "الشفافية في التعامل مع الطلبات ضرورية." },
                        { q: "ما أهمية فحص حالة المنتج قبل وضعه في الأوردر؟", options: ["لضمان سلامة المنتج وعدم وجود تلف", "للتسلية", "لا يهم"], answer: 0, tip: "المنتج التالف لا يجب أن يصل للعميل." },
                        { q: "كيف تتعامل مع أوامر الطلب العاجلة؟", options: ["إعطاؤها أولوية وفقاً لنظام العمل", "تجاهلها", "تركها للآخر"], answer: 0, tip: "السرعة هي معيار أساسي في Fulfillment." },
                        { q: "ماذا تعني 'التحضير المتعدد' (Batch Picking)؟", options: ["تحضير عدة أوردرات في جولة واحدة", "تحضير طلب واحد فقط", "لا شيء"], answer: 0, tip: "تقنية ممتازة لزيادة كفاءتك." },
                        { q: "كيف تحمي المنتجات الحساسة داخل الأوردر؟", options: ["بتغليفها جيداً واستخدام فواصل حماية", "بوضعها مع أشياء ثقيلة", "تركها بدون حماية"], answer: 0, tip: "حماية المنتج مسؤوليتك." },
                        { q: "ماذا تفعل بعد الانتهاء من تجميع الأوردر؟", options: ["مراجعة الأصناف والكميات مع القائمة", "تسليمه فوراً", "وضعه في أي مكان"], answer: 0, tip: "المراجعة النهائية هي خط الدفاع الأخير." },

                    medium: [
                        { q: "ما هو دور الـ 'Scanner' في تحضير الأوردرات؟", options: ["التأكد الرقمي من صحة الصنف والكمية", "قراءة الأخبار", "تصميم"], answer: 0, tip: "الباركود هو أداة منع الخطأ البشرى." },
                        { q: "ماذا تعني 'المرونة' في عملية التحضير؟", options: ["القدرة على التعامل مع تغييرات الطلبات", "السرعة فقط", "العمل ببطء"], answer: 0, tip: "طلبات العملاء تتغير باستمرار." },
                        { q: "كيف تتعامل مع 'الأوردرات المستعجلة'؟", options: ["بالتركيز والتنظيم لتقليل وقت التنفيذ", "بالارتباك", "بالعمل ببطء"], answer: 0, tip: "الهدوء تحت ضغط الوقت هو مهارة." },

                        { q: "كيف تساهم في تقليل 'مرتجعات العملاء'؟", options: ["بالدقة العالية في التحضير والفحص", "بإرسال أي شيء", "لا يهم"], answer: 0, tip: "الدقة = صفر مرتجعات." },
                        { q: "ماذا تعني 'Zone Picking'؟", options: ["تحضير الطلبات حسب مناطق المخزن", "العمل في منطقة واحدة", "لا شيء"], answer: 0, tip: "كل شخص مسؤول عن منطقته لزيادة السرعة." },
                        { q: "ما أهمية الـ 'Documentation' (التوثيق) لكل أوردر؟", options: ["ضمان وجود سجل كامل لعملية الشحن", "لا يهم", "للزينة"], answer: 0, tip: "التوثيق يحمي حقك وحق الشركة." },
                        { q: "كيف تتعامل مع أصناف متشابهة في الشكل؟", options: ["قراءة الـ SKU بعناية فائقة", "التخمين", "تجاهل التشابه"], answer: 0, tip: "التشابه هو أكبر مصدر للأخطاء." },
                        { q: "ماذا يعني 'Order Accuracy Rate'؟", options: ["نسبة دقة تحضير الطلبات", "سعر الأوردر", "عدد الأصناف"], answer: 0, tip: "هذا أهم مقياس لأدائك الوظيفي." },
                        { q: "كيف تتعامل مع المنتجات التي تتطلب حرارة خاصة؟", options: ["اتباع تعليمات التخزين والنقل بدقة", "تجاهل التعليمات", "لا شيء"], answer: 0, tip: "الجودة تتأثر فوراً بإهمال الظروف." }
                    ],
                    hard: [
                        { q: "ماذا يعني 'Slotting' في المستودعات؟", options: ["تحسين أماكن تخزين الأصناف لتسهيل التحضير", "ترتيب الأرفف باللون", "تنظيف"], answer: 0, tip: "الأصناف الأكثر طلباً توضع في أماكن قريبة." },

                        { q: "ما هو دور 'نظام الإدارة' (WMS) في عملك؟", options: ["توجيهك لأقصر مسار وأفضل الأصناف", "لا شيء", "مراقبة"], answer: 0, tip: "النظام هو عقلك المدبر في التحضير." },
                        { q: "كيف تتعامل مع 'المخزون المعلق' (Pending)؟", options: ["متابعة الحالة مع الإدارة قبل التحضير", "تجميعه دون إذن", "تجاهله"], answer: 0, tip: "لا تحضر ما لا تملك إذن صرفه." },
                        { q: "ماذا تفعل في حال وجود عجز دائم في صنف معين؟", options: ["رفع تقرير للإدارة لتحديث المخزون", "تجاهله", "تجميعه كأنه موجود"], answer: 0, tip: "أنت عيون الإدارة في المخزن." }
                    ],
                    expert: [
                        { q: "ما هو الـ 'Wave Picking'؟", options: ["تحضير الطلبات على شكل دفعات زمنية", "تحضير طلب واحد", "لا شيء"], answer: 0, tip: "تزيد من كفاءة تدفق الطلبات بشكل كبير." },
                        { q: "كيف تؤثر عملية التحضير على 'سلسلة الإمداد'؟", options: ["أنت نقطة التحول الأساسية للعميل", "لا تؤثر", "لا شيء"], answer: 0, tip: "عملك هو الخطوة الأخيرة للوصول للعميل." },
                        { q: "ما هو 'Lean Picking'؟", options: ["إلغاء أي حركة غير ضرورية في التحضير", "التحضير السريع", "لا شيء"], answer: 0, tip: "تقليل الهدر هو مفتاح الاحترافية." },
                        { q: "كيف تتعامل مع أخطاء النظام (System Errors)؟", options: ["التوقف والإبلاغ فوراً للحصول على حل", "العمل بالاجتهاد الشخصي", "تجاهلها"], answer: 0, tip: "العمل بنظام معطل يسبب كوارث بيانات." },
                        { q: "ما هي أهمية 'التحسين المستمر' (Kaizen) لعملك؟", options: ["إيجاد طرق أسرع وأدق للتحضير", "عدم تغيير أي شيء", "لا يهم"], answer: 0, tip: "دائماً هناك طريقة أفضل للعمل." }
                    ]
                }
            };

            try {
                await setDoc(doc(db, "jobs", "Order_Picker"), data);
                alert("تم رفع الـ 30 سؤال لوظيفة تحضير أوردرات بنجاح! 🚀");
            } catch (e) {
                alert("خطأ: " + e.message);
                console.error(e);
            }
        }

        document.getElementById('uploadBtn').addEventListener('click', uploadOrderPickerData);
    </script>
</body>
</html>
