<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AM Rewards | حضر نفسك</title>
    <style>
        :root { --primary: #007bff; --bg: #0b0e14; }
        * { will-change: transform; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle at 50% 50%, #1a1f2e, #0b0e14); min-height: 100vh; color: white; padding: 15px; margin: 0; -webkit-overflow-scrolling: touch; overflow-y: auto; overscroll-behavior: contain; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .header { text-align: center; margin: 20px 0; font-size: 22px; color: var(--primary); text-shadow: 0 0 10px rgba(0,123,255,0.5); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; animation: fadeIn 0.6s ease; contain: content; }
        
        .card { background: rgba(255, 255, 255, 0.04); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(0, 123, 255, 0.2); cursor: pointer; transition: 0.2s; position: relative; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .card:hover { border-color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.2); transform: scale(1.02); }
        .card::before { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(0,123,255,0.1), transparent); transition: 0.5s; }
        
        .hidden { display: none; }
        
        .levels-container { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; justify-content: center; animation: fadeIn 0.6s ease; -webkit-overflow-scrolling: touch; scroll-snap-type: x mandatory; }
        .level-btn { min-width: 80px; padding: 15px; background: rgba(40, 167, 69, 0.2); border: 1px solid #28a745; border-radius: 15px; color: white; font-size: 14px; cursor: pointer; transition: 0.4s; scroll-snap-align: center; }
        .level-btn:hover { background: #28a745; transform: translateY(-5px); box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3); }
        
        .back-btn { display: block; width: 100%; padding: 15px; margin-top: 20px; background: rgba(255,255,255,0.1); border: 1px solid #6c757d; border-radius: 10px; color: white; cursor: pointer; transition: 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.2); }

        .quiz-container { animation: fadeIn 0.6s ease; padding: 10px; }
        .question-box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid var(--primary); }
        .option-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #1c222d; border: 1px solid #444; border-radius: 12px; color: white; cursor: pointer; transition: 0.3s; }
        .option-btn:hover { background: var(--primary); }
        .progress { text-align: center; margin-bottom: 10px; color: var(--primary); font-weight: bold; }
        .tip-box { background: rgba(0,123,255,0.1); padding: 15px; border-radius: 15px; margin-top: 20px; border-right: 4px solid var(--primary); font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="homeScreen">
        <h2 class="header">استعد لاقتناص فرصتك المهنية الآن</h2>
        <div id="jobGrid" class="grid"></div>
    </div>

    <div id="levelScreen" class="hidden">
        <h2 id="selectedJobTitle" class="header"></h2>
        <div id="levelsBox" class="levels-container">
            <button class="level-btn" onclick="startQuiz('easy')">سهل</button>
            <button class="level-btn" onclick="startQuiz('medium')">متوسط</button>
            <button class="level-btn" onclick="startQuiz('hard')">صعب</button>
            <button class="level-btn" onclick="startQuiz('expert')">محترف</button>
        </div>
        <button class="back-btn" onclick="goBack()">عودة</button>
    </div>

    <div id="quizScreen" class="hidden">
        <div id="quizProgress" class="progress"></div>
        <div class="quiz-container">
            <div id="questionBox" class="question-box"></div>
            <div id="optionsBox"></div>
        </div>
        <button class="back-btn" onclick="goBack()">إلغاء الاختبار</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", authDomain: "am--rewards.firebaseapp.com", projectId: "am--rewards" };
        
        const jobTranslations = {
            "Accountant": "محاسب", "Assistant": "مساعد", "Biomedical_Tech": "فني أجهزة طبية",
            "Call_Center": "خدمة عملاء", "Content_Writer": "كتابة محتوى", "Customer_Service": "خدمة عملاء",
            "Data_Entry": "إدخال بيانات", "Digital_Marketing": "تسويق رقمي", "Electronics_Tech": "فني إلكترونيات",
            "Frontend_Developer": "مطور واجهات", "Graphic_Designer": "مصمم جرافيك", "HR": "موارد بشرية",
            "Order_Picker": "تجهيز طلبات", "Packaging_Worker": "عمال تغليف", "Receptionist": "استقبال",
            "Sales_Representative": "مندوب مبيعات", "Social_Media_Moderator": "مشرف وسائل التواصل", 
            "Translator": "مترجم", "Warehouse_Keeper": "أمين مخزن", "General_Interview": "أسئلة عامة", "Technical_Support": "دعم فني"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentJob = null, questions = [], currentIndex = 0, score = 0, wrongQuestions = [];

        async function loadJobs() {
            const querySnapshot = await getDocs(collection(db, "jobs"));
            const grid = document.getElementById('jobGrid');
            querySnapshot.forEach((doc) => {
                const jobData = doc.data();
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div>${jobTranslations[doc.id] || doc.id}</div>`;
                card.onclick = () => showLevels(doc.id, jobData);
                grid.appendChild(card);
            });
        }

        window.showLevels = (id, jobData) => {
            currentJob = jobData;
            document.getElementById('homeScreen').classList.add('hidden');
            document.getElementById('levelScreen').classList.remove('hidden');
            document.getElementById('selectedJobTitle').innerText = jobTranslations[id] || id;
        };

        window.goBack = () => {
            document.getElementById('homeScreen').classList.remove('hidden');
            document.getElementById('levelScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.add('hidden');
        };

        window.startQuiz = (level) => {
            questions = currentJob.levels ? currentJob.levels[level] : [];
            if (questions.length === 0) { alert("لا توجد أسئلة"); return; }
            currentIndex = 0; score = 0; wrongQuestions = [];
            document.getElementById('levelScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('hidden');
            showQuestion();
        };

        function showQuestion() {
            const q = questions[currentIndex];
            document.getElementById('quizProgress').innerText = `سؤال ${currentIndex + 1} من ${questions.length}`;
            document.getElementById('questionBox').innerText = q.q;
            const optionsBox = document.getElementById('optionsBox');
            optionsBox.innerHTML = "";
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(index, q);
                optionsBox.appendChild(btn);
            });
        }

        function handleAnswer(selectedIndex, q) {
            if (selectedIndex === q.answer) score++;
            else wrongQuestions.push({ ...q, selected: q.options[selectedIndex] });
            currentIndex++;
            if (currentIndex < questions.length) showQuestion();
            else showResult();
        }

        function showResult() {
            let html = `<h3>نتيجتك: ${score} من ${questions.length}</h3>`;
            if (wrongQuestions.length > 0) {
                html += `<h4>أسئلة تحتاج مراجعة:</h4>`;
                wrongQuestions.forEach(q => html += `<p style="font-size:14px">❌ ${q.q}<br>الصحيح: <b>${q.options[q.answer]}</b></p>`);
            }
            html += `<div class="tip-box">
                <b>نصائح ذهبية للمقابلة:</b><br>
                1. <b>احكي عن نفسك:</b> ركّز على المهارات لا الحياة الشخصية.<br>
                2. <b>نقاط الضعف:</b> اذكر ضعفاً حقيقياً وتحدث عن خطواتك لتطويره.<br>
                3. <b>الأسئلة:</b> اسأل عن طبيعة يوم العمل، هذا يُظهر اهتمامك الجاد.<br>
                4. <b>الثقة:</b> لا تقل "مش عارف"، قل "هذا مجال جديد عليّ لكن أستطيع تعلمه بسرعة".
            </div>`;
            document.getElementById('quizProgress').innerText = "نتائج الاختبار";
            document.getElementById('questionBox').innerHTML = html;
            document.getElementById('optionsBox').innerHTML = `<button class="option-btn" onclick="goBack()">العودة للرئيسية</button>`;
        }

        loadJobs();
    </script>
</body>
</html>
