<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة رفع الأسئلة</title>
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #0b0e14;">

    <button id="uploadBtn" style="padding: 20px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer;">
        اضغط لرفع كامل أسئلة فني أجهزة طبية
    </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", 
            authDomain: "am--rewards.firebaseapp.com", 
            projectId: "am--rewards" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function uploadBiomedicalData() {
            const data = {
                title: "فني أجهزة طبية",
                category: "Tech",
                levels: {
                    easy: [
                        { q: "ما هو الجهاز المستخدم لمراقبة نبضات القلب؟", options: ["ECG", "Ventilator", "Syringe Pump"], answer: 0, tip: "جهاز الـ ECG هو المختص بتخطيط ومراقبة النشاط الكهربائي للقلب." },
                        { q: "ما هي الوحدة المستخدمة لقياس المقاومة الكهربائية؟", options: ["Volt", "Ohm", "Ampere"], answer: 1, tip: "الأوم (Ohm) هو وحدة قياس المقاومة." },
                        { q: "كيف نتأكد من سلامة كابلات الجهاز؟", options: ["بالنظر فقط", "باستخدام الملتيميتر", "بتغيير الجهاز"], answer: 1, tip: "الملتيميتر هو الأداة الصحيحة لفحص استمرارية الكابلات." },
                        { q: "ما هو دور الـ Sensor في الأجهزة الطبية؟", options: ["تحويل الإشارة", "تخزين الطاقة", "تبريد الجهاز"], answer: 0, tip: "الحساس (Sensor) يقوم بتحويل المتغيرات الفيزيائية لإشارات كهربائية." },
                        { q: "ما هو لون سلك التأريض (Ground) عادةً؟", options: ["أحمر", "أصفر وأخضر", "أزرق"], answer: 1, tip: "سلك التأريض (Ground) غالباً ما يكون باللون الأصفر والأخضر." },
                        { q: "كيف يتم تعقيم الأدوات الطبية؟", options: ["بالماء فقط", "بالأوتوكلاف", "بالميكروويف"], answer: 1, tip: "الأوتوكلاف (Autoclave) هو الجهاز القياسي للتعقيم." },
                        { q: "أي جهاز يستخدم لمساعدة المريض على التنفس؟", options: ["Ventilator", "Defibrillator", "Monitor"], answer: 0, tip: "جهاز التنفس الصناعي (Ventilator) يوفر المساعدة في عملية التنفس." },
                        { q: "ما هو الـ LCD؟", options: ["جهاز قياس", "شاشة عرض", "مضخة"], answer: 1, tip: "شاشة الكريستال السائل (LCD) تُستخدم لعرض بيانات الجهاز للمستخدم." },
                        { q: "ماذا يعني وجود إنذار على الـ Monitor؟", options: ["فصل الكهرباء", "خروج القراءة عن النطاق", "تحديث البرنامج"], answer: 1, tip: "الإنذار يخبرك أن القراءات الحيوية للمريض قد تجاوزت الحدود الطبيعية." },
                        { q: "ما أهمية صيانة الأجهزة دورياً؟", options: ["زيادة السعر", "ضمان دقة القراءات", "تغيير الشكل"], answer: 1, tip: "الصيانة الدورية تضمن دقة القراءات وسلامة المريض والجهاز." }
                    ],
                    medium: [
                        { q: "ما هو الإجراء الصحيح عند اكتشاف تسريب في جهاز تخدير؟", options: ["إكمال العملية", "إيقاف الجهاز واستبداله", "وضع لاصق"], answer: 1, tip: "السلامة أولاً، يجب إيقاف الجهاز فوراً لمنع تعريض حياة المريض للخطر." },
                        { q: "لماذا نقوم بعملية المعايرة (Calibration)؟", options: ["لتحسين الشكل", "لضمان دقة القراءات", "لتقليل استهلاك الطاقة"], answer: 1, tip: "المعايرة تضمن أن الجهاز يقرأ القيم الحقيقية بدقة متناهية." },
                        { q: "ماذا يعني وجود 'Artifact' في إشارة الـ ECG؟", options: ["تشويش خارجي", "توقف القلب", "جودة عالية"], answer: 0, tip: "التشويش (Artifact) غالباً بسبب حركة المريض أو سوء توصيل الأقطاب." },
                        { q: "ما هو دور الـ Defibrillator؟", options: ["تخطيط القلب", "إعطاء صدمة كهربائية", "قياس التنفس"], answer: 1, tip: "يستخدم لإعادة ضربات القلب الطبيعية في حالات الطوارئ." },
                        { q: "كيف يتم تنظيف عدسة الـ Endoscope؟", options: ["بمادة كيميائية قوية", "بقطعة قماش ناعمة ومحلول معقم", "بالماء والصابون"], answer: 1, tip: "العدسات حساسة جداً وتحتاج تنظيفاً دقيقاً لمنع الخدش." },
                        { q: "أي جزء في جهاز التنفس الصناعي يمنع دخول العدوى؟", options: ["الفلتر (HEPA Filter)", "الشاشة", "المضخة"], answer: 0, tip: "فلتر الـ HEPA يمنع انتقال الميكروبات للمريض وللجهاز." },
                        { q: "ماذا تفعل إذا لم يستجب الجهاز للتشغيل؟", options: ["أقوم بفتح الغطاء", "أفحص مصدر الطاقة والفيوزات", "أطلب شراء جهاز جديد"], answer: 1, tip: "دائماً ابدأ بالتحقق من أبسط الأشياء مثل كابل الكهرباء والفيوز (Fuse)." },
                        { q: "ما هي المادة المستخدمة في تصوير الأشعة السينية (X-Ray)؟", options: ["الرصاص (Lead)", "النحاس", "الألمنيوم"], answer: 0, tip: "الرصاص يستخدم بكثافة للحماية من الإشعاع الضار." },
                        { q: "كيف نتجنب حدوث تداخل كهربائي بين الأجهزة؟", options: ["بوضعها قريبة جداً", "بالتأريض الجيد (Grounding)", "بتشغيلها جميعاً"], answer: 1, tip: "التأريض الجيد هو الحل الأمثل لمنع التشويش الكهربائي." },
                        { q: "ما هو الاختبار الذي يضمن سلامة المريض من التيار الكهربائي؟", options: ["Electrical Safety Test", "Visual Check", "Speed Test"], answer: 0, tip: "اختبار السلامة الكهربائية (Electrical Safety Test) يحمي المريض من الصعق." }
                    ],
                    hard: [
                        { q: "ما هو الفرق الرئيسي بين الـ MRI والـ CT Scan؟", options: ["MRI يستخدم مغناطيس، CT يستخدم أشعة", "كلاهما نفس الشيء", "CT يستخدم مغناطيس"], "answer": 0, "tip": "الـ MRI يعتمد على الرنين المغناطيسي، بينما الـ CT يعتمد على الأشعة السينية." },
                        { q: "ماذا يعني الـ Impedance في سياق المجسات؟", options: ["المقاومة للتيار المتردد", "الجهد المستمر", "شدة الإضاءة"], "answer": 0, "tip": "الممانعة (Impedance) هي المعاوقة الكلية لتدفق التيار في الدوائر المترددة." },
                        { q: "كيف تتعامل مع رسالة 'Sensor Failure' في جهاز تنفس صناعي؟", options: ["أتجاهلها", "أعيد معايرة الحساس أو استبدله", "أفصل الجهاز"], "answer": 1, "tip": "فشل الحساس يعني فقدان الدقة في القياس، يجب استبداله فوراً لضمان سلامة المريض." },
                        { q: "ما هو الغرض من استخدام 'Isolation Transformer'؟", options: ["زيادة الجهد", "عزل الجهاز كهربائياً عن الشبكة", "تحويل التيار لمستمر"], "answer": 1, "tip": "يستخدم لعزل الأجهزة الطبية عن تقلبات شبكة الكهرباء الرئيسية ومنع التسريب." },
                        { q: "كيف يتم فحص دقة ضغط الـ Syringe Pump؟", options: ["بالميزان الرقمي", "بالنظر", "بقياس درجة الحرارة"], "answer": 0, "tip": "يتم قياس حجم السائل الخارج خلال زمن معين بدقة باستخدام الميزان الرقمي." }
                    ],
                    expert: [
                        { q: "في أنظمة الـ Telemetry، ما هو بروتوكول نقل البيانات الأكثر شيوعاً؟", options: ["HTTP", "DICOM", "FTP"], "answer": 1, "tip": "DICOM هو المعيار العالمي لنقل وتخزين الصور والبيانات الطبية." },
                        { q: "كيف تكتشف وجود 'Ground Loop' في نظام مراقبة؟", options: ["بفحص جهد الأرضي", "بملاحظة الضوضاء في الإشارة", "لا يمكن اكتشافه"], "answer": 1, "tip": "الحلقات الأرضية تسبب تشويشاً دورياً (Hum) في الإشارات التناظرية." },
                        { q: "ما هو الـ FPGA في تصميم الأجهزة الطبية؟", options: ["متحكم منطقي قابل للبرمجة", "محرك ميكانيكي", "نوع من الشاشات"], "answer": 0, "tip": "الـ FPGA يوفر سرعة معالجة عالية جداً للأجهزة الطبية المعقدة." },
                        { q: "ماذا يحدث عند تعطل الـ Power Supply Unit (PSU) في جهاز حيوي؟", options: ["الجهاز يستمر بالبطارية الداخلية", "الجهاز ينفجر", "لا شيء"], "answer": 0, "tip": "الأجهزة الحيوية مصممة للتحول التلقائي للبطارية في حال فشل الـ PSU." },
                        { q: "كيف يتم تحليل جودة الإشارة الرقمية في جهاز طبي؟", options: ["باستخدام الـ SNR (Signal to Noise Ratio)", "بقياس الوزن", "بالرؤية"], "answer": 0, "tip": "نسبة الإشارة إلى الضوضاء (SNR) هي المقياس الأساسي لجودة ونقاء الإشارة." }
                    ]
                }
            };

            try {
                await setDoc(doc(db, "jobs", "Biomedical_Tech"), data);
                alert("تم رفع الـ 30 سؤال (4 مستويات) بنجاح! 🚀");
            } catch (e) {
                alert("خطأ: " + e.message);
                console.error(e);
            }
        }

        document.getElementById('uploadBtn').addEventListener('click', uploadBiomedicalData);
    </script>
</body>
</html>
