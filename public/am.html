<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AM Rewards | اختيار الاختبار</title>
    <style>
        body { font-family: sans-serif; background: #0b0e14; color: white; padding: 15px; }
        .search-bar { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 10px; border: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: #1c222d; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #007bff; cursor: pointer; }
        .hidden { display: none; }
        .level-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #28a745; border: none; border-radius: 10px; color: white; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="homeScreen">
        <input type="text" id="searchInput" class="search-bar" placeholder="ابحث عن وظيفتك..." onkeyup="filterJobs()">
        <div id="jobGrid" class="grid"></div>
    </div>

    <div id="levelScreen" class="hidden">
        <h2 id="selectedJobTitle"></h2>
        <button class="level-btn" onclick="startQuiz('easy')">سهل</button>
        <button class="level-btn" onclick="startQuiz('medium')">متوسط</button>
        <button class="level-btn" onclick="startQuiz('hard')">صعب</button>
        <button class="level-btn" onclick="startQuiz('expert')">محترف</button>
        <button class="level-btn" style="background: #6c757d;" onclick="goBack()">عودة</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { /* بياناتك هنا */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentJob = null;

        // جلب الوظائف
        async function loadJobs() {
            const querySnapshot = await getDocs(collection(db, "jobs"));
            const grid = document.getElementById('jobGrid');
            querySnapshot.forEach((doc) => {
                const job = doc.data();
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div>${job.title}</div>`;
                card.onclick = () => showLevels(job);
                grid.appendChild(card);
            });
        }

        window.showLevels = (job) => {
            currentJob = job;
            document.getElementById('homeScreen').classList.add('hidden');
            document.getElementById('levelScreen').classList.remove('hidden');
            document.getElementById('selectedJobTitle').innerText = job.title;
        };

        window.goBack = () => {
            document.getElementById('homeScreen').classList.remove('hidden');
            document.getElementById('levelScreen').classList.add('hidden');
        };

        window.filterJobs = () => {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(input) ? "" : "none";
            });
        };

        window.startQuiz = (level) => {
            alert("بدء اختبار " + level + " لوظيفة " + currentJob.title);
            // هنا ستنتقل لشاشة الأسئلة وتجلب البيانات من currentJob.levels[level]
        };

        loadJobs();
    </script>
</body>
</html>
