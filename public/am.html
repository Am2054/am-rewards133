<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة رفع الأسئلة</title>
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #0b0e14;">

    <button id="uploadBtn" style="padding: 20px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer;">
        اضغط لرفع كامل أسئلة خدمة عملاء
    </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBfOJPkWbmcJ6s29bDNysr-H0Kx-Js3Gy0", 
            authDomain: "am--rewards.firebaseapp.com", 
            projectId: "am--rewards" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function uploadCustomerServiceData() {
            const data = {
                title: "خدمة عملاء",
                category: "Service",
                levels: {
                    easy: [
                        { q: "ما هي الطريقة الأفضل للرد على عميل غاضب؟", options: ["إغلاق الخط", "الاستماع له بهدوء", "الصراخ عليه"], answer: 1, tip: "الاستماع للعميل هو أول خطوة لامتصاص غضبه." },
                        { q: "ماذا يجب أن تقول عند بداية المكالمة؟", options: ["ألو.. مين؟", "تحية مهنية وتعريف بنفسك", "سأعطيك الهاتف"], answer: 1, tip: "التحية المهنية تعطي انطباعاً بالاحترافية." },
                        { q: "كيف تتعامل مع طلب لا يمكنك تنفيذه؟", options: ["وعده بأي شيء", "شرح السبب بوضوح ولطف", "تجاهل الرسالة"], answer: 1, tip: "الوضوح واللطف يحفظان ثقة العميل." },
                        { q: "ماذا تعني كلمة 'سيرفيس'؟", options: ["خدمة", "منتج", "شحن"], answer: 0, tip: "سيرفيس تعني خدمة." },
                        { q: "ما هي الأداة الأهم لخدمة العملاء؟", options: ["الصبر", "السرعة فقط", "الخصم"], answer: 0, tip: "الصبر هو مفتاح التعامل مع مختلف الشخصيات." },
                        { q: "إذا لم تعرف إجابة سؤال العميل، ماذا تفعل؟", options: ["تأليف إجابة", "طلب الانتظار حتى التأكد", "قول 'لا أعلم' فقط"], answer: 1, tip: "التأكد من المعلومة خير من إعطاء معلومة خاطئة." },
                        { q: "كيف تنهي المكالمة؟", options: ["بشكل مفاجئ", "بالتأكد من رضا العميل", "بترك الخط مفتوحاً"], answer: 1, tip: "التأكد من رضا العميل ينهي المكالمة بنجاح." },
                        { q: "ما هو الهدف من خدمة العملاء؟", options: ["إرضاء العميل", "بيع المنتجات فقط", "الراحة"], answer: 0, tip: "الهدف الأساسي هو بناء علاقة جيدة وإرضاء العميل." },
                        { q: "كيف تظهر اهتمامك بالعميل؟", options: ["بتدوين ملاحظات", "بمقاطعته", "بالتحدث كثيراً"], answer: 0, tip: "التدوين يظهر أنك مهتم بكل تفاصيل مشكلته." },
                        { q: "ما هي الصفة المطلوبة للعمل في هذا المجال؟", options: ["سرعة البديهة", "الخجل", "العصبية"], answer: 0, tip: "سرعة البديهة تساعد في حل المشاكل بسرعة." }
                    ],
                    medium: [
                        { q: "كيف تتعامل مع عميل يطالب بخصم غير موجود؟", options: ["الموافقة فوراً", "شرح سياسة الشركة بلطف", "إهانته"], answer: 1, tip: "شرح السياسة بمهنية يضع حدوداً واضحة." },
                        { q: "ماذا تفعل إذا كان هناك ضغط مكالمات كبير؟", options: ["الرد بإيجاز ومهنية", "الهروب", "الرد ببطء"], answer: 0, tip: "الإيجاز والمهنية يضمنان خدمة الجميع." },
                        { q: "ماذا تعني مهارة 'التعاطف' في خدمة العملاء؟", options: ["شعورك بموقف العميل", "الشفقة", "التجاهل"], answer: 0, tip: "التعاطف يساعد في بناء جسر ثقة مع العميل." },
                        { q: "كيف تعالج خطأ تقني تسبب فيه النظام؟", options: ["لوم العميل", "الاعتذار الصادق والعمل على الحل", "تجاهله"], answer: 1, tip: "الاعتذار هو بداية الحل لأي مشكلة." },
                        { q: "ماذا تفعل إذا أهانك عميل؟", options: ["إهانته بالمثل", "الالتزام بالهدوء وطلب الاحترام", "البكاء"], answer: 1, tip: "الحفاظ على الهدوء هو علامة الاحترافية." },
                        { q: "كيف تنقل مكالمة لزميل آخر؟", options: ["رمي العميل", "شرح المشكلة للزميل أولاً", "إغلاق الخط"], answer: 1, tip: "شرح المشكلة يغني العميل عن إعادة القصة." },
                        { q: "ما هي أهمية متابعة الشكوى؟", options: ["إزعاج العميل", "ضمان حل المشكلة نهائياً", "لا أهمية لها"], answer: 1, tip: "المتابعة تظهر اهتمام الشركة الحقيقي." },
                        { q: "كيف تبني ولاء العميل؟", options: ["بتقديم تجربة ممتازة", "بالخداع", "بإهماله"], answer: 0, tip: "التجربة الممتازة هي سر الولاء." },
                        { q: "ما هو الوقت المثالي للرد؟", options: ["أسرع وقت ممكن", "بعد يوم", "لا يهم"], answer: 0, tip: "السرعة في الرد توفر وقت العميل." },
                        { q: "كيف تفرق بين مشكلة تقنية وشكوى إدارية؟", options: ["بالتحليل والخبرة", "بالحظ", "بالمصادفة"], answer: 0, tip: "الخبرة تمكنك من تصنيف الشكوى فوراً." }
                    ],
                    hard: [
                        { q: "ماذا تفعل إذا تكررت شكوى العميل دون حل؟", options: ["تصعيد المشكلة للإدارة", "تجاهله", "وعده كذباً"], answer: 0, tip: "التصعيد يضمن حل المشاكل الجذرية." },
                        { q: "كيف تدير توقعات العميل؟", options: ["بتقديم وعود واقعية", "بتقديم وعود خيالية", "بعدم تقديم وعود"], answer: 0, tip: "الواقعية تحمي الشركة من فقدان المصداقية." },
                        { q: "ما هو أثر التغذية الراجعة (Feedback)؟", options: ["تحسين الخدمة", "تضييع الوقت", "لا تأثير"], answer: 0, tip: "الـ Feedback هو وقود التطوير." },
                        { q: "كيف تتعامل مع عميل يهدد بترك الشركة؟", options: ["محاولة فهم السبب وتقديم حلول", "قول 'لا ترحل'", "إغلاق الخط"], answer: 0, tip: "فهم السبب هو الفرصة الأخيرة للإصلاح." },
                        { q: "ماذا تعني مهارة 'الاستماع النشط'؟", options: ["فهم المعنى وليس فقط الكلمات", "النوم أثناء الكلام", "الرد التلقائي"], answer: 0, tip: "الاستماع النشط يضمن عدم سوء الفهم." }
                    ],
                    expert: [
                        { q: "ما هو الـ KPI الأهم في خدمة العملاء؟", options: ["CSAT / NPS", "عدد القهوة", "عدد الضحكات"], answer: 0, tip: "مؤشرات رضا العملاء (CSAT/NPS) هي المقياس الحقيقي." },
                        { q: "كيف تساهم خدمة العملاء في المبيعات؟", options: ["عن طريق التوصية (Upselling)", "بالتخويف", "لا علاقة لها"], answer: 0, tip: "الخدمة الجيدة تفتح باباً للبيع الإضافي." },
                        { q: "ما هو 'رحلة العميل' (Customer Journey)؟", options: ["كل نقاط تواصل العميل مع الشركة", "رحلة سياحية", "الخروج"], answer: 0, tip: "فهم الرحلة يحلل نقاط القوة والضعف." },
                        { q: "كيف تتعامل مع أزمة علاقات عامة؟", options: ["بالشفافية والاعتذار الرسمي", "بالإنكار", "بالهرب"], answer: 0, tip: "الشفافية تبني الثقة في وقت الأزمات." },
                        { q: "ما هو مفهوم الـ 'Proactive Service'؟", options: ["حل المشكلة قبل حدوثها", "الرد بعد الشكوى", "لا يوجد"], answer: 0, tip: "الاستباقية هي أعلى مستويات الخدمة." }
                    ]
                }
            };

            try {
                await setDoc(doc(db, "jobs", "Customer_Service"), data);
                alert("تم رفع الـ 30 سؤال (4 مستويات) لوظيفة خدمة العملاء بنجاح! 🚀");
            } catch (e) {
                alert("خطأ: " + e.message);
                console.error(e);
            }
        }

        document.getElementById('uploadBtn').addEventListener('click', uploadCustomerServiceData);
    </script>
</body>
</html>
