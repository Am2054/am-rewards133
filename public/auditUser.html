<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AM REWARDS | نظام المراجعة المتقدم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; --bg: #0a0a0a; --card: #151515; --border: rgba(0, 242, 255, 0.15); --danger: #ff0055; --success: #00ffc3; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* البحث والبروفايل */
        .search-area { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: #111; color: #fff; outline: none; }
        .btn-search { background: var(--primary); color: #000; border: none; padding: 0 30px; border-radius: 12px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        
        .audit-grid { display: grid; grid-template-columns: 320px 1fr; gap: 25px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* الجداول الاحترافية */
        .section-title { color: var(--primary); font-size: 1.1rem; font-weight: 900; margin: 30px 0 15px; display: flex; align-items: center; gap: 10px; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        
        table { width: 100%; border-collapse: collapse; background: rgba(255,255,255,0.02); border-radius: 12px; overflow: hidden; }
        th { background: rgba(0, 242, 255, 0.05); color: var(--primary); text-align: right; padding: 15px; font-size: 0.85rem; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
        
        .btn-details { background: #333; color: var(--primary); border: 1px solid var(--primary); padding: 5px 15px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; font-weight: 700; }
        .btn-details:hover { background: var(--primary); color: #000; }

        /* نافذة التفاصيل (Modal) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card); width: 90%; max-width: 800px; max-height: 80vh; overflow-y: auto; padding: 30px; border-radius: 20px; border: 1px solid var(--primary); }
        .close-modal { float: left; color: var(--danger); font-size: 1.5rem; cursor: pointer; }

        .status-tag { padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 900; }
        .status-active { background: rgba(0, 255, 195, 0.1); color: var(--success); }
        .status-banned { background: rgba(255, 0, 85, 0.1); color: var(--danger); }
        
        .hidden { display: none !important; }
        .data-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="search-area">
        <input type="text" id="userInput" placeholder="أدخل UID أو البريد الإلكتروني للمستخدم...">
        <button class="btn-search" onclick="fetchUser()">فحص البيانات</button>
    </div>

    <div id="loader" class="hidden" style="text-align: center;"><img src="https://i.gifer.com/ZZ5H.gif" width="30"></div>

    <div id="mainUI" class="audit-grid hidden">
        <div class="card profile-info">
            <h2 id="view-name" style="margin-top:0; color:var(--primary);">...</h2>
            <div class="data-row"><span>UID:</span> <small id="view-uid" style="color:#888;"></small></div>
            <div class="data-row"><span>Device ID:</span> <small id="view-device" style="color:var(--danger);"></small></div>
            <div class="data-row"><span>النقاط:</span> <b id="view-points" style="color:var(--primary);">0</b></div>
            <div class="data-row"><span>الحالة:</span> <span id="view-status"></span></div>
            
            <div style="margin-top:20px; padding:15px; background:rgba(255,255,255,0.03); border-radius:12px;">
                <h4 style="margin:0 0 10px; font-size:0.8rem;">تعديل إداري</h4>
                <input type="number" id="editPoints" style="width:100%; margin-bottom:10px; padding:8px; box-sizing:border-box;">
                <button onclick="adminAction('updatePoints')" style="width:100%; background:var(--primary); color:#000; border:none; padding:10px; border-radius:8px; font-weight:900; cursor:pointer;">حفظ النقاط</button>
            </div>
        </div>

        <div class="logs-area">
            <div class="section-title">إحصائيات المهام</div>
            <div class="card" style="padding:0; overflow:hidden;">
                <table id="table-tasks">
                    <thead><tr><th>نوع المهمة</th><th>العدد المكتمل</th><th>إجمالي النقاط</th><th>التفاصيل</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="section-title">نظام الإحالات (10%)</div>
            <div class="card" style="padding:0; overflow:hidden;">
                <table id="table-referrals">
                    <thead><tr><th>المستخدم المدعو</th><th>عدد المدعوين</th><th>الأرباح منه</th><th>التفاصيل</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="section-title">سجل السحوبات</div>
            <div class="card" style="padding:0; overflow:hidden;">
                <table id="table-withdrawals">
                    <thead><tr><th>المحفظة</th><th>الرقم</th><th>المبلغ</th><th>التفاصيل</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="section-title">تذاكر الدعم الفني</div>
            <div class="card" style="padding:0; overflow:hidden;">
                <table id="table-tickets">
                    <thead><tr><th>المشكلة</th><th>الوقت</th><th>النقاط</th><th>الحالة</th><th>التفاصيل</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h3 id="modalTitle" style="color:var(--primary);">التفاصيل</h3>
        <div id="modalBody" style="margin-top:20px;"></div>
    </div>
</div>

<script>
    let globalData = null;

    async function fetchUser() {
        const q = document.getElementById('userInput').value;
        document.getElementById('loader').classList.remove('hidden');
        try {
            const res = await fetch(`/api/audit-user?query=${q}`);
            const data = await res.json();
            if(!res.ok) throw new Error(data.error);
            globalData = data;
            renderUI(data);
        } catch (e) { alert(e.message); }
        finally { document.getElementById('loader').classList.add('hidden'); }
    }

    function renderUI(data) {
        document.getElementById('mainUI').classList.remove('hidden');
        document.getElementById('view-name').innerText = data.profile.name;
        document.getElementById('view-uid').innerText = data.profile.uid;
        document.getElementById('view-device').innerText = data.profile.deviceId;
        document.getElementById('view-points').innerText = data.profile.points;
        document.getElementById('view-status').innerHTML = `<span class="status-tag ${data.profile.accountStatus === 'active' ? 'status-active' : 'status-banned'}">${data.profile.accountStatus}</span>`;

        // 1. رندر المهام
        const tasksBody = document.querySelector('#table-tasks tbody');
        tasksBody.innerHTML = Object.entries(data.tasksGrouped).map(([type, d]) => `
            <tr>
                <td>${type}</td>
                <td>${d.count}</td>
                <td style="color:var(--success)">${d.points}</td>
                <td><button class="btn-details" onclick="showTaskDetails('${type}')">عرض</button></td>
            </tr>
        `).join('');

        // 2. رندر الإحالات
        const refBody = document.querySelector('#table-referrals tbody');
        refBody.innerHTML = `<tr>
            <td>إجمالي المدعوين</td>
            <td>${data.referrals.length}</td>
            <td style="color:var(--success)">${data.profile.totalReferralEarnings || 0}</td>
            <td><button class="btn-details" onclick="showReferralDetails()">عرض</button></td>
        </tr>`;

        // 3. رندر السحوبات
        const withBody = document.querySelector('#table-withdrawals tbody');
        withBody.innerHTML = data.withdrawals.map(w => `
            <tr>
                <td>${w.method}</td>
                <td>${w.wallet || w.phone || 'N/A'}</td>
                <td>${w.amount} EGP</td>
                <td><button class="btn-details" onclick="showWithdrawDetails('${w.id}')">التفاصيل</button></td>
            </tr>
        `).join('');

        // 4. رندر التذاكر
        const ticketBody = document.querySelector('#table-tickets tbody');
        ticketBody.innerHTML = data.tickets.map(t => `
            <tr>
                <td>${t.selectedService || 'عامة'}</td>
                <td><small>${new Date(t.timestamp).toLocaleString('ar-EG')}</small></td>
                <td>${t.rewardPoints || 0}</td>
                <td><span class="status-tag status-active">${t.status}</span></td>
                <td><button class="btn-details" onclick="showTicketDetails('${t.id}')">فتح</button></td>
            </tr>
        `).join('');
    }

    // دوال التفاصيل (Show Details)
    function showTaskDetails(type) {
        const details = globalData.tasksGrouped[type].details;
        let html = `<table style="font-size:0.7rem;"><tr><th>ID المهمة</th><th>النقاط</th><th>التاريخ</th></tr>`;
        details.forEach(t => {
            html += `<tr><td>${t.taskId}</td><td>${t.pointsEarned}</td><td>${new Date(t.date).toLocaleString()}</td></tr>`;
        });
        openModal(`تفاصيل مهمة: ${type}`, html + `</table>`);
    }

    function showReferralDetails() {
        let html = `<table style="font-size:0.7rem;"><tr><th>الاسم</th><th>الربح منه</th><th>سحوبات متبقية</th></tr>`;
        globalData.referrals.forEach(r => {
            html += `<tr><td>${r.name}</td><td>${r.earnedFromHim}</td><td>${r.withdrawalsLeft} سحب</td></tr>`;
        });
        openModal(`قائمة المحالين`, html + `</table>`);
    }

    function showWithdrawDetails(id) {
        const w = globalData.withdrawals.find(x => x.id === id);
        const html = `
            <div class="data-row"><span>الحالة:</span> <b>${w.status}</b></div>
            <div class="data-row"><span>المبلغ الصافي:</span> <b>${w.net} EGP</b></div>
            <div class="data-row"><span>تاريخ الطلب:</span> <b>${new Date(w.timestamp).toLocaleString()}</b></div>
            <div class="data-row"><span>رقم المعاملة:</span> <small>${w.id}</small></div>
        `;
        openModal('تفاصيل السحب', html);
    }

    function showTicketDetails(id) {
        const t = globalData.tickets.find(x => x.id === id);
        const html = `
            <p><b>الرسالة:</b><br>${t.message}</p>
            <p style="color:var(--primary)"><b>رد الإدارة:</b><br>${t.adminReply || 'لا يوجد رد بعد'}</p>
            <div class="data-row"><span>معلومات إضافية:</span> <b>${t.extraData || 'لا يوجد'}</b></div>
        `;
        openModal('تفاصيل التذكرة', html);
    }

    function openModal(title, body) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalBody').innerHTML = body;
        document.getElementById('detailModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('detailModal').style.display = 'none'; }

    async function adminAction(action) {
        const uid = document.getElementById('view-uid').innerText;
        const amount = document.getElementById('editPoints').value;
        const res = await fetch(`/api/audit-user?query=${uid}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action, amount })
        });
        if(res.ok) { alert("تم التحديث"); fetchUser(); }
    }
</script>
</body>
</html>
