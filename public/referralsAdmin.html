<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AM REWARDS | REFERRAL ROYALTY</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0c;
      --accent: #d4af37; /* Royal Gold */
      --secondary: #8e44ad; /* Deep Purple */
      --card: rgba(30, 30, 45, 0.6);
      --text: #f8f9fa;
      --glass: rgba(255, 255, 255, 0.03);
    }

    body {
      margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text);
      background-image: radial-gradient(circle at 0% 0%, #2c1a33 0%, #0a0a0c 50%);
      min-height: 100vh; overflow-x: hidden;
    }

    .wrap { max-width: 1200px; margin: 0 auto; padding: 20px; }

    /* Login Section */
    #loginBox {
      position: fixed; inset: 0; background: #000;
      display: flex; align-items: center; justify-content: center; z-index: 10000;
    }
    .auth-card {
      width: 380px; padding: 50px; background: var(--card);
      border: 1px solid var(--secondary); border-radius: 40px;
      text-align: center; box-shadow: 0 10px 50px rgba(142, 68, 173, 0.2);
    }
    .auth-card h2 { font-family: 'Syncopate'; color: var(--accent); letter-spacing: 3px; }
    .auth-card input {
      width: 100%; padding: 15px; margin-top: 25px; border-radius: 15px;
      border: 1px solid var(--glass); background: #16161d; color: #fff; text-align: center;
    }
    .auth-card button {
      width: 100%; padding: 15px; margin-top: 20px; border-radius: 15px;
      border: none; background: linear-gradient(45deg, var(--secondary), #9b59b6);
      color: #fff; font-weight: 900; cursor: pointer; transition: 0.3s;
    }

    /* Header */
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 30px; background: var(--card); border-radius: 30px;
      border: 1px solid var(--glass); backdrop-filter: blur(20px); margin-bottom: 30px;
    }
    header h1 { font-family: 'Syncopate'; font-size: 1.1rem; color: var(--accent); margin:0; }

    /* Metrics Grid */
    .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
    .stat-box {
      background: var(--card); padding: 30px; border-radius: 30px;
      border: 1px solid var(--glass); position: relative; overflow: hidden;
      text-align: center; border-top: 4px solid var(--accent);
    }
    .stat-box strong { display: block; font-size: 2.2rem; font-family: 'Syncopate'; margin-bottom: 5px; }
    .stat-box span { color: #aaa; font-size: 0.8rem; letter-spacing: 1px; }

    /* Tables */
    .table-section {
      background: var(--card); border-radius: 35px; border: 1px solid var(--glass);
      padding: 25px; backdrop-filter: blur(15px); margin-bottom: 30px;
    }
    .table-section h3 { margin-top: 0; color: var(--accent); font-weight: 900; display: flex; align-items: center; gap: 10px; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th { text-align: right; padding: 15px; color: var(--secondary); font-size: 0.8rem; border-bottom: 1px solid var(--glass); }
    td { padding: 15px; border-bottom: 1px solid var(--glass); font-size: 0.95rem; }

    /* Custom Elements */
    .rank-num { font-family: 'Syncopate'; color: var(--secondary); font-weight: 900; }
    .comm-val { color: #2ecc71; font-weight: 900; }
    .details-btn {
      background: var(--glass); border: 1px solid var(--accent); color: var(--accent);
      padding: 8px 15px; border-radius: 10px; cursor: pointer; font-size: 0.75rem; transition: 0.3s;
    }
    .details-btn:hover { background: var(--accent); color: #000; }

    /* Modal */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 10000; backdrop-filter: blur(10px); }
    .modal-content {
      width: 90%; max-width: 600px; background: #16161d; border-radius: 35px;
      border: 1px solid var(--secondary); padding: 35px; max-height: 80vh; overflow-y: auto;
    }
    .friend-card {
      background: rgba(255,255,255,0.02); padding: 15px; border-radius: 20px;
      margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
      border: 1px solid var(--glass);
    }
    .progress-track { width: 100px; height: 5px; background: #222; border-radius: 5px; margin-top: 5px; }
    .progress-fill { height: 100%; background: var(--secondary); border-radius: 5px; transition: 1s; }

    .hidden { display: none !important; }
    button { font-family: 'Cairo'; }

  </style>
</head>
<body>

  <div id="loginBox">
    <div class="auth-card">
      <h2>REF-CORE LOGIN</h2>
      <input type="password" id="adminPass" placeholder="ADMIN_PASSWORD2">
      <button id="loginBtn">ACCESS DATABASE</button>
    </div>
  </div>

  <div id="main-ui" class="wrap hidden">
    <header>
      <h1>NETWORK <span style="font-weight:300; opacity:0.6;">GENEALOGY</span></h1>
      <div style="display:flex; gap:10px;">
        <button onclick="loadReferralData()" class="details-btn" style="border-color:var(--secondary); color:var(--secondary);">🔄 Refresh</button>
        <button id="logoutBtn" class="details-btn" style="border-color:#e74c3c; color:#e74c3c;">EXIT</button>
      </div>
    </header>

    <div class="metrics">
      <div class="stat-box">
        <strong id="totalReferrals">0</strong> <span>إجمالي الشبكة</span>
      </div>
      <div class="stat-box" style="border-top-color:var(--secondary);">
        <strong id="totalRewardEGP">0.00</strong> <span>العمولات الموزعة (ج.م)</span>
      </div>
    </div>

    <div class="table-section">
      <h3>👑 حيتان الإحالات (Leaderboard)</h3>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>الرتبة</th>
              <th>الداعي</th>
              <th>الأصدقاء</th>
              <th>العمولة</th>
              <th>التحكم</th>
            </tr>
          </thead>
          <tbody id="leaderboardBody"></tbody>
        </table>
      </div>
    </div>

    <div class="table-section" style="border-top: 2px solid var(--secondary);">
      <h3>📡 آخر الإشارات (Live Logs)</h3>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>الصديق</th>
              <th>بواسطة (UID)</th>
              <th>الحالة</th>
            </tr>
          </thead>
          <tbody id="liveLogsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="detailsModal" class="modal hidden">
    <div class="modal-content">
      <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <h3 id="modalTitle" style="color:var(--accent); margin:0;">تفاصيل الشبكة</h3>
        <span onclick="closeModal()" style="cursor:pointer; color:#e74c3c; font-weight:900;">✕</span>
      </div>
      <div id="friendsListContainer"></div>
    </div>
  </div>

  <script>
    let cachedData = [];

    async function apiRequest(data) {
  try {
    const res = await fetch('/api/admin_tasks', { // يكلم نفس الملف الموحد
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...data, module: 'referrals' }) // تحديد الموديول
    });
    if (res.status === 401) { toggleUI(false); return null; }
    return await res.json();
  } catch (e) { return null; }
}

// تعديل زر الخروج ليمسح التوكن الصحيح
document.getElementById('logoutBtn').onclick = () => {
  document.cookie = "refToken=; max-age=0; path=/";
  location.reload();
};


    async function loadReferralData() {
      const data = await apiRequest({ action: 'get_referrals_stats' });
      if (data) {
        cachedData = data.leaderboard;
        renderUI(data);
      }
    }

    function renderUI(data) {
      document.getElementById('totalReferrals').innerText = data.totalConversions;
      document.getElementById('totalRewardEGP').innerText = data.totalSystemCommission.toFixed(2);

      const lbBody = document.getElementById('leaderboardBody');
      lbBody.innerHTML = data.leaderboard.map((user, i) => `
        <tr>
          <td><span class="rank-num">#${i + 1}</span></td>
          <td><b>${user.name}</b><br><small style="color:#666;">${user.email}</small></td>
          <td><span style="background:rgba(212,175,55,0.1); color:var(--accent); padding:2px 8px; border-radius:5px;">${user.friends.length}</span></td>
          <td class="comm-val">${user.totalComm.toFixed(2)}</td>
          <td><button class="details-btn" onclick="showFriends('${user.id}')">التفاصيل</button></td>
        </tr>
      `).join('');

      const logsBody = document.getElementById('liveLogsBody');
      logsBody.innerHTML = data.recentLogs.map(u => `
        <tr>
          <td>${u.name}</td>
          <td><code style="color:var(--secondary);">${u.referredBy.slice(0,10)}</code></td>
          <td><span style="color:#2ecc71; font-size:0.7rem;">● متصل</span></td>
        </tr>
      `).join('');
    }

    function showFriends(userId) {
      const user = cachedData.find(u => u.id === userId);
      if (!user) return;
      document.getElementById('modalTitle').innerText = `أصدقاء ${user.name}`;
      const container = document.getElementById('friendsListContainer');
      container.innerHTML = user.friends.map(f => `
        <div class="friend-card">
          <div><b>${f.name}</b><br><small style="color:#666">${f.email}</small></div>
          <div style="text-align:left;">
            <div style="font-size:0.7rem;">سحبات: ${f.withdrawalsCount}/10</div>
            <div class="progress-track"><div class="progress-fill" style="width:${Math.min(f.withdrawalsCount*10, 100)}%"></div></div>
            <div style="color:#2ecc71; font-size:0.8rem; margin-top:5px;">+${f.commGenerated.toFixed(2)}</div>
          </div>
        </div>
      `).join('');
      document.getElementById('detailsModal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('detailsModal').classList.add('hidden'); }
    function toggleUI(is) { 
      document.getElementById('loginBox').classList.toggle('hidden', is); 
      document.getElementById('main-ui').classList.toggle('hidden', !is); 
    }

    document.getElementById('loginBtn').onclick = async () => {
      const pass = document.getElementById('adminPass').value;
      const res = await apiRequest({ action: 'admin_login', password: pass });
      if (res?.success) { toggleUI(true); loadReferralData(); }
    };

    document.getElementById('logoutBtn').onclick = () => {
      document.cookie = "adminToken=; max-age=0; path=/";
      location.reload();
    };

    window.onload = () => { if(document.cookie.includes('adminToken')) { toggleUI(true); loadReferralData(); } };
  </script>
</body>
</html>
