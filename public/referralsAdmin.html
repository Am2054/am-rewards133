<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AM REWARDS | REFERRALS CONTROL PRO</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #030712; --card: rgba(17, 24, 39, 0.7); --gold: #f5c542; 
      --border: rgba(245, 197, 66, 0.1); --text: #eef2f7; --accent: #00fa9a;
      --blue: #3b82f6; --red: #ef4444; --cyan: #00f2ff;
    }
    body { font-family: "Cairo", sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; min-height: 100vh; background-image: radial-gradient(circle at top right, #1e293b, #030712); }
    .wrap { max-width: 1200px; margin: 0 auto; }
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; padding: 20px; background: var(--card); border-radius: 20px; border: 1px solid var(--border); backdrop-filter: blur(10px); }
    header h1 { margin: 0; font-family: 'Syncopate'; font-size: 1.2rem; letter-spacing: 1px; }
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-item { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--border); text-align: center; border-bottom: 3px solid var(--gold); transition: 0.3s; }
    .stat-item strong { display: block; font-size: 1.8rem; color: #fff; font-family: 'Syncopate'; margin-bottom: 5px; }
    .stat-item span { color: var(--gold); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
    .table-card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--border); margin-bottom: 30px; backdrop-filter: blur(15px); }
    .table-container { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 800px; }
    th { padding: 15px; color: var(--gold); font-size: 0.8rem; text-align: right; border-bottom: 1px solid var(--border); font-weight: 900; }
    td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; vertical-align: middle; }
    .btn-main { background: var(--gold); color: #000; font-weight: 900; border: none; padding: 12px 25px; border-radius: 12px; cursor: pointer; transition: 0.3s; font-family: 'Cairo'; }
    .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(245, 197, 66, 0.3); }
    .status-badge { padding: 5px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: 900; background: rgba(0,250,154,0.1); color: var(--accent); border: 1px solid var(--accent); cursor: pointer; transition: 0.2s; }
    .status-badge:hover { background: var(--accent); color: #000; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(8px); }
    .modal-content { background: #0f172a; padding: 30px; border-radius: 25px; border: 1px solid var(--gold); width: 95%; max-width: 650px; max-height: 80vh; overflow-y: auto; animation: slideUp 0.4s ease; }
    @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .friend-row { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
    .progress-mini { width: 120px; height: 6px; background: #1e293b; border-radius: 10px; overflow: hidden; margin-top: 8px; }
    .progress-bar-mini { height: 100%; background: var(--accent); box-shadow: 0 0 10px var(--accent); transition: 1s width ease-in-out; }
    .hidden { display: none !important; }
    .clickable { color: var(--cyan); cursor: pointer; transition: 0.3s; font-weight: 700; }
    .clickable:hover { color: var(--gold); text-decoration: underline; }

    /* Login System */
    #loginBox { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 5000; }
    .auth-card { background: var(--card); padding: 45px; border-radius: 35px; border: 1px solid var(--gold); text-align: center; width: 350px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
    .auth-card input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 15px; border: 1px solid var(--border); background: #000; color: #fff; text-align: center; font-size: 1.1rem; outline: none; }
    .auth-card input:focus { border-color: var(--gold); }
  </style>
</head>
<body>

  <div id="loginBox">
    <div class="auth-card">
      <h2 style="font-family:'Syncopate'; color:var(--gold); margin-bottom:25px;">REF-PRO ACCESS</h2>
      <input type="password" id="adminPass" placeholder="ADMIN_PASSWORD2">
      <button class="btn-main" id="loginBtn" style="width:100%">UNLOCK DATABASE</button>
    </div>
  </div>

  <div id="main-ui" class="wrap hidden">
    <header>
      <h1>REFERRALS <span style="color:var(--gold);">CONTROL CENTER</span></h1>
      <button class="btn-main" id="refreshBtn">SYNC DATA</button>
    </header>

    <div class="metrics">
      <div class="stat-item"><strong id="totalReferrals">0</strong> <span>إجمالي التحويلات</span></div>
      <div class="stat-item"><strong id="totalRewardEGP">0.00</strong> <span>إجمالي العمولات الموزعة</span></div>
    </div>

    <div class="table-card">
        <h3 style="color:var(--gold); margin-bottom:20px; font-family:'Cairo';">🏆 متصدري نظام الإحالات</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>الترتيب</th>
                        <th>اسم الداعي</th>
                        <th>عدد الأصدقاء</th>
                        <th>العمولة المكتسبة</th>
                        <th>الإجراء</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody"></tbody>
            </table>
        </div>
    </div>

    <div class="table-card">
        <h3 style="color:var(--cyan); margin-bottom:20px; font-family:'Cairo';">📡 سجل النشاطات الأخير (Server Logs)</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>الصديق المنضم</th>
                        <th>كود الداعي (UID)</th>
                        <th>الحالة المبدئية</th>
                    </tr>
                </thead>
                <tbody id="liveLogsBody"></tbody>
            </table>
        </div>
    </div>
  </div>
  
  <div id="detailsModal" class="modal hidden">
    <div class="modal-content">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; border-bottom:1px solid var(--border); padding-bottom:15px;">
        <h3 id="modalTitle" style="color:var(--gold); margin:0; font-family:'Cairo';">تفاصيل الأصدقاء</h3>
        <span style="color:var(--red); cursor:pointer; font-weight:bold; font-size:1.5rem;" id="closeModalBtn">✕</span>
      </div>
      <div id="friendsListContainer"></div>
    </div>
  </div>

  <script>
    // --- إعدادات الأمان المتقدمة ---
    const getSecureFingerprint = () => {
        return btoa(
            navigator.userAgent + 
            screen.width + 
            screen.height + 
            Intl.DateTimeFormat().resolvedOptions().timeZone +
            navigator.language
        ).slice(0, 32);
    };

    const fingerprint = getSecureFingerprint();
    let cachedLeaderboard = [];

    // --- دالة التواصل مع الـ Backend ---
    async function apiRequest(data) {
        try {
            const res = await fetch('/api/admin', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'x-fingerprint': fingerprint 
                },
                body: JSON.stringify(data)
            });
            
            if (res.status === 401 || res.status === 403) {
                toggleUI(false);
                return null;
            }
            
            if (res.status === 429) {
                alert("Too many requests! Please wait.");
                return null;
            }

            return await res.json();
        } catch (error) {
            console.error("Connection Error:", error);
            return null;
        }
    }

    // --- جلب البيانات وعرضها ---
    async function loadReferralData() {
        const data = await apiRequest({ action: 'get_referrals_stats' });
        if (data) {
            cachedLeaderboard = data.leaderboard;
            renderUI(data);
        }
    }

    function renderUI(data) {
        // تحديث العدادات
        document.getElementById('totalReferrals').innerText = data.totalConversions;
        document.getElementById('totalRewardEGP').innerText = data.totalSystemCommission.toFixed(2);

        // بناء جدول المتصدرين
        const lbBody = document.getElementById('leaderboardBody');
        lbBody.innerHTML = data.leaderboard.map((user, i) => `
            <tr>
                <td><b style="color:${i < 3 ? 'var(--gold)' : '#64748b'}">#${i + 1}</b></td>
                <td class="clickable view-friends" data-id="${user.id}">${user.name}</td>
                <td><span style="background:rgba(255,255,255,0.05); padding:4px 10px; border-radius:6px;">${user.friends.length}</span></td>
                <td style="color:var(--accent); font-weight:900;">${user.totalComm.toFixed(2)} ج.م</td>
                <td><button class="status-badge view-friends" data-id="${user.id}">عرض التفاصيل</button></td>
            </tr>
        `).join('');

        // بناء سجل النشاطات
        const logsBody = document.getElementById('liveLogsBody');
        logsBody.innerHTML = data.recentLogs.map(u => `
            <tr>
                <td>${u.name}<br><small style="color:#64748b">${u.email}</small></td>
                <td><code style="color:var(--cyan)">${u.referredBy.slice(0, 12)}...</code></td>
                <td><span class="status-badge" style="border-color:var(--blue); color:var(--blue); background:rgba(59,130,246,0.1)">قيد المتابعة</span></td>
            </tr>
        `).join('');

        // ربط الأحداث بطريقة آمنة
        attachEventListeners();
    }

    function attachEventListeners() {
        document.querySelectorAll('.view-friends').forEach(btn => {
            btn.addEventListener('click', () => {
                const userId = btn.getAttribute('data-id');
                const userData = cachedLeaderboard.find(u => u.id === userId);
                if (userData) showFriendsModal(userData);
            });
        });
    }

    function showFriendsModal(boss) {
        document.getElementById('modalTitle').innerText = `قائمة أصدقاء: ${boss.name}`;
        const container = document.getElementById('friendsListContainer');
        
        container.innerHTML = boss.friends.map(f => {
            const progress = Math.min((f.withdrawalsCount / 10) * 100, 100);
            return `
                <div class="friend-row">
                    <div>
                        <div style="font-weight:900; color:#fff;">${f.name}</div>
                        <div style="font-size:11px; color:#64748b;">${f.email}</div>
                    </div>
                    <div style="text-align:left">
                        <div style="font-size:11px; margin-bottom:4px;">السحبات: ${f.withdrawalsCount}/10</div>
                        <div class="progress-mini"><div class="progress-bar-mini" style="width:${progress}%"></div></div>
                        <div style="color:var(--accent); font-size:12px; font-weight:bold; margin-top:8px;">+${f.commGenerated.toFixed(2)} ج.م</div>
                    </div>
                </div>
            `;
        }).join('');
        
        document.getElementById('detailsModal').classList.remove('hidden');
    }

    // --- إدارة الجلسة والواجهة ---
    function toggleUI(isLoggedIn) {
        document.getElementById('loginBox').classList.toggle('hidden', isLoggedIn);
        document.getElementById('main-ui').classList.toggle('hidden', !isLoggedIn);
    }

    document.getElementById('loginBtn').addEventListener('click', async () => {
        const pass = document.getElementById('adminPass').value;
        const res = await apiRequest({ action: 'admin_login', password: pass });
        if (res?.success) {
            toggleUI(true);
            loadReferralData();
        } else {
            alert("خطأ: كلمة المرor غير صحيحة أو غير مصرح لك.");
        }
    });

    document.getElementById('refreshBtn').addEventListener('click', loadReferralData);
    
    document.getElementById('closeModalBtn').addEventListener('click', () => {
        document.getElementById('detailsModal').classList.add('hidden');
    });

    // تسجيل الخروج التلقائي عند مسح الكوكيز أو انتهاء الجلسة
    if (document.cookie.includes('adminToken')) {
        toggleUI(true);
        loadReferralData();
    }
  </script>
</body>
</html>
